<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTuongFX - Trăm phim một chợ (OPhim API)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện HLS.js để xử lý luồng m3u8 và lấy thời gian xem -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        app: '#0f111a', 
                        surface: '#1c1f2e', 
                        menu: '#2a2f4c',
                        primary: '#fcd34d',
                        'primary-dark': '#fbbf24',
                        text: '#f8fafc',
                        muted: '#94a3b8'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
        }
        
        body { 
            background-color: #0f111a; color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
            overscroll-behavior-y: none;
        }

        .watch-gradient { background: linear-gradient(to top, #0f111a 10%, rgba(15, 17, 26, 0.8) 50%, rgba(15, 17, 26, 0.4) 100%); }
        .tab-active { color: #fcd34d; border-bottom: 2px solid #fcd34d; }
        .bottom-sheet-open { transform: translateY(0%); }
        .bottom-sheet-closed { transform: translateY(100%); }
        
        @media (min-width: 640px) {
            .bottom-sheet-open { transform: scale(1); opacity: 1; pointer-events: auto;}
            .bottom-sheet-closed { transform: scale(0.95); opacity: 0; pointer-events: none; }
        }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
        
        video#kt-player { outline: none; background-color: #000; }
        video::-webkit-media-controls-panel { background-image: linear-gradient(transparent, rgba(0, 0, 0, 0.8)); }

        /* Style cho số thứ hạng Top 10 giống Netflix */
        .netflix-number {
            font-size: 120px;
            font-weight: 900;
            line-height: 0.8;
            color: #0f111a;
            -webkit-text-stroke: 3px #64748b; /* Viền xám */
            position: absolute;
            left: -15px;
            bottom: 25px;
            z-index: 0;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.8);
            letter-spacing: -5px;
            user-select: none;
        }

        @media (max-width: 640px) {
            .netflix-number {
                font-size: 100px;
                left: -10px;
                bottom: 25px;
                -webkit-text-stroke: 2px #64748b;
            }
        }
        
        .top-netflix-card {
            padding-left: 45px; /* Tạo khoảng trống cho số đằng sau poster */
        }
        @media (max-width: 640px) {
            .top-netflix-card { padding-left: 35px; }
        }
    </style>

on border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Colombia</button><button onclick="AppHandlers.loadList('quoc-gia', 'phan-lan', 'Phần Lan'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Phần Lan</button><button onclick="AppHandlers.loadList('quoc-gia', 'viet-nam', 'Việt Nam'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Việt Nam</button><button onclick="AppHandlers.loadList('quoc-gia', 'chile', 'Chile'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Chile</button><button onclick="AppHandlers.loadList('quoc-gia', 'hy-lap', 'Hy Lạp'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Hy Lạp</button><button onclick="AppHandlers.loadList('quoc-gia', 'nigeria', 'Nigeria'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Nigeria</button><button onclick="AppHandlers.loadList('quoc-gia', 'argentina', 'Argentina'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Argentina</button><button onclick="AppHandlers.loadList('quoc-gia', 'singapore', 'Singapore'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">Singapore</button></div>
            </div>

            <!-- Công cụ & Liên hệ -->
            <div class="border-t border-white/10 pt-6 space-y-4">
                <button onclick="AppHandlers.downloadSource()" class="w-full bg-surface border border-white/10 text-white font-medium text-sm py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-white/10 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Tải HTML mã nguồn web
                </button>
                <div class="text-center">
                    <p class="text-xs text-muted mb-1">Liên hệ hỗ trợ Admin:</p>
                    <a href="mailto:ktuongzxzx@gmail.com" class="text-sm font-bold text-primary hover:underline">ktuongzxzx@gmail.com</a>

    <!-- Main Content -->
    <main class="w-full max-w-screen-xl mx-auto pt-16 min-h-screen">
        
        <!-- View: HOME -->
        <div id="view-home" class="flex flex-col gap-6 animate-fade-in pb-10"></div>
        
        <!-- View: WATCH -->
        <div id="view-watch" class="animate-fade-in w-full hidden"></div>
        
        <!-- View: SEARCH & LISTS -->
        <div id="view-search" class="animate-fade-in p-4 lg:p-8 hidden">
            <div class="relative max-w-2xl mx-auto mb-8">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="text-muted" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="search-input" class="w-full bg-surface border border-white/10 text-white rounded-2xl py-3.5 pl-12 pr-4 focus:outline-none focus:border-primary transition-all placeholder-muted text-base shadow-lg" placeholder="Nhập tên phim, diễn viên..." oninput="AppHandlers.onSearchInput(this.value)" autocomplete="off">
            </div>
            <div id="search-title" class="text-lg md:text-xl font-bold mb-4 px-2 text-primary">Tìm kiếm</div>
            <div id="search-results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2"></div>
        </div>
        
        <!-- View: HISTORY -->
        <div id="view-history" class="animate-fade-in p-4 lg:p-8 hidden">
            <div class="flex gap-6 mb-6 border-b border-white/10 px-2">
                <button onclick="AppHandlers.switchHistoryTab('recent')" id="htab-recent" class="pb-3 text-base md:text-lg font-bold tab-active transition-colors">Tiếp tục xem</button>
                <button onclick="AppHandlers.switchHistoryTab('favs')" id="htab-favs" class="pb-3 text-base md:text-lg font-bold text-muted hover:text-white transition-colors">Yêu Thích</button>
            </div>
            <div id="history-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2">
            </div>
        </div>
    </main>

    <!-- Javascript -->
    <script>
        const CONFIG = { 
            API_BASE: 'https://ophim1.com', 
            IMG_BASE: 'https://img.ophim.live/uploads/movies/',
            HERO_LIMIT: 10,
            HERO_AUTO_PLAY_INTERVAL: 5000,
            // Đa dạng hóa chuyên mục, có tính năng đánh thứ hạng (rank)
            MOVIE_ROWS: [
                { title: 'Phim Mới Phát Hành', type: 'danh-sach', slug: 'phim-moi-cap-nhat', limit: 12 },
                { title: 'Top Hành Động Kịch Tính', type: 'the-loai', slug: 'hanh-dong', limit: 10, rank: true },
                { title: 'Siêu Phẩm Hoạt Hình (Anime)', type: 'the-loai', slug: 'hoat-hinh', limit: 10, rank: true },
                { title: 'Kinh Dị & Giật Gân', type: 'the-loai', slug: 'kinh-di', limit: 12 },
                { title: 'Top Hài Hước Để Xả Stress', type: 'the-loai', slug: 'hai-huoc', limit: 10, rank: true },
                { title: 'Tâm Lý Sâu Sắc', type: 'the-loai', slug: 'tam-ly', limit: 12 },
                { title: 'Lãng Mạn - Tình Cảm', type: 'the-loai', slug: 'tinh-cam', limit: 12 },
                { title: 'Phim Lẻ Đặc Sắc', type: 'danh-sach', slug: 'phim-le', limit: 12 },
                { title: 'Khoa Học Viễn Tưởng', type: 'the-loai', slug: 'vien-tuong', limit: 12 }
            ]
        };

        const AppState = {
            currentView: 'home', genres: [], countries: [], searchTimeout: null,
            watchData: null, activeServerIdx: 0, activeEpIdx: 0, isPlaying: false, 
            heroInterval: null, totalHeroSlides: 0, currentHeroSlide: 0,
            hlsInstance: null, saveInterval: null,
            favorites: JSON.parse(localStorage.getItem('ktuong_favs') || '[]'),
            history: JSON.parse(localStorage.getItem('ktuong_history') || '[]'),
            touchStartX: 0, touchEndX: 0
        };

        const Utils = {
            getImage: (path) => {
                if(!path) return 'https://placehold.co/300x450/1c1f2e/94a3b8?text=No+Poster';
                if(path.startsWith('http')) return path;
                return `${CONFIG.IMG_BASE}${path.replace(/^\/+/, '')}`;
            },
            showLoading: (fullHeight = false) => `<div class="flex flex-col items-center justify-center w-full ${fullHeight ? 'min-h-[60vh]' : 'py-12'}"><div class="w-10 h-10 border-4 border-surface border-t-primary rounded-full animate-spin"></div></div>`,
            
            saveHistory: (movie, epIdx = 0, epName = '', currentTime = 0) => {
                if(!movie || !movie.slug) return;
                let hist = AppState.history.filter(m => m.slug !== movie.slug);
                hist.unshift({ 
                    slug: movie.slug, 
                    name: movie.name, 
                    origin_name: movie.origin_name, 
                    thumb_url: movie.thumb_url || movie.poster_url, 
                    last_ep_idx: epIdx, 
                    last_ep_name: epName,
                    current_time: currentTime 
                });
                if (hist.length > 50) hist.pop(); 
                AppState.history = hist; 
                localStorage.setItem('ktuong_history', JSON.stringify(hist));
            },
            toggleFavorite: (movie) => {
                const isFav = AppState.favorites.some(m => m.slug === movie.slug);
                if (isFav) AppState.favorites = AppState.favorites.filter(m => m.slug !== movie.slug);
                else AppState.favorites.unshift({ slug: movie.slug, name: movie.name, origin_name: movie.origin_name, thumb_url: movie.thumb_url || movie.poster_url });
                localStorage.setItem('ktuong_favs', JSON.stringify(AppState.favorites)); return !isFav;
            },
            isFavorite: (slug) => AppState.favorites.some(m => m.slug === slug),
            formatTime: (seconds) => {
                if (!seconds) return "00:00";
                const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
                return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            }
        };

        const API = {
            fetchJSON: async (endpoint) => { try { return await (await fetch(`${CONFIG.API_BASE}${endpoint}`)).json(); } catch(e) { return null; } },
            getAppData: async () => {
                const [g, c] = await Promise.all([API.fetchJSON('/the-loai'), API.fetchJSON('/quoc-gia')]);
                if (g) AppState.genres = g; if (c) AppState.countries = c;
            },
            getMovieDetails: async (slug) => API.fetchJSON(`/phim/${slug}`),
            search: async (kw, limit=24) => API.fetchJSON(`/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=${limit}`),
            getList: async (type, slug, limit=24) => {
                let ep = ['phim-bo', 'phim-le', 'tv-shows', 'hoat-hinh', 'phim-moi-cap-nhat'].includes(slug) ? `/v1/api/danh-sach/${slug}?limit=${limit}` : `/v1/api/${type}/${slug}?limit=${limit}`;
                return API.fetchJSON(ep);
            }
        };

        const Render = {
            // Card phim thường có thêm tuỳ chọn rank (đánh số góc)
            movieCard: (m, badgeStr, rank = null) => {
                let badge = badgeStr || (m.episode_current ? m.episode_current : '');
                if(m.current_time && badgeStr) {
                     badge += ` (${Utils.formatTime(m.current_time)})`;
                }
                
                const rankHtml = rank ? `<div class="absolute -top-2 -right-2 bg-primary text-black font-black w-7 h-7 rounded-full flex items-center justify-center border-2 border-surface z-20 text-xs shadow-lg">#${rank}</div>` : '';

                return `
                <div class="group cursor-pointer flex flex-col h-full shrink-0 w-32 md:w-40 snap-start relative" onclick="AppHandlers.goToWatch('${m.slug}')">
                    ${rankHtml}
                    <div class="relative aspect-[2/3] rounded-xl overflow-hidden bg-surface mb-2.5 border border-white/5 shadow-sm">
                        <img src="${Utils.getImage(m.thumb_url || m.poster_url)}" loading="lazy" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=Loi+Anh'"/>
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="w-10 h-10 bg-primary text-black rounded-full flex items-center justify-center shadow-lg"><svg width="18" height="18" fill="currentColor" class="ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                        </div>
                        ${badge ? `<div class="absolute top-1.5 left-1.5 max-w-[90%]"><span class="bg-primary/90 backdrop-blur text-black text-[10px] font-bold px-1.5 py-0.5 rounded block truncate">${badge}</span></div>` : ''}
                    </div>
                    <h3 class="font-bold text-[13px] md:text-sm text-text line-clamp-1 group-hover:text-primary transition-colors">${m.name}</h3>
                </div>`;
            },

            // Card phim Top Netflix Style (Số khổng lồ phía sau)
            topNetflixCard: (m, index, isGrid = false) => {
                const num = index + 1;
                const badge = m.episode_current ? m.episode_current : '';
                return `
                <div class="group cursor-pointer flex flex-col h-full shrink-0 top-netflix-card relative ${isGrid ? 'w-full' : 'w-44 md:w-52 snap-start'}" onclick="AppHandlers.goToWatch('${m.slug}')">
                    <div class="netflix-number transition-transform duration-500 group-hover:-translate-y-1">${num}</div>
                    <div class="relative aspect-[2/3] rounded-xl overflow-hidden bg-surface mb-2.5 shadow-xl border border-white/10 z-10 transition-transform duration-500 group-hover:scale-105">
                        <img src="${Utils.getImage(m.thumb_url || m.poster_url)}" loading="lazy" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=Loi+Anh'"/>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="w-12 h-12 bg-primary/90 backdrop-blur text-black rounded-full flex items-center justify-center shadow-lg transform scale-90 group-hover:scale-100 transition-transform"><svg width="22" height="22" fill="currentColor" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                        </div>
                        ${badge ? `<div class="absolute top-2 right-2 max-w-[90%]"><span class="bg-black/60 backdrop-blur text-white border border-white/20 text-[10px] font-bold px-2 py-1 rounded-md block truncate">${badge}</span></div>` : ''}
                    </div>
                    <h3 class="font-bold text-sm text-text line-clamp-1 group-hover:text-primary transition-colors z-10 drop-shadow-md">${m.name}</h3>
                </div>`;
            },

            // Row hiển thị Top 10 hôm nay (Netflix style)
            topHorizontalRow: (title, items) => {
                if (!items || !items.length) return '';
                return `
                <section class="px-4 md:px-6 mt-2 mb-4 relative">
                    <div class="flex justify-between items-center mb-6 relative z-20">
                        <h2 class="text-2xl md:text-3xl font-black text-white tracking-tight drop-shadow-lg">${title} <span class="text-primary">#10</span></h2>
                        <button onclick="AppHandlers.loadTop50()" class="text-sm font-bold text-primary hover:text-white transition-colors flex items-center gap-1 bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full border border-white/10">Xem Top 50 <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5l7 7-7 7"></path></svg></button>
                    </div>
                    <div class="flex overflow-x-auto hide-scrollbar gap-2 pb-6 pt-2 snap-x snap-mandatory relative z-10">
                        ${items.map((m, i) => Render.topNetflixCard(m, i)).join('')}
                    </div>
                </section>`;
            },
            
            horizontalRow: (title, items, type, slug, isRanked = false) => {
                if (!items || !items.length) return '';
                const viewAllAction = slug !== 'recent' ? `onclick="AppHandlers.loadList('${type}', '${slug}', '${title}')"` : `onclick="AppHandlers.navigate('history')"`;
                return `
                <section class="px-4 md:px-6 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight">${title} <svg class="inline w-5 h-5 text-primary -mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></h2>
                        <button ${viewAllAction} class="text-sm font-medium text-muted hover:text-primary transition-colors">Xem tất cả</button>
                    </div>
                    <div class="flex overflow-x-auto hide-scrollbar gap-3 md:gap-4 pb-4 snap-x snap-mandatory pt-2">
                        ${items.map((m, i) => Render.movieCard(m, '', isRanked ? (i + 1) : null)).join('')}
                    </div>
                </section>`;
            },

            heroBanner: (movies) => {
                if(!movies || !movies.length) return '';
                AppState.totalHeroSlides = movies.length;
                AppState.currentHeroSlide = 0;

                let slidesHtml = movies.map((res, index) => {
                    if(!res || !res.movie) return '';
                    const m = res.movie;
                    const imdb = m.tmdb?.vote_average ? `<span class="bg-[#f5c518] text-black text-[10px] md:text-xs font-bold px-2 py-1 rounded">IMDb ${m.tmdb.vote_average}</span>` : '';
                    const tmdb = m.tmdb?.vote_average ? `<span class="bg-[#01b4e4] text-white text-[10px] md:text-xs font-bold px-2 py-1 rounded">TMDB ${m.tmdb.vote_average}</span>` : '';
                    const year = m.year ? `<span class="border border-white/30 text-white text-[10px] md:text-xs px-2 py-1 rounded">${m.year}</span>` : '';
                    const status = m.episode_current ? `<span class="border border-white/30 text-white text-[10px] md:text-xs px-2 py-1 rounded">${m.episode_current}</span>` : '';
                    const genres = (m.category || []).slice(0,3).map(c => `<span class="bg-white/10 text-gray-300 text-[10px] md:text-xs px-3 py-1 rounded-full">${c.name}</span>`).join('');
                    const content = m.content ? m.content.replace(/<[^>]*>?/gm, '') : 'Nội dung đang cập nhật...';

                    const activeClass = index === 0 ? 'opacity-100 z-10' : 'opacity-0 z-0 pointer-events-none';

                    return `
                    <div id="hero-slide-${index}" class="absolute inset-0 w-full h-full transition-opacity duration-1000 ease-in-out ${activeClass}">
                        <div class="relative w-full h-full cursor-pointer" onclick="AppHandlers.goToWatch('${m.slug}')">
                            <img src="${Utils.getImage(m.poster_url || m.thumb_url)}" class="absolute inset-0 w-full h-full object-cover" onerror="this.src='https://placehold.co/1200x800/1c1f2e/94a3b8?text=Banner+Loi'"/>
                            <div class="absolute inset-0 bg-gradient-to-t from-surface via-surface/80 to-transparent"></div>
                            <div class="absolute inset-0 bg-gradient-to-r from-surface/50 to-transparent"></div>
                            <div class="absolute bottom-0 left-0 w-full p-5 md:p-10 z-20 flex flex-col justify-end h-full pointer-events-none">
                                <h2 class="text-3xl md:text-5xl font-black text-white mb-2 line-clamp-2 drop-shadow-md">${m.name}</h2>
                                <p class="text-sm md:text-base text-primary font-medium mb-3 line-clamp-1 drop-shadow-md">${m.origin_name}</p>
                                
                                <div class="flex flex-wrap items-center gap-2 mb-3 pointer-events-auto">
                                    ${imdb} ${tmdb} ${year} ${status}
                                </div>
                                
                                <div class="flex flex-wrap items-center gap-2 mb-4 pointer-events-auto">
                                    ${genres}
                                </div>
                                
                                <p class="text-gray-300 text-xs md:text-sm line-clamp-2 md:line-clamp-3 w-full md:w-2/3 mb-6">${content}</p>

                        <button onclick="AppHandlers.goToWatch('${m.slug}')" class="absolute bottom-6 right-6 hidden md:flex bg-primary hover:bg-primary-dark text-black px-6 py-2.5 rounded-full font-bold items-center gap-2 shadow-lg transition-transform transform hover:scale-105 z-30">

                const dotsHtml = movies.map((_, i) => `<div onclick="AppHandlers.changeHeroSlide(${i})" id="dot-${i}" class="w-2 h-2 rounded-full cursor-pointer transition-all duration-300 ${i === 0 ? 'bg-primary w-6' : 'bg-white/30'}"></div>`).join('');

                return `
                <div class="px-4 py-6 mt-2">
                    <div class="relative w-full aspect-[4/5] sm:aspect-video md:aspect-[21/9] bg-surface rounded-2xl overflow-hidden shadow-2xl border border-white/10 group">
                        <div id="hero-slider" class="relative w-full h-full" ontouchstart="AppHandlers.handleTouchStart(event)" ontouchend="AppHandlers.handleTouchEnd(event)">
                            ${slidesHtml}
                        </div>
                    </div>
                    
                    <div id="hero-dots" class="flex justify-center gap-2 mt-4 flex-wrap max-w-full">
                        ${dotsHtml}
                    </div>
                </div>`;
            },

            watchUI: (data, isPlaying, activeServer, activeEp) => {
                const m = data.movie, eps = data.episodes, isFav = Utils.isFavorite(m.slug);
                let currentEpName = eps?.[activeServer]?.server_data?.[activeEp]?.name || '';
                
                let topAreaHtml = '';
                if (!isPlaying) {
                    topAreaHtml = `
                    <div class="relative w-full aspect-[4/5] sm:aspect-video lg:h-[65vh] bg-surface flex flex-col items-center justify-center overflow-hidden border-b border-white/5">
                        <img src="${Utils.getImage(m.poster_url || m.thumb_url)}" class="absolute inset-0 w-full h-full object-cover blur-2xl opacity-30 scale-110" onerror="this.src='https://placehold.co/1200x800/1c1f2e/94a3b8?text=Bg'"/>
                        <div class="absolute inset-0 watch-gradient"></div>
                        
                        <div class="relative z-10 flex flex-col items-center p-6 text-center w-full max-w-2xl mt-10">
                            <img src="${Utils.getImage(m.thumb_url)}" class="w-36 sm:w-48 rounded-xl shadow-2xl border border-white/10 mb-6" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=Loi+Anh'"/>
                            <h1 class="text-3xl sm:text-4xl font-black text-white mb-1 tracking-tight">${m.name}</h1>
                            <p class="text-muted text-sm mb-6 font-medium">${m.origin_name}</p>
                            
                            <button onclick="AppHandlers.playVideo()" class="w-full sm:w-80 bg-primary hover:bg-primary-dark text-black font-bold text-lg py-3.5 rounded-full flex items-center justify-center gap-2 shadow-[0_0_20px_rgba(252,211,77,0.4)] transition-all mb-8">
                                <svg width="24" height="24" fill="currentColor" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"/></svg> Xem ngay
                            </button>
                            
                            <div class="flex items-center justify-center gap-8 text-white">
                                <button onclick="AppHandlers.toggleFav()" class="flex flex-col items-center gap-2 text-sm hover:text-primary transition group">
                                    <svg width="26" height="26" fill="${isFav?'#fcd34d':'none'}" stroke="${isFav?'#fcd34d':'currentColor'}" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 00-7.7 0l-1.1 1-1.1-1a5.5 5.5 0 00-7.8 7.8l1.1 1.1L12 21.2l7.8-7.8 1.1-1.1a5.5 5.5 0 000-7.8z"/></svg>
                                    <span class="group-hover:text-primary ${isFav?'text-primary':''}">${isFav?'Đã thích':'Yêu thích'}</span>
                                </button>
                                <button class="flex flex-col items-center gap-2 text-sm hover:text-primary transition">
                                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                                    Thêm vào
                                </button>
                                <button class="flex flex-col items-center gap-2 text-sm hover:text-primary transition">
                                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"></path></svg>
                                    Bình luận
                                </button>
                            </div>
                        </div>
                    </div>`;
                } else {
                    const epData = eps[activeServer].server_data[activeEp];
                    if (epData.link_m3u8) {
                        topAreaHtml = `
                        <div class="w-full bg-black aspect-video relative z-30 lg:h-[70vh] shadow-2xl flex items-center justify-center">
                            <video id="kt-player" controls playsinline class="w-full h-full max-w-6xl shadow-2xl"></video>
                        </div>
                        <div class="max-w-4xl mx-auto px-4 mt-6 text-center">
                            <h1 class="text-2xl font-bold text-white">${m.name}</h1>
                            <p class="text-primary text-sm mt-1 font-semibold">Đang phát: Tập ${currentEpName}</p>
                        </div>`;
                    } else {
                        topAreaHtml = `
                        <div class="w-full bg-black aspect-video relative z-30 lg:h-[70vh] shadow-2xl flex items-center justify-center">
                            <iframe src="${epData.link_embed}" class="w-full h-full max-w-6xl border-0" allowfullscreen></iframe>
                        </div>
                        <div class="max-w-4xl mx-auto px-4 mt-6 text-center">
                            <h1 class="text-2xl font-bold text-white">${m.name}</h1>
                            <p class="text-primary text-sm mt-1 font-semibold">Đang phát: Tập ${currentEpName}</p>
                        </div>`;
                    }
                }

                const castArray = m.actor?.length && m.actor[0] !== "" ? m.actor : [];
                const castHtml = castArray.length ? castArray.map(actor => `<span onclick="AppHandlers.searchByKeyword('${actor}')" class="px-4 py-2 bg-surface border border-white/10 rounded-lg text-sm hover:bg-primary/20 hover:text-primary hover:border-primary/50 cursor-pointer transition-colors shadow-sm text-center line-clamp-1">${actor}</span>`).join('') : '<span class="text-muted text-sm col-span-full">Đang cập nhật</span>';
                
                let epsHtml = `<div class="text-muted py-4">Chưa có tập phim.</div>`;
                if (eps?.length > 0) {
                    const serverBtns = eps.length > 1 ? `<div class="flex gap-2 mb-4 overflow-x-auto hide-scrollbar">${eps.map((srv, i) => `<button onclick="AppHandlers.changeServer(${i})" class="px-4 py-1.5 rounded-full text-sm transition font-medium whitespace-nowrap ${activeServer === i ? 'bg-primary text-black' : 'bg-surface text-muted border border-white/10 hover:text-white'}">${srv.server_name}</button>`).join('')}</div>` : '';
                    const epBtns = eps[activeServer].server_data.map((ep, i) => `<button onclick="AppHandlers.changeEpisode(${i})" class="p-3 rounded-xl text-sm font-semibold transition flex flex-col items-center justify-center gap-1 shadow-sm ${i === activeEp ? 'bg-primary/20 text-primary border border-primary/50' : 'bg-surface text-gray-300 hover:bg-white/10 border border-white/5'}"><span>Tập ${ep.name}</span></button>`).join('');
                    epsHtml = `${serverBtns}<div class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-2.5">${epBtns}</div>`;
                }

                return `
                ${topAreaHtml}
                <div class="max-w-4xl mx-auto px-4 py-6">
                    <div class="border-b border-white/10 mb-6 flex gap-6 overflow-x-auto hide-scrollbar">
                        <button onclick="AppHandlers.switchWatchTab('episodes')" id="tab-btn-episodes" class="pb-3 text-base font-bold tab-active whitespace-nowrap transition-colors">Tập phim</button>
                        <button onclick="AppHandlers.switchWatchTab('info')" id="tab-btn-info" class="pb-3 text-base font-bold text-muted whitespace-nowrap hover:text-white transition-colors">Thông tin</button>
                        <button onclick="AppHandlers.switchWatchTab('cast')" id="tab-btn-cast" class="pb-3 text-base font-bold text-muted whitespace-nowrap hover:text-white transition-colors">Diễn viên</button>
                        <button onclick="AppHandlers.switchWatchTab('suggest')" id="tab-btn-suggest" class="pb-3 text-base font-bold text-muted whitespace-nowrap hover:text-white transition-colors">Đề xuất</button>
                    </div>
                    
                    <div id="tab-content-episodes" class="tab-pane animate-fade-in">${epsHtml}</div>
                    <div id="tab-content-info" class="tab-pane hidden animate-fade-in">
                        <div class="bg-surface rounded-2xl p-5 border border-white/5 text-gray-300 text-sm leading-relaxed shadow-inner">
                            <p class="mb-4"><span class="text-white font-semibold">Tên gốc:</span> ${m.origin_name}</p>
                            <p class="mb-4"><span class="text-white font-semibold">Năm phát hành:</span> ${m.year}</p>
                            <p class="mb-4"><span class="text-white font-semibold">Thời lượng:</span> ${m.time}</p>
                            <div class="mt-4 pt-4 border-t border-white/5">
                                <h4 class="text-white font-semibold mb-2">Nội dung chính:</h4>
                                ${m.content || 'Nội dung đang cập nhật'}
                            </div>
                        </div>
                    </div>
                    <div id="tab-content-cast" class="tab-pane hidden animate-fade-in"><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">${castHtml}</div></div>
                    <div id="tab-content-suggest" class="tab-pane hidden animate-fade-in"><div id="suggest-container" class="min-h-[200px]">${Utils.showLoading()}</div></div>
                </div>`;
            }
        };

        const AppHandlers = {
            init: async () => { 
                API.getAppData().then(() => {
                    const rPill = (arr, t) => arr.map(i => `<button onclick="AppHandlers.loadList('${t}', '${i.slug}', '${i.name}'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">${i.name}</button>`).join('');
                    const gEl = document.getElementById('dropdown-genres');
                    const cEl = document.getElementById('dropdown-countries');
                    if(gEl && AppState.genres.length) gEl.innerHTML = rPill(AppState.genres, 'the-loai');
                    if(cEl && AppState.countries.length) cEl.innerHTML = rPill(AppState.countries, 'quoc-gia');
                });
                AppHandlers.loadHome(); 
                window.addEventListener('beforeunload', AppHandlers.saveCurrentVideoState);
            },
            
            saveCurrentVideoState: () => {
                if(AppState.currentView === 'watch' && AppState.watchData && AppState.isPlaying) {
                    const video = document.getElementById('kt-player');
                    let currentTime = 0;
                    if(video) currentTime = video.currentTime;
                    
                    const m = AppState.watchData.movie;
                    const eps = AppState.watchData.episodes;
                    if(eps && eps[0] && m) {
                         Utils.saveHistory(m, AppState.activeEpIdx, eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx].name, currentTime);
                    }
                }
            },

            navigate: (viewId) => {
                if (AppState.currentView === 'watch' && viewId !== 'watch') { 
                    AppHandlers.saveCurrentVideoState();
                    if(AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if(AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    document.getElementById('view-watch').innerHTML = ''; 
                    AppState.isPlaying = false; 
                }

                AppState.currentView = viewId;
                ['home', 'watch', 'search', 'history'].forEach(id => document.getElementById(`view-${id}`).classList.toggle('hidden', id !== viewId));
                window.scrollTo(0, 0);
                
                document.getElementById('navbar').className = `fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 ${viewId === 'watch' ? 'bg-gradient-to-b from-black/80 to-transparent' : 'bg-app/90 backdrop-blur-md'}`;

                if (viewId === 'home' && !document.getElementById('view-home').innerHTML.trim()) AppHandlers.loadHome();
                if (viewId === 'history') AppHandlers.renderHistory('recent');
            },

            // Tải mã nguồn HTML cực sạch, bỏ qua DOM rác
            downloadSource: async () => {
                try {
                    // Thử fetch trực tiếp url hiện tại để lấy HTML nguyên bản
                    const response = await fetch(window.location.href);
                    if (response.ok) {
                        const text = await response.text();
                        AppHandlers._triggerDownload(text);
                        return;
                    }
                } catch(e) {}
                
                // Backup logic nếu fetch thất bại (VD chạy file local file://)
                let clone = document.documentElement.cloneNode(true);
                // Dọn dẹp DOM đã bị sinh ra bởi JS
                const home = clone.querySelector('#view-home'); if(home) home.innerHTML = '';
                const watch = clone.querySelector('#view-watch'); if(watch) watch.innerHTML = '';
                const search = clone.querySelector('#search-results'); if(search) search.innerHTML = '';
                // Reset menu
                const overlay = clone.querySelector('#menu-overlay'); if(overlay) overlay.className = "fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0";
                const modal = clone.querySelector('#menu-modal'); if(modal) modal.classList.replace('bottom-sheet-open', 'bottom-sheet-closed');
                // Xóa script từ extension
                clone.querySelectorAll('script[data-bard-injected], script[injected]').forEach(s => s.remove());
                
                const finalHtml = "<!DOCTYPE html>\n<html lang=\"vi\">\n" + clone.innerHTML + "\n</html>";
                AppHandlers._triggerDownload(finalHtml);
            },

            _triggerDownload: (htmlContent) => {
                const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "tuongdeptrai_v2.html";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                AppHandlers.toggleMenuModal();
            },

            toggleMenuModal: () => {
                const modal = document.getElementById('menu-modal'), overlay = document.getElementById('menu-overlay');
                if(modal.classList.contains('bottom-sheet-closed')) {
                    modal.classList.replace('bottom-sheet-closed', 'bottom-sheet-open');
                    overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                } else {
                    modal.classList.replace('bottom-sheet-open', 'bottom-sheet-closed');
                    overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            },
            
            toggleDropdown: (id) => {
                const el = document.getElementById(id);
                const isGenres = id === 'dropdown-genres';
                el.classList.toggle('hidden');
                
                const icon = document.getElementById(isGenres ? 'icon-genres' : 'icon-countries');
                if(icon) icon.style.transform = el.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
                
                const otherId = isGenres ? 'dropdown-countries' : 'dropdown-genres';
                const otherEl = document.getElementById(otherId);
                if(otherEl) {
                    otherEl.classList.add('hidden');
                    const otherIcon = document.getElementById(isGenres ? 'icon-countries' : 'icon-genres');
                    if(otherIcon) otherIcon.style.transform = 'rotate(0deg)';
                }
            },

            handleTouchStart: (e) => {
                AppState.touchStartX = e.changedTouches[0].screenX;
            },
            handleTouchEnd: (e) => {
                AppState.touchEndX = e.changedTouches[0].screenX;
                AppHandlers.handleSwipe();
            },
            handleSwipe: () => {
                const threshold = 50; 
                if (AppState.touchEndX < AppState.touchStartX - threshold) {
                    AppHandlers.changeHeroSlide((AppState.currentHeroSlide + 1) % AppState.totalHeroSlides);
                }
                if (AppState.touchEndX > AppState.touchStartX + threshold) {
                    let prev = AppState.currentHeroSlide - 1;
                    if(prev < 0) prev = AppState.totalHeroSlides - 1;
                    AppHandlers.changeHeroSlide(prev);
                }
            },

            loadHome: async () => {
                const homeDiv = document.getElementById('view-home'); 
                homeDiv.innerHTML = Utils.showLoading(true);
                
                let homeContent = '';

                // Hero Slider
                try {
                    const heroRes = await API.fetchJSON('/v1/api/danh-sach/phim-moi-cap-nhat?limit=20');
                    if (heroRes && heroRes.data && heroRes.data.items) {
                        let heroSlugs = heroRes.data.items.map(i => i.slug).slice(0, CONFIG.HERO_LIMIT);
                        const heroPromises = await Promise.allSettled(heroSlugs.map(slug => API.getMovieDetails(slug)));
                        const heroDetails = heroPromises.filter(p => p.status === 'fulfilled' && p.value?.status).map(p => p.value);
                        homeContent += Render.heroBanner(heroDetails);
                    }
                } catch(e) { console.log("Lỗi tải Slider", e); }
                
                // Hàng Top 10 Hôm nay (Netflix Style)
                try {
                    const top10Res = await API.getList('danh-sach', 'phim-bo', 10);
                    if(top10Res && top10Res.data && top10Res.data.items) {
                        homeContent += Render.topHorizontalRow('Top 10 Phim Bộ Hôm Nay', top10Res.data.items);
                    }
                } catch(e) { console.log("Lỗi tải Top 10", e); }

                // Lịch sử xem
                if (AppState.history.length > 0) {
                    homeContent += Render.horizontalRow('Tiếp tục xem', AppState.history.slice(0,12).map(m=>({...m, episode_current: m.last_ep_name?`Tập ${m.last_ep_name}`:''})), 'history', 'recent');
                }

                // Danh sách theo CONFIG (có đánh thứ hạng Top nếu set rank=true)
                const rowPromises = CONFIG.MOVIE_ROWS.map(row => API.getList(row.type, row.slug, row.limit).catch(() => null));
                const rowResults = await Promise.all(rowPromises);

                rowResults.forEach((res, index) => {
                    const rowConfig = CONFIG.MOVIE_ROWS[index];
                    if (res && (res.data?.items || res.items)) {
                        const items = res.data?.items || res.items;
                        if (items.length > 0) {
                            homeContent += Render.horizontalRow(rowConfig.title, items, rowConfig.type, rowConfig.slug, rowConfig.rank);
                        }
                    }
                });

                homeDiv.innerHTML = homeContent;
                AppHandlers.startHeroInterval();
            },

            // Tải giao diện Top 50 khi bấm Xem Thêm ở mục Top 10
            loadTop50: async () => {
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                // Set layout grid phù hợp với dạng card netflix
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-2 gap-y-6 px-2";
                document.getElementById('search-title').innerHTML = 'Top 50 Phim Hot Nhất <span class="text-primary text-sm ml-2">HOT 🔥</span>';
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList('danh-sach', 'phim-bo', 50);
                if(data?.data?.items?.length) {
                    resDiv.innerHTML = data.data.items.map((m, i) => Render.topNetflixCard(m, i, true)).join('');
                }
            },

            startHeroInterval: () => {
                if(AppState.heroInterval) clearInterval(AppState.heroInterval);
                AppState.heroInterval = setInterval(() => {
                    if(document.getElementById('hero-slider') && AppState.currentView === 'home' && AppState.totalHeroSlides > 0) {
                        let nextIndex = AppState.currentHeroSlide + 1;
                        if(nextIndex >= AppState.totalHeroSlides) nextIndex = 0;
                        AppHandlers.changeHeroSlide(nextIndex, false);
                    }
                }, CONFIG.HERO_AUTO_PLAY_INTERVAL);
            },

            changeHeroSlide: (nextIndex, isManual = true) => {
                if(nextIndex === AppState.currentHeroSlide || nextIndex >= AppState.totalHeroSlides) return;
                
                if(isManual) AppHandlers.startHeroInterval();

                const currentSlide = document.getElementById(`hero-slide-${AppState.currentHeroSlide}`);
                const currentDot = document.getElementById(`dot-${AppState.currentHeroSlide}`);
                
                AppState.currentHeroSlide = nextIndex;
                
                const newSlide = document.getElementById(`hero-slide-${AppState.currentHeroSlide}`);
                const newDot = document.getElementById(`dot-${AppState.currentHeroSlide}`);

                if(currentSlide) {
                    currentSlide.classList.remove('opacity-100', 'z-10');
                    currentSlide.classList.add('opacity-0', 'z-0', 'pointer-events-none');
                }
                if(newSlide) {
                    newSlide.classList.remove('opacity-0', 'z-0', 'pointer-events-none');
                    newSlide.classList.add('opacity-100', 'z-10');
                }
                
                if(currentDot) currentDot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-white/30";
                if(newDot) newDot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-primary w-6";
            },

            goToWatch: async (slug) => {
                AppHandlers.navigate('watch'); 
                AppState.isPlaying = false;
                const watchDiv = document.getElementById('view-watch'); watchDiv.innerHTML = Utils.showLoading(true);
                const res = await API.getMovieDetails(slug);
                if (res?.status) {
                    AppState.watchData = res; AppState.activeServerIdx = 0;
                    AppState.activeEpIdx = AppState.history.find(h => h.slug === slug)?.last_ep_idx || 0;
                    watchDiv.innerHTML = Render.watchUI(res, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                    AppHandlers.loadSuggestions(res.movie);
                } else watchDiv.innerHTML = `<div class="text-center p-10 text-muted">Lỗi tải dữ liệu phim. Hãy thử lại.</div>`;
            },

            playVideo: () => {
                AppState.isPlaying = true;
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, true, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie); 
                window.scrollTo({top: 0, behavior: 'smooth'});
                
                const m = AppState.watchData.movie;
                const eps = AppState.watchData.episodes;
                const epData = eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx];
                const video = document.getElementById('kt-player');

                if (video && epData.link_m3u8) {
                    const savedHist = AppState.history.find(h => h.slug === m.slug);
                    const savedTime = (savedHist && savedHist.last_ep_idx === AppState.activeEpIdx && savedHist.current_time) ? savedHist.current_time : 0;

                    if (Hls.isSupported()) {
                        if(AppState.hlsInstance) AppState.hlsInstance.destroy();
                        AppState.hlsInstance = new Hls();
                        AppState.hlsInstance.loadSource(epData.link_m3u8);
                        AppState.hlsInstance.attachMedia(video);
                        AppState.hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                            if(savedTime > 0) video.currentTime = savedTime;
                            video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = epData.link_m3u8;
                        video.addEventListener('loadedmetadata', function() {
                            if(savedTime > 0) video.currentTime = savedTime;
                            video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                        });
                    }

                    if(AppState.saveInterval) clearInterval(AppState.saveInterval);
                    AppState.saveInterval = setInterval(AppHandlers.saveCurrentVideoState, 5000);
                } else {
                    if(eps && eps[0]) Utils.saveHistory(m, AppState.activeEpIdx, epData.name, 0);
                }
            },

            changeServer: (idx) => { AppHandlers.saveCurrentVideoState(); AppState.activeServerIdx = idx; AppState.activeEpIdx = 0; AppHandlers.playVideo(); },
            changeEpisode: (idx) => { AppHandlers.saveCurrentVideoState(); AppState.activeEpIdx = idx; AppHandlers.playVideo(); },
            
            switchWatchTab: (tabId) => {
                ['episodes', 'info', 'cast', 'suggest'].forEach(id => {
                    document.getElementById(`tab-content-${id}`)?.classList.add('hidden');
                    document.getElementById(`tab-btn-${id}`)?.classList.replace('tab-active', 'text-muted');
                });
                document.getElementById(`tab-content-${tabId}`)?.classList.remove('hidden');
                document.getElementById(`tab-btn-${tabId}`)?.classList.replace('text-muted', 'tab-active');
            },

            loadSuggestions: async (movie) => {
                const container = document.getElementById('suggest-container');
                if(!container) return;
                container.innerHTML = Utils.showLoading();
                
                let queries = [];
                
                if (movie.category && movie.category.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[0].slug}?limit=24`));
                    if (movie.category.length > 1) {
                        queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[1].slug}?limit=24`));
                    }
                }
                if (movie.country && movie.country.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/quoc-gia/${movie.country[0].slug}?limit=24`));
                }
                
                if (queries.length === 0) {
                    queries.push(API.fetchJSON('/danh-sach/phim-moi-cap-nhat?limit=24'));
                }

                const results = await Promise.allSettled(queries);
                let combinedMap = new Map();

                results.forEach(res => {
                    if(res.status === 'fulfilled' && res.value) {
                        let items = res.value.data ? res.value.data.items : res.value.items || [];
                        items.forEach(m => {
                            if (m.slug !== movie.slug) {
                                if (combinedMap.has(m.slug)) {
                                    combinedMap.get(m.slug).score += 1;
                                } else {
                                    m.score = 1;
                                    combinedMap.set(m.slug, m);
                                }
                            }
                        });
                    }
                });

                let items = Array.from(combinedMap.values());
                items.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                });
                items = items.slice(0, 16);
                
                if(items.length) {
                    container.innerHTML = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">${items.map(m => Render.movieCard(m)).join('')}</div>`;
                } else {
                    container.innerHTML = `<div class="text-center text-muted py-8">Chưa có đề xuất phù hợp lúc này.</div>`;
                }
            },

            toggleFav: () => {
                if(!AppState.watchData) return;
                Utils.toggleFavorite(AppState.watchData.movie);
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie);
            },

            loadList: async (type, slug, title) => {
                AppHandlers.navigate('search'); document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                // Khôi phục layout thường nếu trước đó đang ở Top 50
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                document.getElementById('search-title').innerHTML = title;
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList(type, slug, 36);
                resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-16 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><p>Danh sách này hiện tại đang trống.</p></div>`;
            },

            searchByKeyword: (kw) => { 
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = kw; 
                AppHandlers.onSearchInput(kw); 
            },

            onSearchInput: (val) => {
                const kw = val.trim(); 
                if(AppState.searchTimeout) clearTimeout(AppState.searchTimeout);
                const resDiv = document.getElementById('search-results'), tDiv = document.getElementById('search-title');
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                if (!kw) { tDiv.innerHTML = 'Tìm kiếm'; resDiv.innerHTML = ''; return; }
                
                tDiv.innerHTML = `Kết quả cho: "${kw}"`; 
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                AppState.searchTimeout = setTimeout(async () => {
                    const data = await API.search(kw);
                    const emptyStateHtml = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-muted">
                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" class="mb-4 opacity-40" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <p class="font-medium text-gray-300">Không tìm thấy dữ liệu cho từ khóa này.</p>
                        <p class="text-sm mt-2 max-w-sm text-center">API hệ thống có thể chưa cập nhật diễn viên hoặc tên phim này. Bạn vui lòng thử một từ khóa khác.</p>
                    </div>`;

                    resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : emptyStateHtml;
                }, 700);
            },

            renderHistory: (type = 'recent') => {
                const c = document.getElementById('history-content');
                let data = type === 'recent' ? AppState.history.map(m => ({...m, badge: m.last_ep_name?`Tập ${m.last_ep_name}`:'Đã xem'})) : AppState.favorites;
                c.innerHTML = data.length ? data.map(m => Render.movieCard(m, m.badge)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-20 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><p>Danh sách của bạn đang trống.</p></div>`;
            },
            
            switchHistoryTab: (tab) => {
                document.getElementById('htab-recent').classList.replace('tab-active', 'text-muted');
                document.getElementById('htab-favs').classList.replace('tab-active', 'text-muted');
                document.getElementById(`htab-${tab}`).classList.replace('text-muted', 'tab-active');
                AppHandlers.renderHistory(tab);
            }
        };

        document.addEventListener('DOMContentLoaded', AppHandlers.init);
    </script>

</body>
</html>
