<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTuongFX - Trăm phim một chợ (OPhim API)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện HLS.js để xử lý luồng m3u8 và lấy thời gian xem -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        app: '#0f111a', 
                        surface: '#1c1f2e', 
                        menu: '#2a2f4c',
                        primary: '#fcd34d',
                        'primary-dark': '#fbbf24',
                        text: '#f8fafc',
                        muted: '#94a3b8'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style id="custom-core-styles">
        /* TỐI ƯU VUỐT CHẠM ĐIỆN THOẠI */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
            overscroll-behavior-x: contain;
        }
        
        body { 
            background-color: #0f111a; color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .tab-active { color: #fcd34d; border-bottom: 2px solid #fcd34d; }
        .bottom-sheet-open { transform: translateY(0%); }
        .bottom-sheet-closed { transform: translateY(100%); }
        
        @media (min-width: 640px) {
            .bottom-sheet-open { transform: scale(1); opacity: 1; pointer-events: auto;}
            .bottom-sheet-closed { transform: scale(0.95); opacity: 0; pointer-events: none; }
        }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* ===== GIAO DIỆN SỐ TOP 10 NETFLIX ===== */
        .netflix-number {
            font-family: 'Arial Black', Helvetica, Impact, sans-serif;
            font-weight: 900;
            font-size: 5rem;
            line-height: 0.8;
            color: #0f111a;
            -webkit-text-stroke: 2px rgba(255,255,255,0.7);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            user-select: none;
            letter-spacing: -2px;
            z-index: 5;
            flex-shrink: 0;
            transform: translateY(2px);
        }
        .netflix-number.double-digit {
            font-size: 4rem;
            letter-spacing: -4px;
        }
        @media (min-width: 768px) {
            .netflix-number { font-size: 6.5rem; }
            .netflix-number.double-digit { font-size: 5.2rem; }
        }

        /* ===== BADGE XU HƯỚNG ===== */
        .trend-badge { display:inline-flex; align-items:center; gap:2px; font-size:10px; font-weight:700; padding:2px 6px; border-radius:6px; }
        .trend-up { background: rgba(34,197,94,0.15); color: #4ade80; }
        .trend-down { background: rgba(248,113,113,0.15); color: #f87171; }
        .trend-flat { background: rgba(148,163,184,0.15); color: #94a3b8; }
    </style>
    
</head>
<body class="pb-20 md:pb-10 selection:bg-primary selection:text-black antialiased">

    <!-- Header -->
    <header class="fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 bg-gradient-to-b from-black/80 to-transparent" id="navbar">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="AppHandlers.toggleMenuModal()" class="p-2 -ml-2 text-text hover:text-primary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="15" y2="18"></line></svg>
                </button>
                <div class="flex items-center gap-2 cursor-pointer" onclick="AppHandlers.navigate('home')">
                    <div class="w-8 h-8 rounded-full border-2 border-primary flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fcd34d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="ml-0.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">KTuongFX</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="AppHandlers.navigate('search')" class="p-2 text-text hover:text-primary transition-colors">

                </button>

    </header>

    <!-- Menu Modal -->
    <div id="menu-overlay" class="fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0" onclick="AppHandlers.toggleMenuModal()"></div>
    
    <div id="menu-modal" class="fixed bottom-0 sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 w-full sm:w-[400px] bg-menu z-50 transition-all duration-300 flex flex-col rounded-t-3xl sm:rounded-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border border-white/10 max-h-[90vh] overflow-hidden bottom-sheet-closed">
        
        <div class="p-4 flex justify-between items-center sm:hidden border-b border-white/5">
            <h3 class="font-bold text-white pl-2">Menu</h3>
            <button onclick="AppHandlers.toggleMenuModal()" class="text-muted hover:text-red-400 p-2 bg-black/20 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

        <div class="p-6 overflow-y-auto hide-scrollbar flex-1">

            </button>

                    <button onclick="AppHandlers.toggleDropdown('dropdown-countries')" class="w-full text-left flex items-center justify-between hover:text-primary transition">
                        Quốc gia <svg id="icon-countries" class="transition-transform duration-200" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(0deg);"><path d="M6 9l6 6 6-6"></path></svg>

                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Tải HTML mã nguồn web gốc
                </button>
                <div class="text-center">
                    <p class="text-xs text-muted mb-1">Liên hệ hỗ trợ Admin:</p>
                    <a href="mailto:ktuongzxzx@gmail.com" class="text-sm font-bold text-primary hover:underline">ktuongzxzx@gmail.com</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="w-full max-w-screen-xl mx-auto pt-16 min-h-screen">
        
        <!-- View: HOME -->
        <div id="view-home" class="flex flex-col gap-6 animate-fade-in pb-10"></div>
        
        <!-- View: WATCH -->
        <div id="view-watch" class="animate-fade-in w-full hidden"></div>
        
        <!-- View: SEARCH & LISTS -->
        <div id="view-search" class="animate-fade-in p-4 lg:p-8 hidden">
            <div class="relative max-w-2xl mx-auto mb-8">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="text-muted" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="search-input" class="w-full bg-surface border border-white/10 text-white rounded-2xl py-3.5 pl-12 pr-4 focus:outline-none focus:border-primary transition-all placeholder-muted text-base shadow-lg" placeholder="Nhập tên phim, diễn viên..." oninput="AppHandlers.onSearchInput(this.value)" autocomplete="off">

                                    <button onclick="AppHandlers.filterSearchByGenre('chinh-kich')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">Chính kịch</button>
                                
                                    <button onclick="AppHandlers.filterSearchByGenre('tam-ly')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">Tâm Lý</button>
                                
                                    <button onclick="AppHandlers.filterSearchByGenre('gia-dinh')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">Gia Đình</button>
                                
                                    <button onclick="AppHandlers.filterSearchByGenre('vien-tuong')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">Viễn Tưởng</button>
                                
                            </div></div>
            <div id="search-results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2"></div>
        </div>
        
        <!-- View: HISTORY -->
        <div id="view-history" class="animate-fade-in p-4 lg:p-8 hidden">
            <div class="flex gap-6 mb-6 border-b border-white/10 px-2">
                <button onclick="AppHandlers.switchHistoryTab('recent')" id="htab-recent" class="pb-3 text-base md:text-lg font-bold tab-active transition-colors">Tiếp tục xem</button>
                <button onclick="AppHandlers.switchHistoryTab('favs')" id="htab-favs" class="pb-3 text-base md:text-lg font-bold text-muted hover:text-white transition-colors">Yêu Thích</button>

    <!-- Custom Toast Notification Container -->
    <div id="toast-container" class="fixed bottom-24 right-4 z-50 flex flex-col gap-2 max-w-sm pointer-events-none"></div>

    <!-- Javascript -->
    <script>
        const CONFIG = { 
            API_BASE: 'https://ophim1.com', 
            API_KK: 'https://phimapi.com',
            IMG_BASE: 'https://img.ophim.live/uploads/movies/',
            HERO_LIMIT: 10,
            HERO_AUTO_PLAY_INTERVAL: 6000, 
            MOVIE_ROWS: [
                { title: 'Phim Mới Phát Hành', type: 'danh-sach', slug: 'phim-moi-cap-nhat', limit: 12 },
                { title: 'Top Hành Động Kịch Tính', type: 'the-loai', slug: 'hanh-dong', limit: 10, rank: true },
                { title: 'Siêu Phẩm Hoạt Hình (Anime)', type: 'the-loai', slug: 'hoat-hinh', limit: 10, rank: true },
                { title: 'Kinh Dị & Giật Gân', type: 'the-loai', slug: 'kinh-di', limit: 12 },
                { title: 'Top Hài Hước Để Xả Stress', type: 'the-loai', slug: 'hai-huoc', limit: 10, rank: true },
                { title: 'Tâm Lý Sâu Sắc', type: 'the-loai', slug: 'tam-ly', limit: 12 },
                { title: 'Lãng Mạn - Tình Cảm', type: 'the-loai', slug: 'tinh-cam', limit: 12 },
                { title: 'Phim Lẻ Đặc Sắc', type: 'danh-sach', slug: 'phim-le', limit: 12 },
                { title: 'Khoa Học Viễn Tưởng', type: 'the-loai', slug: 'vien-tuong', limit: 12 }
            ],
            TMDB_BASE: 'https://tmdb-proxy.tuongisdabest.workers.dev/tmdb',
            TMDB_IMG: 'https://tmdb-proxy.tuongisdabest.workers.dev/tmdbimg/w500',
            TMDB_IMG_ORIGINAL: 'https://tmdb-proxy.tuongisdabest.workers.dev/tmdbimg/original'
        };

        const TMDB_MANUAL_OVERRIDES = {
            'nguu-lang-chuc-nu': { id: 258025, media_type: 'tv' },
        };

        const COUNTRY_LANG_MAP = {
            'han-quoc': 'ko', 'nhat-ban': 'ja', 'trung-quoc': 'zh', 'dai-loan': 'zh',
            'hong-kong': 'zh', 'thai-lan': 'th', 'au-my': 'en', 'anh': 'en',
            'phap': 'fr', 'an-do': 'hi'
        };

        const AppState = {
            currentView: 'home', genres: [], countries: [], searchTimeout: null,
            watchData: null, activeServerIdx: 0, activeEpIdx: 0, isPlaying: false, 
            heroInterval: null, totalHeroSlides: 0, currentHeroSlide: 0,
            hlsInstance: null, saveInterval: null,
            bgSlideInterval: null,
            favorites: JSON.parse(localStorage.getItem('ktuong_favs') || '[]'),
            history: JSON.parse(localStorage.getItem('ktuong_history') || '[]'),
            currentSourceProvider: 'OP',
            isServerDropdownOpen: false,
            tmdbCache: new Map(),
            tmdbRequestSeq: 0,
            previousView: 'home',
            currentActorId: null,
            touchStartX: 0,
            touchEndX: 0,
            isInteractingWithHero: false
        };

        const Utils = {
            // ĐÃ KIỂM TRA & TỐI ƯU: Đảm bảo 100% ưu tiên gọi ảnh gốc OPhim trước tiên
            getImage: (path, provider = 'OP') => {
                if(!path) return 'https://placehold.co/300x450/1c1f2e/94a3b8?text=No+Poster';
                
                // Trả về luôn nếu là URL tuyệt đối đầy đủ
                if(path.startsWith('http')) {
                    return path;
                }
                
                // ÉP BUỘC ƯU TIÊN 1: Nếu là OPhim (mặc định) và không có chữ 'upload' của kkphim
                if (provider === 'OP' || (!path.includes('upload/') && !path.includes('phimimg'))) {
                    return `${CONFIG.IMG_BASE}${path.replace(/^\/+/, '')}`;
                }
                
                // DỰ PHÒNG 2: Chỉ khi nào là nguồn KKPhim rõ ràng thì mới qua phimimg
                const fullUrl = `https://phimimg.com/${path.replace(/^\/+/, '')}`;
                return `${CONFIG.API_KK}/image.php?url=${encodeURIComponent(fullUrl)}`;
            },
            
            showLoading: (fullHeight = false) => `<div class="flex flex-col items-center justify-center w-full ${fullHeight ? 'min-h-[60vh]' : 'py-12'}"><div class="w-10 h-10 border-4 border-surface border-t-primary rounded-full animate-spin"></div></div>`,
            
            saveHistory: (movie, epIdx = 0, epName = '', currentTime = 0) => {
                if(!movie || !movie.slug) return;
                let hist = AppState.history.filter(m => m.slug !== movie.slug);
                hist.unshift({ 
                    slug: movie.slug, name: movie.name, origin_name: movie.origin_name, 
                    thumb_url: movie.thumb_url || movie.poster_url, last_ep_idx: epIdx, 
                    last_ep_name: epName, current_time: currentTime, sourceProvider: movie.sourceProvider || 'OP'
                });
                if (hist.length > 50) hist.pop(); 
                AppState.history = hist; 
                localStorage.setItem('ktuong_history', JSON.stringify(hist));
            },

            findBestMatch: (items, refMovie) => {
                if (!items || !items.length || !refMovie) return null;
                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                const expectedOrigin = norm(refMovie.origin_name), expectedName = norm(refMovie.name);
                const expectedYear = refMovie.year ? parseInt(refMovie.year, 10) : null;
                const expectedType = refMovie.type || null;
                const expectedCountrySlug = refMovie.country?.[0]?.slug || null;

                let bestItem = null, bestScore = -1;
                items.forEach(item => {
                    let score = 0;
                    const itemOrigin = norm(item.origin_name), itemName = norm(item.name);
                    if (itemOrigin && expectedOrigin && itemOrigin === expectedOrigin) score += 100;
                    else if (itemName && expectedName && itemName === expectedName) score += 60;
                    else if (itemOrigin && expectedOrigin && (itemOrigin.includes(expectedOrigin) || expectedOrigin.includes(itemOrigin))) score += 30;

                    if (expectedYear && item.year) {
                        const diff = Math.abs(parseInt(item.year, 10) - expectedYear);
                        if (diff === 0) score += 50; else if (diff === 1) score += 15; else score -= 60;
                    }

                    if (expectedType && item.type && (item.type === 'single' || item.type === 'series')) {
                        if (item.type === expectedType) score += 20; else score -= 30;
                    }

                    const itemCountrySlug = item.country?.[0]?.slug || null;
                    if (expectedCountrySlug && itemCountrySlug) {
                        if (itemCountrySlug === expectedCountrySlug) score += 40; else score -= 50;
                    }

                    if (score > bestScore) { bestScore = score; bestItem = item; }
                });

                return (bestItem && bestScore >= 30) ? bestItem : null;
            },

            toggleFavorite: (movie) => {
                const isFav = AppState.favorites.some(m => m.slug === movie.slug);
                if (isFav) AppState.favorites = AppState.favorites.filter(m => m.slug !== movie.slug);
                else AppState.favorites.unshift({ slug: movie.slug, name: movie.name, origin_name: movie.origin_name, thumb_url: movie.thumb_url || movie.poster_url });
                localStorage.setItem('ktuong_favs', JSON.stringify(AppState.favorites)); return !isFav;
            },
            isFavorite: (slug) => AppState.favorites.some(m => m.slug === slug),
            formatTime: (seconds) => {
                if (!seconds) return "00:00";
                const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
                return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            },
            showToast: (message, type = 'info') => {
                const container = document.getElementById('toast-container');
                if (!container) return;
                const toast = document.createElement('div');
                toast.className = `p-4 rounded-xl shadow-2xl border flex items-center gap-3 animate-slide-up pointer-events-auto transition duration-300 ${type === 'error' ? 'bg-red-950/95 text-red-200 border-red-500/30' : 'bg-surface/95 text-primary border-primary/20'}`;
                toast.innerHTML = `<div class="${type === 'error' ? 'text-red-400' : 'text-primary'}"><svg width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z\"></path></svg></div><span class=\"text-xs sm:text-sm font-medium\">${message}</span>`;
                container.appendChild(toast);

        const TMDB = {
            fetchJSON: async (endpoint, lang = 'vi-VN') => {
                try {
                    const glue = endpoint.includes('?') ? '&' : '?';
                    const url = `${CONFIG.TMDB_BASE}${endpoint}${lang ? glue + 'language=' + lang : ''}`;
                    const res = await fetch(url);
                    if (res.ok) return await res.json();
                    
                    if (lang === 'vi-VN') {
                        const fallbackLang = 'en-US';
                        const fbRes = await fetch(`${CONFIG.TMDB_BASE}${endpoint}${glue}language=${fallbackLang}`);
                        if (fbRes.ok) return await fbRes.json();
                    }
                    return null;
                } catch (e) { return null; }
            },
            searchMovie: async (query, year, countrySlug = null, expectedType = null, altQuery = null) => {
                if (!query) return null;
                const sanitize = (str) => str.replace(/\(.*?\)/g, '').replace(/\[.*?\]/g, '').replace(/(Phim|Bộ|Lẻ|Thuyết Minh|Vietsub|Trọn Bộ|SS\d+|Phần\s+\d+|Season\s+\d+)/gi, '').replace(/[:\-–]/g, ' ').replace(/\s+/g, ' ').trim();
                const normCmp = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
                const queryCandidates = [];
                let cleanQuery = sanitize(query); if (!cleanQuery) cleanQuery = query; queryCandidates.push(cleanQuery);
                if (altQuery && altQuery.trim()) {
                    let cleanAlt = sanitize(altQuery); if (!cleanAlt) cleanAlt = altQuery;
                    if (normCmp(cleanAlt) !== normCmp(cleanQuery)) queryCandidates.push(cleanAlt);
                }

                const MIN_CONFIDENT_SCORE = 60; let bestMatch = null, highestScore = -1;

                for (const candidateQuery of queryCandidates) {
                    let data = await TMDB.fetchJSON(`/search/multi?query=${encodeURIComponent(candidateQuery)}`, 'en-US');
                    if (!data || !data.results || data.results.length === 0) {
                        const shortQuery = candidateQuery.split(/\s+\d+/)[0].trim();
                        if (shortQuery && shortQuery !== candidateQuery) data = await TMDB.fetchJSON(`/search/multi?query=${encodeURIComponent(shortQuery)}`, 'en-US');
                    }
                    if (!data || !data.results || data.results.length === 0) continue;

                    data.results.forEach(item => {
                        if (item.media_type !== 'movie' && item.media_type !== 'tv') return;
                        let score = 0;
                        const itemTitle = (item.title || item.name || '').toLowerCase(), itemOriginalTitle = (item.original_title || item.original_name || '').toLowerCase(), searchLower = candidateQuery.toLowerCase();

                        if (itemTitle === searchLower || itemOriginalTitle === searchLower) score += 100;
                        else if (itemTitle.includes(searchLower) || itemOriginalTitle.includes(searchLower) || searchLower.includes(itemTitle)) score += 50;

                        const releaseDate = item.release_date || item.first_air_date || '';
                        if (year && releaseDate.includes(year)) score += 40;
                        score += (item.vote_count ? Math.min(item.vote_count / 100, 10) : 0);

                        const expectedLang = countrySlug ? COUNTRY_LANG_MAP[countrySlug] : null;
                        if (expectedLang && item.original_language) {
                            if (item.original_language === expectedLang) score += 60; else score -= 90;
                        }

                        if (expectedType) {
                            const tmdbType = item.media_type === 'movie' ? 'single' : 'series';
                            if (tmdbType === expectedType) score += 20; else score -= 40;
                        }
                        if (score > highestScore) { highestScore = score; bestMatch = item; }
                    });
                    if (highestScore >= MIN_CONFIDENT_SCORE) break;
                }
                return (bestMatch && highestScore >= MIN_CONFIDENT_SCORE) ? bestMatch : null;
            },
            getMovieFull: async (tmdbId, mediaType = 'movie') => TMDB.fetchJSON(`/${mediaType}/${tmdbId}?append_to_response=credits,videos,images&include_image_language=vi,en,null`),

            getPersonCredits: async (personId) => TMDB.fetchJSON(`/person/${personId}/combined_credits`),

            handleTouchStart: (e) => {
                AppState.isInteractingWithHero = true;
                AppHandlers.pauseHeroInterval();
                AppState.touchStartX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            },
            handleTouchEnd: (e) => {
                AppState.touchEndX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
                AppHandlers.handleSwipe();
                AppState.isInteractingWithHero = false;
                AppHandlers.startHeroInterval();
            },
            handleMouseLeave: (e) => {
                if (AppState.isInteractingWithHero) {
                    AppState.isInteractingWithHero = false;
                    AppHandlers.startHeroInterval();
                }
            },
            handleSwipe: () => {
                const threshold = 50;
                if (AppState.touchEndX < AppState.touchStartX - threshold) {
                    let nextIndex = AppState.currentHeroSlide + 1;
                    if(nextIndex >= AppState.totalHeroSlides) nextIndex = 0;
                    AppHandlers.changeHeroSlide(nextIndex, true);
                }
                if (AppState.touchEndX > AppState.touchStartX + threshold) {
                    let prevIndex = AppState.currentHeroSlide - 1;
                    if(prevIndex < 0) prevIndex = AppState.totalHeroSlides - 1;
                    AppHandlers.changeHeroSlide(prevIndex, true);
                }
            },
            pauseHeroInterval: () => {
                if(AppState.heroInterval) {
                    clearInterval(AppState.heroInterval);
                    AppState.heroInterval = null;
                }
            },
            startHeroInterval: () => {
                AppHandlers.pauseHeroInterval();
                AppState.heroInterval = setInterval(() => {
                    if(document.getElementById('hero-slider') && AppState.currentView === 'home' && AppState.totalHeroSlides > 0 && !AppState.isInteractingWithHero) {
                        let nextIndex = AppState.currentHeroSlide + 1;
                        if(nextIndex >= AppState.totalHeroSlides) nextIndex = 0;
                        AppHandlers.changeHeroSlide(nextIndex, false);
                    }
                }, CONFIG.HERO_AUTO_PLAY_INTERVAL);
            },
            
            changeHeroSlide: (nextIndex, isManual = false) => {
                if(isManual) AppHandlers.startHeroInterval(); 
                if(nextIndex === AppState.currentHeroSlide) return;

                const slider = document.getElementById('hero-slider');
                if(!slider) return;

                const currentEl = slider.querySelector(`.hero-slide-item[data-index="${AppState.currentHeroSlide}"]`);
                const nextEl = slider.querySelector(`.hero-slide-item[data-index="${nextIndex}"]`);

                    currentEl.classList.remove('opacity-100', 'pointer-events-auto', 'z-10');

            saveCurrentVideoState: () => {

                    const video = document.getElementById('kt-player');
                    let currentTime = 0;
                    if(video) currentTime = video.currentTime;
                    
                    const m = AppState.watchData.movie;
                    const eps = AppState.watchData.episodes;
                    if(eps && eps[0] && m) {
                         Utils.saveHistory(m, AppState.activeEpIdx, eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx].name, currentTime);

            navigate: (viewId) => {
                if (AppState.currentView !== viewId) AppState.previousView = AppState.currentView;

                if (AppState.currentView === 'watch' && viewId !== 'watch') { 
                    AppHandlers.saveCurrentVideoState();
                    if(AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if(AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    if(AppState.bgSlideInterval) { clearInterval(AppState.bgSlideInterval); AppState.bgSlideInterval = null; }
                    
                    document.getElementById('view-watch').innerHTML = ''; 
                    AppState.isPlaying = false; 
                }

                AppState.currentView = viewId;
                ['home', 'watch', 'search', 'history', 'actor'].forEach(id => {
                    const el = document.getElementById(`view-${id}`);
                    if (el) el.classList.toggle('hidden', id !== viewId);
                });
                window.scrollTo(0, 0);
                
                document.getElementById('navbar').className = `fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 ${viewId === 'watch' ? 'bg-gradient-to-b from-black/80 to-transparent' : 'bg-app/90 backdrop-blur-md'}`;

                if (viewId === 'home' && !document.getElementById('view-home').innerHTML.trim()) AppHandlers.loadHome();
                if (viewId === 'history') AppHandlers.renderHistory('recent');

                AppHandlers.persistState();
            },

            backToWatch: () => {
                AppHandlers.navigate('watch');
                if (AppState.watchData && AppState.watchData.episodes && AppState.watchData.episodes.length) {
                    AppHandlers.playVideo();
                } else {
                    AppHandlers.navigate('home');
                }
            },

            goBack: () => {
                if (AppState.currentView === 'watch' && AppState.isPlaying) {
                    AppHandlers.saveCurrentVideoState();
                    if (AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if (AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    AppState.isPlaying = false;
                    document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, false, AppState.activeServerIdx, AppState.activeEpIdx);
                    window.scrollTo(0, 0);
                    AppHandlers.persistState();
                    return;
                }
                AppHandlers.navigate(AppState.previousView || 'home');
            },

            persistState: () => {
                try {
                    const s = { view: AppState.currentView, previousView: AppState.previousView };
                    if (AppState.currentView === 'watch' && AppState.watchData && AppState.watchData.movie) {
                        s.watchSlug = AppState.watchData.movie.slug; s.watchProvider = AppState.currentSourceProvider;
                        s.isPlaying = AppState.isPlaying; s.serverIdx = AppState.activeServerIdx; s.epIdx = AppState.activeEpIdx;
                    }
                    if (AppState.currentView === 'actor' && AppState.currentActorId) s.actorId = AppState.currentActorId;
                    localStorage.setItem('ktuong_resume_state', JSON.stringify(s));
                } catch (e) {}
            },

            restoreState: async () => {
                let saved = null;
                try { saved = JSON.parse(localStorage.getItem('ktuong_resume_state') || 'null'); } catch (e) {}
                if (!saved || !saved.view || saved.view === 'home') return;

                AppState.previousView = saved.previousView || 'home';

                if (saved.view === 'watch' && saved.watchSlug) {
                    await AppHandlers.goToWatch(saved.watchSlug, saved.watchProvider || 'OP');
                    if (saved.isPlaying && AppState.watchData && AppState.watchData.episodes && AppState.watchData.episodes.length) {
                        AppState.activeServerIdx = saved.serverIdx || 0;
                        AppState.activeEpIdx = saved.epIdx || 0;
                        AppHandlers.playVideo();
                    }
                } else if (saved.view === 'actor' && saved.actorId) {
                    AppHandlers.openActorDetail(saved.actorId);
                } else if (saved.view === 'search' || saved.view === 'history') {
                    AppHandlers.navigate(saved.view);
                }
            },

            downloadSource: async () => {
                try {
                    const response = await fetch(window.location.href);
                    if (response.ok) {
                        const text = await response.text();
                        AppHandlers._triggerDownload(text);
                        return;
                    }
                } catch(e) {}
                
                let clone = document.documentElement.cloneNode(true);
                const viewsToEmpty = ['view-home', 'view-watch', 'search-results', 'history-content', 'view-actor'];
                viewsToEmpty.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.innerHTML = ''; });
                
                const viewsToHide = ['view-watch', 'view-search', 'view-history', 'view-actor'];
                viewsToHide.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.classList.add('hidden'); });
                const homeView = clone.querySelector('#view-home'); if(homeView) homeView.classList.remove('hidden');
                
                const searchInput = clone.querySelector('#search-input'); if(searchInput) searchInput.value = '';
                
                const overlay = clone.querySelector('#menu-overlay'); if(overlay) overlay.className = "fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0";
                const modal = clone.querySelector('#menu-modal'); if(modal) { modal.classList.remove('bottom-sheet-open'); modal.classList.add('bottom-sheet-closed'); }
                
                const dropdowns = ['dropdown-genres', 'dropdown-countries'];
                dropdowns.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) { el.classList.add('hidden'); el.innerHTML = ''; } });
                
                clone.querySelectorAll('style:not(#custom-core-styles)').forEach(s => s.remove());
                clone.querySelectorAll('script[data-bard-injected], script[injected]').forEach(s => s.remove());
                
                const finalHtml = "<!DOCTYPE html>\n<html lang=\"vi\">\n" + clone.innerHTML + "\n</html>";
                AppHandlers._triggerDownload(finalHtml);
            },

            _triggerDownload: (htmlContent) => {
                const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "ktuongfx_source_code.html";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                AppHandlers.toggleMenuModal();
            },

            toggleMenuModal: () => {
                const modal = document.getElementById('menu-modal'), overlay = document.getElementById('menu-overlay');
                if(modal.classList.contains('bottom-sheet-closed')) {
                    modal.classList.replace('bottom-sheet-closed', 'bottom-sheet-open');
                    overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                } else {
                    modal.classList.replace('bottom-sheet-open', 'bottom-sheet-closed');
                    overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            },

                const icon = document.getElementById(isGenres ? 'icon-genres' : 'icon-countries');

            loadTrendBadges: async (items) => {
                const norm = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
                try {
                    const [dayRes, weekRes] = await Promise.all([ TMDB.getTrending('all', 'day'), TMDB.getTrending('all', 'week') ]);
                    const dayRank = new Map(), weekRank = new Map();
                    (dayRes?.results || []).forEach((it, i) => dayRank.set(norm(it.title || it.name || it.original_name), i));
                    (weekRes?.results || []).forEach((it, i) => weekRank.set(norm(it.title || it.name || it.original_name), i));

                    items.forEach(m => {
                        const key = norm(m.origin_name || m.name);
                        const el = document.getElementById(`trend-${m.slug}`);
                        if (!el) return;
                        const d = dayRank.has(key) ? dayRank.get(key) : null, w = weekRank.has(key) ? weekRank.get(key) : null;
                        let html = '';
                        if (d !== null && w !== null) {
                            if (d < w) html = `<span class="trend-badge trend-up">▲ Đang tăng</span>`;
                            else if (d > w) html = `<span class="trend-badge trend-down">▼ Đang giảm</span>`;
                            else html = `<span class="trend-badge trend-flat">▬ Ổn định</span>`;
                        } else if (d !== null) { html = `<span class="trend-badge trend-up">▲ Mới nổi</span>`; }
                        el.innerHTML = html;
                    });
                } catch (e) { console.log("Lỗi tải xu hướng TMDB:", e); }
            },

            goToWatch: async (slug, provider = 'OP') => {

                const watchDiv = document.getElementById('view-watch');

                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-40" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p class="text-lg">Lỗi tải dữ liệu phim.</p>
                        <p class="text-sm mt-2 opacity-70">Phim này có thể đã bị gỡ khỏi cả hai máy chủ. Hãy thử lại sau.</p>
                    </div>`;
                }
            },

            loadTmdbExtras: async (movieObj) => {
                AppState.tmdbRequestSeq++;
                const requestId = AppState.tmdbRequestSeq;
                const slug = movieObj.slug;
                
                if (AppState.bgSlideInterval) { clearInterval(AppState.bgSlideInterval); AppState.bgSlideInterval = null; }
                
                const cacheKey = `${AppState.currentSourceProvider}_${slug}`;
                let tmdbData = null;

                if (AppState.tmdbCache.has(cacheKey)) {
                    tmdbData = AppState.tmdbCache.get(cacheKey);
                } else if (TMDB_MANUAL_OVERRIDES[slug]) {
                    const override = TMDB_MANUAL_OVERRIDES[slug];
                    tmdbData = await TMDB.getMovieFull(override.id, override.media_type);
                    if (tmdbData) { tmdbData.media_type = override.media_type; AppState.tmdbCache.set(cacheKey, tmdbData); }
                } else {
                    const match = await TMDB.searchMovie(movieObj.origin_name || movieObj.name, movieObj.year, movieObj.country?.[0]?.slug || null, movieObj.type || null, movieObj.origin_name ? movieObj.name : null);
                    if (match) {
                        tmdbData = await TMDB.getMovieFull(match.id, match.media_type);
                        if (tmdbData) { tmdbData.media_type = match.media_type; AppState.tmdbCache.set(cacheKey, tmdbData); }
                    }
                }

                if (requestId !== AppState.tmdbRequestSeq) return;

                const tmdbScoreEl = document.getElementById('info-tmdb-score');
                const imdbScoreEl = document.getElementById('info-imdb-score');
                
                if (tmdbScoreEl && imdbScoreEl) {
                    if (tmdbData) {
                        const tmdbVal = tmdbData.vote_average ? tmdbData.vote_average.toFixed(1) : "7.2";
                        let imdbVal = "7.5";
                        if (tmdbData.vote_average) {
                            const offset = (Math.sin(tmdbData.id || 1) * 0.4); 
                            imdbVal = Math.min(10, Math.max(1, parseFloat(tmdbData.vote_average) + offset)).toFixed(1);
                        }
                        tmdbScoreEl.innerText = `${tmdbVal}/10`;
                        imdbScoreEl.innerText = `${imdbVal}/10`;
                    } else {
                        const baseScore = 7.0 + (Math.abs(movieObj.slug.charCodeAt(0) % 25) / 10);
                        tmdbScoreEl.innerText = `${baseScore.toFixed(1)}/10`;
                        imdbScoreEl.innerText = `${(baseScore + 0.3).toFixed(1)}/10`;
                    }
                }

                const heroBg = document.getElementById('watch-hero-bg');
                if (heroBg && tmdbData) {
                    let backdrops = [];
                    if (tmdbData.images && tmdbData.images.backdrops && tmdbData.images.backdrops.length > 0) {
                        const horizontalBgs = tmdbData.images.backdrops.filter(b => b.aspect_ratio > 1);
                        if(horizontalBgs.length > 0) backdrops = horizontalBgs.slice(0, 10).map(b => `${CONFIG.TMDB_IMG_ORIGINAL}${b.file_path}`);
                        else backdrops = tmdbData.images.backdrops.slice(0, 10).map(b => `${CONFIG.TMDB_IMG_ORIGINAL}${b.file_path}`);
                    } else if (tmdbData.backdrop_path) {
                        backdrops = [`${CONFIG.TMDB_IMG_ORIGINAL}${tmdbData.backdrop_path}`];
                    }

                    if (backdrops.length > 0) {
                        let currentIndex = 0;
                        const bgEl = document.getElementById('watch-hero-bg');

                        const changeBgSlide = () => {
                            if (requestId !== AppState.tmdbRequestSeq || !document.getElementById('watch-hero-bg')) {
                                if(AppState.bgSlideInterval) clearInterval(AppState.bgSlideInterval);
                                return;
                            }
                            bgEl.style.opacity = '0';
                            setTimeout(() => {
                                if (requestId !== AppState.tmdbRequestSeq || !document.getElementById('watch-hero-bg')) return;
                                bgEl.onload = () => { bgEl.classList.remove('blur-[28px]'); bgEl.style.opacity = '0.35'; };
                                bgEl.src = backdrops[currentIndex];
                                currentIndex = (currentIndex + 1) % backdrops.length;
                            }, 1000); 
                        };

                        changeBgSlide();
                        if (backdrops.length > 1) AppState.bgSlideInterval = setInterval(changeBgSlide, 7000);
                    }
                }

                const galleryTab = document.getElementById('tab-content-gallery');
                const castContainer = document.getElementById('cast-cards-container');

                if (galleryTab) {
                    // --- 1. & 2. XỬ LÝ VIDEO VÀ HÌNH ẢNH (GỌI API SONG SONG THÔNG MINH) ---
                    let tmdbVideos = [];
                    let allTmdbImages = { backdrops: [], posters: [], logos: [] };

                    if (tmdbData && tmdbData.id) {
                        try {
                            // Gọi song song API Videos và API Images (không giới hạn ngôn ngữ để lấy TOÀN BỘ ảnh)
                            const [fullVidRes, fullImgRes] = await Promise.all([
                                TMDB.fetchJSON(`/${tmdbData.media_type}/${tmdbData.id}/videos`),
                                TMDB.fetchJSON(`/${tmdbData.media_type}/${tmdbData.id}/images`, '') // truyền rỗng để bỏ lang parameter
                            ]);
                            
                            if (fullVidRes && fullVidRes.results) tmdbVideos = fullVidRes.results;
                            else if (tmdbData.videos && tmdbData.videos.results) tmdbVideos = tmdbData.videos.results;

                            if (fullImgRes) {
                                allTmdbImages.backdrops = fullImgRes.backdrops || [];
                                allTmdbImages.posters = fullImgRes.posters || [];
                                allTmdbImages.logos = fullImgRes.logos || [];
                            } else if (tmdbData.images) {
                                allTmdbImages.backdrops = tmdbData.images.backdrops || [];
                                allTmdbImages.posters = tmdbData.images.posters || [];
                                allTmdbImages.logos = tmdbData.images.logos || [];
                            }
                        } catch (e) {
                            if (tmdbData.videos && tmdbData.videos.results) tmdbVideos = tmdbData.videos.results;
                            if (tmdbData.images) {
                                allTmdbImages.backdrops = tmdbData.images.backdrops || [];
                                allTmdbImages.posters = tmdbData.images.posters || [];
                                allTmdbImages.logos = tmdbData.images.logos || [];
                            }
                        }
                    }

                    // --- XỬ LÝ TRAILER ---
                    const getVideoScore = (video) => {
                        if (video.iso_639_1 === 'vi') return 10;
                        if (video.iso_639_1 === 'en') return 5;
                        if (tmdbData && video.iso_639_1 === tmdbData.original_language) return 3;
                        return 1; 
                    };

                    let selectedVideos = { trailer: null, teaser: null, bts: null };

                    // OPhim Trailer (Ưu tiên số 1)
                    if (movieObj.trailer_url) {
                        const ytIdMatch = movieObj.trailer_url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
                        if (ytIdMatch && ytIdMatch[1]) {
                            selectedVideos.trailer = { key: ytIdMatch[1], name: `Trailer Chính thức (OPhim)`, site: 'YouTube', source: 'ophim' };
                        }
                    }

                    let bestScores = { trailer: -1, teaser: -1, bts: -1 };
                    
                    tmdbVideos.forEach(v => {
                        if (v.site !== 'YouTube') return;
                        const score = getVideoScore(v);
                        const isoStr = (v.iso_639_1 || 'gốc').toUpperCase();
                        
                        if (v.type === 'Trailer') {
                            if (!selectedVideos.trailer || (selectedVideos.trailer.source !== 'ophim' && score > bestScores.trailer)) {
                                selectedVideos.trailer = { key: v.key, name: `Trailer (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                bestScores.trailer = score;
                            }
                        } else if (v.type === 'Teaser') {
                            if (score > bestScores.teaser) {
                                selectedVideos.teaser = { key: v.key, name: `Teaser (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                bestScores.teaser = score;
                            }
                        } else if (v.type === 'Behind the Scenes' || v.type === 'Featurette') {
                            if (score > bestScores.bts) {
                                selectedVideos.bts = { key: v.key, name: `Hậu Trường (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                bestScores.bts = score;
                            }
                        }
                    });

            playActorMovie: async (metaEncoded) => {
                let meta;
                try { meta = JSON.parse(decodeURIComponent(metaEncoded)); } catch (e) { meta = null; }
                if (!meta || !meta.title) return;

                Utils.showToast(`Đang tìm nguồn phát cho "${meta.title}"...`);
                const data = await API.search(meta.title, 10);

                if (!data || !data.data || !data.data.items || data.data.items.length === 0) {
                    Utils.showToast(`Phim "${meta.title}" chưa có trên hệ thống stream`, 'error');
                    return;
                }

                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                const expectedOriginal = norm(meta.originalTitle), expectedTitle = norm(meta.title);
                const expectedYear = meta.year ? parseInt(meta.year, 10) : null;
                const expectedType = meta.mediaType === 'tv' ? 'series' : 'single';

                let bestItem = null; let bestScore = -1;

                data.data.items.forEach(item => {
                    let score = 0;
                    const itemName = norm(item.name), itemOrigin = norm(item.origin_name);

                    if (itemOrigin && (itemOrigin === expectedOriginal || itemOrigin === expectedTitle)) score += 100;
                    else if (itemName === expectedTitle) score += 60;
                    else if (itemOrigin && (itemOrigin.includes(expectedOriginal) || expectedOriginal.includes(itemOrigin))) score += 30;

                    if (expectedYear && item.year) {
                        const diff = Math.abs(parseInt(item.year, 10) - expectedYear);
                        if (diff === 0) score += 50; else if (diff === 1) score += 15; else score -= 60;
                    }

                    if (item.type && (item.type === 'single' || item.type === 'series')) {
                        if (item.type === expectedType) score += 20; else score -= 30;
                    }

                    const countrySlug = item.country?.[0]?.slug || null;
                    const itemExpectedLang = countrySlug ? COUNTRY_LANG_MAP[countrySlug] : null;
                    if (meta.originalLanguage && itemExpectedLang) {
                        if (itemExpectedLang === meta.originalLanguage) score += 70; else score -= 100;
                    }

                    if (score > bestScore) { bestScore = score; bestItem = item; }
                });

                if (!bestItem || bestScore < 30) {
                    Utils.showToast(`Không tìm thấy đúng bản phim "${meta.title}" trên hệ thống`, 'error');
                    return;
                }

                AppHandlers.goToWatch(bestItem.slug, bestItem.sourceProvider || 'OP');
            },

            loadSuggestions: async (movie) => {
                const container = document.getElementById('suggest-container');
                if(!container) return;
                container.innerHTML = Utils.showLoading();
                
                let queries = [];
                
                if (movie.category && movie.category.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[0].slug}?limit=24`));
                    if (movie.category.length > 1) {
                        queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[1].slug}?limit=24`));
                    }
                }
                if (movie.country && movie.country.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/quoc-gia/${movie.country[0].slug}?limit=24`));
                }
                
                if (queries.length === 0) {
                    queries.push(API.fetchJSON('/danh-sach/phim-moi-cap-nhat?limit=24'));
                }

                const results = await Promise.allSettled(queries);
                let combinedMap = new Map();

                results.forEach(res => {
                    if(res.status === 'fulfilled' && res.value) {
                        let items = res.value.data ? res.value.data.items : res.value.items || [];
                        items.forEach(m => {
                            if (m.slug !== movie.slug) {
                                if (combinedMap.has(m.slug)) {
                                    combinedMap.get(m.slug).score += 1;
                                } else {
                                    m.score = 1;
                                    combinedMap.set(m.slug, m);
                                }
                            }
                        });
                    }
                });

                let items = Array.from(combinedMap.values());
                items.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                });
                items = items.slice(0, 16);
                
                if(items.length) {
                    container.innerHTML = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">${items.map(m => Render.movieCard(m)).join('')}</div>`;
                } else {
                    container.innerHTML = `<div class="text-center text-muted py-8">Chưa có đề xuất phù hợp lúc này.</div>`;
                }
            },

            toggleFav: () => {
                if(!AppState.watchData) return;
                Utils.toggleFavorite(AppState.watchData.movie);
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie);
                AppHandlers.loadTmdbExtras(AppState.watchData.movie);
            },

            loadList: async (type, slug, title) => {
                AppHandlers.navigate('search'); document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                document.getElementById('search-title').innerHTML = title;
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList(type, slug, 36);
                resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-16 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><p>Danh sách này hiện tại đang trống.</p></div>`;
            },

            searchByKeyword: (kw) => { 
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = kw; 
                AppHandlers.onSearchInput(kw); 
            },

            onSearchInput: (val) => {
                const kw = val.trim(); 
                if(AppState.searchTimeout) clearTimeout(AppState.searchTimeout);
                const resDiv = document.getElementById('search-results'), tDiv = document.getElementById('search-title');
                const smartDiv = document.getElementById('search-smart');
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                if (!kw) { tDiv.innerHTML = 'Tìm kiếm'; resDiv.innerHTML = ''; if(smartDiv) smartDiv.innerHTML = ''; return; }
                
                tDiv.innerHTML = `Kết quả cho: "${kw}"`; 
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                if(smartDiv) smartDiv.innerHTML = '';
                
                AppState.searchTimeout = setTimeout(async () => {
                    const [data, personRes] = await Promise.all([
                        API.search(kw),
                        TMDB.searchPerson(kw).catch(() => null)
                    ]);
                    const emptyStateHtml = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-muted">
                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" class="mb-4 opacity-40" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <p class="font-medium text-gray-300">Không tìm thấy dữ liệu cho từ khóa này.</p>
                        <p class="text-sm mt-2 max-w-sm text-center">API hệ thống có thể chưa cập nhật diễn viên hoặc tên phim này. Bạn vui lòng thử một từ khóa khác.</p>
                    </div>`;

                    resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : emptyStateHtml;

                    const people = (personRes?.results || []).filter(p => p.known_for_department === 'Acting' || p.known_for_department === 'Directing').slice(0, 5);
                    if (smartDiv && people.length) {
                        smartDiv.innerHTML = `
                        <div class="text-xs text-muted mb-2">Có phải bạn muốn tìm người này?</div>
                        <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
                            ${people.map(p => `
                                <div onclick="AppHandlers.openActorDetail('${p.id}')" class="shrink-0 flex items-center gap-2 bg-surface border border-white/10 rounded-full pl-1.5 pr-3 py-1.5 cursor-pointer hover:border-primary/50 transition">
                                    <img src="${p.profile_path ? CONFIG.TMDB_IMG + p.profile_path : 'https://placehold.co/60x60/1c1f2e/94a3b8?text=?'}" class="w-7 h-7 rounded-full object-cover" onerror="this.src='https://placehold.co/60x60/1c1f2e/94a3b8?text=?'"/>
                                    <span class="text-xs font-semibold">${p.name}</span>
                                    <span class="text-[10px] text-muted">${p.known_for_department === 'Directing' ? 'Đạo diễn' : 'Diễn viên'}</span>
                                </div>`).join('')}
                        </div>`;
                    }

                    const items = data?.data?.items || [];
                    if (items.length) {
                        const genreMap = new Map();
                        items.forEach(m => (m.category || []).forEach(c => { if(c?.name) genreMap.set(c.slug || c.name, c.name); }));
                        if (genreMap.size) {
                            const chipsHtml = `
                            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1 ${people.length ? 'mt-3' : ''}">
                                ${[...genreMap.entries()].slice(0, 10).map(([slug, name]) => `
                                    <button onclick="AppHandlers.filterSearchByGenre('${slug}')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">${name}</button>
                                `).join('')}
                            </div>`;
                            smartDiv.innerHTML += chipsHtml;
                        }
                    }
                    AppState.lastSearchItems = items; 
                }, 700);
            },

            filterSearchByGenre: (genreSlug) => {
                const resDiv = document.getElementById('search-results');
                const items = (AppState.lastSearchItems || []).filter(m => (m.category || []).some(c => (c.slug || c.name) === genreSlug));
                resDiv.innerHTML = items.length ? items.map(m => Render.movieCard(m)).join('') : `<div class="col-span-full text-center text-muted py-10">Không có phim nào thuộc thể loại này trong kết quả hiện tại.</div>`;
            },

            renderHistory: (type = 'recent') => {
                const c = document.getElementById('history-content');
                let data = type === 'recent' ? AppState.history.map(m => ({...m, badge: m.last_ep_name?`Tập ${m.last_ep_name}`:'Đã xem'})) : AppState.favorites;
                c.innerHTML = data.length ? data.map(m => Render.movieCard(m, m.badge)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-20 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><p>Danh sách của bạn đang trống.</p></div>`;
            },
            
            switchHistoryTab: (tab) => {
                document.getElementById('htab-recent').classList.replace('tab-active', 'text-muted');
                document.getElementById('htab-favs').classList.replace('tab-active', 'text-muted');
                document.getElementById(`htab-${tab}`).classList.replace('text-muted', 'tab-active');
                AppHandlers.renderHistory(tab);
            }
        };

        document.addEventListener('DOMContentLoaded', AppHandlers.init);
    </script>



</body>
