            },

            actorDetailUI: (person, credits) => {
                const profileImg = person.profile_path ? `${CONFIG.TMDB_IMG}${person.profile_path}` : 'https://placehold.co/400x600/1c1f2e/94a3b8?text=No+Image';
                const birthday = person.birthday ? person.birthday : 'Đang cập nhật';
                const placeOfBirth = person.place_of_birth ? person.place_of_birth : 'Đang cập nhật';
                const genderStr = person.gender === 1 ? 'Nữ' : (person.gender === 2 ? 'Nam' : 'Khác');
                const otherNames = person.also_known_as?.length ? person.also_known_as.slice(0, 5).join(', ') : 'Không có';
                const biography = person.biography ? person.biography.replace(/\n/g, '<br/>') : 'Thông tin tiểu sử đang được cập nhật.';

                let movies = credits.cast || [];
                movies.sort((a, b) => (b.popularity || 0) - (a.popularity || 0)); 
                movies = movies.slice(0, 30); 

                const movieCardsHtml = movies.map(movie => {
                    const poster = movie.poster_path ? `${CONFIG.TMDB_IMG}${movie.poster_path}` : 'https://placehold.co/300x450/1c1f2e/94a3b8?text=No+Poster';
                    const role = movie.character ? `Vai: ${movie.character}` : 'Tham gia';
                    const title = movie.title || movie.name;
                    
                    const tmdbMeta = {
                        title: title, originalTitle: movie.original_title || movie.original_name || title,
                        year: (movie.release_date || movie.first_air_date || '').slice(0, 4) || null,
                        mediaType: movie.media_type === 'tv' ? 'tv' : 'movie', originalLanguage: movie.original_language || null
                    };
                    const metaEncoded = encodeURIComponent(JSON.stringify(tmdbMeta));
                    return `
                    <div class="group cursor-pointer flex flex-col h-full shrink-0 relative" onclick="AppHandlers.playActorMovie('${metaEncoded}')">
                        <div class="relative aspect-[2/3] rounded-xl overflow-hidden bg-surface mb-2 border border-white/5 shadow-sm">
                            <img src="${poster}" loading="lazy" decoding="async" onload="this.classList.remove('opacity-0')" class="w-full h-full object-cover transition-all duration-500 opacity-0 group-hover:scale-105" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=Loi+Anh'"/>
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <div class="w-10 h-10 bg-primary text-black rounded-full flex items-center justify-center shadow-lg"><svg width="18" height="18" fill="currentColor" class="ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                            </div>
                        </div>
                        <h3 class="font-bold text-[13px] text-text line-clamp-1 group-hover:text-primary transition-colors">${title}</h3>
                        <p class="text-[11px] text-primary font-medium truncate">${role}</p>
                    </div>`;
                }).join('');

                return `
                <div class="max-w-4xl mx-auto">
                    <button onclick="AppHandlers.backToWatch()" class="mb-6 flex items-center gap-2 text-muted hover:text-white font-bold text-sm bg-surface py-2 px-4 rounded-xl border border-white/5 transition">
                        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path></svg>
                        Quay lại phim
                    </button>

                    <div class="flex flex-col md:flex-row gap-8 items-center md:items-start mb-8">
                        <div class="w-48 sm:w-64 aspect-[3/4] rounded-2xl overflow-hidden bg-surface border border-white/10 shadow-2xl shrink-0">
                            <img src="${profileImg}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x600/1c1f2e/94a3b8?text=No+Image'"/>
                        </div>
                        <div class="flex-1 text-center md:text-left">
                            <h1 class="text-3xl sm:text-4xl font-black text-white mb-4 tracking-tight">${person.name}</h1>
                            
                            <div class="flex flex-wrap items-center justify-center md:justify-start gap-3 mb-6">
                                <button onclick="Utils.showToast('Đã thêm diễn viên vào danh sách yêu thích')" class="bg-surface hover:bg-white/5 border border-white/10 text-white font-bold text-sm px-5 py-2.5 rounded-full flex items-center gap-2 transition active:scale-95">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                    Yêu thích
                                </button>
                                <button onclick="AppHandlers.shareActor('${person.name}')" class="bg-surface hover:bg-white/5 border border-white/10 text-white font-bold text-sm px-5 py-2.5 rounded-full flex items-center gap-2 transition active:scale-95">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 10.742l4.636-2.318M8.684 13.258l4.636 2.318M21 12a3 3 0 11-6 0 3 3 0 016 0zm-12-6a3 3 0 11-6 0 3 3 0 016 0zm0 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    Chia sẻ
                                </button>
                            </div>

                            <div class="bg-surface rounded-2xl p-6 border border-white/5 text-sm space-y-3 shadow-inner">
                                <p><span class="text-muted font-semibold">Tên gọi khác:</span> <span class="text-white">${otherNames}</span></p>
                                <p><span class="text-muted font-semibold">Giới tính:</span> <span class="text-white">${genderStr}</span></p>
                                <p><span class="text-muted font-semibold">Ngày sinh:</span> <span class="text-white">${birthday}</span></p>
                                <p><span class="text-muted font-semibold">Nơi sinh:</span> <span class="text-white">${placeOfBirth}</span></p>
                            </div>
                        </div>
                    </div>

                    <div class="mb-10 bg-surface rounded-2xl p-6 border border-white/5 shadow-md">
                        <h2 class="text-lg font-bold text-white mb-3">Giới thiệu</h2>
                        <div class="text-gray-300 text-sm leading-relaxed max-h-60 overflow-y-auto hide-scrollbar border-t border-white/5 pt-3">
                            ${biography}
                        </div>
                    </div>

                    <div class="mb-10">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-1.5 h-4 bg-primary rounded-full"></span>
                            <h2 class="text-xl font-bold text-white">Các phim đã tham gia</h2>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            ${movieCardsHtml ? movieCardsHtml : '<p class="text-muted text-sm col-span-full text-center py-6">Chưa có thông tự tác phẩm đóng chung.</p>'}
                        </div>
                    </div>
                </div>`;
            }
        };

        const AppHandlers = {
            init: async () => { 
                API.getAppData().then(() => {
                    const rPill = (arr, t) => arr.map(i => `<button onclick="AppHandlers.loadList('${t}', '${i.slug}', '${i.name}'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">${i.name}</button>`).join('');
                    const gEl = document.getElementById('dropdown-genres');
                    const cEl = document.getElementById('dropdown-countries');
                    if(gEl && AppState.genres.length) gEl.innerHTML = rPill(AppState.genres, 'the-loai');
                    if(cEl && AppState.countries.length) cEl.innerHTML = rPill(AppState.countries, 'quoc-gia');
                });
                AppHandlers.loadHome(); 
                AppHandlers.restoreState(); 
                window.addEventListener('beforeunload', AppHandlers.saveCurrentVideoState);
                
                window.addEventListener('click', (e) => {
                    const sDropdown = document.getElementById('server-dropdown-list');
                    if (sDropdown && !e.target.closest('#current-server-display') && !e.target.closest('#dropdown-chevron') && !e.target.closest('#server-dropdown-list')) {
                        sDropdown.classList.add('hidden');
                        const chevron = document.getElementById('dropdown-chevron');
                        if (chevron) chevron.style.transform = 'rotate(0deg)';
                        AppState.isServerDropdownOpen = false;
                    }
                });
            },
            
            handleTouchStart: (e) => {
                AppState.isInteractingWithHero = true;
                AppHandlers.pauseHeroInterval();
                AppState.touchStartX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            },
            handleTouchEnd: (e) => {
                AppState.touchEndX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
                AppHandlers.handleSwipe();
                AppState.isInteractingWithHero = false;
                AppHandlers.startHeroInterval();
            },
            handleMouseLeave: (e) => {
                if (AppState.isInteractingWithHero) {
                    AppState.isInteractingWithHero = false;
                    AppHandlers.startHeroInterval();
                }
            },
            handleSwipe: () => {
                const threshold = 50;
                if (AppState.touchEndX < AppState.touchStartX - threshold) {
                    let nextIndex = AppState.currentHeroSlide + 1;
                    if(nextIndex >= AppState.totalHeroSlides) nextIndex = 0;
                    AppHandlers.changeHeroSlide(nextIndex, true);
                }
                if (AppState.touchEndX > AppState.touchStartX + threshold) {
                    let prevIndex = AppState.currentHeroSlide - 1;
                    if(prevIndex < 0) prevIndex = AppState.totalHeroSlides - 1;
                    AppHandlers.changeHeroSlide(prevIndex, true);
                }
            },
            pauseHeroInterval: () => {
                if(AppState.heroInterval) {
                    clearInterval(AppState.heroInterval);
                    AppState.heroInterval = null;
                }
            },
            startHeroInterval: () => {
                AppHandlers.pauseHeroInterval();
                AppState.heroInterval = setInterval(() => {
                    if(document.getElementById('hero-slider') && AppState.currentView === 'home' && AppState.totalHeroSlides > 0 && !AppState.isInteractingWithHero) {
                        let nextIndex = AppState.currentHeroSlide + 1;
                        if(nextIndex >= AppState.totalHeroSlides) nextIndex = 0;
                        AppHandlers.changeHeroSlide(nextIndex, false);
                    }
                }, CONFIG.HERO_AUTO_PLAY_INTERVAL);
            },
            
            changeHeroSlide: (nextIndex, isManual = false) => {
                if(isManual) AppHandlers.startHeroInterval(); 
                if(nextIndex === AppState.currentHeroSlide) return;

                const slider = document.getElementById('hero-slider');
                if(!slider) return;

                const currentEl = slider.querySelector(`.hero-slide-item[data-index="${AppState.currentHeroSlide}"]`);
                const nextEl = slider.querySelector(`.hero-slide-item[data-index="${nextIndex}"]`);

                if(currentEl) {
                    currentEl.classList.remove('opacity-100', 'pointer-events-auto', 'z-10');
                    currentEl.classList.add('opacity-0', 'pointer-events-none', 'z-0');
                }
                if(nextEl) {
                    nextEl.classList.remove('opacity-0', 'pointer-events-none', 'z-0');
                    nextEl.classList.add('opacity-100', 'pointer-events-auto', 'z-10');
                }

                for(let i=0; i<AppState.totalHeroSlides; i++) {
                    const dot = document.getElementById(`dot-${i}`);
                    if(dot) {
                        if(i === nextIndex) dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-primary w-6";
                        else dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-white/30";
                    }
                }
                AppState.currentHeroSlide = nextIndex;
            },

            saveCurrentVideoState: () => {
                if(AppState.currentView === 'watch' && AppState.watchData && AppState.isPlaying) {
                    const video = document.getElementById('kt-player');
                    let currentTime = 0;
                    if(video) currentTime = video.currentTime;
                    
                    const m = AppState.watchData.movie;
                    const eps = AppState.watchData.episodes;
                    if(eps && eps[0] && m) {
                         Utils.updateHistoryTime(m, AppState.activeEpIdx, eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx].name, currentTime);
                    }
                }
            },

            navigate: (viewId) => {
                if (AppState.currentView !== viewId) AppState.previousView = AppState.currentView;

                if (AppState.currentView === 'watch' && viewId !== 'watch') { 
                    AppHandlers.saveCurrentVideoState();
                    if(AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if(AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    if(AppState.bgSlideInterval) { clearInterval(AppState.bgSlideInterval); AppState.bgSlideInterval = null; }
                    
                    document.getElementById('view-watch').innerHTML = ''; 
                    AppState.isPlaying = false; 
                }

                AppState.currentView = viewId;
                ['home', 'watch', 'search', 'history', 'actor'].forEach(id => {
                    const el = document.getElementById(`view-${id}`);
                    if (el) el.classList.toggle('hidden', id !== viewId);
                });
                window.scrollTo(0, 0);
                
                document.getElementById('navbar').className = `fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 ${viewId === 'watch' ? 'bg-gradient-to-b from-black/80 to-transparent' : 'bg-app/90 backdrop-blur-md'}`;

                if (viewId === 'home' && !document.getElementById('view-home').innerHTML.trim()) AppHandlers.loadHome();
                if (viewId === 'history') AppHandlers.renderHistory('recent');

                AppHandlers.persistState();
            },

            backToWatch: () => {
                AppHandlers.navigate('watch');
                if (AppState.watchData && AppState.watchData.episodes && AppState.watchData.episodes.length) {
                    AppHandlers.playVideo();
                } else {
                    AppHandlers.navigate('home');
                }
            },

            goBack: () => {
                if (AppState.currentView === 'watch' && AppState.isPlaying) {
                    AppHandlers.saveCurrentVideoState();
                    if (AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if (AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    AppState.isPlaying = false;
                    document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, false, AppState.activeServerIdx, AppState.activeEpIdx);
                    window.scrollTo(0, 0);
                    AppHandlers.persistState();
                    return;
                }
                AppHandlers.navigate(AppState.previousView || 'home');
            },

            persistState: () => {
                try {
                    const s = { view: AppState.currentView, previousView: AppState.previousView };
                    if (AppState.currentView === 'watch' && AppState.watchData && AppState.watchData.movie) {
                        s.watchSlug = AppState.watchData.movie.slug; s.watchProvider = AppState.currentSourceProvider;
                        s.isPlaying = AppState.isPlaying; s.serverIdx = AppState.activeServerIdx; s.epIdx = AppState.activeEpIdx;
                    }
                    if (AppState.currentView === 'actor' && AppState.currentActorId) s.actorId = AppState.currentActorId;
                    localStorage.setItem('ktuong_resume_state', JSON.stringify(s));
                } catch (e) {}
            },

            restoreState: async () => {
                let saved = null;
                try { saved = JSON.parse(localStorage.getItem('ktuong_resume_state') || 'null'); } catch (e) {}
                if (!saved || !saved.view || saved.view === 'home') return;

                AppState.previousView = saved.previousView || 'home';

                if (saved.view === 'watch' && saved.watchSlug) {
                    await AppHandlers.goToWatch(saved.watchSlug, saved.watchProvider || 'OP');
                    if (saved.isPlaying && AppState.watchData && AppState.watchData.episodes && AppState.watchData.episodes.length) {
                        AppState.activeServerIdx = saved.serverIdx || 0;
                        AppState.activeEpIdx = saved.epIdx || 0;
                        AppHandlers.playVideo();
                    }
                } else if (saved.view === 'actor' && saved.actorId) {
                    AppHandlers.openActorDetail(saved.actorId);
                } else if (saved.view === 'search' || saved.view === 'history') {
                    AppHandlers.navigate(saved.view);
                }
            },

            downloadSource: async () => {
                try {
                    const response = await fetch(window.location.href);
                    if (response.ok) {
                        const text = await response.text();
                        AppHandlers._triggerDownload(text);
                        return;
                    }
                } catch(e) {}
                
                let clone = document.documentElement.cloneNode(true);
                const viewsToEmpty = ['view-home', 'view-watch', 'search-results', 'history-content', 'view-actor'];
                viewsToEmpty.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.innerHTML = ''; });
                
                const viewsToHide = ['view-watch', 'view-search', 'view-history', 'view-actor'];
                viewsToHide.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.classList.add('hidden'); });
                const homeView = clone.querySelector('#view-home'); if(homeView) homeView.classList.remove('hidden');
                
                const searchInput = clone.querySelector('#search-input'); if(searchInput) searchInput.value = '';
                
                const overlay = clone.querySelector('#menu-overlay'); if(overlay) overlay.className = "fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0";
                const modal = clone.querySelector('#menu-modal'); if(modal) { modal.classList.remove('bottom-sheet-open'); modal.classList.add('bottom-sheet-closed'); }
                
                const dropdowns = ['dropdown-genres', 'dropdown-countries'];
                dropdowns.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) { el.classList.add('hidden'); el.innerHTML = ''; } });
                
                clone.querySelectorAll('style:not(#custom-core-styles)').forEach(s => s.remove());
                clone.querySelectorAll('script[data-bard-injected], script[injected]').forEach(s => s.remove());
                
                const finalHtml = "<!DOCTYPE html>\n<html lang=\"vi\">\n" + clone.innerHTML + "\n</html>";
                AppHandlers._triggerDownload(finalHtml);
            },

            _triggerDownload: (htmlContent) => {
                const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "ktuongfx_source_code.html";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                AppHandlers.toggleMenuModal();
            },

            toggleMenuModal: () => {
                const modal = document.getElementById('menu-modal'), overlay = document.getElementById('menu-overlay');
                if(modal.classList.contains('bottom-sheet-closed')) {
                    modal.classList.replace('bottom-sheet-closed', 'bottom-sheet-open');
                    overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                } else {
                    modal.classList.replace('bottom-sheet-open', 'bottom-sheet-closed');
                    overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            },
            
            toggleDropdown: (id) => {
                const el = document.getElementById(id);
                const isGenres = id === 'dropdown-genres';
                el.classList.toggle('hidden');
                
                const icon = document.getElementById(isGenres ? 'icon-genres' : 'icon-countries');
                if(icon) icon.style.transform = el.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
                
                const otherId = isGenres ? 'dropdown-countries' : 'dropdown-countries' === 'dropdown-genres' ? 'dropdown-genres' : 'dropdown-countries'; 
                if (isGenres) { document.getElementById('dropdown-countries')?.classList.add('hidden'); document.getElementById('icon-countries') && (document.getElementById('icon-countries').style.transform = 'rotate(0deg)'); }
                else { document.getElementById('dropdown-genres')?.classList.add('hidden'); document.getElementById('icon-genres') && (document.getElementById('icon-genres').style.transform = 'rotate(0deg)'); }
            },

            loadHome: async () => {
                const homeDiv = document.getElementById('view-home'); 
                homeDiv.innerHTML = Utils.showLoading(true);
                let homeContent = '';

                const heroTask = (async () => {
                    try {
                        const heroRes = await API.fetchJSON('/v1/api/danh-sach/phim-moi-cap-nhat?limit=20');
                        if (heroRes && heroRes.data && heroRes.data.items) {
                            const heroSlugs = heroRes.data.items.map(i => i.slug).slice(0, CONFIG.HERO_LIMIT);
                            const heroPromises = await Promise.allSettled(heroSlugs.map(slug => API.getMovieDetails(slug)));
                            return heroPromises.filter(p => p.status === 'fulfilled' && p.value?.status).map(p => p.value);
                        }
                    } catch(e) { console.log("Lỗi tải Slider", e); }
                    return [];
                })();

                const top10Task = (async () => {
                    try {
                        const top10Res = await API.getList('danh-sach', 'phim-bo', 10);
                        if (top10Res && top10Res.data && top10Res.data.items) return top10Res.data.items;
                    } catch(e) { console.log("Lỗi tải Top 10", e); }
                    return [];
                })();

                // THÊM MỚI: dòng "Phim Điện Ảnh Hot" (phim lẻ) trộn cả phim mới lẫn phim cũ nổi bật,
                // để người dùng vừa có phim mới vừa có phim kinh điển để xem, thay vì chỉ có phim mới nhất.
                const movieHotTask = (async () => {
                    try {
                        const poolRes = await API.getList('danh-sach', 'phim-le', 40);
                        const items = poolRes?.data?.items || [];
                        if (!items.length) return [];
                        const currentYear = new Date().getFullYear();
                        const isNew = (m) => { const y = parseInt(m.year, 10); return y && y >= currentYear - 1; };
                        const newest = items.filter(isNew).sort((a, b) => (parseInt(b.year, 10) || 0) - (parseInt(a.year, 10) || 0));
                        const classics = Utils.sortByPopularity(items.filter(m => !isNew(m)));
                        const merged = []; const seen = new Set();
                        const pushUnique = (m) => { if (m && m.slug && !seen.has(m.slug)) { seen.add(m.slug); merged.push(m); } };
                        let ni = 0, ci = 0;
                        while (merged.length < 14 && (ni < newest.length || ci < classics.length)) {
                            if (ni < newest.length) pushUnique(newest[ni++]);
                            if (merged.length < 14 && ci < classics.length) pushUnique(classics[ci++]);
                        }
                        return merged;
                    } catch (e) { console.log("Lỗi tải Phim Điện Ảnh Hot", e); }
                    return [];
                })();

                const rowPromises = CONFIG.MOVIE_ROWS.map(row => {
                    // Với các mục "thịnh hành", lấy một pool lớn hơn rồi lọc/sắp xếp theo lượt vote/xem thật,
                    // thay vì chỉ hiển thị đúng những phim mới nhất API trả về đầu tiên.
                    const fetchLimit = row.popularity ? Math.min(row.limit * 4, 40) : row.limit;
                    return API.getList(row.type, row.slug, fetchLimit).catch(() => null);
                });

                // TỐI ƯU: gọi TMDB.getTrending 1 LẦN duy nhất ở đây (thay vì loadTrendBadges tự gọi lại sau),
                // rồi dùng chung dữ liệu này cho cả 2 việc: (a) huy hiệu xu hướng trên dòng Top 10, và
                // (b) dựng dòng "Thịnh Hành Toàn Cầu" mới bằng cách đối chiếu ngược lại với các phim đã có
                // sẵn trong thư viện (từ các dòng vừa tải) — không tốn thêm lượt gọi mạng nào cho việc này.
                const trendingTask = (async () => {
                    try {
                        const [dayRes, weekRes] = await Promise.all([ TMDB.getTrending('all', 'day'), TMDB.getTrending('all', 'week') ]);
                        return { dayRes, weekRes };
                    } catch (e) { return { dayRes: null, weekRes: null }; }
                })();

                const [heroDetails, top10Items, trendingData, movieHotItems, ...rowResults] = await Promise.all([heroTask, top10Task, trendingTask, movieHotTask, ...rowPromises]);

                if (heroDetails.length) homeContent += Render.heroBanner(heroDetails);
                if (top10Items.length) homeContent += Render.topHorizontalRow('Top 10 Phim Bộ Hôm Nay', top10Items);

                if (AppState.history.length > 0) {
                    homeContent += Render.horizontalRow('Tiếp tục xem', AppState.history.slice(0,12).map(m=>({...m, episode_current: m.last_ep_name?Utils.formatEpName(m.last_ep_name):''})), 'history', 'recent');
                }

                // THÊM MỚI: hiển thị dòng "Phim Điện Ảnh Hot" (phim lẻ, gồm cả mới lẫn kinh điển)
                if (movieHotItems && movieHotItems.length) {
                    homeContent += Render.horizontalRow('🎬 Phim Điện Ảnh Hot (Mới & Kinh Điển)', movieHotItems, 'danh-sach', 'phim-le', true);
                }

                const libraryPool = [];
                const seenSlugs = new Set();
                const addToPool = (list) => (list || []).forEach(m => {
                    if (m && m.slug && !seenSlugs.has(m.slug)) { seenSlugs.add(m.slug); libraryPool.push(m); }
                });
                addToPool(top10Items);
                addToPool(movieHotItems);

                rowResults.forEach((res, index) => {
                    const rowConfig = CONFIG.MOVIE_ROWS[index];
                    if (res && (res.data?.items || res.items)) {
                        let items = res.data?.items || res.items;
                        addToPool(items);
                        if (rowConfig.popularity) items = Utils.sortByPopularity(items).slice(0, rowConfig.limit);
                        if (items.length > 0) {
                            homeContent += Render.horizontalRow(rowConfig.title, items, rowConfig.type, rowConfig.slug, rowConfig.rank);
                        }
                    }
                });

                // CẬP NHẬT: lấy pool đối chiếu lớn hơn (tới 40 phim) thay vì chỉ 12, rồi lưu lại toàn bộ
                // để nút "Xem thêm" có thể hiển thị nhiều phim top khác thay vì chỉ dừng ở vài phim đầu.
                const globalTrendingFull = Utils.buildGlobalTrendingRow(libraryPool, trendingData.dayRes, 40);
                AppState.homeTmdbTrendingFull = globalTrendingFull;
                AppState.homeTrendingDataCache = trendingData;
                AppState.homeLibraryPoolCache = libraryPool;

                const globalTrendingRow = globalTrendingFull.slice(0, 12);
                if (globalTrendingRow.length) {
                    const viewAllBtnHtml = globalTrendingFull.length > globalTrendingRow.length
                        ? `<button onclick="AppHandlers.loadTmdbTrendingFull()" class="text-sm font-medium text-muted hover:text-primary transition-colors">Xem thêm</button>`
                        : '';
                    homeContent = Render.horizontalRowCustom('🔥 Thịnh Hành Toàn Cầu (TMDB)', globalTrendingRow, true, viewAllBtnHtml) + homeContent;
                }

                // CẬP NHẬT: nhúng "layer" Bảng xếp hạng trực tiếp thẳng vào giữa luồng nội dung trang chủ
                // (ngay phía trên dòng Thịnh Hành Toàn Cầu) thay vì phải bấm nút nổi mới hiện popup.
                if (globalTrendingFull.length || (libraryPool && libraryPool.length)) {
                    homeContent = Render.trendPanelSection() + homeContent;
                }

                if (!homeContent.trim()) {
                    homeDiv.innerHTML = `<div class="grid grid-cols-1 min-h-[60vh]">${Utils.renderApiErrorBanner('AppHandlers.loadHome()', true)}</div>`;
                    return;
                }

                homeDiv.innerHTML = homeContent;
                
                AppHandlers.startHeroInterval();

                if (top10Items.length) AppHandlers.loadTrendBadges(top10Items, trendingData);

                // Dựng ngay nội dung bảng xếp hạng (tab mặc định "Sôi Nổi Nhất") vì giờ nó nằm sẵn trong trang,
                // không còn cần chờ người dùng bấm nút mở popup nữa.
                AppHandlers.switchTrendPanelTab(AppState.trendPanelActiveTab || 'hot');
            },

            loadTrendBadges: async (items, preFetched = null) => {
                const norm = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
                try {
                    // Tái sử dụng dữ liệu trending đã tải sẵn ở loadHome nếu có, tránh gọi lại TMDB 2 lần.
                    const { dayRes, weekRes } = preFetched || await (async () => {
                        const [d, w] = await Promise.all([ TMDB.getTrending('all', 'day'), TMDB.getTrending('all', 'week') ]);
                        return { dayRes: d, weekRes: w };
                    })();
                    const dayRank = new Map(), weekRank = new Map();
                    (dayRes?.results || []).forEach((it, i) => dayRank.set(norm(it.title || it.name || it.original_name), i));
                    (weekRes?.results || []).forEach((it, i) => weekRank.set(norm(it.title || it.name || it.original_name), i));

                    items.forEach(m => {
                        const key = norm(m.origin_name || m.name);
                        const el = document.getElementById(`trend-${m.slug}`);
                        if (!el) return;
                        const d = dayRank.has(key) ? dayRank.get(key) : null, w = weekRank.has(key) ? weekRank.get(key) : null;
                        let html = '';
                        if (d !== null && w !== null) {
                            if (d < w) html = `<span class="trend-badge trend-up">▲ Đang tăng</span>`;
                            else if (d > w) html = `<span class="trend-badge trend-down">▼ Đang giảm</span>`;
                            else html = `<span class="trend-badge trend-flat">▬ Ổn định</span>`;
                        } else if (d !== null) { html = `<span class="trend-badge trend-up">▲ Mới nổi</span>`; }
                        el.innerHTML = html;
                    });
                } catch (e) { console.log("Lỗi tải xu hướng TMDB:", e); }
            },

            loadTop50: async () => {
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-2 gap-y-6 px-2";
                document.getElementById('search-title').innerHTML = 'Top 50 Phim Hot Nhất <span class="text-primary text-sm ml-2">HOT 🔥</span>';
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList('danh-sach', 'phim-bo', 50);
                if(data?.data?.items?.length) {
                    resDiv.innerHTML = data.data.items.map((m, i) => Render.topNetflixCard(m, i, true)).join('');
                }
            },

            // THÊM MỚI: trang "Xem thêm" cho dòng Thịnh Hành Toàn Cầu (TMDB) - trước đây bị ẩn nút
            // vì không có type/slug tương ứng, nay dùng lại danh sách đã đối chiếu sẵn (tới 40 phim)
            // được lưu ở AppState.homeTmdbTrendingFull trong lúc tải trang chủ.
            loadTmdbTrendingFull: async () => {
                AppHandlers.navigate('search');
                document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results');
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-2 gap-y-6 px-2";
                document.getElementById('search-title').innerHTML = '🔥 Thịnh Hành Toàn Cầu (TMDB) <span class="text-primary text-sm ml-2">Cập nhật thời gian thực</span>';
                const items = AppState.homeTmdbTrendingFull || [];
                if (!items.length) {
                    resDiv.innerHTML = `<div class="col-span-full text-center text-muted py-16">Chưa có dữ liệu thịnh hành, vui lòng quay lại Trang chủ để tải dữ liệu trước.</div>`;
                    return;
                }
                resDiv.innerHTML = items.map((m, i) => Render.topNetflixCard(m, i, true)).join('');
                AppHandlers.loadTrendBadges(items, AppState.homeTrendingDataCache);
            },

            // ===== "layer" liquid glass "Bảng xếp hạng trực tiếp" (nhúng thẳng trong trang chủ) =====
            switchTrendPanelTab: (tab) => {
                AppState.trendPanelActiveTab = tab;
                const hotTab = document.getElementById('tptab-hot'), favTab = document.getElementById('tptab-fav');
                if (hotTab) hotTab.classList.toggle('tab-active', tab === 'hot');
                if (hotTab) hotTab.classList.toggle('text-muted', tab !== 'hot');
                if (favTab) favTab.classList.toggle('tab-active', tab === 'fav');
                if (favTab) favTab.classList.toggle('text-muted', tab !== 'fav');
                AppHandlers.renderTrendPanelContent(tab);
            },

            // Danh sách top 5 kèm mũi tên tăng/giảm. Ưu tiên đối chiếu xu hướng ngày (day) vs tuần (week) từ TMDB
            // khi có dữ liệu khớp; nếu phim không nằm trong bảng thịnh hành toàn cầu của TMDB (trường hợp phổ biến),
            // mô phỏng tăng/giảm dựa theo điểm đánh giá TMDB so với mặt bằng chung của danh sách đang hiển thị:
            // điểm cao hơn trung bình => mũi tên tăng, thấp hơn => mũi tên giảm.
            renderTrendPanelContent: (tab) => {
                const content = document.getElementById('trend-panel-content');
                if (!content) return;
                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');

                const list = tab === 'hot'
                    ? (AppState.homeTmdbTrendingFull || []).slice(0, 5)
                    : Utils.sortByPopularity(AppState.homeLibraryPoolCache || []).slice(0, 5);

                if (!list.length) {
                    content.innerHTML = `<div class="text-center text-muted text-sm py-8">Chưa có dữ liệu, vui lòng mở lại Trang chủ để tải dữ liệu thịnh hành.</div>`;
                    return;
                }

                const dayRes = AppState.homeTrendingDataCache?.dayRes, weekRes = AppState.homeTrendingDataCache?.weekRes;
                const dayRank = new Map(), weekRank = new Map();
                (dayRes?.results || []).forEach((it, i) => dayRank.set(norm(it.title || it.name || it.original_name), i));
                (weekRes?.results || []).forEach((it, i) => weekRank.set(norm(it.title || it.name || it.original_name), i));

                const ratings = list.map(m => parseFloat(m?.tmdb?.vote_average) || 0);
                const avgRating = ratings.length ? ratings.reduce((a, b) => a + b, 0) / ratings.length : 0;

                content.innerHTML = list.map((m, idx) => {
                    const key = norm(m.origin_name || m.name);
                    const d = dayRank.has(key) ? dayRank.get(key) : null, w = weekRank.has(key) ? weekRank.get(key) : null;
                    const up = '<span class="text-green-400 text-xs font-bold">▲</span>';
                    const down = '<span class="text-red-400 text-xs font-bold">▼</span>';
                    const flat = '<span class="text-muted text-xs font-bold">▬</span>';
                    let trendIcon;
                    if (d !== null && w !== null) {
                        trendIcon = d < w ? up : (d > w ? down : flat);
                    } else if (d !== null) {
                        trendIcon = up;
                    } else {
                        const rating = parseFloat(m?.tmdb?.vote_average) || 0;
                        trendIcon = rating > avgRating + 0.15 ? up : (rating < avgRating - 0.15 ? down : flat);
                    }
                    const source = m.sourceProvider || 'OP';
                    return `
                    <div class="flex items-center gap-3 cursor-pointer hover:bg-white/5 rounded-xl p-1.5 transition" onclick="AppHandlers.goToWatch('${m.slug}', '${source}', '${m.altSlug || ''}', '${m.altProvider || ''}')">
                        <div class="flex flex-col items-center w-7 shrink-0">
                            <span class="text-lg font-black text-white/80">${idx + 1}</span>
                            ${trendIcon}
                        </div>
                        <img src="${Utils.getSafeImage(m, source, m.thumb_url || m.poster_url)}" class="w-10 h-14 object-cover rounded-lg bg-surface shrink-0" onerror="this.src='https://placehold.co/100x150/1c1f2e/94a3b8?text=No+Poster'"/>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-semibold text-white line-clamp-1">${m.name}</p>
                            <p class="text-xs text-muted line-clamp-1">${m.origin_name || ''}</p>
                        </div>
                    </div>`;
                }).join('');
            },

            goToWatch: async (slug, provider = 'OP', altSlug = '', altProvider = '') => {
                AppHandlers.navigate('watch'); 
                AppState.isPlaying = false;
                AppState.currentSourceProvider = provider; 
                
                const watchDiv = document.getElementById('view-watch'); 
                watchDiv.innerHTML = Utils.showLoading(true);

                let res = provider === 'KK' ? await API.fetchKKPhim(slug) : await API.getMovieDetails(slug);
                let finalSlug = slug;

                if (!res || !res.episodes || res.episodes.length === 0) {
                    const backupProvider = provider === 'KK' ? 'OP' : 'KK';
                    let backupSlug = (altProvider === backupProvider && altSlug) ? altSlug : null;

                    if (!backupSlug) {
                        const refKeyword = (res && res.movie) ? (res.movie.english_name || res.movie.origin_name || res.movie.name) : null;
                        if (refKeyword) {
                            const searchRes = backupProvider === 'KK'
                                ? await fetchViaProxyThenDirect(CONFIG.API_KK_PROXY, CONFIG.API_KK, `/v1/api/tim-kiem?keyword=${encodeURIComponent(refKeyword)}&limit=10`)
                                : await API.fetchJSON(`/v1/api/tim-kiem?keyword=${encodeURIComponent(refKeyword)}&limit=10`);
                            const match = searchRes?.data?.items?.length ? await Utils.findBestMatchAsync(searchRes.data.items, res.movie) : null;
                            if (match) {
                                backupSlug = match.slug;
                            }
                        }
                    }

                    if (backupSlug) {
                        res = backupProvider === 'KK' ? await API.fetchKKPhim(backupSlug) : await API.getMovieDetails(backupSlug);
                        if (res && res.episodes && res.episodes.length > 0) {
                            AppState.currentSourceProvider = backupProvider;
                            finalSlug = backupSlug;
                        }
                    }
                }

                if (res && res.episodes && res.episodes.length > 0) {
                    res.movie.sourceProvider = AppState.currentSourceProvider; 
                    if (finalSlug !== slug) res.movie.slug = finalSlug;
                    AppState.watchData = res; 
                    AppState.activeServerIdx = 0;
                    AppState.activeEpIdx = AppState.history.find(h => h.slug === slug || h.slug === finalSlug)?.last_ep_idx || 0;
                    watchDiv.innerHTML = Render.watchUI(res, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                    AppHandlers.loadSuggestions(res.movie);
                    
                    AppHandlers.loadTmdbExtras(res.movie);
                    AppHandlers.persistState();
                } else {
                    watchDiv.innerHTML = `
                    <div class="text-center p-10 text-muted flex flex-col items-center justify-center h-[50vh]">
                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-40" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p class="text-lg">Không tải được dữ liệu phim từ cả hai máy chủ.</p>
                        <p class="text-sm mt-2 opacity-70 max-w-sm">Phim có thể đã bị gỡ, hoặc nhà mạng của bạn đang chặn API. Hãy thử đổi DNS/VPN rồi bấm thử lại.</p>
                        <button onclick="AppHandlers.goToWatch('${slug}', '${provider}')" class="mt-5 bg-primary text-black font-bold px-5 py-2 rounded-lg text-sm hover:bg-primary-dark transition">Thử lại</button>
                    </div>`;
                }
            },


            // Thay cho tính năng "Sửa TMDB" thủ công cũ: xoá cache đang lưu và chạy lại việc dò phim
            // tự động (đã được tối ưu ở TMDB.resolveMatch/searchMovie) để tự sửa các trường hợp lệch dữ liệu tạm thời.
            retryTmdbMatch: async () => {
                const movieObj = AppState.watchData?.movie;
                if (!movieObj) return;
                const slug = movieObj.slug;

                for (const key of AppState.tmdbCache.keys()) {
                    if (key.includes(`_${slug}_`) || key.endsWith(`_${slug}`)) AppState.tmdbCache.delete(key);
                }
                for (const key of AppState.cardPosterCache.keys()) {
                    if (key.includes(`_${slug}`)) AppState.cardPosterCache.delete(key);
                }
                // Xoá luôn cache resolveMatch dùng chung (mục 1 tối ưu), nếu không trang chi tiết sẽ
                // vẫn trả về kết quả dò cũ đã lưu từ trước khi bấm "Tải lại".
                for (const key of AppState.resolveMatchCache.keys()) {
                    if (key.includes(`_${slug}_`) || key.endsWith(`_${slug}`)) AppState.resolveMatchCache.delete(key);
                }

                Utils.showToast('Đang dò lại thông tin phim từ TMDB...');
                await AppHandlers.loadTmdbExtras(movieObj);
            },

            loadTmdbExtras: async (movieObj) => {
                AppState.tmdbRequestSeq++;
                const requestId = AppState.tmdbRequestSeq;
                const slug = movieObj.slug;
                
                if (AppState.bgSlideInterval) { clearInterval(AppState.bgSlideInterval); AppState.bgSlideInterval = null; }
                
                // FIX 4: Thêm năm vào Key bộ đệm để tránh gọi nhầm phim khác năm
                const cacheKey = `${AppState.currentSourceProvider}_${slug}_${movieObj.year || ''}`;
                let tmdbData = null;

                if (AppState.tmdbCache.has(cacheKey)) {
                    tmdbData = AppState.tmdbCache.get(cacheKey);
                } else {
                    const match = await TMDB.resolveMatch(movieObj);
                    if (match) {
                        tmdbData = await TMDB.getMovieFull(match.id, match.media_type);
                        if (tmdbData) { 
                            tmdbData.media_type = match.media_type; 
                            tmdbData.source_api = "TMDB";
                            tmdbData.resolved_id = match.id;
                            AppState.tmdbCache.set(cacheKey, tmdbData); 
                        }
                    }
                }

                if (requestId !== AppState.tmdbRequestSeq) return;

                const mainPosterEl = document.getElementById('watch-main-poster');
                if (mainPosterEl && tmdbData && tmdbData.poster_path) {
                    const newSrc = `${CONFIG.TMDB_IMG}${tmdbData.poster_path}`;
                    const tempImg = new Image();
                    tempImg.onload = () => { mainPosterEl.src = newSrc; };
                    tempImg.src = newSrc;
                }

                const tmdbOriginalName = tmdbData ? (tmdbData.original_title || tmdbData.original_name || '') : '';
                if (tmdbOriginalName) {
                    const watchOriginEl = document.getElementById('watch-origin-name');
                    if (watchOriginEl) watchOriginEl.innerText = tmdbOriginalName;
                    const infoOriginEl = document.getElementById('info-origin-name');
                    if (infoOriginEl) infoOriginEl.innerText = tmdbOriginalName;
                }

                const countryEl = document.getElementById('info-country');
                const typeEl = document.getElementById('info-type');
                const ophimCountryOk = Utils.getCountryName(movieObj);

                if (countryEl && !ophimCountryOk) {
                    const tmdbCountries = (tmdbData && Array.isArray(tmdbData.production_countries))
                        ? tmdbData.production_countries.map(c => c.name).filter(Boolean)
                        : [];
                    countryEl.innerText = tmdbCountries.length > 0 ? tmdbCountries.join(', ') : 'Đang cập nhật';
                }

                if (typeEl) {
                    let tmdbGenres = [];
                    if (tmdbData && tmdbData.genres && Array.isArray(tmdbData.genres)) {
                        tmdbGenres = tmdbData.genres.map(g => g.name).filter(Boolean);
                    }
                    
                    let ophimGenres = [];
                    if (movieObj.category && Array.isArray(movieObj.category)) {
                        ophimGenres = movieObj.category.map(c => c.name).filter(Boolean);
                    }

                    if (tmdbGenres.length > 0) {
                        typeEl.innerText = tmdbGenres.join(', ');
                    } else if (ophimGenres.length > 0) {
                        typeEl.innerText = ophimGenres.join(', ');
                    } else {
                        const fallbackType = Utils.getTypeLabel(movieObj.type);
                        typeEl.innerText = fallbackType ? fallbackType : (tmdbData ? (tmdbData.media_type === 'tv' ? 'Phim Bộ' : 'Phim Lẻ') : 'Đang cập nhật');
                    }
                }

                const tmdbScoreEl = document.getElementById('info-tmdb-score');
                const imdbScoreEl = document.getElementById('info-imdb-score');
                
                if (tmdbScoreEl && imdbScoreEl) {
                    if (tmdbData) {
                        const tmdbVal = tmdbData.vote_average ? tmdbData.vote_average.toFixed(1) : "7.2";
                        let imdbVal = "7.5";
                        if (tmdbData.vote_average) {
                            const offset = (Math.sin(tmdbData.id || 1) * 0.4); 
                            imdbVal = Math.min(10, Math.max(1, parseFloat(tmdbData.vote_average) + offset)).toFixed(1);
                        }
                        tmdbScoreEl.innerText = `${tmdbVal}/10`;
                        imdbScoreEl.innerText = `${imdbVal}/10`;
                    } else {
                        const baseScore = 7.0 + (Math.abs(movieObj.slug.charCodeAt(0) % 25) / 10);
                        tmdbScoreEl.innerText = `${baseScore.toFixed(1)}/10`;
                        imdbScoreEl.innerText = `${(baseScore + 0.3).toFixed(1)}/10`;
                    }
                }

                const heroBg = document.getElementById('watch-hero-bg');
                if (heroBg && tmdbData) {
                    let backdrops = [];
                    if (tmdbData.images && tmdbData.images.backdrops && tmdbData.images.backdrops.length > 0) {
                        const horizontalBgs = tmdbData.images.backdrops.filter(b => b.aspect_ratio > 1);
                        if(horizontalBgs.length > 0) backdrops = horizontalBgs.slice(0, 10).map(b => `${CONFIG.TMDB_IMG_ORIGINAL}${b.file_path}`);
                        else backdrops = tmdbData.images.backdrops.slice(0, 10).map(b => `${CONFIG.TMDB_IMG_ORIGINAL}${b.file_path}`);
                    } else if (tmdbData.backdrop_path) {
                        backdrops = [`${CONFIG.TMDB_IMG_ORIGINAL}${tmdbData.backdrop_path}`];
                    }

                    if (backdrops.length > 0) {
                        let currentIndex = 0;
                        const bgEl = document.getElementById('watch-hero-bg');

                        const changeBgSlide = () => {
                            if (requestId !== AppState.tmdbRequestSeq || !document.getElementById('watch-hero-bg')) {
                                if(AppState.bgSlideInterval) clearInterval(AppState.bgSlideInterval);
                                return;
                            }
                            bgEl.style.opacity = '0';
                            setTimeout(() => {
                                if (requestId !== AppState.tmdbRequestSeq || !document.getElementById('watch-hero-bg')) return;
                                bgEl.onload = () => { bgEl.classList.remove('blur-[28px]'); bgEl.style.opacity = '0.35'; };
                                bgEl.src = backdrops[currentIndex];
                                currentIndex = (currentIndex + 1) % backdrops.length;
                            }, 1000); 
                        };

                        changeBgSlide();
                        if (backdrops.length > 1) AppState.bgSlideInterval = setInterval(changeBgSlide, 7000);
                    }
                }

                const galleryTab = document.getElementById('tab-content-gallery');
                const castContainer = document.getElementById('cast-cards-container');

                if (galleryTab || castContainer) {
                    // Chuẩn hoá tên diễn viên để so khớp (bỏ dấu, viết thường, gộp khoảng trắng)
                    const normalizeActorName = (s) => (s || '')
                        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                        .replace(/đ/gi, 'd')
                        .toLowerCase().trim().replace(/\s+/g, ' ');

                    const tmdbCastRaw = (tmdbData && tmdbData.credits && Array.isArray(tmdbData.credits.cast)) ? tmdbData.credits.cast : [];
                    const tmdbCastNamesSet = new Set(tmdbCastRaw.map(a => normalizeActorName(a.name)));

                    // Diễn viên OPhim chưa có trong danh sách TMDB (so khớp tên đã chuẩn hoá, không trùng lặp)
                    const extraActorNames = [];
                    const seenExtraNorm = new Set();
                    (movieObj.actor || []).filter(n => n && n.trim()).forEach(rawName => {
                        const name = rawName.trim();
                        const norm = normalizeActorName(name);
                        if (!norm || tmdbCastNamesSet.has(norm) || seenExtraNorm.has(norm)) return;
                        seenExtraNorm.add(norm);
                        extraActorNames.push(name);
                    });

                    if (castContainer && (tmdbCastRaw.length > 0 || extraActorNames.length > 0)) {
                        castContainer.innerHTML = `<div class="col-span-full text-center py-8 flex flex-col items-center"><div class="w-8 h-8 border-4 border-surface border-t-primary rounded-full animate-spin"></div><p class="text-xs text-muted mt-3">Đang đồng bộ dữ liệu diễn viên & hình ảnh...</p></div>`;
                    }

                    // Tra 1 diễn viên qua TMDB (có cache + retry). Luôn trả về 1 kết quả — nếu lỗi/không tìm thấy
                    // vẫn giữ tên gốc OPhim kèm ảnh placeholder, không loại khỏi danh sách.
                    const fetchActorWithRetry = async (cleanName, attempt = 0) => {
                        const cacheKey = normalizeActorName(cleanName);
                        if (AppState.actorSearchCache.has(cacheKey)) return AppState.actorSearchCache.get(cacheKey);
                        try {
                            const searchRes = await TMDB.searchPerson(cleanName);
                            if (searchRes && searchRes.results && searchRes.results.length > 0) {
                                const person = searchRes.results[0];
                                const result = { id: person.id, name: person.name, profile_path: person.profile_path, character: 'Diễn viên' };
                                AppState.actorSearchCache.set(cacheKey, result);
                                return result;
                            }
                        } catch (e) {}
                        if (attempt < 2) {
                            await new Promise(r => setTimeout(r, 350 * (attempt + 1)));
                            return fetchActorWithRetry(cleanName, attempt + 1);
                        }
                        return { id: null, name: cleanName, profile_path: null, character: 'Diễn viên' };
                    };

                    // GỘP TẤT CẢ LỜI GỌI CẦN THIẾT (video, ảnh TMDB, dữ liệu gốc OPhim, dò diễn viên) VÀO 1 ĐỢT
                    // FETCH SONG SONG DUY NHẤT — chờ tất cả xong rồi mới render, không render dần theo từng nguồn.
                    const jobKeys = [];
                    const jobPromises = [];

                    if (tmdbData && tmdbData.id) {
                        jobKeys.push('videos');
                        jobPromises.push(TMDB.fetchJSON(`/${tmdbData.media_type}/${tmdbData.id}/videos`, ''));
                        jobKeys.push('images');
                        // Không kèm language/include_image_language để lấy toàn bộ ảnh, không lọc theo ngôn ngữ.
                        jobPromises.push(TMDB.fetchJSON(`/${tmdbData.media_type}/${tmdbData.id}/images`, ''));
                    }
                    if (AppState.currentSourceProvider !== 'OP') {
                        // Đang phát từ nguồn khác OPhim -> lấy thêm dữ liệu gốc OPhim (poster/thumb/trailer), best-effort.
                        jobKeys.push('ophimRaw');
                        jobPromises.push(API.getMovieDetails(slug).catch(() => null));
                    }
                    extraActorNames.forEach((name, idx) => {
                        jobKeys.push(`actor_${idx}`);
                        jobPromises.push(fetchActorWithRetry(name));
                    });

                    const jobResults = await Promise.allSettled(jobPromises);

                    // Cơ chế huỷ khi chuyển phim: nếu người dùng đã sang phim khác trong lúc chờ, bỏ toàn bộ render này.
                    if (requestId !== AppState.tmdbRequestSeq) return;

                    const resultMap = {};
                    jobKeys.forEach((k, i) => { resultMap[k] = jobResults[i]; });

                    let tmdbVideos = [];
                    if (resultMap.videos && resultMap.videos.status === 'fulfilled' && resultMap.videos.value && resultMap.videos.value.results) {
                        tmdbVideos = resultMap.videos.value.results;
                    } else if (tmdbData && tmdbData.videos && tmdbData.videos.results) {
                        tmdbVideos = tmdbData.videos.results;
                    }

                    let allTmdbImages = { backdrops: [], posters: [], logos: [] };
                    if (resultMap.images && resultMap.images.status === 'fulfilled' && resultMap.images.value) {
                        allTmdbImages.backdrops = resultMap.images.value.backdrops || [];
                        allTmdbImages.posters = resultMap.images.value.posters || [];
                        allTmdbImages.logos = resultMap.images.value.logos || [];
                    } else if (tmdbData && tmdbData.images) {
                        allTmdbImages.backdrops = tmdbData.images.backdrops || [];
                        allTmdbImages.posters = tmdbData.images.posters || [];
                        allTmdbImages.logos = tmdbData.images.logos || [];
                    }

                    let ophimRawMovie = null;
                    if (resultMap.ophimRaw && resultMap.ophimRaw.status === 'fulfilled' && resultMap.ophimRaw.value && resultMap.ophimRaw.value.movie) {
                        ophimRawMovie = resultMap.ophimRaw.value.movie;
                    }

                    if (galleryTab) {
                        const getVideoScore = (video) => {
                            if (video.iso_639_1 === 'vi') return 10;
                            if (video.iso_639_1 === 'en') return 5;
                            if (tmdbData && video.iso_639_1 === tmdbData.original_language) return 3;
                            return 1; 
                        };

                        let selectedVideos = { trailer: null, teaser: null, bts: null };

                        // Ưu tiên OPhim trước (trailer_url của movieObj hiện tại, hoặc bổ sung từ ophimRawMovie).
                        const ophimTrailerCandidates = [movieObj.trailer_url, ophimRawMovie?.trailer_url].filter(Boolean);
                        for (const rawUrl of ophimTrailerCandidates) {
                            const ytIdMatch = rawUrl.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
                            if (ytIdMatch && ytIdMatch[1]) {
                                selectedVideos.trailer = { key: ytIdMatch[1], name: `Trailer Chính thức (OPhim)`, site: 'YouTube', source: 'ophim' };
                                break;
                            }
                        }

                        let bestScores = { trailer: -1, teaser: -1, bts: -1 };

                        tmdbVideos.forEach(v => {
                            if (v.site !== 'YouTube') return;
                            const score = getVideoScore(v);
                            const isoStr = (v.iso_639_1 || 'gốc').toUpperCase();

                            if (v.type === 'Trailer') {
                                if (!selectedVideos.trailer || (selectedVideos.trailer.source !== 'ophim' && score > bestScores.trailer)) {
                                    selectedVideos.trailer = { key: v.key, name: `Trailer (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                    bestScores.trailer = score;
                                }
                            } else if (v.type === 'Teaser') {
                                if (score > bestScores.teaser) {
                                    selectedVideos.teaser = { key: v.key, name: `Teaser (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                    bestScores.teaser = score;
                                }
                            } else if (v.type === 'Behind the Scenes' || v.type === 'Featurette') {
                                if (score > bestScores.bts) {
                                    selectedVideos.bts = { key: v.key, name: `Hậu Trường (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                    bestScores.bts = score;
                                }
                            }
                        });

                        const buildVideoIframe = (vidData) => {
                            if (!vidData) return '';
                            const src = `https://www.youtube.com/embed/${vidData.key}`;
                            return `
                            <div class="flex flex-col gap-2">
                                <div class="relative w-full aspect-video rounded-2xl overflow-hidden bg-black border border-white/10 shadow-lg group">
                                    <iframe src="${src}" class="absolute inset-0 w-full h-full border-0" allowfullscreen></iframe>
                                </div>
                                <span class="text-xs text-muted font-medium px-1 truncate flex items-center justify-between">
                                    ${vidData.name}
                                </span>
                            </div>`;
                        };

                        let trailerHtml = '';
                        const hasVideos = selectedVideos.trailer || selectedVideos.teaser || selectedVideos.bts;

                        if (hasVideos) {
                            trailerHtml = `
                            <div class="mb-8">
                                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                    <span class="w-1.5 h-4 bg-primary rounded-full"></span> Trailer, Teaser & Hậu trường
                                </h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    ${buildVideoIframe(selectedVideos.trailer)}
                                    ${buildVideoIframe(selectedVideos.teaser)}
                                    ${buildVideoIframe(selectedVideos.bts)}
                                </div>
                            </div>`;
                        }

                        const uniqueImagesMap = new Map();

                        const addImageToMap = (url) => {
                            if (!url) return;
                            const fileName = url.substring(url.lastIndexOf('/') + 1).split('?')[0];
                            if (!uniqueImagesMap.has(fileName)) {
                                uniqueImagesMap.set(fileName, url);
                            }
                        };

                        if (movieObj.poster_url) addImageToMap(Utils.getImage(movieObj.poster_url, movieObj.sourceProvider));
                        if (movieObj.thumb_url) addImageToMap(Utils.getImage(movieObj.thumb_url, movieObj.sourceProvider));
                        if (ophimRawMovie) {
                            if (ophimRawMovie.poster_url) addImageToMap(Utils.getImage(ophimRawMovie.poster_url, 'OP'));
                            if (ophimRawMovie.thumb_url) addImageToMap(Utils.getImage(ophimRawMovie.thumb_url, 'OP'));
                        }

                        allTmdbImages.backdrops.forEach(img => addImageToMap(`${CONFIG.TMDB_IMG}${img.file_path}`));
                        allTmdbImages.posters.forEach(img => addImageToMap(`${CONFIG.TMDB_IMG}${img.file_path}`));
                        allTmdbImages.logos.forEach(img => addImageToMap(`${CONFIG.TMDB_IMG}${img.file_path}`));

                        const allImagesRenderList = Array.from(uniqueImagesMap.values());

                        let imagesHtml = '';
                        if (allImagesRenderList.length > 0) {
                            const gridImgs = allImagesRenderList.map(imgUrl => {
                                const originalUrl = imgUrl.includes('tmdbimg') ? imgUrl.replace('/w500/', '/original/') : imgUrl;
                                return `
                                <div class="relative aspect-video rounded-xl overflow-hidden bg-surface border border-white/5 shadow-sm group cursor-zoom-in" onclick="window.open('${originalUrl}', '_blank')">
                                    <img src="${imgUrl}" loading="lazy" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" onerror="this.src='https://placehold.co/600x400/1c1f2e/94a3b8?text=Loi+Anh'"/>
                                </div>`;
                            }).join('');

                            imagesHtml = `
                            <div>
                                <h3 class="text-lg font-bold text-white mb-4 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <span class="w-1.5 h-4 bg-primary rounded-full"></span> 
                                        Album hình ảnh đa dạng 
                                    </div>
                                    <span class="text-sm font-normal text-muted bg-surface px-3 py-1 rounded-full border border-white/10">${allImagesRenderList.length} ảnh</span>
                                </h3>
                                <!-- CẬP NHẬT: ảnh to hơn, tràn full-width theo cột dọc (1 cột trên mobile, 2 cột trên
                                     màn hình lớn hơn) thay vì lưới nhỏ nhiều cột bó trong khung có chiều cao cố định
                                     + overflow-y-auto, vì cách cũ khiến một số máy cũ hiển thị ảnh chồng lên nhau. -->
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-4">
                                    ${gridImgs}
                                </div>
                            </div>`;
                        } else {
                            imagesHtml = `<div class="bg-surface rounded-2xl p-8 border border-white/5 text-center text-muted mt-4">
                                <p class="font-medium text-gray-300">Không tìm thấy kho ảnh</p>
                            </div>`;
                        }

                        if (!hasVideos && allImagesRenderList.length === 0) {
                             galleryTab.innerHTML = `<div class="bg-surface rounded-2xl p-8 border border-white/5 text-center text-muted mt-4">
                                <p class="font-medium text-gray-300">Chưa có Trailer hay Hình ảnh nào được cung cấp cho phim này.</p>
                            </div>`;
                        } else {
                             galleryTab.innerHTML = `<div class="space-y-6">${trailerHtml} ${imagesHtml}</div>`;
                        }
                    }

                    if (castContainer) {
                        // Lấy TOÀN BỘ tmdbData.credits.cast làm gốc (không cắt slice), rồi bổ sung diễn viên OPhim
                        // chưa xuất hiện trong danh sách TMDB (đã dò xong ở đợt fetch song song phía trên).
                        const resolvedExtraActors = extraActorNames.map((name, idx) => {
                            const r = resultMap[`actor_${idx}`];
                            if (r && r.status === 'fulfilled' && r.value) return r.value;
                            // Lỗi mạng / hết retry: vẫn giữ tên gốc OPhim với ảnh placeholder, không loại khỏi danh sách.
                            return { id: null, name, profile_path: null, character: 'Diễn viên' };
                        });

                        const fullCastList = [
                            ...tmdbCastRaw.map(actor => ({ id: actor.id, name: actor.name, profile_path: actor.profile_path, character: actor.character || 'Khác' })),
                            ...resolvedExtraActors
                        ];

                        if (fullCastList.length > 0) {
                            const castCards = fullCastList.map(actor => {
                                const avatar = actor.profile_path ? `${CONFIG.TMDB_IMG}${actor.profile_path}` : 'https://placehold.co/150x150/1c1f2e/94a3b8?text=No+Photo';
                                const action = actor.id ? `onclick="AppHandlers.openActorDetail('${actor.id}')"` : `onclick="AppHandlers.searchByKeyword('${actor.name}')"`;
                                return `
                                <div class="bg-surface border border-white/5 p-3 rounded-2xl flex flex-col items-center text-center shadow-md hover:border-primary/30 transition cursor-pointer group" ${action}>
                                    <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full overflow-hidden mb-3 border border-white/10 group-hover:border-primary/50 transition">
                                        <img src="${avatar}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/150x150/1c1f2e/94a3b8?text=No+Photo'"/>
                                    </div>
                                    <h4 class="font-bold text-xs sm:text-sm text-text line-clamp-1 group-hover:text-primary transition-colors">${actor.name}</h4>
                                    <p class="text-[10px] text-muted line-clamp-1 mt-0.5">${actor.character}</p>
                                </div>`;
                            }).join('');

                            castContainer.innerHTML = castCards;
                        }
                        // Nếu không có dữ liệu diễn viên nào (không TMDB, không OPhim), giữ nguyên nội dung ban đầu
                        // (danh sách tên thuần từ OPhim đã render sẵn lúc mở trang xem phim).
                    }
                }
            },

            openActorDetail: async (tmdbPersonId) => {
                const actorDiv = document.getElementById('view-actor');
                if (!actorDiv) return;
                AppState.currentActorId = tmdbPersonId; 
                actorDiv.innerHTML = Utils.showLoading(true);
                AppHandlers.navigate('actor');

                const [person, credits] = await Promise.all([
                    TMDB.getPerson(tmdbPersonId),
                    TMDB.getPersonCredits(tmdbPersonId)
                ]);

                if (person) {
                    actorDiv.innerHTML = Render.actorDetailUI(person, credits || { cast: [] });
                    AppHandlers.persistState();
                } else {
                    actorDiv.innerHTML = `
                    <div class="text-center p-10 text-muted">
                        <p class="text-lg">Không thể tải thông tin diễn viên.</p>
                        <button onclick="AppHandlers.backToWatch()" class="mt-4 bg-primary text-black px-6 py-2 rounded-full font-bold">Quay lại</button>
                    </div>`;
                }
            },

            playActorMovie: async (metaEncoded) => {
                let meta;
                try { meta = JSON.parse(decodeURIComponent(metaEncoded)); } catch (e) { meta = null; }
                if (!meta || !meta.title) return;

                Utils.showToast(`Đang tìm nguồn phát cho "${meta.title}"...`);
                const data = await API.search(meta.title, 10);

                if (!data || !data.data || !data.data.items || data.data.items.length === 0) {
                    Utils.showToast(`Phim "${meta.title}" chưa có trên hệ thống stream`, 'error');
                    return;
                }

                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                const expectedOriginal = norm(meta.originalTitle), expectedTitle = norm(meta.title);
                const expectedYear = meta.year ? parseInt(meta.year, 10) : null;
                const expectedType = meta.mediaType === 'tv' ? 'series' : 'single';

                let bestItem = null; let bestScore = -1;

                data.data.items.forEach(item => {
                    let score = 0;
                    const itemName = norm(item.name), itemOrigin = norm(item.origin_name);

                    if (itemOrigin && (itemOrigin === expectedOriginal || itemOrigin === expectedTitle)) score += 100;
                    else if (itemName === expectedTitle) score += 60;
                    else if (itemOrigin && (itemOrigin.includes(expectedOriginal) || expectedOriginal.includes(itemOrigin))) score += 30;

                    if (expectedYear && item.year) {
                        const diff = Math.abs(parseInt(item.year, 10) - expectedYear);
                        if (diff === 0) score += 50; else if (diff === 1) score += 15; else score -= 60;
                    }

                    if (item.type && (item.type === 'single' || item.type === 'series')) {
                        if (item.type === expectedType) score += 20; else score -= 30;
                    }

                    const countrySlug = item.country?.[0]?.slug || null;
                    const itemExpectedLang = countrySlug ? COUNTRY_LANG_MAP[countrySlug] : null;
                    if (meta.originalLanguage && itemExpectedLang) {
                        if (itemExpectedLang === meta.originalLanguage) score += 70; else score -= 100;
                    }

                    if (score > bestScore) { bestScore = score; bestItem = item; }
                });

                if (!bestItem || bestScore < 30) {
                    Utils.showToast(`Không tìm thấy đúng bản phim "${meta.title}" trên hệ thống`, 'error');
                    return;
                }

                AppHandlers.goToWatch(bestItem.slug, bestItem.sourceProvider || 'OP');
            },
