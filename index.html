<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTuongFX - Trăm phim một chợ (OPhim API)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện HLS.js để xử lý luồng m3u8 và lấy thời gian xem -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        app: '#0f111a', 
                        surface: '#1c1f2e', 
                        menu: '#2a2f4c',
                        primary: '#fcd34d',
                        'primary-dark': '#fbbf24',
                        text: '#f8fafc',
                        muted: '#94a3b8'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style id="custom-core-styles">
        /* TỐI ƯU VUỐT CHẠM ĐIỆN THOẠI: 
           - Bỏ scroll-behavior: smooth; ở đây vì nó gây lag giật khi dùng ngón tay vuốt 
           - Thêm -webkit-overflow-scrolling: touch để bật Quán tính vuốt mượt mà của iOS
           - Thêm overscroll-behavior-x: contain để chống vuốt nhầm back trang */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
            overscroll-behavior-x: contain;
        }
        
        body { 
            background-color: #0f111a; color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .tab-active { color: #fcd34d; border-bottom: 2px solid #fcd34d; }
        .bottom-sheet-open { transform: translateY(0%); }
        .bottom-sheet-closed { transform: translateY(100%); }
        
        @media (min-width: 640px) {
            .bottom-sheet-open { transform: scale(1); opacity: 1; pointer-events: auto;}
            .bottom-sheet-closed { transform: scale(0.95); opacity: 0; pointer-events: none; }
        }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* ===== GIAO DIỆN SỐ TOP 10 NETFLIX BẰNG FLEXBOX ===== */
        .netflix-number {
            font-family: 'Arial Black', Helvetica, Impact, sans-serif;
            font-weight: 900;
            font-size: 5rem;
            line-height: 0.8;
            color: #0f111a;
            -webkit-text-stroke: 2px rgba(255,255,255,0.7);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            user-select: none;
            letter-spacing: -2px;
            z-index: 5;
            flex-shrink: 0;
            transform: translateY(2px); /* Nhích nhẹ xuống dưới cho cân bằng với đáy poster */
        }
        .netflix-number.double-digit {
            font-size: 4rem;
            letter-spacing: -4px;
        }
        @media (min-width: 768px) {
            .netflix-number { font-size: 6.5rem; }
            .netflix-number.double-digit { font-size: 5.2rem; }
        }

        /* ===== BADGE XU HƯỚNG (tăng/giảm độ hot, dựa trên TMDB trending day/week) ===== */
        .trend-badge { display:inline-flex; align-items:center; gap:2px; font-size:10px; font-weight:700; padding:2px 6px; border-radius:6px; }
        .trend-up { background: rgba(34,197,94,0.15); color: #4ade80; }
        .trend-down { background: rgba(248,113,113,0.15); color: #f87171; }
        .trend-flat { background: rgba(148,163,184,0.15); color: #94a3b8; }
    </style>
    
</head>

    <script>
        const CONFIG = { 
            API_BASE: 'https://ophim1.com', 
            API_KK: 'https://phimapi.com',
            IMG_BASE: 'https://img.ophim.live/uploads/movies/',
            HERO_LIMIT: 10,
            HERO_AUTO_PLAY_INTERVAL: 5000,
            MOVIE_ROWS: [
                { title: 'Phim Mới Phát Hành', type: 'danh-sach', slug: 'phim-moi-cap-nhat', limit: 12 },
                { title: 'Top Hành Động Kịch Tính', type: 'the-loai', slug: 'hanh-dong', limit: 10, rank: true },
                { title: 'Siêu Phẩm Hoạt Hình (Anime)', type: 'the-loai', slug: 'hoat-hinh', limit: 10, rank: true },
                { title: 'Kinh Dị & Giật Gân', type: 'the-loai', slug: 'kinh-di', limit: 12 },
                { title: 'Top Hài Hước Để Xả Stress', type: 'the-loai', slug: 'hai-huoc', limit: 10, rank: true },
                { title: 'Tâm Lý Sâu Sắc', type: 'the-loai', slug: 'tam-ly', limit: 12 },
                { title: 'Lãng Mạn - Tình Cảm', type: 'the-loai', slug: 'tinh-cam', limit: 12 },
                { title: 'Phim Lẻ Đặc Sắc', type: 'danh-sach', slug: 'phim-le', limit: 12 },
                { title: 'Khoa Học Viễn Tưởng', type: 'the-loai', slug: 'vien-tuong', limit: 12 }
            ],
            // CẤU HÌNH TMDB VỚI BEARER ACCESS TOKEN V4 MỚI
            TMDB_TOKEN: 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI3MDUxYjI1NWMyNDMyZDBhOTgxZjE4MTlmMDYwYjViYSIsIm5iZiI6MTc4MzI2MzI4MC43NDMsInN1YiI6IjZhNGE3MDMwYzcyMjc1NGFiNzUyMWI3NiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.4ARUeBsQbyRRBNOWR51f_swwzThKEgyIlZlcsIkb4x0',
            TMDB_BASE: 'https://api.themoviedb.org/3',
            TMDB_IMG: 'https://image.tmdb.org/t/p/w500',
            TMDB_IMG_ORIGINAL: 'https://image.tmdb.org/t/p/original'
        };

        const AppState = {
            currentView: 'home', genres: [], countries: [], searchTimeout: null,
            watchData: null, activeServerIdx: 0, activeEpIdx: 0, isPlaying: false, 
            heroInterval: null, totalHeroSlides: 0, currentHeroSlide: 0, heroObserver: null,
            hlsInstance: null, saveInterval: null,
            favorites: JSON.parse(localStorage.getItem('ktuong_favs') || '[]'),
            history: JSON.parse(localStorage.getItem('ktuong_history') || '[]'),
            currentSourceProvider: 'OP',
            isServerDropdownOpen: false,
            // CACHE KẾT QUẢ TMDB
            tmdbCache: new Map()
        };

        const Utils = {
            getImage: (path, provider = 'OP') => {
                if(!path) return 'https://placehold.co/300x450/1c1f2e/94a3b8?text=No+Poster';
                if(path.startsWith('http')) {
                    if (provider === 'KK') return `${CONFIG.API_KK}/image.php?url=${encodeURIComponent(path)}`;
                    return path;
                }
                if(provider === 'KK' || path.startsWith('upload/') || path.includes('upload/')) {
                    const fullUrl = `https://phimimg.com/${path.replace(/^\/+/, '')}`;
                    return `${CONFIG.API_KK}/image.php?url=${encodeURIComponent(fullUrl)}`;
                }
                return `${CONFIG.IMG_BASE}${path.replace(/^\/+/, '')}`;
            },
            showLoading: (fullHeight = false) => `<div class="flex flex-col items-center justify-center w-full ${fullHeight ? 'min-h-[60vh]' : 'py-12'}"><div class="w-10 h-10 border-4 border-surface border-t-primary rounded-full animate-spin"></div></div>`,
            
            saveHistory: (movie, epIdx = 0, epName = '', currentTime = 0) => {
                if(!movie || !movie.slug) return;
                let hist = AppState.history.filter(m => m.slug !== movie.slug);
                hist.unshift({ 
                    slug: movie.slug, 
                    name: movie.name, 
                    origin_name: movie.origin_name, 
                    thumb_url: movie.thumb_url || movie.poster_url, 
                    last_ep_idx: epIdx, 
                    last_ep_name: epName,
                    current_time: currentTime 
                });
                if (hist.length > 50) hist.pop(); 
                AppState.history = hist; 
                localStorage.setItem('ktuong_history', JSON.stringify(hist));
            },
            toggleFavorite: (movie) => {
                const isFav = AppState.favorites.some(m => m.slug === movie.slug);
                if (isFav) AppState.favorites = AppState.favorites.filter(m => m.slug !== movie.slug);
                else AppState.favorites.unshift({ slug: movie.slug, name: movie.name, origin_name: movie.origin_name, thumb_url: movie.thumb_url || movie.poster_url });
                localStorage.setItem('ktuong_favs', JSON.stringify(AppState.favorites)); return !isFav;
            },
            isFavorite: (slug) => AppState.favorites.some(m => m.slug === slug),
            formatTime: (seconds) => {
                if (!seconds) return "00:00";
                const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
                return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            },
            // Toast notification thay cho alert()
            showToast: (message, type = 'info') => {
                const container = document.getElementById('toast-container');
                if (!container) return;
                const toast = document.createElement('div');
                toast.className = `p-4 rounded-xl shadow-2xl border flex items-center gap-3 animate-slide-up pointer-events-auto transition duration-300 ${
                    type === 'error' ? 'bg-red-950/95 text-red-200 border-red-500/30' : 'bg-surface/95 text-primary border-primary/20'
                }`;
                toast.innerHTML = `
                    <div class="${type === 'error' ? 'text-red-400' : 'text-primary'}">

        const API = {
            fetchJSON: async (endpoint) => { try { return await (await fetch(`${CONFIG.API_BASE}${endpoint}`)).json(); } catch(e) { return null; } },
            fetchKKPhim: async (slug) => { try { return await (await fetch(`${CONFIG.API_KK}/phim/${slug}`)).json(); } catch(e) { return null; } },
            getAppData: async () => {
                const [g, c] = await Promise.all([API.fetchJSON('/the-loai'), API.fetchJSON('/quoc-gia')]);
                if (g) AppState.genres = g; if (c) AppState.countries = c;
            },
            getMovieDetails: async (slug) => API.fetchJSON(`/phim/${slug}`),
            
            search: async (kw, limit=30) => {
                let finalResults = [];
                let seenSlugs = new Set();
                
                try {
                    const ophimRes = await API.fetchJSON(`/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=${limit}`);
                    if (ophimRes && ophimRes.data && ophimRes.data.items) {
                        ophimRes.data.items.forEach(movie => {
                            if (movie.slug) {
                                seenSlugs.add(movie.slug.trim().toLowerCase());
                                movie.sourceProvider = 'OP'; 
                                finalResults.push(movie);
                            }
                        });
                    }
                } catch (e) { console.error("Lỗi tìm kiếm OPhim:", e); }

                try {
                    const kkRes = await fetch(`${CONFIG.API_KK}/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=${limit}`).then(r => r.json());
                    if (kkRes && kkRes.data && kkRes.data.items) {
                        kkRes.data.items.forEach(movie => {
                            const kkSlug = movie.slug ? movie.slug.trim().toLowerCase() : '';
                            if (kkSlug && !seenSlugs.has(kkSlug)) {
                                seenSlugs.add(kkSlug);
                                movie.sourceProvider = 'KK'; 
                                finalResults.push(movie);
                            }
                        });
                    }
                } catch (e) { console.error("Lỗi tìm kiếm KKPhim:", e); }

                return { data: { items: finalResults } };

            getList: async (type, slug, limit=24) => {
                let ep = ['phim-bo', 'phim-le', 'tv-shows', 'hoat-hinh', 'phim-moi-cap-nhat'].includes(slug) ? `/v1/api/danh-sach/${slug}?limit=${limit}` : `/v1/api/${type}/${slug}?limit=${limit}`;

        // OBJECT TMDB MỚI (ĐÃ ĐƯỢC CHUYỂN SANG DÙNG HEADER AUTHORIZATION BEARER TOKEN CỰC KỲ BẢO MẬT VÀ ỔN ĐỊNH)
        const TMDB = {
            fetchJSON: async (endpoint) => {
                try {
                    const glue = endpoint.includes('?') ? '&' : '?';
                    const url = `${CONFIG.TMDB_BASE}${endpoint}${glue}language=vi-VN`;
                    
                    // Thiết lập Headers chứa Bearer Access Token mới
                    const headers = {
                        'Authorization': `Bearer ${CONFIG.TMDB_TOKEN}`,
                        'Accept': 'application/json'
                    };

                    const res = await fetch(url, { headers });
                    if (res.ok) return await res.json();
                    
                    // Fallback sang tiếng Anh nếu tiếng Việt không có dữ liệu
                    const fallbackUrl = `${CONFIG.TMDB_BASE}${endpoint}${glue}language=en-US`;
                    const fbRes = await fetch(fallbackUrl, { headers });
                    if (fbRes.ok) return await fbRes.json();
                    return null;
                } catch (e) {
                    console.error("TMDB Fetch Error:", e);
                    return null;
                }
            },

            searchMovie: async (query, year) => {
                if (!query) return null;

                // Hàm dọn dẹp từ khóa loại bỏ phần mùa (season), định dạng, thông số lồng tiếng trong ngoặc
                const sanitize = (str) => {
                    return str
                        .replace(/\(.*?\)/g, '')  // Xoá nội dung trong dấu ngoặc đơn dạng (Season 2), (Phần 2)
                        .replace(/\[.*?\]/g, '')  // Xoá nội dung trong dấu ngoặc vuông
                        .replace(/(Phim|Bộ|Lẻ|Thuyết Minh|Vietsub|Trọn Bộ|SS\d+|Phần\s+\d+|Season\s+\d+)/gi, '')
                        .replace(/[:\-–]/g, ' ')  // Thay thế dấu hai chấm, dấu gạch ngang bằng khoảng trắng
                        .replace(/\s+/g, ' ')
                        .trim();
                };
                
                let cleanQuery = sanitize(query);
                if (!cleanQuery) cleanQuery = query;

                // Thử tìm kiếm lần 1 với từ khoá sạch
                let data = await TMDB.fetchJSON(`/search/multi?query=${encodeURIComponent(cleanQuery)}`);
                
                // FALLBACK: Nếu không ra kết quả, thử rút gọn hơn nữa (chỉ lấy cụm từ chữ trước số tập/số phần)
                if (!data || !data.results || data.results.length === 0) {
                    const shortQuery = cleanQuery.split(/\s+\d+/)[0].trim();
                    if (shortQuery && shortQuery !== cleanQuery) {
                        data = await TMDB.fetchJSON(`/search/multi?query=${encodeURIComponent(shortQuery)}`);
                    }
                }

                if (!data || !data.results || data.results.length === 0) return null;

                // Thuật toán chấm điểm trùng khớp thông minh
                let bestMatch = null;
                let highestScore = -1;

                data.results.forEach(item => {
                    if (item.media_type !== 'movie' && item.media_type !== 'tv') return;
                    let score = 0;
                    const itemTitle = (item.title || item.name || '').toLowerCase();
                    const itemOriginalTitle = (item.original_title || item.original_name || '').toLowerCase();
                    const searchLower = cleanQuery.toLowerCase();

                    // So khớp chính xác
                    if (itemTitle === searchLower || itemOriginalTitle === searchLower) {
                        score += 100;
                    } else if (itemTitle.includes(searchLower) || itemOriginalTitle.includes(searchLower) || searchLower.includes(itemTitle)) {
                        score += 50;
                    }

                    // Khớp năm phát hành
                    const releaseDate = item.release_date || item.first_air_date || '';
                    if (year && releaseDate.includes(year)) {
                        score += 40;
                    }

                    // Điểm ưu tiên sự phổ biến
                    score += (item.vote_count ? Math.min(item.vote_count / 100, 10) : 0);

                    if (score > highestScore) {
                        highestScore = score;
                        bestMatch = item;
                    }
                });

                return bestMatch;
            },

            getMovieFull: async (tmdbId, mediaType = 'movie') => {
                return TMDB.fetchJSON(`/${mediaType}/${tmdbId}?append_to_response=credits,videos,images&include_image_language=vi,en,null`);
            },

            getPerson: async (personId) => {
                return TMDB.fetchJSON(`/person/${personId}`);
            },

            getPersonCredits: async (personId) => {
                return TMDB.fetchJSON(`/person/${personId}/combined_credits`);
            },
            // Tìm người (diễn viên / đạo diễn) theo tên - dùng cho tìm kiếm thông minh
            searchPerson: async (query) => {
                return TMDB.fetchJSON(`/search/person?query=${encodeURIComponent(query)}`);
            },
            // Danh sách thịnh hành theo ngày & theo tuần - dùng để tính xu hướng tăng/giảm độ hot
            // Lưu ý: TMDB là nguồn dữ liệu thực tế duy nhất có thể gọi công khai được (xem giải thích ở cuối chat).
            getTrending: async (mediaType = 'all', window = 'day') => {

        const AppHandlers = {

                    if(cEl && AppState.countries.length) cEl.innerHTML = rPill(AppState.countries, 'quoc-gia');

                AppHandlers.loadHome(); 
                window.addEventListener('beforeunload', AppHandlers.saveCurrentVideoState);
                
                window.addEventListener('click', (e) => {
                    const sDropdown = document.getElementById('server-dropdown-list');
                    if (sDropdown && !e.target.closest('#current-server-display') && !e.target.closest('#dropdown-chevron') && !e.target.closest('#server-dropdown-list')) {

                        const chevron = document.getElementById('dropdown-chevron');

                });

            saveCurrentVideoState: () => {
                if(AppState.currentView === 'watch' && AppState.watchData && AppState.isPlaying) {
                    const video = document.getElementById('kt-player');
                    let currentTime = 0;
                    if(video) currentTime = video.currentTime;
                    
                    const m = AppState.watchData.movie;
                    const eps = AppState.watchData.episodes;
                    if(eps && eps[0] && m) {
                         Utils.saveHistory(m, AppState.activeEpIdx, eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx].name, currentTime);
                    }
                }
            },

            navigate: (viewId) => {
                if (AppState.currentView === 'watch' && viewId !== 'watch') { 
                    AppHandlers.saveCurrentVideoState();
                    if(AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if(AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    document.getElementById('view-watch').innerHTML = ''; 
                    AppState.isPlaying = false; 
                }

                AppState.currentView = viewId;
                ['home', 'watch', 'search', 'history', 'actor'].forEach(id => {
                    const el = document.getElementById(`view-${id}`);
                    if (el) el.classList.toggle('hidden', id !== viewId);
                });
                window.scrollTo(0, 0);
                
                document.getElementById('navbar').className = `fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 ${viewId === 'watch' ? 'bg-gradient-to-b from-black/80 to-transparent' : 'bg-app/90 backdrop-blur-md'}`;

                if (viewId === 'home' && !document.getElementById('view-home').innerHTML.trim()) AppHandlers.loadHome();
                if (viewId === 'history') AppHandlers.renderHistory('recent');
            },

            downloadSource: async () => {
                try {
                    const response = await fetch(window.location.href);
                    if (response.ok) {
                        const text = await response.text();
                        AppHandlers._triggerDownload(text);
                        return;
                    }
                } catch(e) {}
                
                let clone = document.documentElement.cloneNode(true);
                const viewsToEmpty = ['view-home', 'view-watch', 'search-results', 'history-content', 'view-actor'];
                viewsToEmpty.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.innerHTML = ''; });
                
                const viewsToHide = ['view-watch', 'view-search', 'view-history', 'view-actor'];
                viewsToHide.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.classList.add('hidden'); });
                const homeView = clone.querySelector('#view-home'); if(homeView) homeView.classList.remove('hidden');
                
                const searchInput = clone.querySelector('#search-input'); if(searchInput) searchInput.value = '';
                
                const overlay = clone.querySelector('#menu-overlay'); if(overlay) overlay.className = "fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0";
                const modal = clone.querySelector('#menu-modal'); if(modal) { modal.classList.remove('bottom-sheet-open'); modal.classList.add('bottom-sheet-closed'); }
                
                const dropdowns = ['dropdown-genres', 'dropdown-countries'];
                dropdowns.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) { el.classList.add('hidden'); el.innerHTML = ''; } });
                
                clone.querySelectorAll('style:not(#custom-core-styles)').forEach(s => s.remove());
                clone.querySelectorAll('script[data-bard-injected], script[injected]').forEach(s => s.remove());
                
                const finalHtml = "<!DOCTYPE html>\n<html lang=\"vi\">\n" + clone.innerHTML + "\n</html>";
                AppHandlers._triggerDownload(finalHtml);
            },

            _triggerDownload: (htmlContent) => {
                const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "ktuongfx_source_code.html";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                AppHandlers.toggleMenuModal();
            },

            toggleMenuModal: () => {
                const modal = document.getElementById('menu-modal'), overlay = document.getElementById('menu-overlay');
                if(modal.classList.contains('bottom-sheet-closed')) {
                    modal.classList.replace('bottom-sheet-closed', 'bottom-sheet-open');
                    overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                } else {

                    overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
                }

                el.classList.toggle('hidden');
                
                const icon = document.getElementById(isGenres ? 'icon-genres' : 'icon-countries');

                    otherEl.classList.add('hidden');

                    const heroRes = await API.fetchJSON('/v1/api/danh-sach/phim-moi-cap-nhat?limit=20');
                    if (heroRes && heroRes.data && heroRes.data.items) {
                        let heroSlugs = heroRes.data.items.map(i => i.slug).slice(0, CONFIG.HERO_LIMIT);
                        const heroPromises = await Promise.allSettled(heroSlugs.map(slug => API.getMovieDetails(slug)));
                        const heroDetails = heroPromises.filter(p => p.status === 'fulfilled' && p.value?.status).map(p => p.value);
                        homeContent += Render.heroBanner(heroDetails);
                    }
                } catch(e) { console.log("Lỗi tải Slider", e); }
                
                let top10Items = [];
                try {
                    const top10Res = await API.getList('danh-sach', 'phim-bo', 10);
                    if(top10Res && top10Res.data && top10Res.data.items) {
                        top10Items = top10Res.data.items;
                        homeContent += Render.topHorizontalRow('Top 10 Phim Bộ Hôm Nay', top10Items);
                    }
                } catch(e) { console.log("Lỗi tải Top 10", e); }

                if (AppState.history.length > 0) {
                    homeContent += Render.horizontalRow('Tiếp tục xem', AppState.history.slice(0,12).map(m=>({...m, episode_current: m.last_ep_name?`Tập ${m.last_ep_name}`:''})), 'history', 'recent');
                }

                const rowPromises = CONFIG.MOVIE_ROWS.map(row => API.getList(row.type, row.slug, row.limit).catch(() => null));
                const rowResults = await Promise.all(rowPromises);

                rowResults.forEach((res, index) => {
                    const rowConfig = CONFIG.MOVIE_ROWS[index];
                    if (res && (res.data?.items || res.items)) {
                        const items = res.data?.items || res.items;
                        if (items.length > 0) {
                            homeContent += Render.horizontalRow(rowConfig.title, items, rowConfig.type, rowConfig.slug, rowConfig.rank);
                        }
                    }
                });

                homeDiv.innerHTML = homeContent;
                
                setTimeout(() => AppHandlers.setupHeroObserver(), 100);

                if (top10Items.length) AppHandlers.loadTrendBadges(top10Items);
            },

            // Gắn badge xu hướng tăng/giảm cho từng phim trong Top 10, dựa trên chênh lệch
            // hạng giữa TMDB trending/day và trending/week (không chặn render danh sách chính).
            loadTrendBadges: async (items) => {
                const norm = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
                try {
                    const [dayRes, weekRes] = await Promise.all([
                        TMDB.getTrending('all', 'day'),
                        TMDB.getTrending('all', 'week')
                    ]);
                    const dayRank = new Map(), weekRank = new Map();
                    (dayRes?.results || []).forEach((it, i) => dayRank.set(norm(it.title || it.name || it.original_name), i));
                    (weekRes?.results || []).forEach((it, i) => weekRank.set(norm(it.title || it.name || it.original_name), i));

                    items.forEach(m => {
                        const key = norm(m.origin_name || m.name);
                        const el = document.getElementById(`trend-${m.slug}`);
                        if (!el) return;
                        const d = dayRank.has(key) ? dayRank.get(key) : null;
                        const w = weekRank.has(key) ? weekRank.get(key) : null;
                        let html = '';
                        if (d !== null && w !== null) {
                            if (d < w) html = `<span class="trend-badge trend-up">▲ Đang tăng</span>`;
                            else if (d > w) html = `<span class="trend-badge trend-down">▼ Đang giảm</span>`;
                            else html = `<span class="trend-badge trend-flat">▬ Ổn định</span>`;
                        } else if (d !== null) {
                            html = `<span class="trend-badge trend-up">▲ Mới nổi</span>`;
                        }
                        el.innerHTML = html;
                    });
                } catch (e) { console.log("Lỗi tải xu hướng TMDB:", e); }
            },
            
            setupHeroObserver: () => {
                const slider = document.getElementById('hero-slider');
                if(!slider) return;
                
                if(AppState.heroObserver) AppState.heroObserver.disconnect();
                
                AppState.heroObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting) {
                            const index = parseInt(entry.target.getAttribute('data-index'));
                            AppState.currentHeroSlide = index;
                            
                            for(let i=0; i<AppState.totalHeroSlides; i++) {
                                const dot = document.getElementById(`dot-${i}`);
                                if(dot) {
                                    if(i === index) dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-primary w-6";
                                    else dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-white/30";
                                }
                            }
                        }
                    });
                }, { root: slider, threshold: 0.6 });
                
                document.querySelectorAll('.hero-slide-item').forEach(item => AppState.heroObserver.observe(item));
                AppHandlers.startHeroInterval();
            },

            goToWatch: async (slug, provider = 'OP') => {

                if (galleryTab) {

                    const trailers = tmdbData.videos?.results || [];
                    const youtubeTrailer = trailers.find(v => v.site === 'YouTube' && (v.type === 'Trailer' || v.type === 'Teaser'));

                                <button onclick="AppHandlers.toggleServerDropdown(event)" 
                                        class="bg-surface border border-white/10 hover:border-white/20 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition duration-200">
                                    <span id="current-server-display">${currentServerLabel}</span>
                                    <svg id="dropdown-chevron" class="w-4 h-4 text-muted transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
                                </button>
                                
                                <div id="server-dropdown-list" class="absolute right-0 mt-2 w-48 bg-surface border border-white/10 rounded-xl shadow-2xl py-1 z-40 hidden animate-fade-in">
                                    <button onclick="AppHandlers.selectServerSource('${finalSlug}', 'OP')" class="w-full px-4 py-3 text-left text-xs font-semibold hover:bg-white/5 flex items-center justify-between text-text group">
                                        <span class="group-hover:text-primary transition-colors">Máy chủ 1 (OP)</span>
                                        <span id="check-op" class="${serverKey === 'OP' ? '' : 'hidden'} text-primary">
                                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                                        </span>
                                    </button>
                                    <button onclick="AppHandlers.selectServerSource('${finalSlug}', 'KK')" class="w-full px-4 py-3 text-left text-xs font-semibold hover:bg-white/5 flex items-center justify-between text-text group">
                                        <span class="group-hover:text-primary transition-colors">Máy chủ 2 (KK)</span>
                                        <span id="check-kk" class="${serverKey === 'KK' ? '' : 'hidden'} text-primary">
                                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                                        </span>
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-2.5">
                            ${epBtns}
                        </div>`;
                    }
                    if (AppState.isPlaying) AppHandlers.playVideo();

                } else {
                    AppState.currentSourceProvider = serverKey === 'OP' ? 'KK' : 'OP'; 
                    if (tabEpisodes) {
                        tabEpisodes.innerHTML = `
                        <div class="bg-red-500/10 border border-red-500/20 text-red-300 p-5 rounded-xl text-sm text-center">
                            Máy chủ dự phòng chưa cập nhật bộ phim này. Vui lòng sử dụng máy chủ mặc định.
                            <button onclick="AppHandlers.selectServerSource('${slug}', '${AppState.currentSourceProvider}')" class="mt-4 block mx-auto bg-primary text-black font-bold px-5 py-2 rounded-lg hover:bg-primary-dark transition text-sm">Quay về Máy chủ gốc</button>
                        </div>`;
                    }
                }
            },

            playVideo: () => {
                AppState.isPlaying = true;
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, true, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie); 
                window.scrollTo({top: 0, behavior: 'smooth'});
                
                const m = AppState.watchData.movie;
                const eps = AppState.watchData.episodes;
                const epData = eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx];
                const video = document.getElementById('kt-player');

                if (video && epData.link_m3u8) {
                    const savedHist = AppState.history.find(h => h.slug === m.slug);
                    const savedTime = (savedHist && savedHist.last_ep_idx === AppState.activeEpIdx && savedHist.current_time) ? savedHist.current_time : 0;

                    if (Hls.isSupported()) {
                        if(AppState.hlsInstance) AppState.hlsInstance.destroy();
                        AppState.hlsInstance = new Hls();
                        AppState.hlsInstance.loadSource(epData.link_m3u8);
                        AppState.hlsInstance.attachMedia(video);
                        AppState.hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                            if(savedTime > 0) video.currentTime = savedTime;
                            video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = epData.link_m3u8;
                        video.addEventListener('loadedmetadata', function() {
                            if(savedTime > 0) video.currentTime = savedTime;
                            video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                        });
                    }

                    if(AppState.saveInterval) clearInterval(AppState.saveInterval);
                    AppState.saveInterval = setInterval(AppHandlers.saveCurrentVideoState, 5000);
                } else {
                    if(eps && eps[0]) Utils.saveHistory(m, AppState.activeEpIdx, epData.name, 0);
                }

                // GỌI ASYNC LẤY LẠI EXTRAS KHI PHÁT VIDEO ĐỂ GIỮ NỘI DUNG TABS
                AppHandlers.loadTmdbExtras(AppState.watchData.movie);
            },

            changeServer: (idx) => { AppHandlers.saveCurrentVideoState(); AppState.activeServerIdx = idx; AppState.activeEpIdx = 0; AppHandlers.playVideo(); },
            changeEpisode: (idx) => { AppHandlers.saveCurrentVideoState(); AppState.activeEpIdx = idx; AppHandlers.playVideo(); },
            
            switchWatchTab: (tabId) => {
                ['episodes', 'info', 'cast', 'gallery', 'suggest'].forEach(id => {
                    document.getElementById(`tab-content-${id}`)?.classList.add('hidden');
                    document.getElementById(`tab-btn-${id}`)?.classList.replace('tab-active', 'text-muted');
                });
                document.getElementById(`tab-content-${tabId}`)?.classList.remove('hidden');
                document.getElementById(`tab-btn-${tabId}`)?.classList.replace('text-muted', 'tab-active');
            },

            loadSuggestions: async (movie) => {
                const container = document.getElementById('suggest-container');
                if(!container) return;
                container.innerHTML = Utils.showLoading();
                
                let queries = [];
                
                if (movie.category && movie.category.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[0].slug}?limit=24`));
                    if (movie.category.length > 1) {
                        queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[1].slug}?limit=24`));
                    }
                }
                if (movie.country && movie.country.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/quoc-gia/${movie.country[0].slug}?limit=24`));
                }
                
                if (queries.length === 0) {
                    queries.push(API.fetchJSON('/danh-sach/phim-moi-cap-nhat?limit=24'));
                }

                const results = await Promise.allSettled(queries);
                let combinedMap = new Map();

                results.forEach(res => {
                    if(res.status === 'fulfilled' && res.value) {
                        let items = res.value.data ? res.value.data.items : res.value.items || [];
                        items.forEach(m => {
                            if (m.slug !== movie.slug) {
                                if (combinedMap.has(m.slug)) {
                                    combinedMap.get(m.slug).score += 1;
                                } else {
                                    m.score = 1;
                                    combinedMap.set(m.slug, m);
                                }
                            }
                        });
                    }
                });

                let items = Array.from(combinedMap.values());
                items.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                });
                items = items.slice(0, 16);
                
                if(items.length) {
                    container.innerHTML = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">${items.map(m => Render.movieCard(m)).join('')}</div>`;
                } else {
                    container.innerHTML = `<div class="text-center text-muted py-8">Chưa có đề xuất phù hợp lúc này.</div>`;
                }
            },

            toggleFav: () => {
                if(!AppState.watchData) return;
                Utils.toggleFavorite(AppState.watchData.movie);
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie);
                AppHandlers.loadTmdbExtras(AppState.watchData.movie);
            },

            loadList: async (type, slug, title) => {
                AppHandlers.navigate('search'); document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                document.getElementById('search-title').innerHTML = title;
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList(type, slug, 36);
                resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-16 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><p>Danh sách này hiện tại đang trống.</p></div>`;
            },

            searchByKeyword: (kw) => { 
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = kw; 
                AppHandlers.onSearchInput(kw); 
            },

            onSearchInput: (val) => {
                const kw = val.trim(); 
                if(AppState.searchTimeout) clearTimeout(AppState.searchTimeout);
                const resDiv = document.getElementById('search-results'), tDiv = document.getElementById('search-title');
                const smartDiv = document.getElementById('search-smart');
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                if (!kw) { tDiv.innerHTML = 'Tìm kiếm'; resDiv.innerHTML = ''; if(smartDiv) smartDiv.innerHTML = ''; return; }
                
                tDiv.innerHTML = `Kết quả cho: "${kw}"`; 
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                if(smartDiv) smartDiv.innerHTML = '';
                
                AppState.searchTimeout = setTimeout(async () => {
                    // Chạy song song: tìm trong kho phim (OPhim/KK) + tìm người (diễn viên/đạo diễn) trên TMDB
                    const [data, personRes] = await Promise.all([
                        API.search(kw),
                        TMDB.searchPerson(kw).catch(() => null)
                    ]);
                    const emptyStateHtml = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-muted">
                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" class="mb-4 opacity-40" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <p class="font-medium text-gray-300">Không tìm thấy dữ liệu cho từ khóa này.</p>
                        <p class="text-sm mt-2 max-w-sm text-center">API hệ thống có thể chưa cập nhật diễn viên hoặc tên phim này. Bạn vui lòng thử một từ khóa khác.</p>
                    </div>`;

                    resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : emptyStateHtml;

                    // ----- Gợi ý người (diễn viên/đạo diễn) khớp với từ khóa -----
                    const people = (personRes?.results || []).filter(p => p.known_for_department === 'Acting' || p.known_for_department === 'Directing').slice(0, 5);
                    if (smartDiv && people.length) {
                        smartDiv.innerHTML = `
                        <div class="text-xs text-muted mb-2">Có phải bạn muốn tìm người này?</div>
                        <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
                            ${people.map(p => `
                                <div onclick="AppHandlers.openActorDetail('${p.id}')" class="shrink-0 flex items-center gap-2 bg-surface border border-white/10 rounded-full pl-1.5 pr-3 py-1.5 cursor-pointer hover:border-primary/50 transition">
                                    <img src="${p.profile_path ? CONFIG.TMDB_IMG + p.profile_path : 'https://placehold.co/60x60/1c1f2e/94a3b8?text=?'}" class="w-7 h-7 rounded-full object-cover" onerror="this.src='https://placehold.co/60x60/1c1f2e/94a3b8?text=?'"/>
                                    <span class="text-xs font-semibold">${p.name}</span>
                                    <span class="text-[10px] text-muted">${p.known_for_department === 'Directing' ? 'Đạo diễn' : 'Diễn viên'}</span>
                                </div>`).join('')}
                        </div>`;
                    }

                    // ----- Chip thể loại lấy từ chính kết quả trả về, cho phép lọc nhanh -----
                    const items = data?.data?.items || [];
                    if (items.length) {
                        const genreMap = new Map();
                        items.forEach(m => (m.category || []).forEach(c => { if(c?.name) genreMap.set(c.slug || c.name, c.name); }));
                        if (genreMap.size) {
                            const chipsHtml = `
                            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1 ${people.length ? 'mt-3' : ''}">
                                ${[...genreMap.entries()].slice(0, 10).map(([slug, name]) => `
                                    <button onclick="AppHandlers.filterSearchByGenre('${slug}')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">${name}</button>
                                `).join('')}
                            </div>`;
                            smartDiv.innerHTML += chipsHtml;
                        }
                    }
                    AppState.lastSearchItems = items; // lưu lại để lọc thể loại client-side
                }, 700);
            },

            // Lọc nhanh kết quả tìm kiếm hiện có theo thể loại (client-side, không gọi lại API)
            filterSearchByGenre: (genreSlug) => {
                const resDiv = document.getElementById('search-results');
                const items = (AppState.lastSearchItems || []).filter(m => (m.category || []).some(c => (c.slug || c.name) === genreSlug));
                resDiv.innerHTML = items.length ? items.map(m => Render.movieCard(m)).join('') : `<div class="col-span-full text-center text-muted py-10">Không có phim nào thuộc thể loại này trong kết quả hiện tại.</div>`;
            },

            renderHistory: (type = 'recent') => {
                const c = document.getElementById('history-content');
                let data = type === 'recent' ? AppState.history.map(m => ({...m, badge: m.last_ep_name?`Tập ${m.last_ep_name}`:'Đã xem'})) : AppState.favorites;
                c.innerHTML = data.length ? data.map(m => Render.movieCard(m, m.badge)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-20 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><p>Danh sách của bạn đang trống.</p></div>`;
            },
            
            switchHistoryTab: (tab) => {
                document.getElementById('htab-recent').classList.replace('tab-active', 'text-muted');
                document.getElementById('htab-favs').classList.replace('tab-active', 'text-muted');
                document.getElementById(`htab-${tab}`).classList.replace('text-muted', 'tab-active');
                AppHandlers.renderHistory(tab);
            }
        };

        document.addEventListener('DOMContentLoaded', AppHandlers.init);
    </script>

</body>
</html>
