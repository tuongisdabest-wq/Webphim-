<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTuongFX - Trăm phim một chợ (OPhim API)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện HLS.js để xử lý luồng m3u8 và lấy thời gian xem -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { 
                        app: '#0f111a', 
                        surface: '#1c1f2e', 
                        menu: '#2a2f4c',
                        primary: '#fcd34d',
                        'primary-dark': '#fbbf24',
                        text: '#f8fafc',
                        muted: '#94a3b8'
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
                        slideUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style id="custom-core-styles">
        /* TỐI ƯU VUỐT CHẠM ĐIỆN THOẠI: 
           - Bỏ scroll-behavior: smooth; ở đây vì nó gây lag giật khi dùng ngón tay vuốt 
           - Thêm -webkit-overflow-scrolling: touch để bật Quán tính vuốt mượt mà của iOS
           - Thêm overscroll-behavior-x: contain để chống vuốt nhầm back trang */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
            overscroll-behavior-x: contain;
        }
        
        body { 
            background-color: #0f111a; color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .tab-active { color: #fcd34d; border-bottom: 2px solid #fcd34d; }
        .bottom-sheet-open { transform: translateY(0%); }
        .bottom-sheet-closed { transform: translateY(100%); }
        
        @media (min-width: 640px) {
            .bottom-sheet-open { transform: scale(1); opacity: 1; pointer-events: auto;}
            .bottom-sheet-closed { transform: scale(0.95); opacity: 0; pointer-events: none; }
        }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
    
</head>
<body class="pb-20 md:pb-10 selection:bg-primary selection:text-black antialiased">

    <!-- Header -->
    <header class="fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 bg-app/90 backdrop-blur-md" id="navbar">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="AppHandlers.toggleMenuModal()" class="p-2 -ml-2 text-text hover:text-primary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="15" y2="18"></line></svg>
                </button>
                <div class="flex items-center gap-2 cursor-pointer" onclick="AppHandlers.navigate('home')">
                    <div class="w-8 h-8 rounded-full border-2 border-primary flex items-center justify-center">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fcd34d" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="ml-0.5"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">KTuongFX</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="AppHandlers.navigate('search')" class="p-2 text-text hover:text-primary transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Menu Modal -->
    <div id="menu-overlay" class="fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0" onclick="AppHandlers.toggleMenuModal()"></div>
    
    <div id="menu-modal" class="fixed bottom-0 sm:top-1/2 sm:left-1/2 sm:-translate-x-1/2 sm:-translate-y-1/2 w-full sm:w-[400px] bg-menu z-50 transition-all duration-300 flex flex-col rounded-t-3xl sm:rounded-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] border border-white/10 max-h-[90vh] overflow-hidden bottom-sheet-closed">
        
        <div class="p-4 flex justify-between items-center sm:hidden border-b border-white/5">
            <h3 class="font-bold text-white pl-2">Menu</h3>
            <button onclick="AppHandlers.toggleMenuModal()" class="text-muted hover:text-red-400 p-2 bg-black/20 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>

        <div class="p-6 overflow-y-auto hide-scrollbar flex-1">
            <button class="w-full bg-[#f8fafc] text-black font-bold text-[15px] py-3.5 rounded-full flex items-center justify-center gap-2 mb-4 hover:bg-gray-200 transition shadow">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg> Thành viên
            </button>

            <!-- Grid Menu -->
            <div class="grid grid-cols-2 gap-y-5 gap-x-4 text-white text-[15px] font-medium mb-6">
                <button onclick="AppHandlers.navigate('home'); AppHandlers.toggleMenuModal()" class="text-left hover:text-primary transition flex items-center gap-2">Trang Chủ</button>
                <button onclick="AppHandlers.navigate('history'); AppHandlers.toggleMenuModal()" class="text-left hover:text-primary transition flex items-center gap-2">Lịch Sử / Yêu Thích</button>
                <button onclick="AppHandlers.loadList('danh-sach', 'phim-le', 'Phim Lẻ'); AppHandlers.toggleMenuModal()" class="text-left hover:text-primary transition">Phim Lẻ</button>
                <button onclick="AppHandlers.loadList('danh-sach', 'phim-bo', 'Phim Bộ'); AppHandlers.toggleMenuModal()" class="text-left hover:text-primary transition">Phim Bộ</button>

                <div class="col-span-1">
                    <button onclick="AppHandlers.toggleDropdown('dropdown-genres')" class="w-full text-left flex items-center justify-between hover:text-primary transition">
                        Thể loại <svg id="icon-genres" class="transition-transform duration-200" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(0deg);"><path d="M6 9l6 6 6-6"></path></svg>
                    </button>
                </div>
                <div class="col-span-1">
                    <button onclick="AppHandlers.toggleDropdown('dropdown-countries')" class="w-full text-left flex items-center justify-between hover:text-primary transition">
                        Quốc gia <svg id="icon-countries" class="transition-transform duration-200" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="transform: rotate(0deg);"><path d="M6 9l6 6 6-6"></path></svg>
                    </button>
                </div>

                <div id="dropdown-genres" class="col-span-2 bg-app/50 rounded-xl p-3 grid grid-cols-2 sm:grid-cols-3 gap-2.5 max-h-64 overflow-y-auto hide-scrollbar border border-white/5 hidden"></div>
                <div id="dropdown-countries" class="col-span-2 bg-app/50 rounded-xl p-3 grid grid-cols-2 sm:grid-cols-3 gap-2.5 max-h-64 overflow-y-auto hide-scrollbar border border-white/5 hidden"></div>
            </div>

            <!-- Công cụ & Liên hệ -->
            <div class="border-t border-white/10 pt-6 space-y-4">
                <button onclick="AppHandlers.downloadSource()" class="w-full bg-surface border border-white/10 text-white font-medium text-sm py-3 rounded-xl flex items-center justify-center gap-2 hover:bg-white/10 transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Tải HTML mã nguồn web gốc
                </button>
                <div class="text-center">
                    <p class="text-xs text-muted mb-1">Liên hệ hỗ trợ Admin:</p>
                    <a href="mailto:ktuongzxzx@gmail.com" class="text-sm font-bold text-primary hover:underline">ktuongzxzx@gmail.com</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="w-full max-w-screen-xl mx-auto pt-16 min-h-screen">
        
        <!-- View: HOME -->
        <div id="view-home" class="flex flex-col gap-6 animate-fade-in pb-10"></div>
        
        <!-- View: WATCH -->
        <div id="view-watch" class="animate-fade-in w-full hidden"></div>
        
        <!-- View: SEARCH & LISTS -->
        <div id="view-search" class="animate-fade-in p-4 lg:p-8 hidden">
            <div class="relative max-w-2xl mx-auto mb-8">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <svg class="text-muted" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="search-input" class="w-full bg-surface border border-white/10 text-white rounded-2xl py-3.5 pl-12 pr-4 focus:outline-none focus:border-primary transition-all placeholder-muted text-base shadow-lg" placeholder="Nhập tên phim, diễn viên..." oninput="AppHandlers.onSearchInput(this.value)" autocomplete="off">
            </div>
            <div id="search-title" class="text-lg md:text-xl font-bold mb-4 px-2 text-primary">Kết quả cho: "Spider-Man Noir"</div>
            <div id="search-results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2"></div>
        </div>
        
        <!-- View: HISTORY -->
        <div id="view-history" class="animate-fade-in p-4 lg:p-8 hidden">
            <div class="flex gap-6 mb-6 border-b border-white/10 px-2">
                <button onclick="AppHandlers.switchHistoryTab('recent')" id="htab-recent" class="pb-3 text-base md:text-lg font-bold tab-active transition-colors">Tiếp tục xem</button>
                <button onclick="AppHandlers.switchHistoryTab('favs')" id="htab-favs" class="pb-3 text-base md:text-lg font-bold text-muted hover:text-white transition-colors">Yêu Thích</button>
            </div>
            <div id="history-content" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2"></div>
        </div>
    </main>

    <!-- Javascript -->
    <script>
        const CONFIG = { 
            API_BASE: 'https://ophim1.com', 
            API_KK: 'https://phimapi.com',
            IMG_BASE: 'https://img.ophim.live/uploads/movies/',
            HERO_LIMIT: 10,
            HERO_AUTO_PLAY_INTERVAL: 5000,
            MOVIE_ROWS: [
                { title: 'Phim Mới Phát Hành', type: 'danh-sach', slug: 'phim-moi-cap-nhat', limit: 12 },
                { title: 'Top Hành Động Kịch Tính', type: 'the-loai', slug: 'hanh-dong', limit: 10, rank: true },
                { title: 'Siêu Phẩm Hoạt Hình (Anime)', type: 'the-loai', slug: 'hoat-hinh', limit: 10, rank: true },
                { title: 'Kinh Dị & Giật Gân', type: 'the-loai', slug: 'kinh-di', limit: 12 },
                { title: 'Top Hài Hước Để Xả Stress', type: 'the-loai', slug: 'hai-huoc', limit: 10, rank: true },
                { title: 'Tâm Lý Sâu Sắc', type: 'the-loai', slug: 'tam-ly', limit: 12 },
                { title: 'Lãng Mạn - Tình Cảm', type: 'the-loai', slug: 'tinh-cam', limit: 12 },
                { title: 'Phim Lẻ Đặc Sắc', type: 'danh-sach', slug: 'phim-le', limit: 12 },
                { title: 'Khoa Học Viễn Tưởng', type: 'the-loai', slug: 'vien-tuong', limit: 12 }
            ]
        };

        const AppState = {
            currentView: 'home', genres: [], countries: [], searchTimeout: null,
            watchData: null, activeServerIdx: 0, activeEpIdx: 0, isPlaying: false, 
            heroInterval: null, totalHeroSlides: 0, currentHeroSlide: 0, heroObserver: null,
            hlsInstance: null, saveInterval: null,
            favorites: JSON.parse(localStorage.getItem('ktuong_favs') || '[]'),
            history: JSON.parse(localStorage.getItem('ktuong_history') || '[]'),
            currentSourceProvider: 'OP',
            isServerDropdownOpen: false
        };

        const Utils = {
            getImage: (path, provider = 'OP') => {
                if(!path) return 'https://placehold.co/300x450/1c1f2e/94a3b8?text=No+Poster';
                if(path.startsWith('http')) {
                    if (provider === 'KK') return `${CONFIG.API_KK}/image.php?url=${encodeURIComponent(path)}`;
                    return path;
                }
                if(provider === 'KK' || path.startsWith('upload/') || path.includes('upload/')) {
                    const fullUrl = `https://phimimg.com/${path.replace(/^\/+/, '')}`;
                    return `${CONFIG.API_KK}/image.php?url=${encodeURIComponent(fullUrl)}`;
                }
                return `${CONFIG.IMG_BASE}${path.replace(/^\/+/, '')}`;
            },
            showLoading: (fullHeight = false) => `<div class="flex flex-col items-center justify-center w-full ${fullHeight ? 'min-h-[60vh]' : 'py-12'}"><div class="w-10 h-10 border-4 border-surface border-t-primary rounded-full animate-spin"></div></div>`,
            
            saveHistory: (movie, epIdx = 0, epName = '', currentTime = 0) => {
                if(!movie || !movie.slug) return;
                let hist = AppState.history.filter(m => m.slug !== movie.slug);
                hist.unshift({ 
                    slug: movie.slug, 
                    name: movie.name, 
                    origin_name: movie.origin_name, 
                    thumb_url: movie.thumb_url || movie.poster_url, 
                    last_ep_idx: epIdx, 
                    last_ep_name: epName,
                    current_time: currentTime 
                });
                if (hist.length > 50) hist.pop(); 
                AppState.history = hist; 
                localStorage.setItem('ktuong_history', JSON.stringify(hist));
            },
            toggleFavorite: (movie) => {
                const isFav = AppState.favorites.some(m => m.slug === movie.slug);
                if (isFav) AppState.favorites = AppState.favorites.filter(m => m.slug !== movie.slug);
                else AppState.favorites.unshift({ slug: movie.slug, name: movie.name, origin_name: movie.origin_name, thumb_url: movie.thumb_url || movie.poster_url });
                localStorage.setItem('ktuong_favs', JSON.stringify(AppState.favorites)); return !isFav;
            },
            isFavorite: (slug) => AppState.favorites.some(m => m.slug === slug),
            formatTime: (seconds) => {
                if (!seconds) return "00:00";
                const m = Math.floor(seconds / 60), s = Math.floor(seconds % 60);
                return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            }
        };

        const API = {
            fetchJSON: async (endpoint) => { try { return await (await fetch(`${CONFIG.API_BASE}${endpoint}`)).json(); } catch(e) { return null; } },
            fetchKKPhim: async (slug) => { try { return await (await fetch(`${CONFIG.API_KK}/phim/${slug}`)).json(); } catch(e) { return null; } },
            getAppData: async () => {
                const [g, c] = await Promise.all([API.fetchJSON('/the-loai'), API.fetchJSON('/quoc-gia')]);
                if (g) AppState.genres = g; if (c) AppState.countries = c;
            },
            getMovieDetails: async (slug) => API.fetchJSON(`/phim/${slug}`),
            
            search: async (kw, limit=30) => {
                let finalResults = [];
                let seenSlugs = new Set();
                
                try {
                    const ophimRes = await API.fetchJSON(`/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=${limit}`);
                    if (ophimRes && ophimRes.data && ophimRes.data.items) {
                        ophimRes.data.items.forEach(movie => {
                            if (movie.slug) {
                                seenSlugs.add(movie.slug.trim().toLowerCase());
                                movie.sourceProvider = 'OP'; 
                                finalResults.push(movie);
                            }
                        });
                    }
                } catch (e) { console.error("Lỗi tìm kiếm OPhim:", e); }

                try {
                    const kkRes = await fetch(`${CONFIG.API_KK}/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=${limit}`).then(r => r.json());
                    if (kkRes && kkRes.data && kkRes.data.items) {
                        kkRes.data.items.forEach(movie => {
                            const kkSlug = movie.slug ? movie.slug.trim().toLowerCase() : '';
                            if (kkSlug && !seenSlugs.has(kkSlug)) {
                                seenSlugs.add(kkSlug);
                                movie.sourceProvider = 'KK'; 
                                finalResults.push(movie);
                            }
                        });
                    }
                } catch (e) { console.error("Lỗi tìm kiếm KKPhim:", e); }

                return { data: { items: finalResults } };
            },
            
            getList: async (type, slug, limit=24) => {
                let ep = ['phim-bo', 'phim-le', 'tv-shows', 'hoat-hinh', 'phim-moi-cap-nhat'].includes(slug) ? `/v1/api/danh-sach/${slug}?limit=${limit}` : `/v1/api/${type}/${slug}?limit=${limit}`;
                return API.fetchJSON(ep);
            }
        };

        const Render = {
            movieCard: (m, badgeStr, rank = null) => {
                let badge = badgeStr || (m.episode_current ? m.episode_current : '');
                if(m.current_time && badgeStr) {
                     badge += ` (${Utils.formatTime(m.current_time)})`;
                }
                const rankHtml = rank ? `<div class="absolute -top-2 -right-2 bg-primary text-black font-black w-7 h-7 rounded-full flex items-center justify-center border-2 border-surface z-20 text-xs shadow-lg">#${rank}</div>` : '';

                // CẬP NHẬT CHUẨN XÁC NGUỒN CUNG CẤP VÀO SỰ KIỆN CLICK (Khắc phục Lỗi 1)
                const source = m.sourceProvider || 'OP';

                return `
                <div class="group cursor-pointer flex flex-col h-full shrink-0 w-32 md:w-40 snap-start relative" onclick="AppHandlers.goToWatch('${m.slug}', '${source}')">
                    ${rankHtml}
                    <div class="relative aspect-[2/3] rounded-xl overflow-hidden bg-surface mb-2.5 border border-white/5 shadow-sm">
                        <img src="${Utils.getImage(m.thumb_url || m.poster_url, source)}" loading="lazy" decoding="async" onload="this.classList.remove('opacity-0')" class="w-full h-full object-cover transition-all duration-500 opacity-0 group-hover:scale-105" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=Loi+Anh'"/>
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="w-10 h-10 bg-primary text-black rounded-full flex items-center justify-center shadow-lg"><svg width="18" height="18" fill="currentColor" class="ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                        </div>
                        ${badge ? `<div class="absolute top-1.5 left-1.5 max-w-[90%]"><span class="bg-primary/90 backdrop-blur text-black text-[10px] font-bold px-1.5 py-0.5 rounded block truncate">${badge}</span></div>` : ''}
                    </div>
                    <h3 class="font-bold text-[13px] md:text-sm text-text line-clamp-1 group-hover:text-primary transition-colors">${m.name}</h3>
                </div>`;
            },

            topNetflixCard: (m, index, isGrid = false) => {
                const num = index + 1;
                const isDouble = num >= 10;
                const badge = m.episode_current ? m.episode_current : '';
                const source = m.sourceProvider || 'OP';

                return `
                <div class="group cursor-pointer flex flex-col h-full shrink-0 top-netflix-card ${isDouble ? 'double-digit-card' : ''} relative ${isGrid ? 'w-full' : 'w-44 md:w-52 snap-start'}" onclick="AppHandlers.goToWatch('${m.slug}', '${source}')">
                    <div class="netflix-number ${isDouble ? 'double-digit' : ''} transition-transform duration-500 group-hover:-translate-y-1">${num}</div>
                    <div class="relative aspect-[2/3] rounded-xl overflow-hidden bg-surface mb-2.5 shadow-xl border border-white/10 z-10 transition-transform duration-500 group-hover:scale-105">
                        <img src="${Utils.getImage(m.thumb_url || m.poster_url, source)}" loading="lazy" decoding="async" onload="this.classList.remove('opacity-0')" class="w-full h-full object-cover opacity-0 transition-opacity duration-500" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=Loi+Anh'"/>
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="w-12 h-12 bg-primary/90 backdrop-blur text-black rounded-full flex items-center justify-center shadow-lg transform scale-90 group-hover:scale-100 transition-transform"><svg width="22" height="22" fill="currentColor" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                        </div>
                        ${badge ? `<div class="absolute top-2 right-2 max-w-[90%]"><span class="bg-black/60 backdrop-blur text-white border border-white/20 text-[10px] font-bold px-2 py-1 rounded-md block truncate">${badge}</span></div>` : ''}
                    </div>
                    <h3 class="font-bold text-sm text-text line-clamp-1 group-hover:text-primary transition-colors z-10 drop-shadow-md">${m.name}</h3>
                </div>`;
            },

            topHorizontalRow: (title, items) => {
                if (!items || !items.length) return '';
                return `
                <section class="px-4 md:px-6 mt-2 mb-4 relative">
                    <div class="flex justify-between items-center mb-6 relative z-20">
                        <h2 class="text-2xl md:text-3xl font-black text-white tracking-tight drop-shadow-lg">${title} <span class="text-primary">#10</span></h2>

                const castHtml = castArray.length ? castArray.map(actor => `<span onclick="AppHandlers.searchByKeyword('${actor}')" class="px-4 py-2 bg-surface border border-white/10 rounded-lg text-sm hover:bg-primary/20 hover:text-primary hover:border-primary/50 cursor-pointer transition-colors shadow-sm text-center line-clamp-1">${actor}</span>`).join('') : '<span class="text-muted text-sm col-span-full">Đang cập nhật</span>';

                                </div>
                                <span class="text-xs sm:text-sm font-medium">Liên hệ với ad khi gặp lỗi nha</span>
                            </div>
                            <a href="mailto:ktuongzxzx@gmail.com" class="bg-sky-500 hover:bg-sky-600 text-white font-bold px-3 py-1.5 rounded-lg text-xs transition shrink-0">Liên hệ</a>

                    </div>

                    <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-3">

                        </div>
                        
                        <div class="relative">
                            <button onclick="AppHandlers.toggleServerDropdown(event)" 
                                    class="bg-surface border border-white/10 hover:border-white/20 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2 transition duration-200">
                                <span id="current-server-display">${currentServerLabel}</span>
                                <svg id="dropdown-chevron" class="w-4 h-4 text-muted transition-transform duration-200" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"></path></svg>
                            </button>
                            
                            <div id="server-dropdown-list" class="absolute right-0 mt-2 w-48 bg-surface border border-white/10 rounded-xl shadow-2xl py-1 z-40 hidden animate-fade-in">
                                <button onclick="AppHandlers.selectServerSource('${m.slug}', 'OP')" class="w-full px-4 py-3 text-left text-xs font-semibold hover:bg-white/5 flex items-center justify-between text-text group">
                                    <span class="group-hover:text-primary transition-colors">Máy chủ 1 (OP)</span>
                                    <span id="check-op" class="${AppState.currentSourceProvider === 'OP' ? '' : 'hidden'} text-primary">
                                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>
                                    </span>
                                </button>
                                <button onclick="AppHandlers.selectServerSource('${m.slug}', 'KK')" class="w-full px-4 py-3 text-left text-xs font-semibold hover:bg-white/5 flex items-center justify-between text-text group">
                                    <span class="group-hover:text-primary transition-colors">Máy chủ 2 (KK)</span>
                                    <span id="check-kk" class="${AppState.currentSourceProvider === 'KK' ? '' : 'hidden'} text-primary">
                                        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path></svg>

                    <div class="grid grid-cols-4 sm:grid-cols-6 lg:grid-cols-8 gap-2.5">

                        <button onclick="AppHandlers.switchWatchTab('info')" id="tab-btn-info" class="pb-3 text-base font-bold text-muted whitespace-nowrap hover:text-white transition-colors">Thông tin</button>

                    <div id="tab-content-episodes" class="tab-pane animate-fade-in">${epsHtml}</div>

        const AppHandlers = {
            init: async () => { 
                API.getAppData().then(() => {
                    const rPill = (arr, t) => arr.map(i => `<button onclick="AppHandlers.loadList('${t}', '${i.slug}', '${i.name}'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">${i.name}</button>`).join('');
                    const gEl = document.getElementById('dropdown-genres');
                    const cEl = document.getElementById('dropdown-countries');
                    if(gEl && AppState.genres.length) gEl.innerHTML = rPill(AppState.genres, 'the-loai');
                    if(cEl && AppState.countries.length) cEl.innerHTML = rPill(AppState.countries, 'quoc-gia');
                });
                AppHandlers.loadHome(); 
                window.addEventListener('beforeunload', AppHandlers.saveCurrentVideoState);
                
                window.addEventListener('click', (e) => {
                    const sDropdown = document.getElementById('server-dropdown-list');
                    if (sDropdown && !e.target.closest('#current-server-display') && !e.target.closest('#dropdown-chevron') && !e.target.closest('#server-dropdown-list')) {
                        sDropdown.classList.add('hidden');
                        const chevron = document.getElementById('dropdown-chevron');
                        if (chevron) chevron.style.transform = 'rotate(0deg)';
                        AppState.isServerDropdownOpen = false;
                    }
                });
            },
            
            saveCurrentVideoState: () => {
                if(AppState.currentView === 'watch' && AppState.watchData && AppState.isPlaying) {
                    const video = document.getElementById('kt-player');
                    let currentTime = 0;
                    if(video) currentTime = video.currentTime;
                    
                    const m = AppState.watchData.movie;
                    const eps = AppState.watchData.episodes;
                    if(eps && eps[0] && m) {
                         Utils.saveHistory(m, AppState.activeEpIdx, eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx].name, currentTime);
                    }
                }
            },

            navigate: (viewId) => {
                if (AppState.currentView === 'watch' && viewId !== 'watch') { 
                    AppHandlers.saveCurrentVideoState();
                    if(AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if(AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    document.getElementById('view-watch').innerHTML = ''; 
                    AppState.isPlaying = false; 
                }

                AppState.currentView = viewId;
                ['home', 'watch', 'search', 'history'].forEach(id => document.getElementById(`view-${id}`).classList.toggle('hidden', id !== viewId));
                window.scrollTo(0, 0);
                
                document.getElementById('navbar').className = `fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 ${viewId === 'watch' ? 'bg-gradient-to-b from-black/80 to-transparent' : 'bg-app/90 backdrop-blur-md'}`;

                if (viewId === 'home' && !document.getElementById('view-home').innerHTML.trim()) AppHandlers.loadHome();
                if (viewId === 'history') AppHandlers.renderHistory('recent');
            },

            downloadSource: async () => {
                try {
                    const response = await fetch(window.location.href);
                    if (response.ok) {
                        const text = await response.text();
                        AppHandlers._triggerDownload(text);
                        return;
                    }
                } catch(e) {}
                
                let clone = document.documentElement.cloneNode(true);
                const viewsToEmpty = ['view-home', 'view-watch', 'search-results', 'history-content'];
                viewsToEmpty.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.innerHTML = ''; });
                
                const viewsToHide = ['view-watch', 'view-search', 'view-history'];
                viewsToHide.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.classList.add('hidden'); });
                const homeView = clone.querySelector('#view-home'); if(homeView) homeView.classList.remove('hidden');
                
                const searchInput = clone.querySelector('#search-input'); if(searchInput) searchInput.value = '';
                
                const overlay = clone.querySelector('#menu-overlay'); if(overlay) overlay.className = "fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0";
                const modal = clone.querySelector('#menu-modal'); if(modal) { modal.classList.remove('bottom-sheet-open'); modal.classList.add('bottom-sheet-closed'); }
                
                const dropdowns = ['dropdown-genres', 'dropdown-countries'];
                dropdowns.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) { el.classList.add('hidden'); el.innerHTML = ''; } });
                
                clone.querySelectorAll('style:not(#custom-core-styles)').forEach(s => s.remove());
                clone.querySelectorAll('script[data-bard-injected], script[injected]').forEach(s => s.remove());
                
                const finalHtml = "<!DOCTYPE html>\n<html lang=\"vi\">\n" + clone.innerHTML + "\n</html>";
                AppHandlers._triggerDownload(finalHtml);
            },

            _triggerDownload: (htmlContent) => {
                const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "ktuongfx_source_code.html";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                AppHandlers.toggleMenuModal();
            },

            toggleMenuModal: () => {
                const modal = document.getElementById('menu-modal'), overlay = document.getElementById('menu-overlay');
                if(modal.classList.contains('bottom-sheet-closed')) {
                    modal.classList.replace('bottom-sheet-closed', 'bottom-sheet-open');
                    overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                } else {
                    modal.classList.replace('bottom-sheet-open', 'bottom-sheet-closed');
                    overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            },
            
            toggleDropdown: (id) => {
                const el = document.getElementById(id);
                const isGenres = id === 'dropdown-genres';
                el.classList.toggle('hidden');
                
                const icon = document.getElementById(isGenres ? 'icon-genres' : 'icon-countries');
                if(icon) icon.style.transform = el.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
                
                const otherId = isGenres ? 'dropdown-countries' : 'dropdown-genres';
                const otherEl = document.getElementById(otherId);
                if(otherEl) {
                    otherEl.classList.add('hidden');
                    const otherIcon = document.getElementById(isGenres ? 'icon-countries' : 'icon-genres');
                    if(otherIcon) otherIcon.style.transform = 'rotate(0deg)';
                }
            },

            loadHome: async () => {
                const homeDiv = document.getElementById('view-home'); 
                homeDiv.innerHTML = Utils.showLoading(true);
                
                let homeContent = '';

                try {
                    const heroRes = await API.fetchJSON('/v1/api/danh-sach/phim-moi-cap-nhat?limit=20');
                    if (heroRes && heroRes.data && heroRes.data.items) {
                        let heroSlugs = heroRes.data.items.map(i => i.slug).slice(0, CONFIG.HERO_LIMIT);
                        const heroPromises = await Promise.allSettled(heroSlugs.map(slug => API.getMovieDetails(slug)));
                        const heroDetails = heroPromises.filter(p => p.status === 'fulfilled' && p.value?.status).map(p => p.value);
                        homeContent += Render.heroBanner(heroDetails);
                    }
                } catch(e) { console.log("Lỗi tải Slider", e); }
                
                try {
                    const top10Res = await API.getList('danh-sach', 'phim-bo', 10);
                    if(top10Res && top10Res.data && top10Res.data.items) {
                        homeContent += Render.topHorizontalRow('Top 10 Phim Bộ Hôm Nay', top10Res.data.items);
                    }
                } catch(e) { console.log("Lỗi tải Top 10", e); }

                if (AppState.history.length > 0) {
                    homeContent += Render.horizontalRow('Tiếp tục xem', AppState.history.slice(0,12).map(m=>({...m, episode_current: m.last_ep_name?`Tập ${m.last_ep_name}`:''})), 'history', 'recent');
                }

                const rowPromises = CONFIG.MOVIE_ROWS.map(row => API.getList(row.type, row.slug, row.limit).catch(() => null));
                const rowResults = await Promise.all(rowPromises);

                rowResults.forEach((res, index) => {
                    const rowConfig = CONFIG.MOVIE_ROWS[index];
                    if (res && (res.data?.items || res.items)) {
                        const items = res.data?.items || res.items;
                        if (items.length > 0) {
                            homeContent += Render.horizontalRow(rowConfig.title, items, rowConfig.type, rowConfig.slug, rowConfig.rank);
                        }
                    }
                });

                homeDiv.innerHTML = homeContent;
                
                setTimeout(() => AppHandlers.setupHeroObserver(), 100);
            },
            
            setupHeroObserver: () => {
                const slider = document.getElementById('hero-slider');
                if(!slider) return;
                
                if(AppState.heroObserver) AppState.heroObserver.disconnect();
                
                AppState.heroObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting) {
                            const index = parseInt(entry.target.getAttribute('data-index'));
                            AppState.currentHeroSlide = index;
                            
                            for(let i=0; i<AppState.totalHeroSlides; i++) {
                                const dot = document.getElementById(`dot-${i}`);
                                if(dot) {
                                    if(i === index) dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-primary w-6";
                                    else dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-white/30";
                                }
                            }
                        }
                    });
                }, { root: slider, threshold: 0.6 });
                
                document.querySelectorAll('.hero-slide-item').forEach(item => AppState.heroObserver.observe(item));
                AppHandlers.startHeroInterval();
            },

                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-2 gap-y-6 px-2";

                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;

                if(data?.data?.items?.length) {
                    resDiv.innerHTML = data.data.items.map((m, i) => Render.topNetflixCard(m, i, true)).join('');

                if(AppState.heroInterval) clearInterval(AppState.heroInterval);
                AppState.heroInterval = setInterval(() => {
                    if(document.getElementById('hero-slider') && AppState.currentView === 'home' && AppState.totalHeroSlides > 0) {
                        let nextIndex = AppState.currentHeroSlide + 1;

                        </div>`;

            playVideo: () => {
                AppState.isPlaying = true;
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, true, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie); 
                window.scrollTo({top: 0, behavior: 'smooth'});
                
                const m = AppState.watchData.movie;
                const eps = AppState.watchData.episodes;
                const epData = eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx];
                const video = document.getElementById('kt-player');

                if (video && epData.link_m3u8) {
                    const savedHist = AppState.history.find(h => h.slug === m.slug);
                    const savedTime = (savedHist && savedHist.last_ep_idx === AppState.activeEpIdx && savedHist.current_time) ? savedHist.current_time : 0;

                    if (Hls.isSupported()) {
                        if(AppState.hlsInstance) AppState.hlsInstance.destroy();
                        AppState.hlsInstance = new Hls();
                        AppState.hlsInstance.loadSource(epData.link_m3u8);
                        AppState.hlsInstance.attachMedia(video);
                        AppState.hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
                            if(savedTime > 0) video.currentTime = savedTime;
                            video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                        });
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = epData.link_m3u8;
                        video.addEventListener('loadedmetadata', function() {
                            if(savedTime > 0) video.currentTime = savedTime;
                            video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                        });
                    }

                    if(AppState.saveInterval) clearInterval(AppState.saveInterval);
                    AppState.saveInterval = setInterval(AppHandlers.saveCurrentVideoState, 5000);
                } else {
                    if(eps && eps[0]) Utils.saveHistory(m, AppState.activeEpIdx, epData.name, 0);
                }
            },

            changeServer: (idx) => { AppHandlers.saveCurrentVideoState(); AppState.activeServerIdx = idx; AppState.activeEpIdx = 0; AppHandlers.playVideo(); },
            changeEpisode: (idx) => { AppHandlers.saveCurrentVideoState(); AppState.activeEpIdx = idx; AppHandlers.playVideo(); },
            
            switchWatchTab: (tabId) => {
                ['episodes', 'info', 'cast', 'suggest'].forEach(id => {
                    document.getElementById(`tab-content-${id}`)?.classList.add('hidden');
                    document.getElementById(`tab-btn-${id}`)?.classList.replace('tab-active', 'text-muted');
                });
                document.getElementById(`tab-content-${tabId}`)?.classList.remove('hidden');
                document.getElementById(`tab-btn-${tabId}`)?.classList.replace('text-muted', 'tab-active');
            },

            loadSuggestions: async (movie) => {
                const container = document.getElementById('suggest-container');
                if(!container) return;
                container.innerHTML = Utils.showLoading();
                
                let queries = [];
                
                if (movie.category && movie.category.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[0].slug}?limit=24`));
                    if (movie.category.length > 1) {
                        queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[1].slug}?limit=24`));
                    }
                }
                if (movie.country && movie.country.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/quoc-gia/${movie.country[0].slug}?limit=24`));
                }
                
                if (queries.length === 0) {
                    queries.push(API.fetchJSON('/danh-sach/phim-moi-cap-nhat?limit=24'));
                }

                const results = await Promise.allSettled(queries);
                let combinedMap = new Map();

                results.forEach(res => {
                    if(res.status === 'fulfilled' && res.value) {
                        let items = res.value.data ? res.value.data.items : res.value.items || [];
                        items.forEach(m => {
                            if (m.slug !== movie.slug) {
                                if (combinedMap.has(m.slug)) {
                                    combinedMap.get(m.slug).score += 1;
                                } else {
                                    m.score = 1;
                                    combinedMap.set(m.slug, m);
                                }
                            }
                        });
                    }
                });

                let items = Array.from(combinedMap.values());
                items.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                });
                items = items.slice(0, 16);
                
                if(items.length) {
                    container.innerHTML = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">${items.map(m => Render.movieCard(m)).join('')}</div>`;
                } else {
                    container.innerHTML = `<div class="text-center text-muted py-8">Chưa có đề xuất phù hợp lúc này.</div>`;
                }
            },

            toggleFav: () => {
                if(!AppState.watchData) return;
                Utils.toggleFavorite(AppState.watchData.movie);
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie);
            },

            loadList: async (type, slug, title) => {
                AppHandlers.navigate('search'); document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                document.getElementById('search-title').innerHTML = title;
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList(type, slug, 36);
                resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-16 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><p>Danh sách này hiện tại đang trống.</p></div>`;
            },

            searchByKeyword: (kw) => { 
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = kw; 
                AppHandlers.onSearchInput(kw); 
            },

            onSearchInput: (val) => {
                const kw = val.trim(); 
                if(AppState.searchTimeout) clearTimeout(AppState.searchTimeout);
                const resDiv = document.getElementById('search-results'), tDiv = document.getElementById('search-title');
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                if (!kw) { tDiv.innerHTML = 'Tìm kiếm'; resDiv.innerHTML = ''; return; }
                
                tDiv.innerHTML = `Kết quả cho: "${kw}"`; 
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                AppState.searchTimeout = setTimeout(async () => {
                    const data = await API.search(kw);
                    const emptyStateHtml = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-muted">
                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" class="mb-4 opacity-40" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <p class="font-medium text-gray-300">Không tìm thấy dữ liệu cho từ khóa này.</p>
                        <p class="text-sm mt-2 max-w-sm text-center">API hệ thống có thể chưa cập nhật diễn viên hoặc tên phim này. Bạn vui lòng thử một từ khóa khác.</p>
                    </div>`;

                    resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : emptyStateHtml;
                }, 700);
            },

            renderHistory: (type = 'recent') => {
                const c = document.getElementById('history-content');
                let data = type === 'recent' ? AppState.history.map(m => ({...m, badge: m.last_ep_name?`Tập ${m.last_ep_name}`:'Đã xem'})) : AppState.favorites;
                c.innerHTML = data.length ? data.map(m => Render.movieCard(m, m.badge)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-20 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg><p>Danh sách của bạn đang trống.</p></div>`;
            },
            
            switchHistoryTab: (tab) => {
                document.getElementById('htab-recent').classList.replace('tab-active', 'text-muted');
                document.getElementById('htab-favs').classList.replace('tab-active', 'text-muted');
                document.getElementById(`htab-${tab}`).classList.replace('text-muted', 'tab-active');
                AppHandlers.renderHistory(tab);
            }
        };

        document.addEventListener('DOMContentLoaded', AppHandlers.init);
    </script>


</body>
