<!DOCTYPE html>

    <title>KTuongFX - anh em thôn 2 (OPhim API)</title>

    <!-- ================= THÊM MỚI: Giải mã redirect từ 404.html (SPA fallback cho GitHub Pages) =================
         Giúp các URL dạng /phim/ten-cau-la-gi hoặc /dien-vien/123 không bị lỗi 404 khi người dùng
         bấm F5 hoặc mở thẳng link đó. Bắt buộc phải có file 404.html tương ứng cùng thư mục gốc.
         Không ảnh hưởng gì nếu chưa có file 404.html - script này chỉ chạy khi phát hiện URL đã
         được 404.html chuyển hướng qua (dạng ?/...). -->
    <script>
        (function (l) {
            if (l.search[1] === '/') {
                var decoded = l.search.slice(1).split('&').map(function (s) { return s.replace(/~and~/g, '&'); }).join('?');
                window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
            }
        })(window.location);
    </script>

    <!-- Mở sẵn kết nối DNS/TLS tới các domain hay gọi nhất, giảm độ trễ round-trip đầu tiên -->

    <link rel="dns-prefetch" href="https://tmdb-proxy.tuongisdabest.workers.dev">
    <link rel="preconnect" href="https://ophim1.com" crossorigin="">
    <link rel="preconnect" href="https://phimapi.com" crossorigin="">

    <script>

    </script>
    <style id="custom-core-styles">
        /* TỐI ƯU VUỐT CHẠM ĐIỆN THOẠI */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { 
            -ms-overflow-style: none; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch; 
            overscroll-behavior-x: contain;
        }
        
        body { 
            background-color: #0f111a; color: #f8fafc; 
            font-family: system-ui, -apple-system, sans-serif; 
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .tab-active { color: #fcd34d; border-bottom: 2px solid #fcd34d; }
        .bottom-sheet-open { transform: translateY(0%); }
        .bottom-sheet-closed { transform: translateY(100%); }
        
        @media (min-width: 640px) {
            .bottom-sheet-open { transform: scale(1); opacity: 1; pointer-events: auto;}
            .bottom-sheet-closed { transform: scale(0.95); opacity: 0; pointer-events: none; }
        }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }

        /* ===== GIAO DIỆN SỐ TOP 10 NETFLIX ===== */
        .netflix-number {
            font-family: 'Arial Black', Helvetica, Impact, sans-serif;
            font-weight: 900;
            font-size: 5rem;
            line-height: 0.8;
            color: #0f111a;
            -webkit-text-stroke: 2px rgba(255,255,255,0.7);
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: none;
            user-select: none;
            letter-spacing: -2px;
            z-index: 5;
            flex-shrink: 0;
            transform: translateY(2px);
        }
        .netflix-number.double-digit {
            font-size: 4rem;
            letter-spacing: -4px;
        }
        @media (min-width: 768px) {
            .netflix-number { font-size: 6.5rem; }
            .netflix-number.double-digit { font-size: 5.2rem; }
        }

        /* ===== BADGE XU HƯỚNG ===== */
        .trend-badge { display:inline-flex; align-items:center; gap:2px; font-size:10px; font-weight:700; padding:2px 6px; border-radius:6px; }
        .trend-up { background: rgba(34,197,94,0.15); color: #4ade80; }
        .trend-down { background: rgba(248,113,113,0.15); color: #f87171; }
        .trend-flat { background: rgba(148,163,184,0.15); color: #94a3b8; }

        /* ===== LIQUID GLASS CSS ===== */
        .liquid-glass {
            background: rgba(28, 31, 46, 0.5);
            backdrop-filter: blur(12px) saturate(160%) url(#liquid-distort);
            -webkit-backdrop-filter: blur(12px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        
        .liquid-glass-accent {
            background: rgba(252, 211, 77, 0.7);
            backdrop-filter: blur(8px) saturate(140%) url(#liquid-distort);
            -webkit-backdrop-filter: blur(8px) saturate(140%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 25px rgba(252, 211, 77, 0.3);
        }
    </style>
    
</head>
<body class="pb-20 md:pb-10 selection:bg-primary selection:text-black antialiased">

    <!-- THÊM MỚI: Màn hình Intro Video hiện trước khi vào web xem phim -->
    <!-- LƯU Ý CẤU HÌNH: 
         1) Đổi link video ở thẻ <source> bên dưới thành video intro của bạn (mp4, để trên hosting/CDN của bạn).
         2) Đổi src ảnh logo trong div "intro-logo" thành ảnh logo bạn muốn.
         3) Muốn intro chỉ hiện 1 lần/phiên (không hiện lại khi chuyển trang trong site) hay hiện mỗi lần mở web
            đều được vì đây là web 1 trang (SPA) - có thể chỉnh CONFIG.SHOW_INTRO_EVERY_VISIT trong phần mã JS. -->
    <div id="intro-overlay" class="fixed inset-0 z-[999] bg-black flex items-center justify-center">
        <video id="intro-video" class="w-full h-full object-cover" autoplay muted playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
        <div id="intro-logo" class="absolute bottom-10 left-0 right-0 flex items-center justify-center">
            <img src="logo.png" class="w-16 h-16 rounded-full object-cover border-2 border-primary" onerror="this.style.display='none'">
        </div>
        <button onclick="AppHandlers.skipIntro()" class="absolute bottom-10 right-6 px-4 py-2 rounded-full liquid-glass text-sm font-semibold text-white">Bỏ qua</button>
    </div>
    

    <!-- SVG Filter Kính lỏng -->
    <svg style="width:0;height:0;position:absolute;" aria-hidden="true" focusable="false">
        <filter id="liquid-distort">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="1" result="noise"></feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.5" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
        </filter>
    </svg>

                </button>
            </div>

    <!-- Main Content -->

                </div>

            <div id="search-title" class="text-lg md:text-xl font-bold mb-4 px-2 text-primary">Phim Lẻ Đặc Sắc</div>
            <div id="search-smart" class="px-2 mb-4">

                                    <button onclick="AppHandlers.filterSearchByGenre('phieu-luu')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">Phiêu Lưu</button>

                    const age = currentYear - y;

                    const voteAvgA = a.item?.tmdb?.vote_average || 0;

                    const scoreA = voteCountA + voteAvgA * 20 + recencyBonus(a.item);

                    if (scoreB !== scoreA) return scoreB - scoreA;
                    return a.idx - b.idx;

            checkMovieIdentity: (m1, m2) => {
                if (!m1 || !m2) return false;
                
                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                
                const m1Eng = norm(m1.english_name);
                const m1Orig = norm(m1.origin_name);
                const m1Name = norm(m1.name);
                
                const m2Eng = norm(m2.english_name);
                const m2Orig = norm(m2.origin_name);
                const m2Name = norm(m2.name);

                if (m1.type && m2.type && (m1.type === 'single' || m1.type === 'series') && (m2.type === 'single' || m2.type === 'series')) {
                    if (m1.type !== m2.type) return false;
                }

                const y1 = parseInt(m1.year);
                const y2 = parseInt(m2.year);
                if (y1 && y2 && Math.abs(y1 - y2) > 1) return false;

                const c1 = m1.country?.[0]?.slug;
                const c2 = m2.country?.[0]?.slug;
                if (c1 && c2 && c1 !== c2) return false;

                let nameMatch = false;
                const foreignNames1 = [m1Eng, m1Orig].filter(Boolean);
                const foreignNames2 = [m2Eng, m2Orig].filter(Boolean);

                if (foreignNames1.some(name => foreignNames2.includes(name))) {
                    nameMatch = true;
                }

                if (!nameMatch) {
                    if (foreignNames1.length > 0 && foreignNames2.length > 0) {
                        return false;
                    } else {
                        if (m1Name && m2Name && m1Name === m2Name) {
                            if (y1 && y2 && Math.abs(y1 - y2) <= 1 && c1 && c2 && c1 === c2) {
                                nameMatch = true;
                            }
                        }
                    }
                }
                return nameMatch;
            },

                if (!items || !items.length || !refMovie) return null;
                for (const item of items) {
                    if (Utils.checkMovieIdentity(refMovie, item)) {
                        return item;
                    }
                }
                return null;
            },

            verifyCrossServerMatch: async (refMovie, candidateItem) => {
                const missingCrucialData = !refMovie.year || !candidateItem.year || !refMovie.country?.[0]?.slug || !candidateItem.country?.[0]?.slug;
                const isLocalMatch = Utils.checkMovieIdentity(refMovie, candidateItem);

                if (isLocalMatch && !missingCrucialData) return { ok: true, reason: 'strict_local_match' };
                if (!isLocalMatch && !missingCrucialData) return { ok: false, reason: 'strict_local_mismatch' };

                try {
                    const refMatch = await TMDB.resolveMatch(refMovie);
                    if (!refMatch) return { ok: true, reason: 'no_ref' };

                    const candMatch = await TMDB.resolveMatch(candidateItem);
                    if (!candMatch) return { ok: true, reason: 'no_candidate' };

                    const refId = refMatch.resolved_id || refMatch.id;
                    const candId = candMatch.resolved_id || candMatch.id;
                    const same = String(refId) === String(candId) && refMatch.media_type === candMatch.media_type;
                    return { ok: same, reason: same ? 'match' : 'mismatch', refMatch, candMatch };
                } catch (e) {
                    return { ok: true, reason: 'error' };
                }
            },

            findBestMatchAsync: async (items, refMovie, maxCheck = 4) => {
                if (!items || !items.length || !refMovie) return null;

                const strict = Utils.findBestMatch(items, refMovie);
                if (strict) return strict;

                const candidates = items.slice(0, maxCheck);
                const verdicts = await Promise.all(
                    candidates.map(cand => Utils.verifyCrossServerMatch(refMovie, cand).catch(() => ({ ok: false, reason: 'error' })))
                );

                for (let i = 0; i < candidates.length; i++) {
                    if (verdicts[i] && verdicts[i].ok) return candidates[i];
                }
                return null;
            },

            buildGlobalTrendingRow: (libraryPool, tmdbDayTrendingRes, limit = 12) => {
                const results = tmdbDayTrendingRes?.results;
                if (!results || !results.length || !libraryPool || !libraryPool.length) return [];

                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');

                const poolByName = new Map();
                libraryPool.forEach(m => {
                    [m.origin_name, m.name, m.english_name].forEach(n => {
                        const key = norm(n);
                        if (key && !poolByName.has(key)) poolByName.set(key, m);
                    });
                });

                const matched = [];
                const usedSlugs = new Set();
                for (const trendItem of results) {
                    const key = norm(trendItem.title || trendItem.name || trendItem.original_title || trendItem.original_name);
                    if (!key) continue;
                    const found = poolByName.get(key);
                    if (found && !usedSlugs.has(found.slug)) {
                        usedSlugs.add(found.slug);
                        matched.push(found);
                        if (matched.length >= limit) break;
                    }
                }
                return matched;
            },

            timeAgo: (isoStr) => {

                if (diffSec < 60) return 'Vừa xong';
                if (diffSec < 3600) return `${Math.floor(diffSec / 60)} phút trước`;
                if (diffSec < 86400) return `${Math.floor(diffSec / 3600)} giờ trước`;
                if (diffSec < 2592000) return `${Math.floor(diffSec / 86400)} ngày trước`;
                return new Date(isoStr).toLocaleDateString('vi-VN');
            },
            // THÊM MỚI: escape nội dung bài viết trước khi chèn vào innerHTML, tránh vỡ giao diện/XSS
            escapeHtml: (str) => (str || '').toString()
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;'),
            // THÊM MỚI: escape nội dung rồi biến các link (http/https/www) thành thẻ <a> bấm được,
            // dùng cho nội dung bài viết ở Bảng Tin để tương tác được (vd. admin dán link phim/khuyến mãi)
            linkifyHtml: (str) => {
                const escaped = Utils.escapeHtml(str);
                return escaped.replace(/(https?:\/\/[^\s<]+|www\.[^\s<]+)/gi, (match) => {
                    const href = match.startsWith('http') ? match : `https://${match}`;
                    return `<a href="${href}" target="_blank" rel="noopener noreferrer nofollow" onclick="event.stopPropagation()" class="text-primary underline decoration-primary/50 hover:decoration-primary break-all">${match}</a>`;
                });
            },

        async function fetchWithTimeout(url, ms = CONFIG.FETCH_TIMEOUT_MS) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), ms);
            try {
                const res = await fetch(url, { signal: controller.signal });
                if (!res.ok) throw new Error(`HTTP ${res.status} - ${url}`);
                const data = await res.json();
                if (!data) throw new Error(`Empty body - ${url}`);
                return data;
            } finally {
                clearTimeout(timer);
            }
        }

        async function fetchRace(urls, ms = CONFIG.FETCH_TIMEOUT_MS) {
            const list = urls.filter(Boolean);
            if (list.length === 0) return null;
            try {
                return await Promise.any(list.map(u => fetchWithTimeout(u, ms)));
            } catch (e) {
                return null; 
            }
        }

        async function fetchViaProxyThenDirect(proxyBase, directBase, endpoint) {
            return await fetchRace([
                proxyBase ? `${proxyBase}${endpoint}` : null,
                directBase ? `${directBase}${endpoint}` : null,
            ]);
        }

        const API = {
            fetchJSON: async (endpoint) => { try { return await fetchViaProxyThenDirect(CONFIG.API_BASE_PROXY, CONFIG.API_BASE, endpoint); } catch(e) { return null; } },
            fetchKKPhim: async (slug) => { try { return await fetchViaProxyThenDirect(CONFIG.API_KK_PROXY, CONFIG.API_KK, `/phim/${slug}`); } catch(e) { return null; } },

            // Tra KKPhim trực tiếp bằng TMDB ID đã biết (chính xác hơn dò theo tên khi đổi server).
            fetchKKPhimByTmdb: async (tmdbId, type) => {
                try { return await fetchViaProxyThenDirect(CONFIG.API_KK_PROXY, CONFIG.API_KK, `/tmdb/${type}/${tmdbId}`); } catch(e) { return null; }
            },
            getAppData: async () => {
                try {
                    const cached = JSON.parse(localStorage.getItem('ktuong_appdata') || 'null');
                    if (cached && Array.isArray(cached.genres) && Array.isArray(cached.countries) && (Date.now() - cached.ts) < 24 * 60 * 60 * 1000) {
                        AppState.genres = cached.genres; AppState.countries = cached.countries;

                    }
                } catch (e) {}

                const [g, c] = await Promise.all([API.fetchJSON('/the-loai'), API.fetchJSON('/quoc-gia')]);
                if (g) AppState.genres = g; if (c) AppState.countries = c;
                try { localStorage.setItem('ktuong_appdata', JSON.stringify({ ts: Date.now(), genres: AppState.genres, countries: AppState.countries })); } catch (e) {}
            },
            getMovieDetails: async (slug) => API.fetchJSON(`/phim/${slug}`),
            
            _normKey: (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, '').trim(),

            _buildMovieSignature: (movie) => {
                const title = API._normKey(movie.english_name) || API._normKey(movie.origin_name) || API._normKey(movie.name);
                const year = movie.year ? String(movie.year).trim() : '';
                const countries = (movie.country || []).map(c => c && c.slug).filter(Boolean).sort().join(',');
                return `${title}|${year}|${countries}`;
            },

            search: async (kw, limit=30) => {
                let finalResults = []; 
                let seenSlugs = new Set();

                const addMovie = (movie, provider) => {
                    if (!movie || !movie.slug) return;
                    const slugKey = movie.slug.trim().toLowerCase();
                    if (seenSlugs.has(`${provider}_${slugKey}`)) return; 
                    seenSlugs.add(`${provider}_${slugKey}`);

                    movie.sourceProvider = provider;
                    const existing = finalResults.find(m => Utils.checkMovieIdentity(m, movie));

                    if (existing) {
                        existing.altSlug = movie.slug;
                        existing.altProvider = provider;
                        if (!existing.thumb_url && movie.thumb_url) existing.thumb_url = movie.thumb_url;
                        if (!existing.poster_url && movie.poster_url) existing.poster_url = movie.poster_url;
                    } else {
                        finalResults.push(movie);
                    }
                };

                const [ophimSettled, kkSettled] = await Promise.allSettled([
                    API.fetchJSON(`/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=${limit}`),
                    fetchViaProxyThenDirect(CONFIG.API_KK_PROXY, CONFIG.API_KK, `/v1/api/tim-kiem?keyword=${encodeURIComponent(kw)}&limit=${limit}`)
                ]);

                if (ophimSettled.status === 'fulfilled') {
                    const ophimRes = ophimSettled.value;
                    if (ophimRes && ophimRes.data && ophimRes.data.items) {
                        ophimRes.data.items.forEach(movie => addMovie(movie, 'OP'));
                    }
                }

                if (kkSettled.status === 'fulfilled') {
                    const kkRes = kkSettled.value;
                    if (kkRes && kkRes.data && kkRes.data.items) {
                        kkRes.data.items.forEach(movie => addMovie(movie, 'KK'));
                    }
                }

                return { data: { items: finalResults } };
            },
            getList: async (type, slug, limit=24) => {
                let ep = ['phim-bo', 'phim-le', 'tv-shows', 'hoat-hinh', 'phim-moi-cap-nhat'].includes(slug) ? `/v1/api/danh-sach/${slug}?limit=${limit}` : `/v1/api/${type}/${slug}?limit=${limit}`;
                return API.fetchJSON(ep);
            }
        };

        const TMDB = {
            fetchJSON: async (endpoint, lang = 'vi-VN') => {
                try {
                    const glue = endpoint.includes('?') ? '&' : '?';
                    const url = `${CONFIG.TMDB_BASE}${endpoint}${lang ? glue + 'language=' + lang : ''}`;
                    const res = await fetch(url);
                    if (res.ok) return await res.json();
                    
                    if (lang === 'vi-VN') {
                        const fallbackLang = 'en-US';
                        const fbRes = await fetch(`${CONFIG.TMDB_BASE}${endpoint}${glue}language=${fallbackLang}`);
                        if (fbRes.ok) return await fbRes.json();
                    }
                    return null;
                } catch (e) { return null; }
            },

            searchMovie: async (query, year, countrySlug = null, expectedType = null, altQuery = null, excludeIds = null, altQuery2 = null) => {
                if (!query) return null;
                const sanitize = (str) => str.replace(/\(.*?\)/g, '').replace(/\[.*?\]/g, '').replace(/(Phim|Bộ|Lẻ|Thuyết Minh|Vietsub|Trọn Bộ|SS\d+|Phần\s+\d+|Season\s+\d+)/gi, '').replace(/[:\-–]/g, ' ').replace(/\s+/g, ' ').trim();
                const normCmp = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]/g, '');
                
                const getSimilarity = (s1, s2) => {
                    const n1 = normCmp(s1), n2 = normCmp(s2);
                    if (!n1 || !n2) return 0;
                    if (n1 === n2) return 1.0;

                    // FIX: Tên ngắn/chung chung bị "chứa" trong tên khác không có nghĩa là cùng một phim.
                    // Trước đây cứ n1 chứa n2 (hoặc ngược lại) là cho điểm tin cậy 0.85 cố định, dẫn đến các
                    // phim có tên trùng một phần (vd tên rất ngắn) bị nhận nhầm sang phim hoàn toàn khác.
                    // Giờ đây điểm số tỉ lệ theo độ dài chuỗi ngắn hơn so với chuỗi dài hơn, và chuỗi quá ngắn
                    // (dưới 4 ký tự sau khi chuẩn hoá) sẽ không được tính là trùng khớp qua kiểu "chứa nhau".
                    if (n1.includes(n2) || n2.includes(n1)) {
                        const shorter = n1.length <= n2.length ? n1 : n2;
                        const longer = n1.length <= n2.length ? n2 : n1;
                        if (shorter.length < 4) return 0;
                        return 0.6 + 0.35 * (shorter.length / longer.length);
                    }
                    
                    const getBigrams = (str) => {
                        const bigrams = new Set();
                        for (let i = 0; i < str.length - 1; i++) bigrams.add(str.substr(i, 2));
                        return bigrams;
                    };
                    const b1 = getBigrams(n1), b2 = getBigrams(n2);
                    let intersection = 0;
                    b1.forEach(bg => { if (b2.has(bg)) intersection++; });
                    return (2.0 * intersection) / (b1.size + b2.size);
                };

                // FIX: Xây danh sách tên theo đúng thứ tự ưu tiên "đa số phim đều có tên quốc tế/tiếng Anh":
                // 1) Tên tiếng Anh / quốc tế (query) -> 2) Tên gốc (altQuery) -> 3) Tên tiếng Việt (altQuery2, fallback cuối).
                // Mỗi tầng được tìm kiếm TRƯỚC KHI chuyển sang tầng tiếp theo, thay vì trộn lẫn điểm số của cả 3 tên
                // trong cùng một lượt như trước đây (nguyên nhân khiến tên tiếng Việt đôi khi "thắng" nhầm tên quốc tế).
                let cleanQuery = sanitize(query);
                const queryCandidates = [];
                const seenNorms = new Set();
                const pushCandidate = (text, priority) => {
                    if (!text || !text.trim()) return;
                    const clean = sanitize(text);
                    const norm = normCmp(clean);
                    if (!clean || !norm || seenNorms.has(norm)) return;
                    seenNorms.add(norm);
                    queryCandidates.push({ text: clean, priority });
                };
                pushCandidate(query, 2);
                pushCandidate(altQuery, 1);
                pushCandidate(altQuery2, 0);

                const MIN_CONFIDENT_SCORE = 60; 
                let bestMatch = null, highestScore = -1;

                for (const candidate of queryCandidates) {
                    const candidateQuery = candidate.text;
                    let data = await TMDB.fetchJSON(`/search/multi?query=${encodeURIComponent(candidateQuery)}`, 'en-US');
                    
                    if (!data || !data.results || data.results.length === 0) {
                        const shortQuery = candidateQuery.split(/\s+\d+/)[0].trim();
                        if (shortQuery && shortQuery !== candidateQuery) {
                            data = await TMDB.fetchJSON(`/search/multi?query=${encodeURIComponent(shortQuery)}`, 'en-US');
                        }
                    }
                    
                    if (!data || !data.results || data.results.length === 0) continue;

                    for (const item of data.results) {
                        if (item.media_type !== 'movie' && item.media_type !== 'tv') continue;
                        if (excludeIds && excludeIds.has(item.id)) continue;

                        const tmdbTitle = item.title || item.name || '';
                        const tmdbOriginalTitle = item.original_title || item.original_name || '';
                        
                        const searchNorm = normCmp(candidateQuery);
                        const queryIsOriginalName = candidateQuery === cleanQuery;

                        const simOriginal = getSimilarity(candidateQuery, tmdbOriginalTitle);
                        const simTranslated = getSimilarity(candidateQuery, tmdbTitle);
                        const maxSim = Math.max(simOriginal, simTranslated);
                        
                        // Ngưỡng tối thiểu nâng từ 0.4 lên 0.5 để giảm các khớp mơ hồ giữa các tên phim khác nhau
                        if (maxSim < 0.5) continue; 

                        const releaseDate = item.release_date || item.first_air_date || '';
                        const itemYear = releaseDate ? parseInt(releaseDate.slice(0, 4), 10) : null;
                        const expectedYear = year ? parseInt(year, 10) : null;

                        let yearBonus = 0, yearConfirmed = false;
                        if (expectedYear && itemYear) {
                            const yearDiff = Math.abs(expectedYear - itemYear);
                            if (yearDiff === 0) { yearBonus = 60; yearConfirmed = true; }
                            else if (yearDiff === 1) { yearBonus = 10; }
                            else continue; // Loại ngay lập tức nếu lệch năm quá xa
                        }

                        const expectedLang = countrySlug ? COUNTRY_LANG_MAP[countrySlug] : null;
                        let langBonus = 0, langConfirmed = false;
                        if (expectedLang && item.original_language) {
                            if (item.original_language === expectedLang) { langBonus = 50; langConfirmed = true; }
                            else continue; 
                        }

                        // FIX: Nếu tên chỉ khớp ở mức mơ hồ (chưa phải gần như chắc chắn) và không có năm hoặc
                        // ngôn ngữ gốc nào xác nhận thêm, từ chối luôn thay vì liều chấp nhận — đây chính là kiểu
                        // sai lệch đã khiến các phim trùng tên/gần giống tên trả về nhầm poster và thông tin.
                        if (maxSim < 0.75 && !yearConfirmed && !langConfirmed) continue;

                        let score = maxSim * 100;
                        score += candidate.priority * 6; // Ưu tiên nhẹ cho kết quả tìm được qua tên tiếng Anh/gốc

                        if (queryIsOriginalName && normCmp(tmdbOriginalTitle) === searchNorm) {
                            score += 50; 
                        }

                        score += yearBonus + langBonus;

                        if (expectedType) {
                            const tmdbType = item.media_type === 'movie' ? 'single' : 'series';
                            if (tmdbType === expectedType) score += 20;
                            else score -= 40;
                        }

                        score += (item.vote_count ? Math.min(item.vote_count / 150, 10) : 0);

                        if (score > highestScore) { 
                            highestScore = score; 
                            bestMatch = item; 
                        }
                    }
                    if (highestScore >= MIN_CONFIDENT_SCORE) break;
                }
                
                if (bestMatch) {
                    bestMatch.source_api = "TMDB";
                    bestMatch.resolved_id = bestMatch.id;
                    bestMatch.target_slug = query;
                }
                return (bestMatch && highestScore >= MIN_CONFIDENT_SCORE) ? bestMatch : null;
            },

            getMovieFull: async (tmdbId, mediaType = 'movie') => TMDB.fetchJSON(`/${mediaType}/${tmdbId}?append_to_response=credits,videos,images&include_image_language=vi,en,null`),
            getBasic: async (tmdbId, mediaType = 'movie') => TMDB.fetchJSON(`/${mediaType}/${tmdbId}`),

            // Bản có cache của getBasic(): dùng khi movieObj.tmdb.id đã có sẵn từ API nguồn.
            // Cache theo mediaType_tmdbId để nhiều phim khác nhau (hoặc cùng phim resolve nhiều lần
            // trong 1 phiên) không phải gọi lại proxy cho cùng 1 ID.
            getBasicCached: async (tmdbId, mediaType = 'movie') => {
                const key = `${mediaType}_${tmdbId}`;
                if (AppState.tmdbBasicCache.has(key)) return AppState.tmdbBasicCache.get(key);
                const basic = await TMDB.getBasic(tmdbId, mediaType);
                AppState.tmdbBasicCache.set(key, basic);
                return basic;
            },

            // FIX: Điểm vào duy nhất để xác định 1 phim tương ứng với entry nào trên TMDB.
            // Ưu tiên tuyệt đối: nếu chính API nguồn phim (Ophim/KKPhim) đã đính kèm sẵn ID TMDB
            // (field `tmdb.id`) thì dùng thẳng ID đó — chính xác 100%, không cần đoán qua tên nữa.
            // Đây là lý do chính khiến phim trùng tên trước đây hay bị trả sai poster/thông tin.
            // Chỉ khi không có sẵn ID mới rơi xuống phương án dò tên: tiếng Anh/quốc tế trước, rồi đến
            // tên gốc, và tên tiếng Việt là fallback cuối cùng.
            //
            // TỐI ƯU: kết quả được cache theo slug+năm+provider trong AppState.resolveMatchCache, dùng
            // chung giữa TMDBEnhancer.processQueue (poster thẻ phim), AppHandlers.loadTmdbExtras (trang
            // xem phim) và Utils.verifyCrossServerMatch/findBestMatchAsync (đổi server, tìm kiếm) — mở
            // trang chi tiết sau khi đã thấy thẻ phim sẽ không phải dò lại TMDB từ đầu. Cache chỉ áp dụng
            // khi không truyền excludeIds, vì excludeIds làm thay đổi kết quả tuỳ theo ngữ cảnh gọi.
            resolveMatch: async (movieObj, excludeIds = null) => {
                if (!movieObj) return null;
                const cacheKey = (!excludeIds && movieObj.slug)
                    ? `${movieObj.sourceProvider || 'OP'}_${movieObj.slug}_${movieObj.year || ''}`
                    : null;

                if (cacheKey && AppState.resolveMatchCache.has(cacheKey)) {
                    return AppState.resolveMatchCache.get(cacheKey);
                }

                const store = (result) => {
                    if (cacheKey) AppState.resolveMatchCache.set(cacheKey, result);
                    return result;
                };

                if (movieObj.tmdb && movieObj.tmdb.id && !excludeIds) {
                    const mediaType = movieObj.tmdb.type === 'tv' ? 'tv' : 'movie';
                    try {
                        const basic = await TMDB.getBasicCached(movieObj.tmdb.id, mediaType);
                        if (basic && basic.id) {
                            basic.media_type = mediaType;
                            basic.source_api = 'TMDB';
                            basic.resolved_id = movieObj.tmdb.id;
                            return store(basic);
                        }
                    } catch (e) { /* rơi xuống phương án dò tên bên dưới */ }
                }

                const englishName = movieObj.english_name || null;
                const originName = movieObj.origin_name || null;
                const vietName = movieObj.name || null;
                const primary = englishName || originName || vietName;
                if (!primary) return store(null);
                const secondary = englishName ? originName : null;

                const result = await TMDB.searchMovie(primary, movieObj.year, movieObj.country?.[0]?.slug || null, movieObj.type || null, secondary, excludeIds, vietName);
                return store(result);
            },
            fetchJSONWithFallback: async (endpoint, textFields = []) => {
                const viData = await TMDB.fetchJSON(endpoint, 'vi-VN');
                if (!viData) return null;
                const missing = textFields.some(f => !viData[f]);
                if (missing) {
                    const enData = await TMDB.fetchJSON(endpoint, 'en-US');
                    if (enData) {
                        textFields.forEach(f => { if (!viData[f] && enData[f]) viData[f] = enData[f]; });
                    }
                }
                return viData;
            },
            getPerson: async (personId) => TMDB.fetchJSONWithFallback(`/person/${personId}`, ['biography']),
            getPersonCredits: async (personId) => TMDB.fetchJSON(`/person/${personId}/combined_credits`),
            searchPerson: async (query) => TMDB.fetchJSON(`/search/person?query=${encodeURIComponent(query)}`),
            getTrending: async (mediaType = 'all', window = 'day') => TMDB.fetchJSON(`/trending/${mediaType}/${window}`)
        };

        // ================= GEMINI (AI: tìm kiếm thông minh, gợi ý phim liên quan/cá nhân hoá) =================
        // Toàn bộ gọi đều qua Worker (CONFIG.GEMINI_PROXY) để giữ API key an toàn phía server.
        // Nguyên tắc an toàn: Gemini KHÔNG được tự "sáng tác" ra phim — nó chỉ được chọn/xếp hạng
        // trong danh sách slug đã có thật từ OPhim/KKPhim (candidates), hoặc chỉ trả về từ khóa/thể loại
        // để code tự gọi API thật. Nếu Gemini lỗi hoặc quá tải, mọi tính năng đều fallback êm về cách cũ.
        const Gemini = {
            _call: async (payload, timeoutMs = 9000) => {
                try {
                    const controller = new AbortController();
                    const timer = setTimeout(() => controller.abort(), timeoutMs);
                    const res = await fetch(CONFIG.GEMINI_PROXY, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload),
                        signal: controller.signal
                    });
                    clearTimeout(timer);
                    if (!res.ok) return null;
                    const data = await res.json();
                    return data?.success ? data.result : null;
                } catch (e) { return null; }
            },

            // Xếp hạng lại danh sách ứng viên (đã có thật) theo mức độ liên quan với phim đang xem.
            // Trả về mảng slug đã sắp xếp, hoặc null nếu AI lỗi (chỗ gọi sẽ tự fallback).
            rerankRelated: async (movie, candidates) => {
                const payload = {
                    task: 'related',
                    movie: {
                        name: movie.name, origin_name: movie.origin_name, year: movie.year,
                        genres: (movie.category || []).map(c => c.name).filter(Boolean),
                        description: (movie.content || movie.description || '').replace(/<[^>]*>/g, '').slice(0, 500)
                    },
                    candidates: candidates.map(c => ({
                        slug: c.slug, name: c.name, origin_name: c.origin_name, year: c.year,
                        genres: (c.category || []).map(g => g.name).filter(Boolean)
                    }))
                };
                const result = await Gemini._call(payload);
                return (result && Array.isArray(result.slugs)) ? result.slugs : null;
            },

            // Phân tích câu tìm kiếm tự nhiên -> trả về từ khóa + thể loại gợi ý để code tự search thật.
            parseSearchQuery: async (query) => {
                const result = await Gemini._call({ task: 'search', query, genreList: GENRE_LIST });
                if (!result) return null;
                return {
                    keywords: Array.isArray(result.keywords) ? result.keywords.slice(0, 3) : [],
                    genreSlugs: Array.isArray(result.genreSlugs) ? result.genreSlugs.slice(0, 3) : []
                };
            },

            // Từ lịch sử xem -> trả về các slug thể loại phù hợp gu người dùng.
            profileGenresFromHistory: async (watchedList) => {
                const result = await Gemini._call({ task: 'foryou', watched: watchedList, genreList: GENRE_LIST });
                return (result && Array.isArray(result.genreSlugs)) ? result.genreSlugs.slice(0, 4) : null;
            }
        };

        const TMDBEnhancer = {
            queue: new Map(),
            isProcessing: false,
            
            enqueue: (m, imgId, type = 'poster') => {
                if (!m || !m.slug || (!m.name && !m.origin_name)) return;
                
                // FIX 2: Thêm m.year vào khóa Cache để phân tách hoàn toàn 2 phim cùng slug nhưng khác năm
                const cacheKey = `${m.sourceProvider || 'OP'}_${m.slug}_${m.year || ''}`;
                if (AppState.cardPosterCache.has(cacheKey)) {
                    const cached = AppState.cardPosterCache.get(cacheKey);
                    if (cached) TMDBEnhancer.applyImage(cached, imgId, type);
                    return;
                }

                if (!TMDBEnhancer.queue.has(cacheKey)) {
                    TMDBEnhancer.queue.set(cacheKey, { movie: m, imgIds: [{id: imgId, type: type}] });
                } else {
                    TMDBEnhancer.queue.get(cacheKey).imgIds.push({id: imgId, type: type});
                }
                TMDBEnhancer.processQueue();
            },

            applyImage: (tmdbData, imgId, type) => {
                const el = document.getElementById(imgId);
                if (!el) return;
                
                let targetPath = null;
                if (type === 'poster' && tmdbData.poster_path) targetPath = `${CONFIG.TMDB_IMG}${tmdbData.poster_path}`;
                else if (type === 'backdrop' && tmdbData.backdrop_path) targetPath = `${CONFIG.TMDB_IMG_ORIGINAL}${tmdbData.backdrop_path}`;
                else if (type === 'backdrop' && tmdbData.poster_path) targetPath = `${CONFIG.TMDB_IMG}${tmdbData.poster_path}`; 
                
                if (targetPath) {
                    const tempImg = new Image();
                    tempImg.onload = () => { el.src = targetPath; };
                    tempImg.src = targetPath;
                }
            },

            processQueue: async () => {
                if (TMDBEnhancer.isProcessing || TMDBEnhancer.queue.size === 0) return;
                TMDBEnhancer.isProcessing = true;

                const entries = Array.from(TMDBEnhancer.queue.entries()).slice(0, 8);
                entries.forEach(([key]) => TMDBEnhancer.queue.delete(key));

                await Promise.allSettled(entries.map(async ([cacheKey, data]) => {
                    const m = data.movie;

                    const match = await TMDB.resolveMatch(m);
                    const isDirectId = !!(match && match.resolved_id && m.tmdb && m.tmdb.id && String(match.resolved_id) === String(m.tmdb.id));

                    const matchYear = match ? (match.release_date || match.first_air_date || '').slice(0, 4) : null;
                    const yearOk = isDirectId || !m.year || !matchYear || String(m.year) === matchYear;
                    const typeOk = isDirectId || !m.type || !match.media_type || ((m.type === 'single' ? 'movie' : 'tv') === match.media_type);
                    const isConfident = !!(match && yearOk && typeOk);

                    AppState.cardPosterCache.set(cacheKey, isConfident ? match : null);
                    if (isConfident) {
                        data.imgIds.forEach(item => TMDBEnhancer.applyImage(match, item.id, item.type));
                    }
                }));

                TMDBEnhancer.isProcessing = false;
                if (TMDBEnhancer.queue.size > 0) {
                    setTimeout(TMDBEnhancer.processQueue, 300); 
                }
            }
        };

        const Render = {
            movieCard: (m, badgeStr, rank = null) => {
                let badge = badgeStr || (m.episode_current ? m.episode_current : '');

                // TRẢ LẠI BG-PRIMARY CHO #RANK THEO YÊU CẦU: Rõ ràng, dễ đọc đúng bản gốc
                const rankHtml = rank ? `<div class="absolute -top-2 -right-2 bg-primary text-black font-black w-7 h-7 rounded-full flex items-center justify-center border-2 border-surface z-20 text-xs shadow-lg">#${rank}</div>` : '';
                const source = m.sourceProvider || 'OP';

                const imgId = `card-img-${m.slug}-${Math.random().toString(36).substring(2,7)}`;
                setTimeout(() => TMDBEnhancer.enqueue(m, imgId, 'poster'), 0);

                return `
                <div class="group cursor-pointer flex flex-col h-full shrink-0 w-32 md:w-40 snap-start relative" onclick="AppHandlers.goToWatch('${m.slug}', '${source}', '${m.altSlug || ''}', '${m.altProvider || ''}')">
                    ${rankHtml}
                    <div class="relative aspect-[2/3] rounded-xl overflow-hidden bg-surface mb-2.5 border border-white/5 shadow-sm">
                        <img id="${imgId}" src="${Utils.getSafeImage(m, source, m.thumb_url || m.poster_url)}" loading="lazy" decoding="async" onload="this.classList.remove('opacity-0')" class="w-full h-full object-cover transition-all duration-500 opacity-0 group-hover:scale-105" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=No+Poster'"/>
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="w-10 h-10 liquid-glass-accent text-black rounded-full flex items-center justify-center shadow-lg"><svg width="18" height="18" fill="currentColor" class="ml-0.5"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                        </div>
                        ${badge ? `<div class="absolute top-1.5 left-1.5 max-w-[90%]"><span class="bg-primary/90 backdrop-blur text-black text-[10px] font-bold px-1.5 py-0.5 rounded block truncate">${badge}</span></div>` : ''}
                    </div>
                    <h3 class="font-bold text-[13px] md:text-sm text-text line-clamp-1 group-hover:text-primary transition-colors">${m.name}</h3>
                </div>`;
            },

            topNetflixCard: (m, index, isGrid = false) => {
                const num = index + 1; const isDouble = num >= 10;
                const badge = m.episode_current ? m.episode_current : '';

                const imgId = `top-img-${m.slug}-${Math.random().toString(36).substring(2,7)}`;
                setTimeout(() => TMDBEnhancer.enqueue(m, imgId, 'poster'), 0);

                return `
                <div class="group cursor-pointer flex flex-col h-full shrink-0 relative ${isGrid ? 'w-full' : 'w-44 md:w-52 snap-start'}" onclick="AppHandlers.goToWatch('${m.slug}', '${source}', '${m.altSlug || ''}', '${m.altProvider || ''}')">
                    <div class="flex items-end mb-2.5 w-full relative">
                        <div class="netflix-number ${isDouble ? 'double-digit' : ''} transition-transform duration-500 group-hover:-translate-y-1">${num}</div>

                            <img id="${imgId}" src="${Utils.getSafeImage(m, source, m.thumb_url || m.poster_url)}" loading="lazy" decoding="async" onload="this.classList.remove('opacity-0')" class="w-full h-full object-cover opacity-0 transition-opacity duration-500" onerror="this.src='https://placehold.co/300x450/1c1f2e/94a3b8?text=Loi+Anh'"/>
                            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <div class="w-12 h-12 liquid-glass-accent text-black rounded-full flex items-center justify-center shadow-lg transform scale-90 group-hover:scale-100 transition-transform"><svg width="22" height="22" fill="currentColor" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
                            </div>
                            ${badge ? `<div class="absolute top-2 right-2 max-w-[90%]"><span class="liquid-glass text-white border border-white/20 text-[10px] font-bold px-2 py-1 rounded-md block truncate">${badge}</span></div>` : ''}
                        </div>
                    </div>
                    <div class="pl-4 md:pl-6">
                        <h3 class="font-bold text-sm text-text line-clamp-1 group-hover:text-primary transition-colors z-10 drop-shadow-md">${m.name}</h3>
                        <div id="trend-${m.slug}" class="mt-1 z-10"></div>
                    </div>
                </div>`;
            },

            topHorizontalRow: (title, items) => {
                if (!items || !items.length) return '';
                return `
                <section class="px-4 md:px-6 mt-2 mb-4 relative">
                    <div class="flex justify-between items-center mb-6 relative z-20">
                        <h2 class="text-2xl md:text-3xl font-black text-white tracking-tight drop-shadow-lg">${title} <span class="text-primary">#10</span></h2>
                        <button onclick="AppHandlers.loadTop50()" class="text-sm font-bold text-primary hover:text-white transition-colors flex items-center gap-1 bg-white/5 hover:bg-white/10 px-3 py-1.5 rounded-full border border-white/10">Xem Top 50 <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5l7 7-7 7"></path></svg></button>
                    </div>
                    <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-6 pt-2 snap-x snap-mandatory relative z-10">
                        ${items.map((m, i) => Render.topNetflixCard(m, i)).join('')}
                    </div>
                </section>`;
            },
            
            horizontalRow: (title, items, type, slug, isRanked = false) => {
                if (!items || !items.length) return '';
                // type/slug rỗng (vd dòng "Thịnh hành toàn cầu" ghép từ nhiều nguồn) => không có trang
                // "Xem tất cả" tương ứng, ẩn luôn nút thay vì trỏ nhầm sang danh sách khác.
                const hasViewAll = !!type && !!slug;
                const viewAllAction = slug === 'recent' ? `onclick="AppHandlers.navigate('history')"` : (hasViewAll ? `onclick="AppHandlers.loadList('${type}', '${slug}', '${title}')"` : '');
                const viewAllBtn = (hasViewAll || slug === 'recent') ? `<button ${viewAllAction} class="text-sm font-medium text-muted hover:text-primary transition-colors">Xem tất cả</button>` : '';
                return `
                <section class="px-4 md:px-6 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight">${title} <svg class="inline w-5 h-5 text-primary -mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg></h2>
                        ${viewAllBtn}
                    </div>
                    <div class="flex overflow-x-auto hide-scrollbar gap-3 md:gap-4 pb-4 snap-x snap-mandatory pt-2">
                        ${items.map((m, i) => Render.movieCard(m, '', isRanked ? (i + 1) : null)).join('')}
                    </div>
                </section>`;
            },

            // THÊM MỚI: giống horizontalRow nhưng cho phép truyền sẵn HTML nút "Xem thêm" tùy ý
            // (dùng cho dòng "Thịnh Hành Toàn Cầu (TMDB)" vốn không có type/slug tương ứng để trỏ
            // sang AppHandlers.loadList, nên cần trỏ sang trang "Xem thêm" thịnh hành riêng).
            horizontalRowCustom: (title, items, isRanked = false, viewAllBtnHtml = '') => {
                if (!items || !items.length) return '';
                return `
                <section class="px-4 md:px-6 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight">${title} <svg class="inline w-5 h-5 text-primary -mt-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path></svg></h2>
                        ${viewAllBtnHtml}
                    </div>
                    <div class="flex overflow-x-auto hide-scrollbar gap-3 md:gap-4 pb-4 snap-x snap-mandatory pt-2">
                        ${items.map((m, i) => Render.movieCard(m, '', isRanked ? (i + 1) : null)).join('')}
                    </div>
                </section>`;
            },

            // THÊM MỚI: section "Diễn Viên Yêu Thích" do admin quản lý qua control panel riêng (GET /actors),
            // dựng carousel ngang các thẻ diễn viên (ảnh tròn + tên + bio rút gọn), bấm vào mở trang diễn viên
            // nếu khớp được tmdbId (dùng lại đúng luồng AppHandlers.openActorDetail đang có sẵn).
            favoriteActorsSection: (items) => {

                        <div class="w-20 h-20 md:w-24 md:h-24 rounded-full overflow-hidden mb-2.5 border border-white/10 ${clickable ? 'group-hover:border-primary/50' : ''} transition shadow-sm bg-surface">
                            <img src="${photo}" loading="lazy" decoding="async" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/300x300/1c1f2e/94a3b8?text=No+Photo'"/>

                        <h3 class="font-bold text-[13px] text-text line-clamp-1 ${clickable ? 'group-hover:text-primary' : ''} transition-colors">${name}</h3>
                        ${bio ? `<p class="text-[11px] text-muted line-clamp-2 mt-1">${bio}</p>` : ''}

                <section class="px-4 md:px-6 mt-4">

                <section class="px-4 md:px-6 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-xl md:text-2xl font-bold text-white tracking-tight">📢 Bảng Tin</h2>
                    </div>
                    <div class="max-w-xl mx-auto md:mx-0 flex flex-col divide-y divide-white/10 border border-white/10 rounded-2xl bg-surface/40 overflow-hidden">
                        ${items.slice(0, 20).map(p => `
                        <article class="p-4 flex gap-3">
                            <img src="${authorAvatar}" class="w-9 h-9 rounded-full object-cover border border-white/10 shrink-0" onerror="this.src='https://placehold.co/64x64/1c1f2e/94a3b8?text=${authorName.charAt(0)}'">
                            <div class="min-w-0 flex-1">

                                <div class="flex items-center gap-5 mt-3 text-muted">
                                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg>

            },

            // ================= THÊM MỚI: Render cho khu vực Admin =================
            adminLoginBox: () => `
                <div class="max-w-sm mx-auto mt-6 md:mt-10 bg-surface/60 border border-white/10 rounded-2xl p-6">
                    <h2 class="text-xl font-bold text-white mb-1">Đăng nhập Admin</h2>
                    <p class="text-sm text-muted mb-5">Nhập mật khẩu quản trị để quản lý phim đề xuất và bài viết.</p>
                    <input type="password" id="admin-password-input" placeholder="Mật khẩu" autocomplete="current-password" class="w-full bg-black/30 border border-white/10 rounded-xl px-4 py-3 text-white mb-2 focus:outline-none focus:border-primary/50" onkeydown="if(event.key==='Enter'){event.preventDefault(); AppHandlers.adminLogin();}">
                    <p id="admin-login-error" class="text-red-400 text-xs mb-3 hidden"></p>
                    <button id="admin-login-btn" onclick="AppHandlers.adminLogin()" class="w-full bg-primary text-black font-bold py-3 rounded-xl hover:bg-primary-dark transition">Đăng nhập</button>
                </div>`,

            adminDashboard: () => `
                <div class="max-w-4xl mx-auto">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-2xl font-bold text-white">Quản Trị</h2>
                        <button onclick="AppHandlers.adminLogout()" class="text-sm text-muted hover:text-red-400 transition">Đăng xuất</button>
                    </div>
                    <div class="flex gap-1 mb-6 border-b border-white/10 overflow-x-auto hide-scrollbar">
                        <button id="admin-tab-btn-recommended" onclick="AppHandlers.adminSwitchTab('recommended')" class="shrink-0 flex items-center gap-1.5 px-4 py-2.5 text-sm font-semibold border-b-2 transition ${AppState.adminActiveTab === 'recommended' ? 'border-primary text-primary' : 'border-transparent text-muted hover:text-white'}">
                            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 2l2.9 6.26L21.8 9l-5 4.87L18.2 21 12 17.27 5.8 21l1.4-7.13-5-4.87 6.9-.74L12 2z"></path></svg>

            // THÊM MỚI: thẻ phim dùng riêng cho chế độ "Chọn nhiều" ở trang Lịch sử/Yêu thích.

                const badge = badgeStr || (m.episode_current ? m.episode_current : '');
                const isSelected = AppState.historySelectedSlugs.has(m.slug);
                const source = m.sourceProvider || 'OP';
                const imgId = `sel-img-${m.slug}-${Math.random().toString(36).substring(2,7)}`;

                        <div class="flex-1 text-center md:text-left">
                            <h1 class="text-3xl sm:text-4xl font-black text-white mb-4 tracking-tight">${person.name}</h1>
                            
                            <div class="flex flex-wrap items-center justify-center md:justify-start gap-3 mb-6">
                                <button onclick="Utils.showToast('Đã thêm diễn viên vào danh sách yêu thích')" class="bg-surface hover:bg-white/5 border border-white/10 text-white font-bold text-sm px-5 py-2.5 rounded-full flex items-center gap-2 transition active:scale-95">
                                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                    Yêu thích
                                </button>
                                <button onclick="AppHandlers.shareActor('${person.name}')" class="bg-surface hover:bg-white/5 border border-white/10 text-white font-bold text-sm px-5 py-2.5 rounded-full flex items-center gap-2 transition active:scale-95">
                                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 10.742l4.636-2.318M8.684 13.258l4.636 2.318M21 12a3 3 0 11-6 0 3 3 0 016 0zm-12-6a3 3 0 11-6 0 3 3 0 016 0zm0 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    Chia sẻ
                                </button>
                            </div>

                            <div class="bg-surface rounded-2xl p-6 border border-white/5 text-sm space-y-3 shadow-inner">
                                <p><span class="text-muted font-semibold">Tên gọi khác:</span> <span class="text-white">${otherNames}</span></p>
                                <p><span class="text-muted font-semibold">Giới tính:</span> <span class="text-white">${genderStr}</span></p>
                                <p><span class="text-muted font-semibold">Ngày sinh:</span> <span class="text-white">${birthday}</span></p>
                                <p><span class="text-muted font-semibold">Nơi sinh:</span> <span class="text-white">${placeOfBirth}</span></p>

                    <div class="mb-10 bg-surface rounded-2xl p-6 border border-white/5 shadow-md">
                        <h2 class="text-lg font-bold text-white mb-3">Giới thiệu</h2>
