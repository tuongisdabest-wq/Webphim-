            // ===== "layer" liquid glass "Bảng xếp hạng trực tiếp" (nhúng thẳng trong trang chủ) =====
            switchTrendPanelTab: (tab) => {
                AppState.trendPanelActiveTab = tab;
                const hotTab = document.getElementById('tptab-hot'), favTab = document.getElementById('tptab-fav');
                if (hotTab) hotTab.classList.toggle('tab-active', tab === 'hot');
                if (hotTab) hotTab.classList.toggle('text-muted', tab !== 'hot');
                if (favTab) favTab.classList.toggle('tab-active', tab === 'fav');
                if (favTab) favTab.classList.toggle('text-muted', tab !== 'fav');
                AppHandlers.renderTrendPanelContent(tab);
            },

            // Danh sách top 5 kèm mũi tên tăng/giảm. Ưu tiên đối chiếu xu hướng ngày (day) vs tuần (week) từ TMDB
            // khi có dữ liệu khớp; nếu phim không nằm trong bảng thịnh hành toàn cầu của TMDB (trường hợp phổ biến),
            // mô phỏng tăng/giảm dựa theo điểm đánh giá TMDB so với mặt bằng chung của danh sách đang hiển thị:
            // điểm cao hơn trung bình => mũi tên tăng, thấp hơn => mũi tên giảm.
            renderTrendPanelContent: (tab) => {
                const content = document.getElementById('trend-panel-content');
                if (!content) return;
                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');

                const list = tab === 'hot'
                    ? (AppState.homeTmdbTrendingFull || []).slice(0, 5)
                    : Utils.sortByPopularity(AppState.homeLibraryPoolCache || []).slice(0, 5);

                if (!list.length) {
                    content.innerHTML = `<div class="text-center text-muted text-sm py-8">Chưa có dữ liệu, vui lòng mở lại Trang chủ để tải dữ liệu thịnh hành.</div>`;
                    return;
                }

                const dayRes = AppState.homeTrendingDataCache?.dayRes, weekRes = AppState.homeTrendingDataCache?.weekRes;
                const dayRank = new Map(), weekRank = new Map();
                (dayRes?.results || []).forEach((it, i) => dayRank.set(norm(it.title || it.name || it.original_name), i));
                (weekRes?.results || []).forEach((it, i) => weekRank.set(norm(it.title || it.name || it.original_name), i));

                const ratings = list.map(m => parseFloat(m?.tmdb?.vote_average) || 0);
                const avgRating = ratings.length ? ratings.reduce((a, b) => a + b, 0) / ratings.length : 0;

                content.innerHTML = list.map((m, idx) => {
                    const key = norm(m.origin_name || m.name);
                    const d = dayRank.has(key) ? dayRank.get(key) : null, w = weekRank.has(key) ? weekRank.get(key) : null;
                    const up = '<span class="text-green-400 text-xs font-bold">▲</span>';
                    const down = '<span class="text-red-400 text-xs font-bold">▼</span>';
                    const flat = '<span class="text-muted text-xs font-bold">▬</span>';
                    let trendIcon;
                    if (d !== null && w !== null) {
                        trendIcon = d < w ? up : (d > w ? down : flat);
                    } else if (d !== null) {
                        trendIcon = up;
                    } else {
                        const rating = parseFloat(m?.tmdb?.vote_average) || 0;
                        trendIcon = rating > avgRating + 0.15 ? up : (rating < avgRating - 0.15 ? down : flat);
                    }
                    const source = m.sourceProvider || 'OP';
                    return `
                    <div class="flex items-center gap-3 cursor-pointer hover:bg-white/5 rounded-xl p-1.5 transition" onclick="AppHandlers.goToWatch('${m.slug}', '${source}', '${m.altSlug || ''}', '${m.altProvider || ''}')">
                        <div class="flex flex-col items-center w-7 shrink-0">
                            <span class="text-lg font-black text-white/80">${idx + 1}</span>
                            ${trendIcon}
                        </div>
                        <img src="${Utils.getSafeImage(m, source, m.thumb_url || m.poster_url)}" class="w-10 h-14 object-cover rounded-lg bg-surface shrink-0" onerror="this.src='https://placehold.co/100x150/1c1f2e/94a3b8?text=No+Poster'"/>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-semibold text-white line-clamp-1">${m.name}</p>
                            <p class="text-xs text-muted line-clamp-1">${m.origin_name || ''}</p>
                        </div>
                    </div>`;
                }).join('');
            },

            goToWatch: async (slug, provider = 'OP', altSlug = '', altProvider = '') => {
                AppHandlers.navigate('watch'); 
                AppState.isPlaying = false;
                AppState.currentSourceProvider = provider; 
                
                const watchDiv = document.getElementById('view-watch'); 
                watchDiv.innerHTML = Utils.showLoading(true);

                let res = provider === 'KK' ? await API.fetchKKPhim(slug) : await API.getMovieDetails(slug);
                let finalSlug = slug;

                if (!res || !res.episodes || res.episodes.length === 0) {
                    const backupProvider = provider === 'KK' ? 'OP' : 'KK';
                    let backupSlug = (altProvider === backupProvider && altSlug) ? altSlug : null;

                    if (!backupSlug) {
                        const refKeyword = (res && res.movie) ? (res.movie.english_name || res.movie.origin_name || res.movie.name) : null;
                        if (refKeyword) {
                            const searchRes = backupProvider === 'KK'
                                ? await fetchViaProxyThenDirect(CONFIG.API_KK_PROXY, CONFIG.API_KK, `/v1/api/tim-kiem?keyword=${encodeURIComponent(refKeyword)}&limit=10`)
                                : await API.fetchJSON(`/v1/api/tim-kiem?keyword=${encodeURIComponent(refKeyword)}&limit=10`);
                            const match = searchRes?.data?.items?.length ? await Utils.findBestMatchAsync(searchRes.data.items, res.movie) : null;
                            if (match) {
                                backupSlug = match.slug;
                            }
                        }
                    }

                    if (backupSlug) {
                        res = backupProvider === 'KK' ? await API.fetchKKPhim(backupSlug) : await API.getMovieDetails(backupSlug);
                        if (res && res.episodes && res.episodes.length > 0) {
                            AppState.currentSourceProvider = backupProvider;
                            finalSlug = backupSlug;
                        }
                    }
                }

                if (res && res.episodes && res.episodes.length > 0) {
                    res.movie.sourceProvider = AppState.currentSourceProvider; 
                    if (finalSlug !== slug) res.movie.slug = finalSlug;
                    AppState.watchData = res; 
                    AppState.activeServerIdx = 0;
                    AppState.activeEpIdx = AppState.history.find(h => h.slug === slug || h.slug === finalSlug)?.last_ep_idx || 0;
                    watchDiv.innerHTML = Render.watchUI(res, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                    AppHandlers.loadSuggestions(res.movie);
                    
                    AppHandlers.loadTmdbExtras(res.movie);
                    AppHandlers.persistState();
                } else {
                    watchDiv.innerHTML = `
                    <div class="text-center p-10 text-muted flex flex-col items-center justify-center h-[50vh]">
                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-40" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                        <p class="text-lg">Không tải được dữ liệu phim từ cả hai máy chủ.</p>
                        <p class="text-sm mt-2 opacity-70 max-w-sm">Phim có thể đã bị gỡ, hoặc nhà mạng của bạn đang chặn API. Hãy thử đổi DNS/VPN rồi bấm thử lại.</p>
                        <button onclick="AppHandlers.goToWatch('${slug}', '${provider}')" class="mt-5 bg-primary text-black font-bold px-5 py-2 rounded-lg text-sm hover:bg-primary-dark transition">Thử lại</button>
                    </div>`;
                }
            },


            // Thay cho tính năng "Sửa TMDB" thủ công cũ: xoá cache đang lưu và chạy lại việc dò phim
            // tự động (đã được tối ưu ở TMDB.resolveMatch/searchMovie) để tự sửa các trường hợp lệch dữ liệu tạm thời.
            retryTmdbMatch: async () => {
                const movieObj = AppState.watchData?.movie;
                if (!movieObj) return;
                const slug = movieObj.slug;

                for (const key of AppState.tmdbCache.keys()) {
                    if (key.includes(`_${slug}_`) || key.endsWith(`_${slug}`)) AppState.tmdbCache.delete(key);
                }
                for (const key of AppState.cardPosterCache.keys()) {
                    if (key.includes(`_${slug}`)) AppState.cardPosterCache.delete(key);
                }
                // Xoá luôn cache resolveMatch dùng chung (mục 1 tối ưu), nếu không trang chi tiết sẽ
                // vẫn trả về kết quả dò cũ đã lưu từ trước khi bấm "Tải lại".
                for (const key of AppState.resolveMatchCache.keys()) {
                    if (key.includes(`_${slug}_`) || key.endsWith(`_${slug}`)) AppState.resolveMatchCache.delete(key);
                }

                Utils.showToast('Đang dò lại thông tin phim từ TMDB...');
                await AppHandlers.loadTmdbExtras(movieObj);
            },

            loadTmdbExtras: async (movieObj) => {
                AppState.tmdbRequestSeq++;
                const requestId = AppState.tmdbRequestSeq;
                const slug = movieObj.slug;
                
                if (AppState.bgSlideInterval) { clearInterval(AppState.bgSlideInterval); AppState.bgSlideInterval = null; }
                
                // FIX 4: Thêm năm vào Key bộ đệm để tránh gọi nhầm phim khác năm
                const cacheKey = `${AppState.currentSourceProvider}_${slug}_${movieObj.year || ''}`;
                let tmdbData = null;

                if (AppState.tmdbCache.has(cacheKey)) {
                    tmdbData = AppState.tmdbCache.get(cacheKey);
                } else {
                    const match = await TMDB.resolveMatch(movieObj);
                    if (match) {
                        tmdbData = await TMDB.getMovieFull(match.id, match.media_type);
                        if (tmdbData) { 
                            tmdbData.media_type = match.media_type; 
                            tmdbData.source_api = "TMDB";
                            tmdbData.resolved_id = match.id;
                            AppState.tmdbCache.set(cacheKey, tmdbData); 
                        }
                    }
                }

                if (requestId !== AppState.tmdbRequestSeq) return;

                const mainPosterEl = document.getElementById('watch-main-poster');
                if (mainPosterEl && tmdbData && tmdbData.poster_path) {
                    const newSrc = `${CONFIG.TMDB_IMG}${tmdbData.poster_path}`;
                    const tempImg = new Image();
                    tempImg.onload = () => { mainPosterEl.src = newSrc; };
                    tempImg.src = newSrc;
                }

                const tmdbOriginalName = tmdbData ? (tmdbData.original_title || tmdbData.original_name || '') : '';
                if (tmdbOriginalName) {
                    const watchOriginEl = document.getElementById('watch-origin-name');
                    if (watchOriginEl) watchOriginEl.innerText = tmdbOriginalName;
                    const infoOriginEl = document.getElementById('info-origin-name');
                    if (infoOriginEl) infoOriginEl.innerText = tmdbOriginalName;
                }

                const countryEl = document.getElementById('info-country');
                const typeEl = document.getElementById('info-type');
                const ophimCountryOk = Utils.getCountryName(movieObj);

                if (countryEl && !ophimCountryOk) {
                    const tmdbCountries = (tmdbData && Array.isArray(tmdbData.production_countries))
                        ? tmdbData.production_countries.map(c => c.name).filter(Boolean)
                        : [];
                    countryEl.innerText = tmdbCountries.length > 0 ? tmdbCountries.join(', ') : 'Đang cập nhật';
                }

                if (typeEl) {
                    let tmdbGenres = [];
                    if (tmdbData && tmdbData.genres && Array.isArray(tmdbData.genres)) {
                        tmdbGenres = tmdbData.genres.map(g => g.name).filter(Boolean);
                    }
                    
                    let ophimGenres = [];
                    if (movieObj.category && Array.isArray(movieObj.category)) {
                        ophimGenres = movieObj.category.map(c => c.name).filter(Boolean);
                    }

                    if (tmdbGenres.length > 0) {
                        typeEl.innerText = tmdbGenres.join(', ');
                    } else if (ophimGenres.length > 0) {
                        typeEl.innerText = ophimGenres.join(', ');
                    } else {
                        const fallbackType = Utils.getTypeLabel(movieObj.type);
                        typeEl.innerText = fallbackType ? fallbackType : (tmdbData ? (tmdbData.media_type === 'tv' ? 'Phim Bộ' : 'Phim Lẻ') : 'Đang cập nhật');
                    }
                }

                const tmdbScoreEl = document.getElementById('info-tmdb-score');
                const imdbScoreEl = document.getElementById('info-imdb-score');
                
                if (tmdbScoreEl && imdbScoreEl) {
                    if (tmdbData) {
                        const tmdbVal = tmdbData.vote_average ? tmdbData.vote_average.toFixed(1) : "7.2";
                        let imdbVal = "7.5";
                        if (tmdbData.vote_average) {
                            const offset = (Math.sin(tmdbData.id || 1) * 0.4); 
                            imdbVal = Math.min(10, Math.max(1, parseFloat(tmdbData.vote_average) + offset)).toFixed(1);
                        }
                        tmdbScoreEl.innerText = `${tmdbVal}/10`;
                        imdbScoreEl.innerText = `${imdbVal}/10`;
                    } else {
                        const baseScore = 7.0 + (Math.abs(movieObj.slug.charCodeAt(0) % 25) / 10);
                        tmdbScoreEl.innerText = `${baseScore.toFixed(1)}/10`;
                        imdbScoreEl.innerText = `${(baseScore + 0.3).toFixed(1)}/10`;
                    }
                }

                const heroBg = document.getElementById('watch-hero-bg');
                if (heroBg && tmdbData) {
                    let backdrops = [];
                    if (tmdbData.images && tmdbData.images.backdrops && tmdbData.images.backdrops.length > 0) {
                        const horizontalBgs = tmdbData.images.backdrops.filter(b => b.aspect_ratio > 1);
                        if(horizontalBgs.length > 0) backdrops = horizontalBgs.slice(0, 10).map(b => `${CONFIG.TMDB_IMG_ORIGINAL}${b.file_path}`);
                        else backdrops = tmdbData.images.backdrops.slice(0, 10).map(b => `${CONFIG.TMDB_IMG_ORIGINAL}${b.file_path}`);
                    } else if (tmdbData.backdrop_path) {
                        backdrops = [`${CONFIG.TMDB_IMG_ORIGINAL}${tmdbData.backdrop_path}`];
                    }

                    if (backdrops.length > 0) {
                        let currentIndex = 0;
                        const bgEl = document.getElementById('watch-hero-bg');

                        const changeBgSlide = () => {
                            if (requestId !== AppState.tmdbRequestSeq || !document.getElementById('watch-hero-bg')) {
                                if(AppState.bgSlideInterval) clearInterval(AppState.bgSlideInterval);
                                return;
                            }
                            bgEl.style.opacity = '0';
                            setTimeout(() => {
                                if (requestId !== AppState.tmdbRequestSeq || !document.getElementById('watch-hero-bg')) return;
                                bgEl.onload = () => { bgEl.classList.remove('blur-[28px]'); bgEl.style.opacity = '0.35'; };
                                bgEl.src = backdrops[currentIndex];
                                currentIndex = (currentIndex + 1) % backdrops.length;
                            }, 1000); 
                        };

                        changeBgSlide();
                        if (backdrops.length > 1) AppState.bgSlideInterval = setInterval(changeBgSlide, 7000);
                    }
                }

                const galleryTab = document.getElementById('tab-content-gallery');
                const castContainer = document.getElementById('cast-cards-container');

                if (galleryTab || castContainer) {
                    // Chuẩn hoá tên diễn viên để so khớp (bỏ dấu, viết thường, gộp khoảng trắng)
                    const normalizeActorName = (s) => (s || '')
                        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                        .replace(/đ/gi, 'd')
                        .toLowerCase().trim().replace(/\s+/g, ' ');

                    const tmdbCastRaw = (tmdbData && tmdbData.credits && Array.isArray(tmdbData.credits.cast)) ? tmdbData.credits.cast : [];
                    const tmdbCastNamesSet = new Set(tmdbCastRaw.map(a => normalizeActorName(a.name)));

                    // Diễn viên OPhim chưa có trong danh sách TMDB (so khớp tên đã chuẩn hoá, không trùng lặp)
                    const extraActorNames = [];
                    const seenExtraNorm = new Set();
                    (movieObj.actor || []).filter(n => n && n.trim()).forEach(rawName => {
                        const name = rawName.trim();
                        const norm = normalizeActorName(name);
                        if (!norm || tmdbCastNamesSet.has(norm) || seenExtraNorm.has(norm)) return;
                        seenExtraNorm.add(norm);
                        extraActorNames.push(name);
                    });

                    if (castContainer && (tmdbCastRaw.length > 0 || extraActorNames.length > 0)) {
                        castContainer.innerHTML = `<div class="col-span-full text-center py-8 flex flex-col items-center"><div class="w-8 h-8 border-4 border-surface border-t-primary rounded-full animate-spin"></div><p class="text-xs text-muted mt-3">Đang đồng bộ dữ liệu diễn viên & hình ảnh...</p></div>`;
                    }

                    // Tra 1 diễn viên qua TMDB (có cache + retry). Luôn trả về 1 kết quả — nếu lỗi/không tìm thấy
                    // vẫn giữ tên gốc OPhim kèm ảnh placeholder, không loại khỏi danh sách.
                    const fetchActorWithRetry = async (cleanName, attempt = 0) => {
                        const cacheKey = normalizeActorName(cleanName);
                        if (AppState.actorSearchCache.has(cacheKey)) return AppState.actorSearchCache.get(cacheKey);
                        try {
                            const searchRes = await TMDB.searchPerson(cleanName);
                            if (searchRes && searchRes.results && searchRes.results.length > 0) {
                                const person = searchRes.results[0];
                                const result = { id: person.id, name: person.name, profile_path: person.profile_path, character: 'Diễn viên' };
                                AppState.actorSearchCache.set(cacheKey, result);
                                return result;
                            }
                        } catch (e) {}
                        if (attempt < 2) {
                            await new Promise(r => setTimeout(r, 350 * (attempt + 1)));
                            return fetchActorWithRetry(cleanName, attempt + 1);
                        }
                        return { id: null, name: cleanName, profile_path: null, character: 'Diễn viên' };
                    };

                    // GỘP TẤT CẢ LỜI GỌI CẦN THIẾT (video, ảnh TMDB, dữ liệu gốc OPhim, dò diễn viên) VÀO 1 ĐỢT
                    // FETCH SONG SONG DUY NHẤT — chờ tất cả xong rồi mới render, không render dần theo từng nguồn.
                    const jobKeys = [];
                    const jobPromises = [];

                    if (tmdbData && tmdbData.id) {
                        jobKeys.push('videos');
                        jobPromises.push(TMDB.fetchJSON(`/${tmdbData.media_type}/${tmdbData.id}/videos`, ''));
                        jobKeys.push('images');
                        // Không kèm language/include_image_language để lấy toàn bộ ảnh, không lọc theo ngôn ngữ.
                        jobPromises.push(TMDB.fetchJSON(`/${tmdbData.media_type}/${tmdbData.id}/images`, ''));
                    }
                    if (AppState.currentSourceProvider !== 'OP') {
                        // Đang phát từ nguồn khác OPhim -> lấy thêm dữ liệu gốc OPhim (poster/thumb/trailer), best-effort.
                        jobKeys.push('ophimRaw');
                        jobPromises.push(API.getMovieDetails(slug).catch(() => null));
                    }
                    extraActorNames.forEach((name, idx) => {
                        jobKeys.push(`actor_${idx}`);
                        jobPromises.push(fetchActorWithRetry(name));
                    });

                    const jobResults = await Promise.allSettled(jobPromises);

                    // Cơ chế huỷ khi chuyển phim: nếu người dùng đã sang phim khác trong lúc chờ, bỏ toàn bộ render này.
                    if (requestId !== AppState.tmdbRequestSeq) return;

                    const resultMap = {};
                    jobKeys.forEach((k, i) => { resultMap[k] = jobResults[i]; });

                    let tmdbVideos = [];
                    if (resultMap.videos && resultMap.videos.status === 'fulfilled' && resultMap.videos.value && resultMap.videos.value.results) {
                        tmdbVideos = resultMap.videos.value.results;
                    } else if (tmdbData && tmdbData.videos && tmdbData.videos.results) {
                        tmdbVideos = tmdbData.videos.results;
                    }

                    let allTmdbImages = { backdrops: [], posters: [], logos: [] };
                    if (resultMap.images && resultMap.images.status === 'fulfilled' && resultMap.images.value) {
                        allTmdbImages.backdrops = resultMap.images.value.backdrops || [];
                        allTmdbImages.posters = resultMap.images.value.posters || [];
                        allTmdbImages.logos = resultMap.images.value.logos || [];
                    } else if (tmdbData && tmdbData.images) {
                        allTmdbImages.backdrops = tmdbData.images.backdrops || [];
                        allTmdbImages.posters = tmdbData.images.posters || [];
                        allTmdbImages.logos = tmdbData.images.logos || [];
                    }

                    let ophimRawMovie = null;
                    if (resultMap.ophimRaw && resultMap.ophimRaw.status === 'fulfilled' && resultMap.ophimRaw.value && resultMap.ophimRaw.value.movie) {
                        ophimRawMovie = resultMap.ophimRaw.value.movie;
                    }

                    if (galleryTab) {
                        const getVideoScore = (video) => {
                            if (video.iso_639_1 === 'vi') return 10;
                            if (video.iso_639_1 === 'en') return 5;
                            if (tmdbData && video.iso_639_1 === tmdbData.original_language) return 3;
                            return 1; 
                        };

                        let selectedVideos = { trailer: null, teaser: null, bts: null };

                        // Ưu tiên OPhim trước (trailer_url của movieObj hiện tại, hoặc bổ sung từ ophimRawMovie).
                        const ophimTrailerCandidates = [movieObj.trailer_url, ophimRawMovie?.trailer_url].filter(Boolean);
                        for (const rawUrl of ophimTrailerCandidates) {
                            const ytIdMatch = rawUrl.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
                            if (ytIdMatch && ytIdMatch[1]) {
                                selectedVideos.trailer = { key: ytIdMatch[1], name: `Trailer Chính thức (OPhim)`, site: 'YouTube', source: 'ophim' };
                                break;
                            }
                        }

                        let bestScores = { trailer: -1, teaser: -1, bts: -1 };

                        tmdbVideos.forEach(v => {
                            if (v.site !== 'YouTube') return;
                            const score = getVideoScore(v);
                            const isoStr = (v.iso_639_1 || 'gốc').toUpperCase();

                            if (v.type === 'Trailer') {
                                if (!selectedVideos.trailer || (selectedVideos.trailer.source !== 'ophim' && score > bestScores.trailer)) {
                                    selectedVideos.trailer = { key: v.key, name: `Trailer (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                    bestScores.trailer = score;
                                }
                            } else if (v.type === 'Teaser') {
                                if (score > bestScores.teaser) {
                                    selectedVideos.teaser = { key: v.key, name: `Teaser (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                    bestScores.teaser = score;
                                }
                            } else if (v.type === 'Behind the Scenes' || v.type === 'Featurette') {
                                if (score > bestScores.bts) {
                                    selectedVideos.bts = { key: v.key, name: `Hậu Trường (${isoStr})`, site: 'YouTube', source: 'tmdb' };
                                    bestScores.bts = score;
                                }
                            }
                        });

                        const buildVideoIframe = (vidData) => {
                            if (!vidData) return '';
                            const src = `https://www.youtube.com/embed/${vidData.key}`;
                            return `
                            <div class="flex flex-col gap-2">
                                <div class="relative w-full aspect-video rounded-2xl overflow-hidden bg-black border border-white/10 shadow-lg group">
                                    <iframe src="${src}" class="absolute inset-0 w-full h-full border-0" allowfullscreen></iframe>
                                </div>
                                <span class="text-xs text-muted font-medium px-1 truncate flex items-center justify-between">
                                    ${vidData.name}
                                </span>
                            </div>`;
                        };

                        let trailerHtml = '';
                        const hasVideos = selectedVideos.trailer || selectedVideos.teaser || selectedVideos.bts;

                        if (hasVideos) {
                            trailerHtml = `
                            <div class="mb-8">
                                <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2">
                                    <span class="w-1.5 h-4 bg-primary rounded-full"></span> Trailer, Teaser & Hậu trường
                                </h3>
                                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                    ${buildVideoIframe(selectedVideos.trailer)}
                                    ${buildVideoIframe(selectedVideos.teaser)}
                                    ${buildVideoIframe(selectedVideos.bts)}
                                </div>
                            </div>`;
                        }

                        const uniqueImagesMap = new Map();

                        const addImageToMap = (url) => {
                            if (!url) return;
                            const fileName = url.substring(url.lastIndexOf('/') + 1).split('?')[0];
                            if (!uniqueImagesMap.has(fileName)) {
                                uniqueImagesMap.set(fileName, url);
                            }
                        };

                        if (movieObj.poster_url) addImageToMap(Utils.getImage(movieObj.poster_url, movieObj.sourceProvider));
                        if (movieObj.thumb_url) addImageToMap(Utils.getImage(movieObj.thumb_url, movieObj.sourceProvider));
                        if (ophimRawMovie) {
                            if (ophimRawMovie.poster_url) addImageToMap(Utils.getImage(ophimRawMovie.poster_url, 'OP'));
                            if (ophimRawMovie.thumb_url) addImageToMap(Utils.getImage(ophimRawMovie.thumb_url, 'OP'));
                        }

                        allTmdbImages.backdrops.forEach(img => addImageToMap(`${CONFIG.TMDB_IMG}${img.file_path}`));
                        allTmdbImages.posters.forEach(img => addImageToMap(`${CONFIG.TMDB_IMG}${img.file_path}`));
                        allTmdbImages.logos.forEach(img => addImageToMap(`${CONFIG.TMDB_IMG}${img.file_path}`));

                        const allImagesRenderList = Array.from(uniqueImagesMap.values());

                        let imagesHtml = '';
                        if (allImagesRenderList.length > 0) {
                            const gridImgs = allImagesRenderList.map(imgUrl => {
                                const originalUrl = imgUrl.includes('tmdbimg') ? imgUrl.replace('/w500/', '/original/') : imgUrl;
                                return `
                                <div class="relative aspect-video rounded-xl overflow-hidden bg-surface border border-white/5 shadow-sm group cursor-zoom-in" onclick="window.open('${originalUrl}', '_blank')">
                                    <img src="${imgUrl}" loading="lazy" class="w-full h-full object-cover transition duration-300 group-hover:scale-105" onerror="this.src='https://placehold.co/600x400/1c1f2e/94a3b8?text=Loi+Anh'"/>
                                </div>`;
                            }).join('');

                            imagesHtml = `
                            <div>
                                <h3 class="text-lg font-bold text-white mb-4 flex items-center justify-between">
                                    <div class="flex items-center gap-2">
                                        <span class="w-1.5 h-4 bg-primary rounded-full"></span> 
                                        Album hình ảnh đa dạng 
                                    </div>
                                    <span class="text-sm font-normal text-muted bg-surface px-3 py-1 rounded-full border border-white/10">${allImagesRenderList.length} ảnh</span>
                                </h3>
                                <!-- CẬP NHẬT: ảnh to hơn, tràn full-width theo cột dọc (1 cột trên mobile, 2 cột trên
                                     màn hình lớn hơn) thay vì lưới nhỏ nhiều cột bó trong khung có chiều cao cố định
                                     + overflow-y-auto, vì cách cũ khiến một số máy cũ hiển thị ảnh chồng lên nhau. -->
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 pb-4">
                                    ${gridImgs}
                                </div>
                            </div>`;
                        } else {
                            imagesHtml = `<div class="bg-surface rounded-2xl p-8 border border-white/5 text-center text-muted mt-4">
                                <p class="font-medium text-gray-300">Không tìm thấy kho ảnh</p>
                            </div>`;
                        }

                        if (!hasVideos && allImagesRenderList.length === 0) {
                             galleryTab.innerHTML = `<div class="bg-surface rounded-2xl p-8 border border-white/5 text-center text-muted mt-4">
                                <p class="font-medium text-gray-300">Chưa có Trailer hay Hình ảnh nào được cung cấp cho phim này.</p>
                            </div>`;
                        } else {
                             galleryTab.innerHTML = `<div class="space-y-6">${trailerHtml} ${imagesHtml}</div>`;
                        }
                    }

                    if (castContainer) {
                        // Lấy TOÀN BỘ tmdbData.credits.cast làm gốc (không cắt slice), rồi bổ sung diễn viên OPhim
                        // chưa xuất hiện trong danh sách TMDB (đã dò xong ở đợt fetch song song phía trên).
                        const resolvedExtraActors = extraActorNames.map((name, idx) => {
                            const r = resultMap[`actor_${idx}`];
                            if (r && r.status === 'fulfilled' && r.value) return r.value;
                            // Lỗi mạng / hết retry: vẫn giữ tên gốc OPhim với ảnh placeholder, không loại khỏi danh sách.
                            return { id: null, name, profile_path: null, character: 'Diễn viên' };
                        });

                        const fullCastList = [
                            ...tmdbCastRaw.map(actor => ({ id: actor.id, name: actor.name, profile_path: actor.profile_path, character: actor.character || 'Khác' })),
                            ...resolvedExtraActors
                        ];

                        if (fullCastList.length > 0) {
                            const castCards = fullCastList.map(actor => {
                                const avatar = actor.profile_path ? `${CONFIG.TMDB_IMG}${actor.profile_path}` : 'https://placehold.co/150x150/1c1f2e/94a3b8?text=No+Photo';
                                const action = actor.id ? `onclick="AppHandlers.openActorDetail('${actor.id}')"` : `onclick="AppHandlers.searchByKeyword('${actor.name}')"`;
                                return `
                                <div class="bg-surface border border-white/5 p-3 rounded-2xl flex flex-col items-center text-center shadow-md hover:border-primary/30 transition cursor-pointer group" ${action}>
                                    <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full overflow-hidden mb-3 border border-white/10 group-hover:border-primary/50 transition">
                                        <img src="${avatar}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/150x150/1c1f2e/94a3b8?text=No+Photo'"/>
                                    </div>
                                    <h4 class="font-bold text-xs sm:text-sm text-text line-clamp-1 group-hover:text-primary transition-colors">${actor.name}</h4>
                                    <p class="text-[10px] text-muted line-clamp-1 mt-0.5">${actor.character}</p>
                                </div>`;
                            }).join('');

                            castContainer.innerHTML = castCards;
                        }
                        // Nếu không có dữ liệu diễn viên nào (không TMDB, không OPhim), giữ nguyên nội dung ban đầu
                        // (danh sách tên thuần từ OPhim đã render sẵn lúc mở trang xem phim).
                    }
                }
            },

            openActorDetail: async (tmdbPersonId) => {
                const actorDiv = document.getElementById('view-actor');
                if (!actorDiv) return;
                AppState.currentActorId = tmdbPersonId; 
                actorDiv.innerHTML = Utils.showLoading(true);
                AppHandlers.navigate('actor');

                const [person, credits] = await Promise.all([
                    TMDB.getPerson(tmdbPersonId),
                    TMDB.getPersonCredits(tmdbPersonId)
                ]);

                if (person) {
                    actorDiv.innerHTML = Render.actorDetailUI(person, credits || { cast: [] });
                    AppHandlers.persistState();
                } else {
                    actorDiv.innerHTML = `
                    <div class="text-center p-10 text-muted">
                        <p class="text-lg">Không thể tải thông tin diễn viên.</p>
                        <button onclick="AppHandlers.backToWatch()" class="mt-4 bg-primary text-black px-6 py-2 rounded-full font-bold">Quay lại</button>
                    </div>`;
                }
            },

            playActorMovie: async (metaEncoded) => {
                let meta;
                try { meta = JSON.parse(decodeURIComponent(metaEncoded)); } catch (e) { meta = null; }
                if (!meta || !meta.title) return;

                Utils.showToast(`Đang tìm nguồn phát cho "${meta.title}"...`);
                const data = await API.search(meta.title, 10);

                if (!data || !data.data || !data.data.items || data.data.items.length === 0) {
                    Utils.showToast(`Phim "${meta.title}" chưa có trên hệ thống stream`, 'error');
                    return;
                }

                const norm = (s) => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/[^a-z0-9]+/g, ' ').trim();
                const expectedOriginal = norm(meta.originalTitle), expectedTitle = norm(meta.title);
                const expectedYear = meta.year ? parseInt(meta.year, 10) : null;
                const expectedType = meta.mediaType === 'tv' ? 'series' : 'single';

                let bestItem = null; let bestScore = -1;

                data.data.items.forEach(item => {
                    let score = 0;
                    const itemName = norm(item.name), itemOrigin = norm(item.origin_name);

                    if (itemOrigin && (itemOrigin === expectedOriginal || itemOrigin === expectedTitle)) score += 100;
                    else if (itemName === expectedTitle) score += 60;
                    else if (itemOrigin && (itemOrigin.includes(expectedOriginal) || expectedOriginal.includes(itemOrigin))) score += 30;

                    if (expectedYear && item.year) {
                        const diff = Math.abs(parseInt(item.year, 10) - expectedYear);
                        if (diff === 0) score += 50; else if (diff === 1) score += 15; else score -= 60;
                    }

                    if (item.type && (item.type === 'single' || item.type === 'series')) {
                        if (item.type === expectedType) score += 20; else score -= 30;
                    }

                    const countrySlug = item.country?.[0]?.slug || null;
                    const itemExpectedLang = countrySlug ? COUNTRY_LANG_MAP[countrySlug] : null;
                    if (meta.originalLanguage && itemExpectedLang) {
                        if (itemExpectedLang === meta.originalLanguage) score += 70; else score -= 100;
                    }

                    if (score > bestScore) { bestScore = score; bestItem = item; }
                });

                if (!bestItem || bestScore < 30) {
                    Utils.showToast(`Không tìm thấy đúng bản phim "${meta.title}" trên hệ thống`, 'error');
                    return;
                }

                AppHandlers.goToWatch(bestItem.slug, bestItem.sourceProvider || 'OP');
            },

            shareActor: (name) => {
                const shareData = { title: `Diễn viên ${name} - KTuongFX`, text: `Xem các thông tin và tác phẩm của diễn viên ${name} tại KTuongFX`, url: window.location.href };
                if (navigator.share) navigator.share(shareData).catch(() => {});
                else Utils.showToast("Đã sao chép liên kết chia sẻ vào khay nhớ tạm!");
            },

            toggleServerDropdown: (e) => {
                e.stopPropagation();
                const sDropdown = document.getElementById('server-dropdown-list'), chevron = document.getElementById('dropdown-chevron');
                if (sDropdown) {
                    if (sDropdown.classList.contains('hidden')) {
                        sDropdown.classList.remove('hidden');
                        if (chevron) chevron.style.transform = 'rotate(180deg)';
                        AppState.isServerDropdownOpen = true;
                    } else {
                        sDropdown.classList.add('hidden');
                        if (chevron) chevron.style.transform = 'rotate(0deg)';
                        AppState.isServerDropdownOpen = false;
                    }
                }
            },

            selectServerSource: async (slug, serverKey) => {
                if (AppState.currentSourceProvider === serverKey) return;
                
                const sDropdown = document.getElementById('server-dropdown-list'), chevron = document.getElementById('dropdown-chevron');
                if (sDropdown) sDropdown.classList.add('hidden');
                if (chevron) chevron.style.transform = 'rotate(0deg)';
                AppState.isServerDropdownOpen = false;

                const tabEpisodes = document.getElementById('tab-content-episodes');
                if (tabEpisodes) {
                    tabEpisodes.innerHTML = `<div class="py-12 text-center text-primary flex justify-center items-center gap-2"><span class="animate-spin border-2 border-primary border-t-transparent rounded-full w-4 h-4"></span> Đang chuyển sang ${serverKey === 'OP' ? 'Máy chủ OPhim' : 'Máy chủ KKPhim'}...</div>`;
                }

                AppState.currentSourceProvider = serverKey;

                const prevEpName = AppState.watchData?.episodes?.[AppState.activeServerIdx]?.server_data?.[AppState.activeEpIdx]?.name || null;
                const wasPlaying = AppState.isPlaying;
                const prevVideoEl = document.getElementById('kt-player');
                const prevCurrentTime = (wasPlaying && prevVideoEl) ? prevVideoEl.currentTime : 0;

                let fetchedRes = null; let finalSlug = slug;
                const refMovie = AppState.watchData.movie;
                const searchKeyword = refMovie.english_name || refMovie.origin_name || refMovie.name;
                let mismatchDetected = false;

                // Lấy TMDB ID từ cache (nếu đã có sẵn từ lúc loadTmdbExtras) để tra thẳng, chính xác hơn dò theo tên.
                let currentTmdbId = null;
                let currentTmdbType = null;
                const refCacheKey = `${refMovie.sourceProvider || 'OP'}_${slug}_${refMovie.year || ''}`;
                if (AppState.tmdbCache.has(refCacheKey)) {
                    const cacheData = AppState.tmdbCache.get(refCacheKey);
                    currentTmdbId = cacheData.resolved_id || cacheData.id;
                    currentTmdbType = cacheData.media_type;
                }

                // Hàm checkMovieIdentity giờ đây chịu trách nhiệm lọc 100% việc đổi server
                const validateDirectFetch = async (res) => {
                    if (!res || !res.episodes || !res.episodes.length || !res.movie) return null;
                    const cand = res.movie;
                    if (Utils.checkMovieIdentity(refMovie, cand)) {
                        return res;
                    }
                    mismatchDetected = true;
                    return null;
                };

                if (serverKey === 'OP') {
                    // OPhim không có public TMDB endpoint, chỉ dùng dò trực tiếp slug rồi tìm-và-đối-chiếu.
                    fetchedRes = await validateDirectFetch(await API.getMovieDetails(slug));
                    if (!fetchedRes) {
                        const searchRes = await API.fetchJSON(`/v1/api/tim-kiem?keyword=${encodeURIComponent(searchKeyword)}&limit=10`);
                        const match = searchRes?.data?.items?.length ? await Utils.findBestMatchAsync(searchRes.data.items, refMovie) : null;
                        if (match) {
                            finalSlug = match.slug; 
                            fetchedRes = await API.getMovieDetails(finalSlug);
                        }
                    }
                } else {
                    // Bước 1: ƯU TIÊN SỐ 1 - Lấy qua TMDB Endpoint của KKPhim (chính xác nhất nếu đã biết TMDB ID)
                    if (currentTmdbId && currentTmdbType) {
                        const kkType = currentTmdbType === 'tv' ? 'tv' : 'movie';
                        const kkRes = await API.fetchKKPhimByTmdb(currentTmdbId, kkType);
                        if (kkRes && kkRes.episodes && kkRes.episodes.length > 0) {
                            fetchedRes = kkRes;
                            finalSlug = kkRes.movie.slug; // Lấy đúng slug của KKPhim
                            mismatchDetected = false; // Xoá cảnh báo lệch
                        }
                    }

                    // Bước 2: Thử fetch trực tiếp theo Slug (nếu TMDB không có)
                    if (!fetchedRes) {
                        fetchedRes = await validateDirectFetch(await API.fetchKKPhim(slug));
                    }

                    // Bước 3: Tìm kiếm và đối chiếu qua TMDB (hàm findBestMatchAsync tự động gọi TMDB verify)
                    if (!fetchedRes) {
                        const searchRes = await fetchViaProxyThenDirect(CONFIG.API_KK_PROXY, CONFIG.API_KK, `/v1/api/tim-kiem?keyword=${encodeURIComponent(searchKeyword)}&limit=10`);
                        const match = searchRes?.data?.items?.length ? await Utils.findBestMatchAsync(searchRes.data.items, refMovie) : null;
                        if (match) {
                            finalSlug = match.slug; 
                            fetchedRes = await API.fetchKKPhim(finalSlug);
                        }
                    }
                }

                if (fetchedRes && fetchedRes.episodes && fetchedRes.episodes.length > 0) {
                    if (finalSlug !== slug && fetchedRes.movie) { AppState.watchData.movie.slug = finalSlug; }
                    
                    AppState.watchData.episodes = fetchedRes.episodes;

                    let matchedServerIdx = 0, matchedEpIdx = 0, found = false;
                    if (prevEpName) {
                        for (let si = 0; si < fetchedRes.episodes.length && !found; si++) {
                            const list = fetchedRes.episodes[si]?.server_data || [];
                            const idx = list.findIndex(ep => ep && ep.name === prevEpName);
                            if (idx !== -1) { matchedServerIdx = si; matchedEpIdx = idx; found = true; }
                        }
                    }
                    AppState.activeServerIdx = matchedServerIdx;
                    AppState.activeEpIdx = matchedEpIdx;

                    if (wasPlaying) {
                        const matchedEpName = fetchedRes.episodes[matchedServerIdx]?.server_data?.[matchedEpIdx]?.name || prevEpName || '';
                        Utils.updateHistoryTime(refMovie, matchedEpIdx, matchedEpName, prevCurrentTime);
                    }
                    
                    if (tabEpisodes) {
                        const currentServerLabel = serverKey === 'OP' ? 'Máy chủ 1 (OP)' : 'Máy chủ 2 (KK)';
                        const serverBtns = fetchedRes.episodes.length > 1 ? `<div class="flex gap-3 mb-4 overflow-x-auto hide-scrollbar pb-2">${fetchedRes.episodes.map((srv, i) => Utils.getServerBtnHtml(srv, i, AppState.activeServerIdx)).join('')}</div>` : '';
                        
                        const epBtns = fetchedRes.episodes[matchedServerIdx]?.server_data?.map((ep, i) => `<button onclick="AppHandlers.changeEpisode(${i})" class="p-3 rounded-xl text-sm font-semibold transition flex flex-col items-center justify-center gap-1 shadow-sm ${i === matchedEpIdx ? 'bg-primary/20 text-primary border border-primary/50' : 'bg-surface text-gray-300 hover:bg-white/10 border border-white/5'}"><span>${Utils.formatEpName(ep.name)}</span></button>`).join('') || '';
                        
                        tabEpisodes.innerHTML = `
                        ${serverBtns}

            playVideo: () => {
                AppState.isPlaying = true;
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, true, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie); 
                window.scrollTo({top: 0, behavior: 'smooth'});
                
                const m = AppState.watchData.movie;
                const eps = AppState.watchData.episodes;
                const epData = eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx];
                const video = document.getElementById('kt-player');

                if (video && epData.link_m3u8) {
                    const savedHist = AppState.history.find(h => h.slug === m.slug);
                    const savedTime = (savedHist && savedHist.last_ep_idx === AppState.activeEpIdx && savedHist.current_time) ? savedHist.current_time : 0;

                    if (Hls.isSupported()) {
                        if(AppState.hlsInstance) AppState.hlsInstance.destroy();
                        AppState.hlsInstance = new Hls({
                            manifestLoadingMaxRetry: 4,
                            levelLoadingMaxRetry: 4,
                            fragLoadingMaxRetry: 6
                        });
                        let hlsErrorRetries = 0;
                        const initHlsEvents = (hls) => {
                            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                                if(savedTime > 0) video.currentTime = savedTime;
                                video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                            });
                            hls.on(Hls.Events.ERROR, function(event, data) {
                                if (!data.fatal) return;
                                console.warn('HLS lỗi:', data.type, data.details);
                                hlsErrorRetries++;
                                if (hlsErrorRetries > 5) {
                                    const tabEpisodes = document.getElementById('tab-content-episodes');
                                    if (tabEpisodes && !document.getElementById('hls-fail-msg')) {
                                        tabEpisodes.insertAdjacentHTML('afterbegin', `<div id="hls-fail-msg" class="bg-red-500/10 border border-red-500/20 text-red-300 p-4 rounded-xl text-sm text-center mb-4">Máy chủ này đang gặp sự cố, không thể phát tiếp. Vui lòng chuyển sang <b>Máy chủ dự phòng</b>.</div>`);
                                    }
                                    return;
                                }
                                switch (data.type) {
                                    case Hls.ErrorTypes.NETWORK_ERROR:
                                        hls.startLoad();
                                        break;
                                    case Hls.ErrorTypes.MEDIA_ERROR:
                                        hls.recoverMediaError();
                                        break;
                                    default:
                                        hls.destroy();
                                        AppState.hlsInstance = new Hls();
                                        AppState.hlsInstance.loadSource(epData.link_m3u8);
                                        AppState.hlsInstance.attachMedia(video);
                                        initHlsEvents(AppState.hlsInstance);
                                        break;
                                }
                            });
                        };
                        AppState.hlsInstance.loadSource(epData.link_m3u8);
                        AppState.hlsInstance.attachMedia(video);
                        initHlsEvents(AppState.hlsInstance);
                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = epData.link_m3u8;
                        video.addEventListener('loadedmetadata', function() {
                            if(savedTime > 0) video.currentTime = savedTime;
                            video.play().catch(e => console.log("Trình duyệt chặn autoplay:", e));
                        });
                    }

                    if(AppState.saveInterval) clearInterval(AppState.saveInterval);
                    AppState.saveInterval = setInterval(AppHandlers.saveCurrentVideoState, 5000);
                } else {
                    if(eps && eps[0]) Utils.saveHistory(m, AppState.activeEpIdx, epData.name, 0);
                }

                AppHandlers.loadTmdbExtras(AppState.watchData.movie);
                AppHandlers.persistState(); 
            },

                const video = document.getElementById('kt-player');

                ['episodes', 'info', 'cast', 'gallery', 'suggest'].forEach(id => {

            loadSuggestions: async (movie) => {
                const container = document.getElementById('suggest-container');
                if(!container) return;
                container.innerHTML = Utils.showLoading();
                
                let queries = [];
                
                if (movie.category && movie.category.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[0].slug}?limit=24`));
                    if (movie.category.length > 1) {
                        queries.push(API.fetchJSON(`/v1/api/the-loai/${movie.category[1].slug}?limit=24`));
                    }
                }
                if (movie.country && movie.country.length > 0) {
                    queries.push(API.fetchJSON(`/v1/api/quoc-gia/${movie.country[0].slug}?limit=24`));
                }
                
                if (queries.length === 0) {
                    queries.push(API.fetchJSON('/danh-sach/phim-moi-cap-nhat?limit=24'));
                }

                const results = await Promise.allSettled(queries);
                let combinedMap = new Map();

                results.forEach(res => {
                    if(res.status === 'fulfilled' && res.value) {
                        let items = res.value.data ? res.value.data.items : res.value.items || [];
                        items.forEach(m => {
                            if (m.slug !== movie.slug) {
                                if (combinedMap.has(m.slug)) {
                                    combinedMap.get(m.slug).score += 1;
                                } else {
                                    m.score = 1;
                                    combinedMap.set(m.slug, m);
                                }
                            }
                        });
                    }
                });

                let items = Array.from(combinedMap.values());
                items.sort((a, b) => {
                    if (b.score !== a.score) return b.score - a.score;
                    return (parseInt(b.year) || 0) - (parseInt(a.year) || 0);
                });

                // THÊM MỚI: nhờ AI xếp hạng lại theo mức độ liên quan nội dung (chủ đề/không khí phim),
                // thay vì chỉ tính theo số lượng thể loại trùng nhau. AI chỉ được chọn trong "items" có sẵn
                // (đã lấy thật từ OPhim/KKPhim) nên không có rủi ro gợi ý phim không tồn tại.
                // Nếu AI lỗi/timeout thì dùng luôn thứ tự cũ (score theo thể loại) — không ảnh hưởng trải nghiệm.
                if (items.length > 0) {
                    const aiSlugs = await Gemini.rerankRelated(movie, items.slice(0, 40));
                    if (aiSlugs && aiSlugs.length) {
                        const bySlug = new Map(items.map(m => [m.slug, m]));
                        const reordered = aiSlugs.map(s => bySlug.get(s)).filter(Boolean);
                        const remaining = items.filter(m => !aiSlugs.includes(m.slug));
                        items = [...reordered, ...remaining];
                    }
                }

                items = items.slice(0, 16);
                
                if(items.length) {
                    container.innerHTML = `<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3">${items.map(m => Render.movieCard(m)).join('')}</div>`;
                } else {
                    container.innerHTML = `<div class="text-center text-muted py-8">Chưa có đề xuất phù hợp lúc này.</div>`;
                }
            },

            toggleFav: () => {
                if(!AppState.watchData) return;
                Utils.toggleFavorite(AppState.watchData.movie);
                document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, AppState.isPlaying, AppState.activeServerIdx, AppState.activeEpIdx);
                AppHandlers.loadSuggestions(AppState.watchData.movie);
                AppHandlers.loadTmdbExtras(AppState.watchData.movie);

            loadList: async (type, slug, title) => {
                AppHandlers.navigate('search'); document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                document.getElementById('search-title').innerHTML = title;
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList(type, slug, 36);
                resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : `<div class="col-span-full flex flex-col items-center justify-center py-16 text-muted"><svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" class="mb-4 opacity-30" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg><p>Danh sách này hiện tại đang trống.</p></div>`;
            },

            searchByKeyword: (kw) => { 
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = kw; 
                AppHandlers.onSearchInput(kw); 
            },

            onSearchInput: (val) => {
                const kw = val.trim(); 
                if(AppState.searchTimeout) clearTimeout(AppState.searchTimeout);
                const resDiv = document.getElementById('search-results'), tDiv = document.getElementById('search-title');
                const smartDiv = document.getElementById('search-smart');
                const aiTitleDiv = document.getElementById('search-ai-title');
                const aiResDiv = document.getElementById('search-ai-results');
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-3 md:gap-4 px-2";
                if (!kw) { tDiv.innerHTML = 'Tìm kiếm'; resDiv.innerHTML = ''; if(smartDiv) smartDiv.innerHTML = ''; if(aiTitleDiv) aiTitleDiv.classList.add('hidden'); if(aiResDiv) aiResDiv.innerHTML = ''; return; }
                
                tDiv.innerHTML = `Kết quả cho: "${kw}"`; 
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                if(smartDiv) smartDiv.innerHTML = '';
                if(aiTitleDiv) aiTitleDiv.classList.add('hidden');
                if(aiResDiv) aiResDiv.innerHTML = '';
                
                AppState.searchTimeout = setTimeout(async () => {
                    const [data, personRes] = await Promise.all([
                        API.search(kw),
                        TMDB.searchPerson(kw).catch(() => null)
                    ]);
                    const emptyStateHtml = `
                    <div class="col-span-full flex flex-col items-center justify-center py-20 text-muted">
                        <svg width="64" height="64" fill="none" stroke="currentColor" stroke-width="1" class="mb-4 opacity-40" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <p class="font-medium text-gray-300">Không tìm thấy dữ liệu cho từ khóa này.</p>
                        <p class="text-sm mt-2 max-w-sm text-center">API hệ thống có thể chưa cập nhật diễn viên hoặc tên phim này. Bạn vui lòng thử một từ khóa khác.</p>
                    </div>`;

                    resDiv.innerHTML = data?.data?.items?.length ? data.data.items.map(m => Render.movieCard(m)).join('') : emptyStateHtml;

                    const people = (personRes?.results || []).filter(p => p.known_for_department === 'Acting' || p.known_for_department === 'Directing').slice(0, 5);
                    if (smartDiv && people.length) {
                        smartDiv.innerHTML = `
                        <div class="text-xs text-muted mb-2">Có phải bạn muốn tìm người này?</div>
                        <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-1">
                            ${people.map(p => `
                                <div onclick="AppHandlers.openActorDetail('${p.id}')" class="shrink-0 flex items-center gap-2 bg-surface border border-white/10 rounded-full pl-1.5 pr-3 py-1.5 cursor-pointer hover:border-primary/50 transition">
                                    <img src="${p.profile_path ? CONFIG.TMDB_IMG + p.profile_path : 'https://placehold.co/60x60/1c1f2e/94a3b8?text=?'}" class="w-7 h-7 rounded-full object-cover" onerror="this.src='https://placehold.co/60x60/1c1f2e/94a3b8?text=?'"/>
                                    <span class="text-xs font-semibold">${p.name}</span>
                                    <span class="text-[10px] text-muted">${p.known_for_department === 'Directing' ? 'Đạo diễn' : 'Diễn viên'}</span>
                                </div>`).join('')}
                        </div>`;
                    }

                    const items = data?.data?.items || [];
                    if (items.length) {
                        const genreMap = new Map();
                        items.forEach(m => (m.category || []).forEach(c => { if(c?.name) genreMap.set(c.slug || c.name, c.name); }));
                        if (genreMap.size) {
                            const chipsHtml = `
                            <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1 ${people.length ? 'mt-3' : ''}">
                                ${[...genreMap.entries()].slice(0, 10).map(([slug, name]) => `
                                    <button onclick="AppHandlers.filterSearchByGenre('${slug}')" class="shrink-0 text-xs font-semibold bg-white/5 hover:bg-primary/20 hover:text-primary border border-white/10 px-3 py-1.5 rounded-full transition">${name}</button>
                                `).join('')}
                            </div>`;
                            smartDiv.innerHTML += chipsHtml;
                        }
                    }
                    AppState.lastSearchItems = items; 

                    // THÊM MỚI: Tìm kiếm thông minh bằng AI — chỉ chạy khi tìm bằng từ khóa (kết quả thường ít/không sát ý)
                    // hoặc khi kết quả gốc quá ít. AI chỉ trích xuất từ khóa/thể loại, phim thật vẫn lấy qua API.search
                    // của OPhim/KKPhim nên không có rủi ro hiển thị phim không tồn tại.
                    const searchToken = ++AppState._aiSearchSeq || (AppState._aiSearchSeq = 1);
                    if (items.length < 8) {
                        const parsed = await Gemini.parseSearchQuery(kw);
                        if (searchToken !== AppState._aiSearchSeq) return; // người dùng đã gõ tiếp, huỷ kết quả cũ
                        if (!parsed) return;

                        const existingSlugs = new Set(items.map(m => m.slug));
                        const extraQueries = [];
                        (parsed.keywords || []).forEach(k => { if (k && k.toLowerCase() !== kw.toLowerCase()) extraQueries.push(API.search(k)); });
                        (parsed.genreSlugs || []).forEach(slug => extraQueries.push(API.fetchJSON(`/v1/api/the-loai/${slug}?limit=16`)));

                        if (!extraQueries.length) return;
                        const extraResults = await Promise.allSettled(extraQueries);
                        if (searchToken !== AppState._aiSearchSeq) return;

                        const aiMap = new Map();
                        extraResults.forEach(r => {
                            if (r.status !== 'fulfilled' || !r.value) return;
                            const its = r.value.data ? r.value.data.items : r.value.items || [];
                            its.forEach(m => { if (m.slug && !existingSlugs.has(m.slug) && !aiMap.has(m.slug)) aiMap.set(m.slug, m); });
                        });

                        const aiItems = Array.from(aiMap.values()).slice(0, 12);
                        if (aiItems.length && aiTitleDiv && aiResDiv) {

            },
            
            switchHistoryTab: (tab) => {
                document.getElementById('htab-recent').classList.replace('tab-active', 'text-muted');
                document.getElementById('htab-favs').classList.replace('tab-active', 'text-muted');
                document.getElementById(`htab-${tab}`).classList.replace('text-muted', 'tab-active');
                const clearBtn = document.getElementById('btn-clear-history');
                if (clearBtn) clearBtn.classList.toggle('hidden', tab !== 'recent');
                // Đổi tab thì thoát luôn chế độ chọn nhiều để tránh nhầm lẫn xóa sai danh sách
                AppState.historySelectMode = false;
                AppState.historySelectedSlugs.clear();
                const selectBtn = document.getElementById('btn-toggle-select');
                if (selectBtn) selectBtn.textContent = 'Chọn nhiều';
                AppHandlers.renderHistory(tab);
            },

            // Xóa cache lịch sử "Tiếp tục xem" đang lưu ở localStorage, giúp người dùng
            // làm mới dữ liệu (vd. khi danh sách quá dài hoặc bị lỗi hiển thị) mà không
            // cần xóa toàn bộ dữ liệu trình duyệt.
            clearHistoryCache: () => {
                if (!confirm('Xóa toàn bộ lịch sử "Tiếp tục xem"? Danh sách yêu thích sẽ không bị ảnh hưởng.')) return;
                AppState.history = [];
                try { localStorage.removeItem('ktuong_history'); } catch (e) {}
                AppHandlers.renderHistory('recent');
            },

            // ===== THÊM MỚI: Chọn nhiều để xóa cache theo danh sách tự chọn (thay vì chỉ xóa hết) =====
            toggleHistorySelectMode: () => {
                AppState.historySelectMode = !AppState.historySelectMode;
                if (!AppState.historySelectMode) AppState.historySelectedSlugs.clear();
                const btn = document.getElementById('btn-toggle-select');
                if (btn) btn.textContent = AppState.historySelectMode ? 'Hủy chọn' : 'Chọn nhiều';
                AppHandlers.renderHistory(AppState.historyActiveTab);
            },

            toggleHistorySelectItem: (slug) => {
                if (!AppState.historySelectMode) return;
                if (AppState.historySelectedSlugs.has(slug)) AppState.historySelectedSlugs.delete(slug);
                else AppState.historySelectedSlugs.add(slug);
                AppHandlers.renderHistory(AppState.historyActiveTab);
            },

            updateSelectionBar: () => {
                const bar = document.getElementById('history-selection-bar');
                if (!bar) return;
                const n = AppState.historySelectedSlugs.size;
                if (AppState.historySelectMode && n > 0) {
                    bar.classList.remove('hidden');
                    const countEl = document.getElementById('history-selection-count');
                    if (countEl) countEl.textContent = `Đã chọn ${n} mục`;
                } else {
                    bar.classList.add('hidden');
                }
            },

            // Xóa đúng những phim đã tick chọn (đa chọn) khỏi Lịch sử hoặc Yêu thích, thay vì xóa toàn bộ.
            clearSelectedHistoryItems: () => {
                const n = AppState.historySelectedSlugs.size;
                if (!n) return;
                const isFavTab = AppState.historyActiveTab === 'favs';
                if (!confirm(`Xóa ${n} mục đã chọn khỏi ${isFavTab ? 'danh sách Yêu thích' : 'Lịch sử xem'}?`)) return;

                if (isFavTab) {
                    AppState.favorites = AppState.favorites.filter(m => !AppState.historySelectedSlugs.has(m.slug));
                    try { localStorage.setItem('ktuong_favs', JSON.stringify(AppState.favorites)); } catch (e) {}
                } else {
                    AppState.history = AppState.history.filter(m => !AppState.historySelectedSlugs.has(m.slug));
                    try { localStorage.setItem('ktuong_history', JSON.stringify(AppState.history)); } catch (e) {}
                }

                AppState.historySelectedSlugs.clear();
                AppState.historySelectMode = false;
                const btn = document.getElementById('btn-toggle-select');
                if (btn) btn.textContent = 'Chọn nhiều';
                AppHandlers.renderHistory(AppState.historyActiveTab);
            },

            // ===== THÊM MỚI: Màn hình Intro Video trước khi vào web =====
            initIntro: () => {
                const overlay = document.getElementById('intro-overlay');
                const toggleEl = document.getElementById('toggle-intro-setting');

                // Đọc cài đặt bật/tắt Intro của người dùng (lưu ở localStorage, mặc định là BẬT).
                let introEnabled = true;
                try {
                    const saved = localStorage.getItem('ktuong_intro_enabled');
                    if (saved !== null) introEnabled = saved === '1';
                } catch (e) {}
                if (toggleEl) toggleEl.checked = introEnabled;

                if (!overlay) return;
                if (!introEnabled) { overlay.remove(); return; }

                // Nếu cấu hình chỉ hiện 1 lần/phiên và trình duyệt đã xem rồi thì bỏ qua luôn, không chặn trang.
                let alreadySeen = false;
                try { alreadySeen = sessionStorage.getItem('ktuong_intro_seen') === '1'; } catch (e) {}
                if (!CONFIG.SHOW_INTRO_EVERY_VISIT && alreadySeen) {
                    overlay.remove();
                    return;
                }

                const video = document.getElementById('intro-video');
                const sourceEl = video ? video.querySelector('source') : null;

                // Chưa gắn file video (mặc định) hoặc trình duyệt không load được video (thiếu file intro.mp4
                // trong đúng thư mục) -> bỏ qua intro, tránh chặn người dùng vào web bởi màn hình đen không có nội dung.
                if (!sourceEl || !sourceEl.getAttribute('src')) {
                    overlay.remove();
                    return;
                }

                video.addEventListener('ended', AppHandlers.skipIntro);
                video.addEventListener('error', AppHandlers.skipIntro);
                // Một số trình duyệt/máy cũ chặn autoplay dù đã muted -> vẫn cho phép bấm "Bỏ qua" bằng tay.
                video.play().catch(() => {});
            },

            skipIntro: () => {
                const overlay = document.getElementById('intro-overlay');
                if (!overlay) return;
                try { sessionStorage.setItem('ktuong_intro_seen', '1'); } catch (e) {}
                const video = document.getElementById('intro-video');
                if (video) { try { video.pause(); } catch (e) {} }
                overlay.style.transition = 'opacity 0.4s ease';
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.remove(), 400);
            },

            // Bật/tắt Intro Video từ mục cài đặt trong Menu, lưu lại lựa chọn để dùng cho các lần mở web sau.
            toggleIntroSetting: (checked) => {
                try { localStorage.setItem('ktuong_intro_enabled', checked ? '1' : '0'); } catch (e) {}
                Utils.showToast(checked ? 'Đã bật Intro khi mở web' : 'Đã tắt Intro khi mở web');
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            // CẬP NHẬT: kiểm tra Freeze Web (/maintenance) TRƯỚC, chặn init()/initIntro() nếu đang bảo trì
            AppHandlers.checkMaintenanceAndInit();
        });
    </script>

    <!-- ================= THÊM MỚI: URL Routing (History API) cho SPA =================
         Giúp mỗi phim/diễn viên có URL riêng (vd: /phim/ten-cau-la-gi, /dien-vien/123)
         thay vì domain luôn giữ nguyên như cũ. Toàn bộ phần này chỉ "bọc" (wrap) thêm
         quanh các hàm điều hướng gốc ở trên (navigate, goToWatch, openActorDetail) để
         đồng bộ URL - KHÔNG sửa bất kỳ dòng code gốc nào phía trên.
         Lưu ý: cần thêm file 404.html (SPA fallback) ở cùng thư mục gốc để URL vẫn
         chạy đúng khi người dùng bấm F5 hoặc mở thẳng 1 link đã chia sẻ. -->
    <script>
        (function () {
            // Nếu web nằm trong thư mục con dạng username.github.io/ten-repo/ (project page),
            // đổi ROUTER_BASE thành '/ten-repo'. Để trống '' nếu web chạy ở domain gốc.
            const ROUTER_BASE = '/Webphim-';

            const Router = {
                buildUrl: (path) => ROUTER_BASE + path,

                go: (path) => {
                    const url = Router.buildUrl(path);
                    if (window.location.pathname + window.location.search === url) return;
                    history.pushState({ path }, '', url);
                },

                // Đọc URL hiện tại và mở đúng nội dung tương ứng - dùng lúc tải trang lần đầu
                // (nếu người dùng mở thẳng 1 link chia sẻ) và khi bấm nút Back/Forward trình duyệt.
                // CẬP NHẬT: URL phim giờ có kèm mã nguồn dạng /phim/{provider}/{slug} (vd: /phim/OP/ten-cau-la-gi)
                // để tránh 2 phim khác nguồn (OPhim/PhimAPI...) nhưng trùng slug bị nhầm lẫn với nhau.
                // Vẫn nhận link cũ dạng /phim/{slug} (không có provider) để không hỏng link đã chia sẻ trước đó.
                resolveCurrentPath: () => {
                    let path = window.location.pathname;
                    if (ROUTER_BASE && path.startsWith(ROUTER_BASE)) path = path.slice(ROUTER_BASE.length);
                    if (!path) path = '/';

                    const watchMatchWithProvider = path.match(/^\/phim\/([^\/]+)\/([^\/]+)\/?$/);
                    const watchMatchLegacy = path.match(/^\/phim\/([^\/]+)\/?$/);
                    const actorMatch = path.match(/^\/dien-vien\/([^\/]+)\/?$/);

                    if (watchMatchWithProvider) {
                        AppHandlers.goToWatch(decodeURIComponent(watchMatchWithProvider[2]), decodeURIComponent(watchMatchWithProvider[1]));
                    } else if (watchMatchLegacy) {
                        AppHandlers.goToWatch(decodeURIComponent(watchMatchLegacy[1]));
                    } else if (actorMatch) {
                        AppHandlers.openActorDetail(decodeURIComponent(actorMatch[1]));
                    } else if (path === '/tim-kiem') {
                        AppHandlers.navigate('search');
                    } else if (path === '/lich-su') {
                        AppHandlers.navigate('history');
                    }
                    // path === '/' hoặc không khớp route nào -> giữ nguyên màn hình mặc định (Trang chủ)
                }
            };

            // ===== Bọc thêm các hàm điều hướng gốc để đồng bộ URL, không đụng code gốc =====
            const _originalNavigate = AppHandlers.navigate;
            AppHandlers.navigate = function (viewId) {
                const result = _originalNavigate.apply(this, arguments);
                const routeMap = { home: '/', search: '/tim-kiem', history: '/lich-su' };
                if (routeMap[viewId] !== undefined) Router.go(routeMap[viewId]);
                return result;
            };

            // CẬP NHẬT: gắn thêm mã nguồn (provider: 'OP', 'KK'...) vào URL để tránh trùng slug
            // giữa các nguồn phim khác nhau. Lấy đúng provider/slug THẬT SỰ đã tải thành công
            // (AppState.currentSourceProvider / AppState.watchData.movie.slug), vì có trường hợp
            // web tự động chuyển sang nguồn dự phòng khi nguồn đầu tiên bị lỗi.
            const _originalGoToWatch = AppHandlers.goToWatch;
            AppHandlers.goToWatch = async function (slug, provider = 'OP') {
                const result = await _originalGoToWatch.apply(this, arguments);
                const finalSlug = (AppState.watchData && AppState.watchData.movie && AppState.watchData.movie.slug) || slug;
                const finalProvider = AppState.currentSourceProvider || provider || 'OP';
                if (finalSlug) Router.go(`/phim/${encodeURIComponent(finalProvider)}/${encodeURIComponent(finalSlug)}`);
                return result;
            };

            const _originalOpenActorDetail = AppHandlers.openActorDetail;
            AppHandlers.openActorDetail = async function (tmdbPersonId) {
                const result = await _originalOpenActorDetail.apply(this, arguments);
                if (tmdbPersonId) Router.go(`/dien-vien/${encodeURIComponent(tmdbPersonId)}`);
                return result;
            };

            // Bấm nút Back/Forward của trình duyệt -> mở lại đúng nội dung theo URL
            window.addEventListener('popstate', () => Router.resolveCurrentPath());

            // Sau khi web tải xong (và đã tự khôi phục trạng thái lần xem trước nếu có),
            // nếu thanh địa chỉ đang có sẵn 1 URL cụ thể (vd. người dùng mở thẳng link chia sẻ
            // /phim/ten-cau-la-gi) thì ưu tiên mở đúng nội dung đó.
            window.addEventListener('load', () => {
                let path = window.location.pathname;
                if (ROUTER_BASE && path.startsWith(ROUTER_BASE)) path = path.slice(ROUTER_BASE.length);
                if (path && path !== '/' && path !== '/index.html') {
                    setTimeout(() => Router.resolveCurrentPath(), 300);
                }
            });
        })();
    </script>
