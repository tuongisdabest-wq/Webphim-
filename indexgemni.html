                            ${biography}
                        </div>
                    </div>

                    <div class="mb-10">
                        <div class="flex items-center gap-2 mb-4">
                            <span class="w-1.5 h-4 bg-primary rounded-full"></span>
                            <h2 class="text-xl font-bold text-white">Các phim đã tham gia</h2>
                        </div>
                        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                            ${movieCardsHtml ? movieCardsHtml : '<p class="text-muted text-sm col-span-full text-center py-6">Chưa có thông tự tác phẩm đóng chung.</p>'}
                        </div>
                    </div>
                </div>`;
            }
        };

        const AppHandlers = {
            // THÊM MỚI: kiểm tra "Freeze Web" (GET /maintenance) NGAY ĐẦU TIÊN, trước cả init(), để chặn
            // toàn bộ trang sớm nhất có thể nếu admin đang bật chế độ bảo trì từ control panel riêng.
            checkMaintenanceAndInit: async () => {
                let maintenance = { enabled: false };
                try {
                    const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/maintenance`);
                    maintenance = await res.json();
                } catch (e) { maintenance = { enabled: false }; }

                if (maintenance && maintenance.enabled) {
                    // Web đang bị Freeze -> KHÔNG chạy loadHome()/restoreState()/gắn thêm event listener nào
                    // nữa, cũng bỏ luôn màn hình Intro (nếu có) để không cho thao tác gì khác trên trang.
                    const introOverlay = document.getElementById('intro-overlay');
                    if (introOverlay) introOverlay.remove();
                    const text = Utils.escapeHtml(maintenance.text || 'Website đang bảo trì, quay lại sau ít phút nhé!');
                    const imgHtml = maintenance.image
                        ? `<img src="${maintenance.image}" class="max-w-xs sm:max-w-sm w-full rounded-2xl shadow-2xl mb-6 border border-white/10" onerror="this.style.display='none'"/>`
                        : '';
                    document.body.innerHTML = `
                    <div class="fixed inset-0 z-[999] bg-black flex flex-col items-center justify-center p-6 text-center">
                        ${imgHtml}
                        <p class="text-white text-base md:text-lg font-semibold max-w-md">${text}</p>
                    </div>`;
                    return;
                }

                // enabled=false (hoặc gọi API lỗi/timeout) -> bỏ qua, chạy tiếp như bình thường
                // THÊM MỚI: áp dụng cấu hình Intro/Site do admin tuỳ chỉnh (nếu có) TRƯỚC khi initIntro()
                // chạy, để đúng src video/logo được thay thế trước khi màn hình Intro hiển thị ra.
                await AppHandlers.applySiteConfig();
                AppHandlers.initIntro();
                AppHandlers.init();
            },

            // THÊM MỚI (Bước 3): tải /site-config và áp override lên Intro video/logo/tên site — theo đúng
            // mô hình "lớp nền + override": field nào Worker không trả về (admin chưa từng lưu, hoặc đã
            // "Khôi phục mặc định") thì GIỮ NGUYÊN giá trị mặc định gốc hardcode sẵn trong HTML/CONFIG.
            applySiteConfig: async () => {
                let cfg = {};
                try {
                    const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/site-config`);
                    cfg = await res.json();
                } catch (e) { cfg = {}; }
                if (!cfg || typeof cfg !== 'object') return;

                if (cfg.introVideoUrl) {
                    const sourceEl = document.querySelector('#intro-video source');
                    if (sourceEl) sourceEl.setAttribute('src', cfg.introVideoUrl);
                }
                if (cfg.introLogoUrl) {
                    const introLogoImg = document.querySelector('#intro-logo img');
                    if (introLogoImg) introLogoImg.src = cfg.introLogoUrl;
                    const siteLogoImg = document.getElementById('site-logo');
                    if (siteLogoImg) siteLogoImg.src = cfg.introLogoUrl;
                }
                if (typeof cfg.showIntroEveryVisit === 'boolean') {
                    CONFIG.SHOW_INTRO_EVERY_VISIT = cfg.showIntroEveryVisit;
                }
                if (cfg.siteName) {
                    const nameEl = document.getElementById('site-name-text');
                    if (nameEl) nameEl.textContent = cfg.siteName;
                    document.title = cfg.siteName;
                }
            },

            init: async () => { 
                API.getAppData().then(() => {
                    const rPill = (arr, t) => arr.map(i => `<button onclick="AppHandlers.loadList('${t}', '${i.slug}', '${i.name}'); AppHandlers.toggleMenuModal()" class="flex items-center justify-center text-center text-[12px] sm:text-[13px] text-gray-300 py-2.5 px-2 rounded-lg bg-white/5 hover:bg-white/10 hover:text-primary transition border border-white/5 shadow-sm min-h-[44px] leading-snug break-words">${i.name}</button>`).join('');
                    const gEl = document.getElementById('dropdown-genres');
                    const cEl = document.getElementById('dropdown-countries');
                    if(gEl && AppState.genres.length) gEl.innerHTML = rPill(AppState.genres, 'the-loai');
                    if(cEl && AppState.countries.length) cEl.innerHTML = rPill(AppState.countries, 'quoc-gia');
                });
                AppHandlers.loadHome(); 
                AppHandlers.restoreState(); 
                window.addEventListener('beforeunload', AppHandlers.saveCurrentVideoState);
                
                window.addEventListener('click', (e) => {
                    const sDropdown = document.getElementById('server-dropdown-list');
                    if (sDropdown && !e.target.closest('#current-server-display') && !e.target.closest('#dropdown-chevron') && !e.target.closest('#server-dropdown-list')) {
                        sDropdown.classList.add('hidden');
                        const chevron = document.getElementById('dropdown-chevron');
                        if (chevron) chevron.style.transform = 'rotate(0deg)';
                        AppState.isServerDropdownOpen = false;
                    }
                });
            },
            
            handleTouchStart: (e) => {
                AppState.isInteractingWithHero = true;
                AppHandlers.pauseHeroInterval();
                AppState.touchStartX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
            },
            handleTouchEnd: (e) => {
                AppState.touchEndX = e.changedTouches ? e.changedTouches[0].screenX : e.screenX;
                AppHandlers.handleSwipe();
                AppState.isInteractingWithHero = false;
                AppHandlers.startHeroInterval();
            },
            handleMouseLeave: (e) => {
                if (AppState.isInteractingWithHero) {
                    AppState.isInteractingWithHero = false;
                    AppHandlers.startHeroInterval();
                }
            },
            handleSwipe: () => {
                const threshold = 50;
                if (AppState.touchEndX < AppState.touchStartX - threshold) {
                    let nextIndex = AppState.currentHeroSlide + 1;
                    if(nextIndex >= AppState.totalHeroSlides) nextIndex = 0;
                    AppHandlers.changeHeroSlide(nextIndex, true);
                }
                if (AppState.touchEndX > AppState.touchStartX + threshold) {
                    let prevIndex = AppState.currentHeroSlide - 1;
                    if(prevIndex < 0) prevIndex = AppState.totalHeroSlides - 1;
                    AppHandlers.changeHeroSlide(prevIndex, true);
                }
            },
            pauseHeroInterval: () => {
                if(AppState.heroInterval) {
                    clearInterval(AppState.heroInterval);
                    AppState.heroInterval = null;
                }
            },
            startHeroInterval: () => {
                AppHandlers.pauseHeroInterval();
                AppState.heroInterval = setInterval(() => {
                    if(document.getElementById('hero-slider') && AppState.currentView === 'home' && AppState.totalHeroSlides > 0 && !AppState.isInteractingWithHero) {
                        let nextIndex = AppState.currentHeroSlide + 1;
                        if(nextIndex >= AppState.totalHeroSlides) nextIndex = 0;
                        AppHandlers.changeHeroSlide(nextIndex, false);
                    }
                }, CONFIG.HERO_AUTO_PLAY_INTERVAL);
            },
            
            changeHeroSlide: (nextIndex, isManual = false) => {
                if(isManual) AppHandlers.startHeroInterval(); 
                if(nextIndex === AppState.currentHeroSlide) return;

                const slider = document.getElementById('hero-slider');
                if(!slider) return;

                const currentEl = slider.querySelector(`.hero-slide-item[data-index="${AppState.currentHeroSlide}"]`);
                const nextEl = slider.querySelector(`.hero-slide-item[data-index="${nextIndex}"]`);

                if(currentEl) {
                    currentEl.classList.remove('opacity-100', 'pointer-events-auto', 'z-10');
                    currentEl.classList.add('opacity-0', 'pointer-events-none', 'z-0');
                }
                if(nextEl) {
                    nextEl.classList.remove('opacity-0', 'pointer-events-none', 'z-0');
                    nextEl.classList.add('opacity-100', 'pointer-events-auto', 'z-10');
                }

                for(let i=0; i<AppState.totalHeroSlides; i++) {
                    const dot = document.getElementById(`dot-${i}`);
                    if(dot) {
                        if(i === nextIndex) dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-primary w-6";
                        else dot.className = "w-2 h-2 rounded-full cursor-pointer transition-all duration-300 bg-white/30";
                    }
                }
                AppState.currentHeroSlide = nextIndex;
            },

            saveCurrentVideoState: () => {
                if(AppState.currentView === 'watch' && AppState.watchData && AppState.isPlaying) {
                    const video = document.getElementById('kt-player');
                    let currentTime = 0;
                    if(video) currentTime = video.currentTime;
                    
                    const m = AppState.watchData.movie;
                    const eps = AppState.watchData.episodes;
                    if(eps && eps[0] && m) {
                         Utils.updateHistoryTime(m, AppState.activeEpIdx, eps[AppState.activeServerIdx].server_data[AppState.activeEpIdx].name, currentTime);
                    }
                }
            },

            navigate: (viewId) => {
                if (AppState.currentView !== viewId) AppState.previousView = AppState.currentView;

                if (AppState.currentView === 'watch' && viewId !== 'watch') { 
                    AppHandlers.saveCurrentVideoState();
                    if(AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if(AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    if(AppState.bgSlideInterval) { clearInterval(AppState.bgSlideInterval); AppState.bgSlideInterval = null; }
                    
                    document.getElementById('view-watch').innerHTML = ''; 
                    AppState.isPlaying = false; 
                }

                AppState.currentView = viewId;
                ['home', 'watch', 'search', 'history', 'actor', 'admin'].forEach(id => {
                    const el = document.getElementById(`view-${id}`);
                    if (el) el.classList.toggle('hidden', id !== viewId);
                });
                window.scrollTo(0, 0);
                
                document.getElementById('navbar').className = `fixed top-0 w-full z-40 transition-all duration-300 border-b border-white/5 ${viewId === 'watch' ? 'bg-gradient-to-b from-black/80 to-transparent' : 'bg-app/90 backdrop-blur-md'}`;

                if (viewId === 'home' && !document.getElementById('view-home').innerHTML.trim()) AppHandlers.loadHome();
                if (viewId === 'history') AppHandlers.renderHistory('recent');
                if (viewId === 'admin') AppHandlers.renderAdmin();

                AppHandlers.persistState();
            },

            // ================= THÊM MỚI: AppHandlers cho khu vực Admin =================

            // Gọi API có gắn sẵn token admin; nếu token hết hạn/sai (401) thì tự đăng xuất
            adminAuthedFetch: async (path, options = {}) => {
                const headers = { ...(options.headers || {}), 'Authorization': `Bearer ${AppState.adminToken}` };
                // ĐÃ SỬA: cache:'no-store' để tránh trình duyệt tự cache response của các thao tác quản trị.
                const res = await fetch(`${CONFIG.WORKER_BASE}${path}`, { ...options, headers, cache: 'no-store' });
                if (res.status === 401) {
                    AppHandlers.adminLogout();
                    Utils.showToast('Phiên đăng nhập đã hết hạn, vui lòng đăng nhập lại.', 'error');
                    throw new Error('unauthorized');
                }
                return res;
            },

            renderAdmin: () => {
                const container = document.getElementById('view-admin');
                if (!AppState.adminToken) {
                    container.innerHTML = Render.adminLoginBox();
                    return;
                }
                container.innerHTML = Render.adminDashboard();
                AppHandlers.adminSwitchTab(AppState.adminActiveTab || 'recommended');
            },

            adminLogin: async () => {
                const input = document.getElementById('admin-password-input');
                const btn = document.getElementById('admin-login-btn');
                const errEl = document.getElementById('admin-login-error');
                const password = (input?.value || '').trim();
                if (errEl) errEl.classList.add('hidden');
                if (!password) return;

                if (btn) { btn.disabled = true; btn.textContent = 'Đang đăng nhập...'; }
                try {
                    const res = await fetch(`${CONFIG.WORKER_BASE}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.token) {
                        AppState.adminToken = data.token;
                        localStorage.setItem('ktuong_admin_token', data.token);
                        AppHandlers.renderAdmin();
                    } else {
                        if (errEl) { errEl.textContent = 'Sai mật khẩu, vui lòng thử lại.'; errEl.classList.remove('hidden'); }
                    }
                } catch (e) {
                    if (errEl) { errEl.textContent = 'Lỗi kết nối tới máy chủ, thử lại sau.'; errEl.classList.remove('hidden'); }
                } finally {
                    if (btn) { btn.disabled = false; btn.textContent = 'Đăng nhập'; }
                }
            },

            adminLogout: () => {
                AppState.adminToken = null;
                localStorage.removeItem('ktuong_admin_token');
                AppHandlers.renderAdmin();
            },

            adminSwitchTab: (tab) => {
                AppState.adminActiveTab = tab;
                const recBtn = document.getElementById('admin-tab-btn-recommended');
                const postBtn = document.getElementById('admin-tab-btn-posts');
                const rowsBtn = document.getElementById('admin-tab-btn-rows');
                const activeCls = 'px-4 py-2.5 text-sm font-semibold border-b-2 transition border-primary text-primary';
                const inactiveCls = 'px-4 py-2.5 text-sm font-semibold border-b-2 transition border-transparent text-muted hover:text-white';
                if (recBtn) recBtn.className = tab === 'recommended' ? activeCls : inactiveCls;
                if (postBtn) postBtn.className = tab === 'posts' ? activeCls : inactiveCls;
                if (rowsBtn) rowsBtn.className = tab === 'rows' ? activeCls : inactiveCls;

                const content = document.getElementById('admin-tab-content');
                if (!content) return;
                if (tab === 'recommended') {
                    content.innerHTML = Render.adminRecommendedTab();
                    AppHandlers.adminLoadRecommended();
                } else if (tab === 'rows') {
                    content.innerHTML = Render.adminRowsTab();
                    AppHandlers.adminLoadRows();
                } else {
                    content.innerHTML = Render.adminPostsTab();
                    AppHandlers.adminLoadPosts();
                }
            },

            // --- Phim đề xuất ---
            adminLoadRecommended: async () => {
                try {
                    const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/recommended`);
                    const data = await res.json();
                    AppState.recommendedMovies = data.items || [];
                } catch (e) { AppState.recommendedMovies = []; }
                AppHandlers.adminRenderRecommendedList();
            },

            adminRenderRecommendedList: () => {
                const listDiv = document.getElementById('admin-recommended-list');
                const countEl = document.getElementById('admin-rec-count');
                if (countEl) countEl.textContent = AppState.recommendedMovies.length;
                if (!listDiv) return;
                listDiv.innerHTML = AppState.recommendedMovies.length
                    ? AppState.recommendedMovies.map((m, i) => Render.adminRecommendedCard(m, i)).join('')
                    : `<div class="col-span-full text-center text-muted py-8 text-sm">Chưa có phim đề xuất nào. Tìm và bấm vào phim ở trên để thêm.</div>`;
            },

            adminSearchMovies: (val) => {
                const kw = val.trim();
                if (AppState.adminSearchTimeout) clearTimeout(AppState.adminSearchTimeout);
                const resDiv = document.getElementById('admin-search-results');
                if (!kw) { if (resDiv) resDiv.innerHTML = ''; return; }
                if (resDiv) resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;

                AppState.adminSearchTimeout = setTimeout(async () => {
                    try {
                        const data = await API.search(kw, 24);
                        AppState.adminSearchResults = data?.data?.items || [];
                    } catch (e) { AppState.adminSearchResults = []; }
                    if (!resDiv) return;
                    resDiv.innerHTML = AppState.adminSearchResults.length
                        ? AppState.adminSearchResults.map((m, i) => Render.adminSearchResultCard(m, i)).join('')
                        : `<div class="col-span-full text-center text-muted py-6 text-sm">Không tìm thấy phim phù hợp.</div>`;
                }, 400);
            },

            adminAddRecommended: (index) => {
                const movie = AppState.adminSearchResults[index];
                if (!movie) return;
                const already = AppState.recommendedMovies.some(m => m.slug === movie.slug && m.sourceProvider === movie.sourceProvider);
                if (already) { Utils.showToast('Phim này đã có trong danh sách đề xuất.'); return; }
                if (AppState.recommendedMovies.length >= 50) { Utils.showToast('Danh sách đề xuất đã đầy (tối đa 50 phim).', 'error'); return; }
                AppState.recommendedMovies.push(movie);
                AppHandlers.adminRenderRecommendedList();
                Utils.showToast(`Đã thêm "${movie.name}" — nhớ bấm "Lưu danh sách" để áp dụng.`);
            },

            adminRemoveRecommended: (index) => {
                AppState.recommendedMovies.splice(index, 1);
                AppHandlers.adminRenderRecommendedList();
            },

            adminSaveRecommended: async () => {
                try {
                    const res = await AppHandlers.adminAuthedFetch('/recommended', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items: AppState.recommendedMovies })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.success) {
                        Utils.showToast('Đã lưu danh sách phim đề xuất!');
                    } else {
                        Utils.showToast('Lưu thất bại, thử lại sau.', 'error');
                    }
                } catch (e) { if (e.message !== 'unauthorized') Utils.showToast('Lỗi kết nối, thử lại sau.', 'error'); }
            },

            // --- Dòng phim thông minh (thêm dòng phim ở trang chủ chỉ bằng cách gõ tên) ---
            adminLoadRows: async () => {
                if (!AppState.genres.length || !AppState.countries.length) { try { await API.getAppData(); } catch (e) {} }
                AppHandlers.adminRowTypeChanged();
                try {
                    const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/homepage-rows`);
                    const data = await res.json();
                    // CẬP NHẬT: dùng chung Utils.buildEffectiveRows để admin thấy và SỬA ĐƯỢC TOÀN BỘ dòng phim,
                    // kể cả các dòng "mặc định" (trước đây không thể đổi tên/ẩn/xoá từ giao diện quản trị).
                    AppState.homepageRows = Utils.buildEffectiveRows(data.rows);
                } catch (e) { AppState.homepageRows = Utils.buildEffectiveRows(null); }
                AppHandlers.adminRenderRowsList();
            },

            // THÊM MỚI: khôi phục toàn bộ dòng phim về đúng bộ mặc định gốc (CONFIG.MOVIE_ROWS), dùng khi
            // admin muốn "reset" lại sau khi đã chỉnh sửa/xoá/ẩn quá nhiều. Cần bấm "Lưu tất cả" sau đó để áp dụng.
            adminResetRowsToDefault: () => {
                if (!confirm('Khôi phục toàn bộ dòng phim về mặc định ban đầu? Mọi tuỳ chỉnh (đổi tên, ẩn, xoá, ẩn phim lẻ) sẽ mất, và các dòng bạn tự thêm cũng sẽ bị xoá. Nhớ bấm "Lưu tất cả" để áp dụng.')) return;
                AppState.homepageRows = CONFIG.MOVIE_ROWS.map(r => ({ ...r, hidden: false, excludedSlugs: [], isDefault: true }));
                AppState.adminRowMoviesCache = {};
                AppHandlers.adminRenderRowsList();
                Utils.showToast('Đã khôi phục về mặc định — nhớ bấm "Lưu tất cả" để áp dụng.');
            },

            adminRenderRowsList: () => {
                const listDiv = document.getElementById('admin-rows-list');
                const countEl = document.getElementById('admin-rows-count');
                const total = AppState.homepageRows.length;
                if (countEl) countEl.textContent = total;
                if (!listDiv) return;
                // THÊM MỚI: lọc theo tên dòng phim, nhưng vẫn giữ ĐÚNG index gốc trong AppState.homepageRows
                // (để các nút lên/xuống/sửa/xoá vẫn thao tác đúng dòng đang lọc, không lệch vị trí).
                const filterKey = (AppState.adminRowsFilter || '').trim().toLowerCase();
                const entries = AppState.homepageRows
                    .map((r, i) => ({ r, i }))
                    .filter(({ r }) => !filterKey || (r.title || '').toLowerCase().includes(filterKey));
                if (!total) {
                    listDiv.innerHTML = `<div class="text-center text-muted py-8 text-sm">Chưa có dòng phim nào. Thêm dòng mới ở trên.</div>`;
                } else if (!entries.length) {
                    listDiv.innerHTML = `<div class="text-center text-muted py-8 text-sm">Không tìm thấy dòng phim nào khớp "${Utils.escapeHtml(AppState.adminRowsFilter)}".</div>`;
                } else {
                    listDiv.innerHTML = entries.map(({ r, i }) => Render.adminRowItem(r, i, total)).join('');
                }
            },

            adminFilterRows: (val) => {
                AppState.adminRowsFilter = val;
                AppHandlers.adminRenderRowsList();
            },

            // Đổi loại (thể loại/quốc gia/danh sách) -> nạp lại gợi ý tên tương ứng vào ô datalist
            adminRowTypeChanged: () => {
                const typeSel = document.getElementById('admin-row-type');
                const datalist = document.getElementById('admin-row-name-list');
                if (!typeSel || !datalist) return;
                const type = typeSel.value;
                const source = type === 'the-loai' ? AppState.genres : type === 'quoc-gia' ? AppState.countries : DANH_SACH_OPTIONS;
                datalist.innerHTML = (source || []).map(o => `<option value="${Utils.escapeHtml(o.name)}"></option>`).join('');
            },

            // Gõ tên -> tự dò slug đúng (so khớp không phân biệt hoa thường/dấu), trả về {name, slug} hoặc null
            adminResolveRowByName: (type, typedName) => {
                const source = type === 'the-loai' ? AppState.genres : type === 'quoc-gia' ? AppState.countries : DANH_SACH_OPTIONS;
                const key = API._normKey(typedName);
                if (!key) return null;
                return (source || []).find(o => API._normKey(o.name) === key) || null;
            },

            adminAddRow: () => {
                const titleEl = document.getElementById('admin-row-title');
                const typeEl = document.getElementById('admin-row-type');
                const nameEl = document.getElementById('admin-row-name');
                const limitEl = document.getElementById('admin-row-limit');
                const rankEl = document.getElementById('admin-row-rank');
                const popEl = document.getElementById('admin-row-popularity');

                const title = (titleEl?.value || '').trim();
                const type = typeEl?.value || 'the-loai';
                const typedName = (nameEl?.value || '').trim();
                const limit = Math.min(Math.max(parseInt(limitEl?.value) || 12, 4), 24);

                if (!title) { Utils.showToast('Vui lòng nhập tên dòng phim.', 'error'); return; }
                if (!typedName) { Utils.showToast('Vui lòng gõ tên thể loại/quốc gia/danh sách.', 'error'); return; }

                const matched = AppHandlers.adminResolveRowByName(type, typedName);
                if (!matched) { Utils.showToast(`Không tìm thấy "${typedName}" trong danh sách ${type === 'the-loai' ? 'thể loại' : type === 'quoc-gia' ? 'quốc gia' : 'danh sách'}. Vui lòng chọn đúng tên gợi ý.`, 'error'); return; }

                // CẬP NHẬT: chặn thêm trùng — giờ chỉ còn 1 danh sách duy nhất (AppState.homepageRows đã gồm
                // cả dòng mặc định lẫn dòng tự thêm) nên chỉ cần kiểm tra trùng type+slug trong chính mảng này.
                const isDup = AppState.homepageRows.some(r => r.type === type && r.slug === matched.slug);
                if (isDup) {
                    Utils.showToast(`Đã có dòng phim khác dùng "${typedName}" rồi, vui lòng chọn thể loại/quốc gia/danh sách khác.`, 'error');
                    return;
                }

                if (AppState.homepageRows.length >= 30) { Utils.showToast('Đã đạt tối đa 30 dòng phim.', 'error'); return; }

                AppState.homepageRows.push({
                    title, type, slug: matched.slug, limit,
                    rank: !!rankEl?.checked, popularity: !!popEl?.checked, hidden: false, excludedSlugs: []
                });
                AppHandlers.adminRenderRowsList();
                if (titleEl) titleEl.value = '';
                if (nameEl) nameEl.value = '';
                Utils.showToast(`Đã thêm dòng "${title}" — nhớ bấm "Lưu tất cả" để áp dụng.`);
            },

            adminRemoveRow: (index) => {
                const row = AppState.homepageRows[index];
                if (!row) return;
                // THÊM MỚI: xác nhận trước khi xoá — giờ admin có thể xoá cả dòng mặc định nên cần cảnh báo rõ,
                // dòng mặc định vẫn có thể lấy lại bằng nút "Khôi phục mặc định".
                const warn = row.isDefault ? ' Đây là dòng mặc định, nhưng bạn vẫn có thể lấy lại qua nút "Khôi phục mặc định".' : '';
                if (!confirm(`Xoá dòng phim "${row.title}"?${warn}`)) return;
                AppState.homepageRows.splice(index, 1);
                // Xóa cache danh sách phim đã tải (nếu có) vì index của các dòng phía sau sẽ dịch chuyển
                AppState.adminRowMoviesCache = {};
                AppHandlers.adminRenderRowsList();
                Utils.showToast(`Đã xoá dòng "${row.title}" — nhớ bấm "Lưu tất cả" để áp dụng.`);
            },

            adminMoveRow: (index, dir) => {
                const target = index + dir;
                if (target < 0 || target >= AppState.homepageRows.length) return;
                const arr = AppState.homepageRows;
                [arr[index], arr[target]] = [arr[target], arr[index]];
                // Xóa cache vì vị trí (index) của 2 dòng vừa đổi chỗ đã thay đổi
                AppState.adminRowMoviesCache = {};
                AppHandlers.adminRenderRowsList();
            },

            adminToggleRowHidden: (index) => {
                AppState.homepageRows[index].hidden = !AppState.homepageRows[index].hidden;
                AppHandlers.adminRenderRowsList();
            },

            // THÊM MỚI: sửa tên hiển thị của 1 dòng phim tuỳ chỉnh (không đổi thể loại/quốc gia/danh sách gốc)
            adminRenameRow: (index) => {
                const row = AppState.homepageRows[index];
                if (!row) return;
                const newTitle = prompt('Nhập tên mới cho dòng phim:', row.title);
                if (newTitle === null) return; // bấm Hủy
                const trimmed = newTitle.trim().slice(0, 60);
                if (!trimmed) { Utils.showToast('Tên dòng phim không được để trống.', 'error'); return; }
                row.title = trimmed;
                AppHandlers.adminRenderRowsList();
                Utils.showToast('Đã đổi tên — nhớ bấm "Lưu tất cả" để áp dụng.');
            },

            // THÊM MỚI: mở/đóng bảng quản lý ẩn-hiện từng phim cụ thể trong 1 dòng, tự tải danh sách phim khi mở lần đầu
            adminToggleRowMovies: async (index) => {
                const panel = document.getElementById(`admin-row-movies-panel-${index}`);
                if (!panel) return;
                const row = AppState.homepageRows[index];
                if (!row) return;

                // Nếu đang mở thì đóng lại (không cần tải lại)
                if (panel.dataset.open === '1') {
                    panel.dataset.open = '0';
                    panel.innerHTML = '';
                    return;
                }
                panel.dataset.open = '1';
                panel.innerHTML = Render.adminRowMoviesPanel(row, index, [], true);

                try {
                    // Lấy nhiều hơn limit hiển thị thực tế để admin có nhiều lựa chọn ẩn/hiện
                    const fetchLimit = Math.min(Math.max(row.limit * 3, 30), 60);
                    const res = await API.getList(row.type, row.slug, fetchLimit);
                    const movies = res?.data?.items || res?.items || [];
                    // Lưu cache để adminToggleExcludeMovie không cần gọi lại API mỗi lần tick ẩn/hiện
                    if (!AppState.adminRowMoviesCache) AppState.adminRowMoviesCache = {};
                    AppState.adminRowMoviesCache[index] = movies;
                    if (panel.dataset.open === '1') panel.innerHTML = Render.adminRowMoviesPanel(row, index, movies, false);
                } catch (e) {
                    if (panel.dataset.open === '1') panel.innerHTML = Render.adminRowMoviesPanel(row, index, [], false);
                }
            },

            // THÊM MỚI: bấm 1 phim trong bảng quản lý -> thêm/bớt khỏi excludedSlugs của dòng đó
            adminToggleExcludeMovie: (index, slug) => {
                const row = AppState.homepageRows[index];
                if (!row) return;
                if (!Array.isArray(row.excludedSlugs)) row.excludedSlugs = [];
                const pos = row.excludedSlugs.indexOf(slug);
                if (pos >= 0) row.excludedSlugs.splice(pos, 1);
                else row.excludedSlugs.push(slug);

                const panel = document.getElementById(`admin-row-movies-panel-${index}`);
                const movies = AppState.adminRowMoviesCache?.[index] || [];
                if (panel) panel.innerHTML = Render.adminRowMoviesPanel(row, index, movies, false);
                // Cập nhật luôn dòng thông tin "đang ẩn N phim" phía trên mà không cần đóng/mở lại bảng
                // (dùng data-row-index thay vì nth-child vì danh sách có thể đang bị lọc theo từ khóa tìm kiếm)
                const rowItemEl = document.querySelector(`#admin-rows-list > div[data-row-index="${index}"]`);
                const countText = rowItemEl ? rowItemEl.querySelector('p.text-xs.text-muted') : null;
                if (countText) {
                    countText.textContent = `${row.type === 'the-loai' ? 'Thể loại' : row.type === 'quoc-gia' ? 'Quốc gia' : 'Danh sách'} · slug: ${row.slug} · ${row.limit} phim${row.rank ? ' · có thứ hạng' : ''}${row.popularity ? ' · ưu tiên phổ biến' : ''}${row.excludedSlugs.length ? ` · đang ẩn ${row.excludedSlugs.length} phim` : ''}`;
                }
            },

            adminSaveRows: async () => {
                try {
                    const res = await AppHandlers.adminAuthedFetch('/homepage-rows', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ rows: AppState.homepageRows })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.success) {
                        Utils.showToast('Đã lưu các dòng phim!');
                    } else {
                        Utils.showToast('Lưu thất bại, thử lại sau.', 'error');
                    }
                } catch (e) { if (e.message !== 'unauthorized') Utils.showToast('Lỗi kết nối, thử lại sau.', 'error'); }
            },

            // --- Bài viết ---
            adminLoadPosts: async () => {
                const listDiv = document.getElementById('admin-posts-list');
                try {
                    const [postsRes, profileRes] = await Promise.all([
                        Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/posts`),
                        Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/admin/profile`)
                    ]);
                    const postsData = await postsRes.json().catch(() => ({}));
                    const profileData = await profileRes.json().catch(() => ({}));
                    AppState.posts = postsData.items || [];
                    if (profileData?.name) {
                        AppState.adminProfile = { name: profileData.name, avatar: profileData.avatar || '' };
                        const nameInput = document.getElementById('admin-profile-name-input');
                        const composerName = document.getElementById('admin-post-composer-name');
                        const avatarPreview = document.getElementById('admin-avatar-preview');
                        const composerAvatar = document.getElementById('admin-post-composer-avatar');
                        if (nameInput) nameInput.value = profileData.name;
                        if (composerName) composerName.textContent = profileData.name;
                        if (profileData.avatar) {
                            if (avatarPreview) avatarPreview.src = profileData.avatar;
                            if (composerAvatar) composerAvatar.src = profileData.avatar;
                        }
                    }
                } catch (e) { AppState.posts = AppState.posts || []; }
                if (!listDiv) return;
                listDiv.innerHTML = AppState.posts.length
                    ? AppState.posts.map(p => Render.adminPostItem(p)).join('')
                    : `<div class="text-center text-muted py-8 text-sm">Chưa có bài viết nào.</div>`;
            },

            // Đọc 1 File thành base64 thuần (không kèm tiền tố "data:image/...;base64,")
            _fileToRawBase64: (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
                reader.onerror = reject;
                reader.readAsDataURL(file);
            }),

            // Upload 1 ảnh lên GitHub qua Worker (folder: 'avatar' hoặc 'posts') -> trả về URL công khai hoặc null
            adminUploadImageToGithub: async (file, folder) => {
                if (!file) return null;
                if (file.size > 5 * 1024 * 1024) { Utils.showToast('Ảnh quá lớn (tối đa 5MB).', 'error'); return null; }
                const dataBase64 = await AppHandlers._fileToRawBase64(file);
                const res = await AppHandlers.adminAuthedFetch('/admin/upload-image', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dataBase64, filename: file.name, folder })
                });
                const data = await res.json().catch(() => ({}));
                if (res.ok && data.success) return data.url;
                if (data.error === 'github_not_configured') {
                    Utils.showToast('Chưa cấu hình GitHub trên Worker (GITHUB_TOKEN/GITHUB_REPO). Xem hướng dẫn trong code worker.js.', 'error');
                } else {
                    Utils.showToast('Tải ảnh lên thất bại, thử lại sau.', 'error');
                }
                return null;
            },

            adminPickAvatarFile: async (file) => {
                if (!file) return;
                const preview = document.getElementById('admin-avatar-preview');
                const composerAvatar = document.getElementById('admin-post-composer-avatar');
                const statusEl = document.getElementById('admin-avatar-status');
                // Xem trước ngay bằng ảnh local trong lúc chờ upload lên GitHub
                const localUrl = URL.createObjectURL(file);
                if (preview) preview.src = localUrl;
                if (statusEl) { statusEl.textContent = 'Đang tải ảnh đại diện lên GitHub...'; statusEl.classList.remove('hidden'); }

                const url = await AppHandlers.adminUploadImageToGithub(file, 'avatar');
                if (!url) { if (statusEl) statusEl.classList.add('hidden'); return; }

                AppState.adminProfile = { ...AppState.adminProfile, avatar: url };
                if (preview) preview.src = url;
                if (composerAvatar) composerAvatar.src = url;
                if (statusEl) { statusEl.textContent = 'Đã tải ảnh lên — nhớ bấm "Lưu" để áp dụng tên + ảnh đại diện.'; }
                Utils.showToast('Đã tải ảnh đại diện lên GitHub!');
            },

            adminPickPostImage: (file) => {
                if (!file) return;
                AppState.adminPendingPostImageFile = file;
                const wrap = document.getElementById('admin-post-image-preview-wrap');
                const img = document.getElementById('admin-post-image-preview');
                if (img) img.src = URL.createObjectURL(file);
                if (wrap) wrap.classList.remove('hidden');
            },

            adminRemovePostImage: () => {
                AppState.adminPendingPostImageFile = null;
                const wrap = document.getElementById('admin-post-image-preview-wrap');
                const input = document.getElementById('admin-post-image-file-input');
                if (wrap) wrap.classList.add('hidden');
                if (input) input.value = '';
            },

            adminSaveProfile: async () => {
                const input = document.getElementById('admin-profile-name-input');
                const name = (input?.value || '').trim();
                if (!name) { Utils.showToast('Vui lòng nhập tên hiển thị.', 'error'); return; }
                const avatar = AppState.adminProfile?.avatar || '';
                try {
                    const res = await AppHandlers.adminAuthedFetch('/admin/profile', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ name, avatar })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.success) {
                        AppState.adminProfile = { name: data.name, avatar: data.avatar || '' };
                        const composerName = document.getElementById('admin-post-composer-name');
                        if (composerName) composerName.textContent = data.name;
                        const statusEl = document.getElementById('admin-avatar-status');
                        if (statusEl) statusEl.classList.add('hidden');
                        const listDiv = document.getElementById('admin-posts-list');
                        if (listDiv) listDiv.innerHTML = AppState.posts.length
                            ? AppState.posts.map(p => Render.adminPostItem(p)).join('')
                            : `<div class="text-center text-muted py-8 text-sm">Chưa có bài viết nào.</div>`;
                        Utils.showToast('Đã lưu hồ sơ hiển thị!');
                    } else {
                        Utils.showToast('Lưu thất bại, thử lại sau.', 'error');
                    }
                } catch (e) { if (e.message !== 'unauthorized') Utils.showToast('Lỗi kết nối, thử lại sau.', 'error'); }
            },

            adminCreatePost: async () => {
                const textarea = document.getElementById('admin-post-content');
                const content = (textarea?.value || '').trim();
                const submitBtn = document.getElementById('admin-post-submit-btn');
                if (!content && !AppState.adminPendingPostImageFile) return;

                if (submitBtn) { submitBtn.disabled = true; submitBtn.textContent = 'Đang đăng...'; }

                let images = [];
                if (AppState.adminPendingPostImageFile) {
                    const url = await AppHandlers.adminUploadImageToGithub(AppState.adminPendingPostImageFile, 'posts');
                    if (url) images = [url];
                }

                const newPost = { id: crypto.randomUUID(), content, images, created_at: new Date().toISOString() };
                const updated = [newPost, ...AppState.posts];

                try {
                    const res = await AppHandlers.adminAuthedFetch('/posts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items: updated })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.success) {
                        AppState.posts = updated;
                        if (textarea) textarea.value = '';
                        AppHandlers.adminRemovePostImage();
                        const listDiv = document.getElementById('admin-posts-list');
                        if (listDiv) listDiv.innerHTML = AppState.posts.map(p => Render.adminPostItem(p)).join('');
                        Utils.showToast('Đã đăng bài viết!');
                    } else {
                        Utils.showToast('Đăng bài thất bại, thử lại sau.', 'error');
                    }
                } catch (e) { if (e.message !== 'unauthorized') Utils.showToast('Lỗi kết nối, thử lại sau.', 'error'); }
                finally { if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Đăng bài'; } }
            },

            adminDeletePost: async (id) => {
                if (!confirm('Xóa bài viết này?')) return;
                const updated = AppState.posts.filter(p => p.id !== id);
                try {
                    const res = await AppHandlers.adminAuthedFetch('/posts', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ items: updated })
                    });
                    const data = await res.json().catch(() => ({}));
                    if (res.ok && data.success) {
                        AppState.posts = updated;
                        const listDiv = document.getElementById('admin-posts-list');
                        if (listDiv) listDiv.innerHTML = AppState.posts.length ? AppState.posts.map(p => Render.adminPostItem(p)).join('') : `<div class="text-center text-muted py-8 text-sm">Chưa có bài viết nào.</div>`;
                        Utils.showToast('Đã xóa bài viết.');
                    } else {
                        Utils.showToast('Xóa thất bại, thử lại sau.', 'error');
                    }
                } catch (e) { if (e.message !== 'unauthorized') Utils.showToast('Lỗi kết nối, thử lại sau.', 'error'); }
            },

            backToWatch: () => {
                AppHandlers.navigate('watch');
                if (AppState.watchData && AppState.watchData.episodes && AppState.watchData.episodes.length) {
                    AppHandlers.playVideo();
                } else {
                    AppHandlers.navigate('home');
                }
            },

            goBack: () => {
                if (AppState.currentView === 'watch' && AppState.isPlaying) {
                    AppHandlers.saveCurrentVideoState();
                    if (AppState.hlsInstance) { AppState.hlsInstance.destroy(); AppState.hlsInstance = null; }
                    if (AppState.saveInterval) { clearInterval(AppState.saveInterval); AppState.saveInterval = null; }
                    AppState.isPlaying = false;
                    document.getElementById('view-watch').innerHTML = Render.watchUI(AppState.watchData, false, AppState.activeServerIdx, AppState.activeEpIdx);
                    window.scrollTo(0, 0);
                    AppHandlers.persistState();
                    return;
                }
                AppHandlers.navigate(AppState.previousView || 'home');
            },

            persistState: () => {
                try {
                    const s = { view: AppState.currentView, previousView: AppState.previousView };
                    if (AppState.currentView === 'watch' && AppState.watchData && AppState.watchData.movie) {
                        s.watchSlug = AppState.watchData.movie.slug; s.watchProvider = AppState.currentSourceProvider;
                        s.isPlaying = AppState.isPlaying; s.serverIdx = AppState.activeServerIdx; s.epIdx = AppState.activeEpIdx;
                    }
                    if (AppState.currentView === 'actor' && AppState.currentActorId) s.actorId = AppState.currentActorId;
                    localStorage.setItem('ktuong_resume_state', JSON.stringify(s));
                } catch (e) {}
            },

            restoreState: async () => {
                let saved = null;
                try { saved = JSON.parse(localStorage.getItem('ktuong_resume_state') || 'null'); } catch (e) {}
                if (!saved || !saved.view || saved.view === 'home') return;

                AppState.previousView = saved.previousView || 'home';

                if (saved.view === 'watch' && saved.watchSlug) {
                    await AppHandlers.goToWatch(saved.watchSlug, saved.watchProvider || 'OP');
                    if (saved.isPlaying && AppState.watchData && AppState.watchData.episodes && AppState.watchData.episodes.length) {
                        AppState.activeServerIdx = saved.serverIdx || 0;
                        AppState.activeEpIdx = saved.epIdx || 0;
                        AppHandlers.playVideo();
                    }
                } else if (saved.view === 'actor' && saved.actorId) {
                    AppHandlers.openActorDetail(saved.actorId);
                } else if (saved.view === 'search' || saved.view === 'history') {
                    AppHandlers.navigate(saved.view);
                }
            },

            downloadSource: async () => {
                try {
                    const response = await fetch(window.location.href);
                    if (response.ok) {
                        const text = await response.text();
                        AppHandlers._triggerDownload(text);
                        return;
                    }
                } catch(e) {}
                
                let clone = document.documentElement.cloneNode(true);
                const viewsToEmpty = ['view-home', 'view-watch', 'search-results', 'history-content', 'view-actor'];
                viewsToEmpty.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.innerHTML = ''; });
                
                const viewsToHide = ['view-watch', 'view-search', 'view-history', 'view-actor'];
                viewsToHide.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) el.classList.add('hidden'); });
                const homeView = clone.querySelector('#view-home'); if(homeView) homeView.classList.remove('hidden');
                
                const searchInput = clone.querySelector('#search-input'); if(searchInput) searchInput.value = '';
                
                const overlay = clone.querySelector('#menu-overlay'); if(overlay) overlay.className = "fixed inset-0 bg-black/70 z-50 transition-opacity duration-300 backdrop-blur-sm hidden opacity-0";
                const modal = clone.querySelector('#menu-modal'); if(modal) { modal.classList.remove('bottom-sheet-open'); modal.classList.add('bottom-sheet-closed'); }
                
                const dropdowns = ['dropdown-genres', 'dropdown-countries'];
                dropdowns.forEach(id => { const el = clone.querySelector(`#${id}`); if(el) { el.classList.add('hidden'); el.innerHTML = ''; } });
                
                clone.querySelectorAll('style:not(#custom-core-styles)').forEach(s => s.remove());
                clone.querySelectorAll('script[data-bard-injected], script[injected]').forEach(s => s.remove());
                
                const finalHtml = "<!DOCTYPE html>\n<html lang=\"vi\">\n" + clone.innerHTML + "\n</html>";
                AppHandlers._triggerDownload(finalHtml);
            },

            _triggerDownload: (htmlContent) => {
                const blob = new Blob([htmlContent], { type: "text/html;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url; a.download = "ktuongfx_source_code.html";
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                AppHandlers.toggleMenuModal();
            },

            toggleMenuModal: () => {
                const modal = document.getElementById('menu-modal'), overlay = document.getElementById('menu-overlay');
                if(modal.classList.contains('bottom-sheet-closed')) {
                    modal.classList.replace('bottom-sheet-closed', 'bottom-sheet-open');
                    overlay.classList.remove('hidden'); setTimeout(() => overlay.classList.remove('opacity-0'), 10);
                } else {
                    modal.classList.replace('bottom-sheet-open', 'bottom-sheet-closed');
                    overlay.classList.add('opacity-0'); setTimeout(() => overlay.classList.add('hidden'), 300);
                }
            },
            
            toggleDropdown: (id) => {
                const el = document.getElementById(id);
                const isGenres = id === 'dropdown-genres';
                el.classList.toggle('hidden');
                
                const icon = document.getElementById(isGenres ? 'icon-genres' : 'icon-countries');
                if(icon) icon.style.transform = el.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
                
                const otherId = isGenres ? 'dropdown-countries' : 'dropdown-countries' === 'dropdown-genres' ? 'dropdown-genres' : 'dropdown-countries'; 
                if (isGenres) { document.getElementById('dropdown-countries')?.classList.add('hidden'); document.getElementById('icon-countries') && (document.getElementById('icon-countries').style.transform = 'rotate(0deg)'); }
                else { document.getElementById('dropdown-genres')?.classList.add('hidden'); document.getElementById('icon-genres') && (document.getElementById('icon-genres').style.transform = 'rotate(0deg)'); }
            },

            loadHome: async () => {
                const homeDiv = document.getElementById('view-home'); 
                homeDiv.innerHTML = Utils.showLoading(true);
                let homeContent = '';

                const heroTask = (async () => {
                    try {
                        const heroRes = await API.fetchJSON('/v1/api/danh-sach/phim-moi-cap-nhat?limit=20');
                        if (heroRes && heroRes.data && heroRes.data.items) {
                            const heroSlugs = heroRes.data.items.map(i => i.slug).slice(0, CONFIG.HERO_LIMIT);
                            const heroPromises = await Promise.allSettled(heroSlugs.map(slug => API.getMovieDetails(slug)));
                            return heroPromises.filter(p => p.status === 'fulfilled' && p.value?.status).map(p => p.value);
                        }
                    } catch(e) { console.log("Lỗi tải Slider", e); }
                    return [];
                })();

                const top10Task = (async () => {
                    try {
                        const top10Res = await API.getList('danh-sach', 'phim-bo', 10);
                        if (top10Res && top10Res.data && top10Res.data.items) return top10Res.data.items;
                    } catch(e) { console.log("Lỗi tải Top 10", e); }
                    return [];
                })();

                // THÊM MỚI: dòng "Phim Điện Ảnh Hot" (phim lẻ) trộn cả phim mới lẫn phim cũ nổi bật,
                // để người dùng vừa có phim mới vừa có phim kinh điển để xem, thay vì chỉ có phim mới nhất.
                const movieHotTask = (async () => {
                    try {
                        const poolRes = await API.getList('danh-sach', 'phim-le', 40);
                        const items = poolRes?.data?.items || [];
                        if (!items.length) return [];
                        const currentYear = new Date().getFullYear();
                        const isNew = (m) => { const y = parseInt(m.year, 10); return y && y >= currentYear - 1; };
                        const newest = items.filter(isNew).sort((a, b) => (parseInt(b.year, 10) || 0) - (parseInt(a.year, 10) || 0));
                        const classics = Utils.sortByPopularity(items.filter(m => !isNew(m)));
                        const merged = []; const seen = new Set();
                        const pushUnique = (m) => { if (m && m.slug && !seen.has(m.slug)) { seen.add(m.slug); merged.push(m); } };
                        let ni = 0, ci = 0;
                        while (merged.length < 14 && (ni < newest.length || ci < classics.length)) {
                            if (ni < newest.length) pushUnique(newest[ni++]);
                            if (merged.length < 14 && ci < classics.length) pushUnique(classics[ci++]);
                        }
                        return merged;
                    } catch (e) { console.log("Lỗi tải Phim Điện Ảnh Hot", e); }
                    return [];
                })();

                // CẬP NHẬT: tải cấu hình dòng phim (/homepage-rows) NGAY TỪ ĐẦU, song song với các phần khác,
                // thay vì tải tuần tự ở cuối như trước (giúp trang chủ hiện nhanh hơn). Danh sách trả về là
                // DUY NHẤT 1 nguồn cho TẤT CẢ dòng phim (mặc định + admin tự thêm) -> admin có toàn quyền
                // đổi tên/ẩn/xoá/ẩn từng phim/sắp xếp lại cho MỌI dòng, không còn 2 danh sách tách rời.
                const rowsConfigTask = (async () => {
                    try {
                        const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/homepage-rows`);
                        const data = await res.json();
                        return Utils.buildEffectiveRows(data.rows);
                    } catch (e) { return Utils.buildEffectiveRows(null); }
                })();

                // TỐI ƯU: gọi TMDB.getTrending 1 LẦN duy nhất ở đây (thay vì loadTrendBadges tự gọi lại sau),
                // rồi dùng chung dữ liệu này cho cả 2 việc: (a) huy hiệu xu hướng trên dòng Top 10, và
                // (b) dựng dòng "Thịnh Hành Toàn Cầu" mới bằng cách đối chiếu ngược lại với các phim đã có
                // sẵn trong thư viện (từ các dòng vừa tải) — không tốn thêm lượt gọi mạng nào cho việc này.
                const trendingTask = (async () => {
                    try {
                        const [dayRes, weekRes] = await Promise.all([ TMDB.getTrending('all', 'day'), TMDB.getTrending('all', 'week') ]);
                        return { dayRes, weekRes };
                    } catch (e) { return { dayRes: null, weekRes: null }; }
                })();

                // THÊM MỚI: tải song song "Bảng Tin" (bài viết Admin) và "Phim đề xuất" — public, không cần đăng nhập
                const postsTask = (async () => {
                    try {
                        const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/posts`);
                        const data = await res.json();
                        return data.items || [];
                    } catch (e) { return []; }
                })();

                const profileTask = (async () => {
                    try {
                        const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/admin/profile`);
                        const data = await res.json();
                        return { name: data?.name || 'KTuongFX', avatar: data?.avatar || '' };
                    } catch (e) { return { name: 'KTuongFX', avatar: '' }; }
                })();

                const recommendedTask = (async () => {
                    try {
                        const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/recommended`);
                        const data = await res.json();
                        return data.items || [];
                    } catch (e) { return []; }
                })();

                // THÊM MỚI: tải playlist tuỳ chỉnh (/custom-rows) và diễn viên yêu thích (/actors) — dữ liệu
                // do control panel RIÊNG BIỆT của Tuong lưu sẵn lên backend, ở đây chỉ ĐỌC (GET) rồi vẽ ra.
                const customRowsTask = (async () => {
                    try {
                        const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/custom-rows`);
                        const data = await res.json();
                        return (data.rows || []).filter(r => !r.hidden);
                    } catch (e) { return []; }
                })();

                const favoriteActorsTask = (async () => {
                    try {
                        const res = await Utils.noStoreFetch(`${CONFIG.WORKER_BASE}/actors`);
                        const data = await res.json();
                        return data.items || [];
                    } catch (e) { return []; }
                })();

                const [heroDetails, top10Items, trendingData, movieHotItems, postsItems, profileData, recommendedItems, effectiveRows, customRowsData, favoriteActorsData] = await Promise.all([heroTask, top10Task, trendingTask, movieHotTask, postsTask, profileTask, recommendedTask, rowsConfigTask, customRowsTask, favoriteActorsTask]);

                // THÊM MỚI: gom playlist/diễn viên tuỳ chỉnh theo "position" để chèn đúng chỗ bên dưới.
                // Vị trí không hợp lệ/không có -> mặc định rơi vào 'bottom' cho an toàn (không mất dữ liệu).
                const customRowsByPosition = { top: [], after_recommended: [], middle_rows: [], bottom: [] };
                customRowsData.forEach(r => { (customRowsByPosition[r.position] || customRowsByPosition.bottom).push(r); });
                const actorsByPosition = { top: [], after_recommended: [], middle_rows: [], bottom: [] };
                favoriteActorsData.forEach(a => { (actorsByPosition[a.position] || actorsByPosition.bottom).push(a); });

                const renderCustomRowsAt = (pos) => (customRowsByPosition[pos] || [])
                    .map(r => Render.horizontalRow(r.title, r.items, '', '', true)).join('');
                const renderActorsAt = (pos) => {
                    const list = actorsByPosition[pos] || [];
                    return list.length ? Render.favoriteActorsSection(list) : '';
                };

                // Chỉ tải phim cho những dòng đang HIỆN (bỏ qua dòng admin đã ẩn để đỡ tốn lượt gọi API)
                const visibleRows = effectiveRows.filter(r => !r.hidden);
                const rowResults = await Promise.all(visibleRows.map(row => {
                    // Với các mục "thịnh hành", lấy một pool lớn hơn rồi lọc/sắp xếp theo lượt vote/xem thật,
                    // thay vì chỉ hiển thị đúng những phim mới nhất API trả về đầu tiên.
                    const fetchLimit = row.popularity ? Math.min(row.limit * 4, 40) : row.limit;
                    return API.getList(row.type, row.slug, fetchLimit).catch(() => null);
                }));

                AppState.adminProfile = profileData;
                if (heroDetails.length) homeContent += Render.heroBanner(heroDetails);
                // THÊM MỚI: chèn playlist tuỳ chỉnh + diễn viên yêu thích ở vị trí 'top' (đầu trang, dưới hero)
                homeContent += renderCustomRowsAt('top');
                homeContent += renderActorsAt('top');
                // THÊM MỚI: chèn "Bảng Tin" và dòng "Phim đề xuất" ngay sau Hero, trước các dòng phim khác
                if (postsItems.length) homeContent += Render.postsFeed(postsItems);
                if (recommendedItems.length) homeContent += Render.horizontalRow('⭐ Đề Xuất Từ Admin', recommendedItems, '', '');
                AppState.homePosts = postsItems;
                AppState.homeRecommended = recommendedItems;
                // THÊM MỚI: chèn playlist tuỳ chỉnh + diễn viên yêu thích ở vị trí 'after_recommended'
                // (ngay sau dòng "Đề Xuất Từ Admin", trước Top 10)
                homeContent += renderCustomRowsAt('after_recommended');
                homeContent += renderActorsAt('after_recommended');
                if (top10Items.length) homeContent += Render.topHorizontalRow('Top 10 Phim Bộ Hôm Nay', top10Items);

                if (AppState.history.length > 0) {
                    homeContent += Render.horizontalRow('Tiếp tục xem', AppState.history.slice(0,12).map(m=>({...m, episode_current: m.last_ep_name?Utils.formatEpName(m.last_ep_name):''})), 'history', 'recent');
                }

                // THÊM MỚI: chỗ trống để chèn dòng "Đề Xuất Riêng Cho Bạn" (AI phân tích lịch sử xem) sau khi
                // trang chủ đã hiển thị xong — không chặn tốc độ tải trang chủ ban đầu vì cần gọi thêm AI + API.
                if (AppState.history.length >= 3) {
                    homeContent += `<div id="ai-foryou-row"></div>`;
                }

                // THÊM MỚI: hiển thị dòng "Phim Điện Ảnh Hot" (phim lẻ, gồm cả mới lẫn kinh điển)
                if (movieHotItems && movieHotItems.length) {
                    homeContent += Render.horizontalRow('🎬 Phim Điện Ảnh Hot (Mới & Kinh Điển)', movieHotItems, 'danh-sach', 'phim-le', true);
                }

                const libraryPool = [];
                const seenSlugs = new Set();
                const addToPool = (list) => (list || []).forEach(m => {
                    if (m && m.slug && !seenSlugs.has(m.slug)) { seenSlugs.add(m.slug); libraryPool.push(m); }
                });
                addToPool(top10Items);
                addToPool(movieHotItems);

                // CẬP NHẬT: giờ chỉ còn 1 danh sách dòng phim DUY NHẤT (effectiveRows/visibleRows), nên chỉ cần
                // 1 vòng lặp render duy nhất — không còn nguy cơ trùng dòng giữa "mặc định" và "admin tự thêm"
                // vì cả 2 giờ nằm chung 1 mảng, và adminAddRow() đã chặn trùng type+slug ngay khi thêm.
                visibleRows.forEach((rowConfig, index) => {
                    const res = rowResults[index];
                    if (res && (res.data?.items || res.items)) {
                        let items = res.data?.items || res.items;
                        // Lọc bỏ những phim admin đã ẩn riêng lẻ trong dòng này (excludedSlugs)
                        if (rowConfig.excludedSlugs && rowConfig.excludedSlugs.length) {
                            const excluded = new Set(rowConfig.excludedSlugs);
                            items = items.filter(m => !excluded.has(m.slug));
                        }
                        addToPool(items);
                        if (rowConfig.popularity) items = Utils.sortByPopularity(items).slice(0, rowConfig.limit);
                        else items = items.slice(0, rowConfig.limit);
                        if (items.length > 0) {
                            homeContent += Render.horizontalRow(rowConfig.title, items, rowConfig.type, rowConfig.slug, rowConfig.rank);
                        }
                    }
                    // THÊM MỚI: chèn playlist/diễn viên tuỳ chỉnh ở vị trí 'middle_rows', ngay SAU dòng phim
                    // thứ N (N = afterRowIndex, đếm theo thứ tự các dòng hiển thị từ /homepage-rows, bắt đầu từ 1)
                    const rowNum = index + 1;
                    (customRowsByPosition.middle_rows || []).filter(r => r.afterRowIndex === rowNum)
                        .forEach(r => { homeContent += Render.horizontalRow(r.title, r.items, '', '', true); });
                    const midActors = (actorsByPosition.middle_rows || []).filter(a => a.afterRowIndex === rowNum);
                    if (midActors.length) homeContent += Render.favoriteActorsSection(midActors);
                });

                // THÊM MỚI: chèn playlist tuỳ chỉnh + diễn viên yêu thích ở vị trí 'bottom'
                // (cuối trang, trước footer) — đặt trước các bước "prepend" bên dưới để luôn nằm cuối cùng.
                homeContent += renderCustomRowsAt('bottom');
                homeContent += renderActorsAt('bottom');

                // CẬP NHẬT: lấy pool đối chiếu lớn hơn (tới 40 phim) thay vì chỉ 12, rồi lưu lại toàn bộ
                // để nút "Xem thêm" có thể hiển thị nhiều phim top khác thay vì chỉ dừng ở vài phim đầu.
                const globalTrendingFull = Utils.buildGlobalTrendingRow(libraryPool, trendingData.dayRes, 40);
                AppState.homeTmdbTrendingFull = globalTrendingFull;
                AppState.homeTrendingDataCache = trendingData;
                AppState.homeLibraryPoolCache = libraryPool;

                const globalTrendingRow = globalTrendingFull.slice(0, 12);
                if (globalTrendingRow.length) {
                    const viewAllBtnHtml = globalTrendingFull.length > globalTrendingRow.length
                        ? `<button onclick="AppHandlers.loadTmdbTrendingFull()" class="text-sm font-medium text-muted hover:text-primary transition-colors">Xem thêm</button>`
                        : '';
                    homeContent = Render.horizontalRowCustom('🔥 Thịnh Hành Toàn Cầu (TMDB)', globalTrendingRow, true, viewAllBtnHtml) + homeContent;
                }

                // CẬP NHẬT: nhúng "layer" Bảng xếp hạng trực tiếp thẳng vào giữa luồng nội dung trang chủ
                // (ngay phía trên dòng Thịnh Hành Toàn Cầu) thay vì phải bấm nút nổi mới hiện popup.
                if (globalTrendingFull.length || (libraryPool && libraryPool.length)) {
                    homeContent = Render.trendPanelSection() + homeContent;
                }

                if (!homeContent.trim()) {
                    homeDiv.innerHTML = `<div class="grid grid-cols-1 min-h-[60vh]">${Utils.renderApiErrorBanner('AppHandlers.loadHome()', true)}</div>`;
                    return;
                }

                homeDiv.innerHTML = homeContent;
                
                AppHandlers.startHeroInterval();

                if (top10Items.length) AppHandlers.loadTrendBadges(top10Items, trendingData);

                // THÊM MỚI: nạp dòng "Đề Xuất Riêng Cho Bạn" (không chặn phần còn lại của trang chủ)
                if (AppState.history.length >= 3) AppHandlers.loadPersonalizedRow();

                // Dựng ngay nội dung bảng xếp hạng (tab mặc định "Sôi Nổi Nhất") vì giờ nó nằm sẵn trong trang,
                // không còn cần chờ người dùng bấm nút mở popup nữa.
                AppHandlers.switchTrendPanelTab(AppState.trendPanelActiveTab || 'hot');
            },

            // THÊM MỚI: dòng "Đề Xuất Riêng Cho Bạn" ở trang chủ — AI phân tích thể loại phim đã xem gần đây
            // để chọn ra vài thể loại hợp gu nhất, sau đó lấy phim THẬT theo thể loại đó từ OPhim/KKPhim
            // (không phải AI tự bịa phim). Nếu AI lỗi/timeout thì bỏ qua êm, không hiện dòng này.
            loadPersonalizedRow: async () => {
                const container = document.getElementById('ai-foryou-row');
                if (!container) return;

                const watched = AppState.history.slice(0, 15).map(m => ({
                    name: m.name,
                    genres: (m.category || []).map(c => c.name).filter(Boolean)
                }));
                if (!watched.some(w => w.genres.length)) return; // lịch sử cũ chưa có category thì bỏ qua, tránh gợi ý sai

                const genreSlugs = await Gemini.profileGenresFromHistory(watched);
                if (!genreSlugs || !genreSlugs.length) return;

                const watchedSlugs = new Set(AppState.history.map(m => m.slug));
                const results = await Promise.allSettled(genreSlugs.map(slug => API.fetchJSON(`/v1/api/the-loai/${slug}?limit=16`)));

                const pool = new Map();
                results.forEach(r => {
                    if (r.status !== 'fulfilled' || !r.value) return;
                    const its = r.value.data ? r.value.data.items : r.value.items || [];
                    its.forEach(m => { if (m.slug && !watchedSlugs.has(m.slug) && !pool.has(m.slug)) pool.set(m.slug, m); });
                });

                const items = Array.from(pool.values()).slice(0, 12);
                if (items.length) {
                    container.outerHTML = Render.horizontalRow('🤖 Đề Xuất Riêng Cho Bạn', items, '', '');
                }
            },

            loadTrendBadges: async (items, preFetched = null) => {
                const norm = (s) => (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]/g, '');
                try {
                    // Tái sử dụng dữ liệu trending đã tải sẵn ở loadHome nếu có, tránh gọi lại TMDB 2 lần.
                    const { dayRes, weekRes } = preFetched || await (async () => {
                        const [d, w] = await Promise.all([ TMDB.getTrending('all', 'day'), TMDB.getTrending('all', 'week') ]);
                        return { dayRes: d, weekRes: w };
                    })();
                    const dayRank = new Map(), weekRank = new Map();
                    (dayRes?.results || []).forEach((it, i) => dayRank.set(norm(it.title || it.name || it.original_name), i));
                    (weekRes?.results || []).forEach((it, i) => weekRank.set(norm(it.title || it.name || it.original_name), i));

                    items.forEach(m => {
                        const key = norm(m.origin_name || m.name);
                        const el = document.getElementById(`trend-${m.slug}`);
                        if (!el) return;
                        const d = dayRank.has(key) ? dayRank.get(key) : null, w = weekRank.has(key) ? weekRank.get(key) : null;
                        let html = '';
                        if (d !== null && w !== null) {
                            if (d < w) html = `<span class="trend-badge trend-up">▲ Đang tăng</span>`;
                            else if (d > w) html = `<span class="trend-badge trend-down">▼ Đang giảm</span>`;
                            else html = `<span class="trend-badge trend-flat">▬ Ổn định</span>`;
                        } else if (d !== null) { html = `<span class="trend-badge trend-up">▲ Mới nổi</span>`; }
                        el.innerHTML = html;
                    });
                } catch (e) { console.log("Lỗi tải xu hướng TMDB:", e); }
            },

            loadTop50: async () => {
                AppHandlers.navigate('search'); 
                document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results'); 
                
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-2 gap-y-6 px-2";
                document.getElementById('search-title').innerHTML = 'Top 50 Phim Hot Nhất <span class="text-primary text-sm ml-2">HOT 🔥</span>';
                resDiv.innerHTML = `<div class="col-span-full">${Utils.showLoading()}</div>`;
                
                const data = await API.getList('danh-sach', 'phim-bo', 50);
                if(data?.data?.items?.length) {
                    resDiv.innerHTML = data.data.items.map((m, i) => Render.topNetflixCard(m, i, true)).join('');
                }
            },

            // THÊM MỚI: trang "Xem thêm" cho dòng Thịnh Hành Toàn Cầu (TMDB) - trước đây bị ẩn nút
            // vì không có type/slug tương ứng, nay dùng lại danh sách đã đối chiếu sẵn (tới 40 phim)
            // được lưu ở AppState.homeTmdbTrendingFull trong lúc tải trang chủ.

                document.getElementById('search-input').value = '';
                const resDiv = document.getElementById('search-results');
                resDiv.className = "grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-x-2 gap-y-6 px-2";
                document.getElementById('search-title').innerHTML = '🔥 Thịnh Hành Toàn Cầu (TMDB) <span class="text-primary text-sm ml-2">Cập nhật thời gian thực</span>';
                const items = AppState.homeTmdbTrendingFull || [];
                if (!items.length) {
                    resDiv.innerHTML = `<div class="col-span-full text-center text-muted py-16">Chưa có dữ liệu thịnh hành, vui lòng quay lại Trang chủ để tải dữ liệu trước.</div>`;
