<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gemini Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-void:#0a0e16;
    --bg-panel:#11151f;
    --bg-elevated:#171c28;
    --bg-surface:#1e2534;
    --bg-surface-2:#252d40;
    --line:#252c3c;
    --text-primary:#e9ecf5;
    --text-muted:#8790a8;
    --text-faint:#5b637a;
    --accent-a:#6c8cff;
    --accent-b:#b479ff;
    --accent-grad:linear-gradient(135deg,var(--accent-a),var(--accent-b));
    --danger:#ff6b7a;
    --radius-lg:18px;
    --radius-md:12px;
    --radius-sm:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
  h1,h2,h3,.brand,.new-chat-btn,.session-title{font-family:'Sora',sans-serif;}
  body{background:var(--bg-void);min-height:100vh;color:var(--text-primary);}
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-thumb{background:#2c3446;border-radius:10px;}
  ::-webkit-scrollbar-track{background:transparent;}

  .app{display:flex;height:100vh;height:calc(var(--app-height, 100vh));max-width:1180px;margin:0 auto;background:var(--bg-panel);box-shadow:0 0 60px rgba(0,0,0,.5);}

  /* ---------- Sidebar ---------- */
  .sidebar{width:272px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--line);display:flex;flex-direction:column;transition:transform .25s ease;}
  .sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 8px;}
  .brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:15.5px;letter-spacing:.2px;}
  .brand-mark{width:22px;height:22px;border-radius:7px;background:var(--accent-grad);flex-shrink:0;position:relative;overflow:hidden;}
  .brand-mark::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.55),transparent 60%);}
  .new-chat-btn{margin:10px 16px 6px;padding:10px 14px;border:1px solid var(--line);background:var(--bg-elevated);color:var(--text-primary);border-radius:var(--radius-md);font-size:13.5px;font-weight:600;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;transition:.15s;}
  .new-chat-btn:hover{border-color:var(--accent-a);background:var(--bg-surface);}
  .session-list{flex:1;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:3px;}
  .session-item{position:relative;padding:9px 34px 9px 12px;border-radius:var(--radius-sm);font-size:13px;color:var(--text-muted);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid transparent;transition:.15s;}
  .session-item:hover{background:var(--bg-elevated);color:var(--text-primary);}
  .session-item.active{background:var(--bg-surface);color:var(--text-primary);border-left-color:var(--accent-a);}
  .session-item .del-btn{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-faint);font-size:13px;cursor:pointer;padding:4px 6px;border-radius:6px;opacity:0;transition:.15s;}
  .session-item:hover .del-btn{opacity:1;}
  .session-item .del-btn:hover{color:var(--danger);background:rgba(255,107,122,.12);}
  .sidebar-footer{padding:10px 12px 14px;border-top:1px solid var(--line);}
  .icon-btn{background:none;border:none;color:var(--text-muted);font-size:13px;cursor:pointer;padding:8px 10px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:7px;width:100%;transition:.15s;}
  .icon-btn:hover{background:var(--bg-elevated);color:var(--text-primary);}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;}
  .overlay.show{display:block;}

  /* ---------- Chat container ---------- */
  .chat-container{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg-void);}
  .header{background:var(--bg-elevated);padding:12px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--line);flex-shrink:0;}
  .header h2{font-size:15.5px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .model-badge{font-size:11px;color:var(--text-muted);background:var(--bg-surface);border:1px solid var(--line);padding:4px 10px;border-radius:20px;flex-shrink:0;}
  .only-desktop{display:flex;}
  .only-mobile{display:none;}

  .settings-panel{background:var(--bg-elevated);padding:14px 18px;border-bottom:1px solid var(--line);display:none;flex-wrap:wrap;gap:10px;position:relative;}
  .settings-panel.open{display:flex;}
  .settings-panel-head{flex:1 1 100%;display:flex;align-items:center;justify-content:space-between;margin:-2px 0 2px;}
  .settings-panel-head span{font-size:12.5px;font-weight:600;color:var(--text-primary);font-family:'Sora',sans-serif;}
  .settings-close-btn{background:var(--bg-surface);border:1px solid var(--line);color:var(--text-muted);width:26px;height:26px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;line-height:1;transition:.15s;flex-shrink:0;}
  .settings-close-btn:hover{color:var(--text-primary);border-color:var(--accent-a);}
  .settings-panel .group{flex:1 1 calc(50% - 10px);min-width:130px;}
  .settings-panel label{display:block;color:var(--text-muted);font-size:11px;margin-bottom:4px;font-weight:500;}
  .settings-panel input,.settings-panel textarea,.settings-panel select{width:100%;padding:7px 11px;border:1px solid var(--line);border-radius:10px;background:var(--bg-surface);color:var(--text-primary);font-size:12.5px;outline:none;}
  .settings-panel input:focus,.settings-panel textarea:focus,.settings-panel select:focus{border-color:var(--accent-a);}
  .settings-panel textarea{resize:vertical;min-height:44px;}
  .settings-panel .full{flex:1 1 100%;}
  .settings-panel .btn-save{background:var(--accent-grad);border:none;color:#fff;padding:8px 20px;border-radius:20px;font-weight:600;cursor:pointer;font-size:12.5px;}
  .settings-panel .btn-save:hover{filter:brightness(1.08);}
  .key-row{display:flex;gap:6px;}
  .key-row input{flex:1;}
  .key-row button{background:var(--bg-surface-2);border:1px solid var(--line);color:var(--text-primary);padding:7px 16px;border-radius:10px;cursor:pointer;font-size:12px;white-space:nowrap;}
  .key-row button:hover{border-color:var(--accent-a);}

  .messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;}
  .msg{max-width:78%;padding:11px 15px;border-radius:var(--radius-lg);word-wrap:break-word;font-size:14px;line-height:1.6;animation:fade .18s ease;}
  .msg.user{align-self:flex-end;background:linear-gradient(135deg,#2a3a72,#3a2f6e);color:#fff;border-bottom-right-radius:5px;}
  .msg.bot{align-self:flex-start;background:var(--bg-surface);color:var(--text-primary);border-bottom-left-radius:5px;}
  .msg.bot p{margin:4px 0;}
  .msg.bot ul,.msg.bot ol{padding-left:20px;margin:4px 0;}
  .msg.bot code{background:var(--bg-void);padding:2px 6px;border-radius:4px;font-family:'Courier New',monospace;font-size:13px;}

  /* ---------- code block card (tách khung, có tên ngôn ngữ + nút sao chép) ---------- */
  .code-card{margin:8px 0;border-radius:10px;overflow:hidden;background:var(--bg-void);border:1px solid var(--line);}
  .code-card-head{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg-surface);border-bottom:1px solid var(--line);font-size:10.5px;color:var(--text-muted);font-family:'Courier New',monospace;}
  .code-card-lang{text-transform:lowercase;letter-spacing:.3px;}
  .code-copy-btn{display:flex;align-items:center;gap:5px;border:none;background:var(--bg-surface-2);color:var(--text-primary);font-size:11px;font-weight:600;padding:4px 9px;border-radius:8px;cursor:pointer;transition:.15s;}
  .code-copy-btn:hover{filter:brightness(1.2);}
  .code-copy-btn:active{transform:scale(.95);}
  .code-copy-btn svg{width:11px;height:11px;}
  .code-card pre{margin:0;padding:11px 13px;overflow-x:auto;background:none;border-radius:0;}
  .code-card pre code{background:none;padding:0;font-size:12.5px;}

  /* ---------- copy message button ---------- */
  .msg{user-select:text;position:relative;}
  .msg-copy-btn{display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:3px 9px;border-radius:20px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.15);color:var(--text-faint);font-size:10px;cursor:pointer;transition:.15s;}
  .msg-copy-btn:hover{color:var(--text-primary);background:rgba(255,255,255,.08);}
  .msg-copy-btn svg{width:10px;height:10px;}
  .msg.system{align-self:center;background:var(--bg-elevated);border:1px solid var(--line);color:var(--text-muted);font-size:11.5px;padding:5px 16px;border-radius:20px;max-width:90%;text-align:center;}
  .msg .file-preview{max-width:100%;max-height:220px;border-radius:10px;margin-top:8px;display:block;}
  .file-chip{display:flex;align-items:center;gap:7px;background:rgba(0,0,0,.18);border:1px solid rgba(255,255,255,.08);padding:6px 10px;border-radius:10px;margin-top:8px;font-size:12px;color:var(--text-muted);}
  .file-chip.expired{opacity:.6;font-style:italic;}
  .typing{align-self:flex-start;display:flex;gap:4px;padding:13px 16px;background:var(--bg-surface);border-radius:var(--radius-lg);border-bottom-left-radius:5px;}
  .typing span{width:6px;height:6px;border-radius:50%;background:var(--text-muted);animation:bounce 1.1s infinite ease-in-out;}
  .typing span:nth-child(2){animation-delay:.15s;}
  .typing span:nth-child(3){animation-delay:.3s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-4px);opacity:1;}}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .input-area{background:var(--bg-elevated);padding:10px 14px 14px;border-top:1px solid var(--line);flex-shrink:0;}
  .attach-preview{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .attach-preview:empty{display:none;}
  .attach-chip{display:flex;align-items:center;gap:6px;background:var(--bg-surface);border:1px solid var(--line);padding:5px 8px 5px 11px;border-radius:20px;font-size:11.5px;color:var(--text-muted);}
  .attach-chip button{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:13px;padding:2px 4px;}
  .attach-chip button:hover{color:var(--danger);}
  .input-row{display:flex;gap:8px;align-items:center;}
  .attach-btn{flex-shrink:0;width:38px;height:38px;border-radius:50%;background:var(--bg-surface);border:1px solid var(--line);color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:.15s;}
  .attach-btn:hover{border-color:var(--accent-a);color:var(--text-primary);}
  .attach-btn input{display:none;}
  .input-area input[type="text"]{flex:1;padding:10px 16px;border:1px solid var(--line);border-radius:22px;background:var(--bg-surface);color:#fff;font-size:14px;outline:none;}
  .input-area input[type="text"]:focus{border-color:var(--accent-a);}
  .input-area input[type="text"]::placeholder{color:var(--text-faint);}
  .btn-send{flex-shrink:0;width:38px;height:38px;border-radius:50%;background:var(--accent-grad);color:#fff;border:none;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;}
  .btn-send:hover{filter:brightness(1.1);}
  .btn-send:disabled{opacity:.35;cursor:not-allowed;filter:none;}
  .status{color:var(--text-faint);font-size:10.5px;padding:6px 14px 0;text-align:center;}

  @media (max-width:820px){
    .app{max-width:100%;}
    .only-desktop{display:none;}
    .only-mobile{display:flex;}
    .sidebar{position:fixed;top:0;left:0;bottom:0;height:calc(var(--app-height, 100vh));z-index:20;transform:translateX(-100%);}
    .sidebar.open{transform:translateX(0);}
    .msg{max-width:88%;}
    .settings-panel .group{flex:1 1 100%;}
  }
</style>
</head>
<body>
<div class="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand"><span class="brand-mark"></span><span>Gemini Chat</span></div>
      <button id="closeSidebarBtn" class="icon-btn only-mobile" style="width:auto;">✕</button>
    </div>
    <button class="new-chat-btn" id="newChatBtn">＋ Cuộc trò chuyện mới</button>
    <div class="session-list" id="sessionList"></div>
    <div class="sidebar-footer">
      <button class="icon-btn" id="toggleSettingsBtn">⚙️ Cài đặt</button>
    </div>
  </aside>
  <div class="overlay" id="sidebarOverlay"></div>

  <div class="chat-container">
    <div class="header">
      <button id="openSidebarBtn" class="icon-btn only-mobile" style="width:auto;">☰</button>
      <h2 id="sessionTitle">Cuộc trò chuyện mới</h2>
      <span class="model-badge" id="modelBadge">Gemini 3.1 Flash-Lite</span>
    </div>

    <div class="settings-panel" id="settingsPanel">
      <div class="settings-panel-head">
        <span>⚙️ Cài đặt</span>
        <button class="settings-close-btn" id="closeSettingsBtn" title="Đóng">✕</button>
      </div>
      <div class="group full">
        <label>🔑 API Key</label>
        <div class="key-row">
          <input type="text" id="apiKeyInput" placeholder="Nhập API Key">
          <button id="setKeyBtn">Lưu</button>
        </div>
      </div>
      <div class="group">
        <label>📦 Model</label>
        <select id="modelSelect">
          <option value="gemini-3.1-flash-lite" selected>Gemini 3.1 Flash-Lite</option>
          <option value="gemini-2.0-flash">Gemini 2.0 Flash</option>
          <option value="gemini-2.5-pro-preview-03-25">Gemini 2.5 Pro</option>
        </select>
      </div>
      <div class="group">
        <label>🌡️ Temp</label>
        <input type="number" id="tempInput" min="0" max="2" step=".1" value=".7">
      </div>
      <div class="group">
        <label>📏 Max tokens</label>
        <input type="number" id="maxTokensInput" min="1" max="8192" value="800">
      </div>
      <div class="group">
        <label>🎯 Top P</label>
        <input type="number" id="topPInput" min="0" max="1" step=".05" value=".95">
      </div>
      <div class="group">
        <label>🔢 Top K</label>
        <input type="number" id="topKInput" min="1" max="40" value="40">
      </div>
      <div class="group full">
        <label>🧠 System Instruction</label>
        <textarea id="sysInstrInput" rows="2">Bạn là trợ lý AI thông minh. Trả lời chi tiết, rõ ràng, có cấu trúc. Sử dụng xuống dòng, bullet points nếu cần.</textarea>
      </div>
      <div class="group full" style="display:flex;justify-content:flex-end;">
        <button class="btn-save" id="saveSettingsBtn">💾 Lưu</button>
      </div>
    </div>

    <div class="messages" id="msgContainer"></div>

    <div class="input-area">
      <div class="attach-preview" id="attachPreview"></div>
      <div class="input-row">
        <label class="attach-btn">📎<input type="file" id="fileInput" multiple></label>
        <input type="text" id="userInput" placeholder="Nhập tin nhắn..." disabled>
        <button class="btn-send" id="sendBtn" disabled>➤</button>
      </div>
    </div>
    <div class="status" id="statusMsg">⛔ Chưa có key</div>
  </div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const msgContainer=$('msgContainer'), userInput=$('userInput'), sendBtn=$('sendBtn');
  const apiKeyInput=$('apiKeyInput'), setKeyBtn=$('setKeyBtn'), statusMsg=$('statusMsg');
  const toggleBtn=$('toggleSettingsBtn'), settingsPanel=$('settingsPanel'), closeSettingsBtn=$('closeSettingsBtn');
  const modelSelect=$('modelSelect'), tempInput=$('tempInput'), maxTokensInput=$('maxTokensInput');
  const topPInput=$('topPInput'), topKInput=$('topKInput'), sysInstrInput=$('sysInstrInput');
  const saveBtn=$('saveSettingsBtn'), fileInput=$('fileInput'), attachPreview=$('attachPreview');
  const sidebar=$('sidebar'), sessionList=$('sessionList'), newChatBtn=$('newChatBtn');
  const openSidebarBtn=$('openSidebarBtn'), closeSidebarBtn=$('closeSidebarBtn'), sidebarOverlay=$('sidebarOverlay');
  const sessionTitleEl=$('sessionTitle'), modelBadge=$('modelBadge');

  const EPHEMERAL_SIZE_LIMIT = 500000; // ~500KB base64 chars

  let API_KEY = localStorage.getItem('gemini_key') || '';
  let currentModel = localStorage.getItem('gemini_model') || 'gemini-3.1-flash-lite';
  localStorage.getItem('gemini_temp'); // (kept for backward compat, values re-read live from inputs)
  let sessions = [];
  let currentSessionId = null;
  let pendingFiles = [];

  const modelLabels = {
    'gemini-3.1-flash-lite':'Gemini 3.1 Flash-Lite',
    'gemini-2.0-flash':'Gemini 2.0 Flash',
    'gemini-2.5-pro-preview-03-25':'Gemini 2.5 Pro'
  };

  apiKeyInput.value = API_KEY;
  modelSelect.value = currentModel;
  tempInput.value = parseFloat(localStorage.getItem('gemini_temp')) || .7;
  maxTokensInput.value = parseInt(localStorage.getItem('gemini_maxTokens')) || 800;
  topPInput.value = parseFloat(localStorage.getItem('gemini_topP')) || .95;
  topKInput.value = parseInt(localStorage.getItem('gemini_topK')) || 40;
  sysInstrInput.value = localStorage.getItem('gemini_sysInstr') || sysInstrInput.value;

  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,8); }

  function formatSize(bytes){
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
    return (bytes/1024/1024).toFixed(1) + ' MB';
  }

  /* ---------------- Sessions: load / save ---------------- */
  function loadSessions(){
    try {
      const raw = JSON.parse(localStorage.getItem('gemini_sessions') || '[]');
      return Array.isArray(raw) ? raw : [];
    } catch(e){ return []; }
  }

  function serializeForStorage(list){
    return list.map(s => ({
      ...s,
      messages: s.messages.map(m => ({
        ...m,
        files: (m.files||[]).map(f => f.ephemeral
          ? { name:f.name, type:f.type, size:f.size, ephemeral:true }
          : f)
      }))
    }));
  }

  function saveSessions(){
    try {
      localStorage.setItem('gemini_sessions', JSON.stringify(serializeForStorage(sessions)));
      if (currentSessionId) localStorage.setItem('gemini_current_session', currentSessionId);
    } catch(e){
      addSystemMsg('⚠️ Không thể lưu lịch sử (bộ nhớ trình duyệt đầy). Tệp lớn sẽ không được giữ lại sau khi tải lại trang.');
    }
  }

  function getCurrentSession(){
    return sessions.find(s => s.id === currentSessionId) || null;
  }

  function createSession(){
    const s = { id: uid(), title:'Cuộc trò chuyện mới', titleSet:false, model: currentModel, createdAt: Date.now(), messages: [] };
    sessions.unshift(s);
    currentSessionId = s.id;
    saveSessions();
    renderSidebar();
    renderMessages();
    updateHeader();
    return s;
  }

  function selectSession(id){
    currentSessionId = id;
    const s = getCurrentSession();
    if (s) modelSelect.value = s.model || currentModel;
    renderSidebar();
    renderMessages();
    updateHeader();
    localStorage.setItem('gemini_current_session', id);
    closeSidebarMobile();
  }

  function deleteSession(id){
    const idx = sessions.findIndex(s => s.id === id);
    if (idx === -1) return;
    sessions.splice(idx, 1);
    if (currentSessionId === id) {
      if (sessions.length) selectSession(sessions[0].id);
      else createSession();
    }
    saveSessions();
    renderSidebar();
  }

  function updateHeader(){
    const s = getCurrentSession();
    sessionTitleEl.textContent = s ? s.title : 'Cuộc trò chuyện mới';
    modelBadge.textContent = modelLabels[s?.model || currentModel] || (s?.model || currentModel);
  }

  /* ---------------- Sidebar render ---------------- */
  function renderSidebar(){
    sessionList.innerHTML = '';
    sessions.forEach(s => {
      const item = document.createElement('div');
      item.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      item.textContent = s.title || 'Cuộc trò chuyện mới';
      item.addEventListener('click', () => selectSession(s.id));
      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '🗑';
      del.title = 'Xoá cuộc trò chuyện';
      del.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm('Xoá cuộc trò chuyện này?')) deleteSession(s.id);
      });
      item.appendChild(del);
      sessionList.appendChild(item);
    });
  }

  function openSidebarMobile(){ sidebar.classList.add('open'); sidebarOverlay.classList.add('show'); }
  function closeSidebarMobile(){ sidebar.classList.remove('open'); sidebarOverlay.classList.remove('show'); }

  /* ---------------- Message rendering ---------------- */
  function escapeHtml(str){
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const COPY_ICON_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;

  function formatBotText(raw){
    // Tách khối ```lang\ncode``` khỏi text GỐC trước khi escape,
    // để giữ nguyên nội dung code cho nút "Sao chép" (không escape 2 lần).
    const codeBlocks = [];
    let working = raw.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
      const idx = codeBlocks.length;
      codeBlocks.push({ lang: (lang||'').trim(), code: code.replace(/\n$/, '') });
      return `\u0000CODEBLOCK${idx}\u0000`;
    });

    let text = escapeHtml(working);
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\n[\-•] (.+)/g, '\n<li>$1</li>');
    text = text.replace(/(<li>[\s\S]*?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>');
    text = text.replace(/\n/g, '<br>');

    text = text.replace(/\u0000CODEBLOCK(\d+)\u0000/g, (m, idxStr) => {
      const b = codeBlocks[Number(idxStr)];
      const langLabel = escapeHtml(b.lang || 'text');
      const escapedCode = escapeHtml(b.code);
      const encodedCode = encodeURIComponent(b.code);
      return `<div class="code-card">
        <div class="code-card-head">
          <span class="code-card-lang">${langLabel}</span>
          <button class="code-copy-btn" data-code="${encodedCode}">${COPY_ICON_SVG}<span>Sao chép</span></button>
        </div>
        <pre><code>${escapedCode}</code></pre>
      </div>`;
    });
    return text;
  }

  function copyToClipboard(text, btnEl){
    const done = (ok) => {
      if (btnEl) {
        const label = btnEl.querySelector('span:last-child');
        const prev = label ? label.textContent : null;
        if (label) label.textContent = ok ? 'Đã chép!' : 'Lỗi';
        setTimeout(() => { if (label && prev !== null) label.textContent = prev; }, 1500);
      }
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(() => done(true)).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, cb){
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      cb(ok);
    } catch(e) { cb(false); }
  }

  function renderFileNode(f){
    const wrap = document.createElement('div');
    if (!f.base64) {
      wrap.className = 'file-chip expired';
      wrap.textContent = `📎 ${f.name} (${formatSize(f.size||0)}) — đã hết hạn sau khi tải lại trang`;
      return wrap;
    }
    if (f.type && f.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.src = f.base64; img.className = 'file-preview';
      return img;
    }
    if (f.type && f.type.startsWith('video/')) {
      const vid = document.createElement('video');
      vid.src = f.base64; vid.className = 'file-preview'; vid.controls = true;
      return vid;
    }
    wrap.className = 'file-chip';
    wrap.textContent = `📎 ${f.name} (${formatSize(f.size||0)})`;
    return wrap;
  }

  function addMessageDom(msg){
    const div = document.createElement('div');
    div.className = `msg ${msg.role}`;
    if (msg.role === 'bot') {
      div.innerHTML = formatBotText(msg.text || '');
      div.querySelectorAll('.code-copy-btn').forEach(btn => {
        btn.addEventListener('click', () => copyToClipboard(decodeURIComponent(btn.dataset.code || ''), btn));
      });
    } else {
      div.textContent = msg.text || '';
    }
    (msg.files || []).forEach(f => div.appendChild(renderFileNode(f)));
    if (msg.text && msg.text.trim().length > 0) {
      const copyBtn = document.createElement('button');
      copyBtn.className = 'msg-copy-btn';
      copyBtn.innerHTML = `${COPY_ICON_SVG}<span>Sao chép</span>`;
      copyBtn.addEventListener('click', () => copyToClipboard(msg.text, copyBtn));
      div.appendChild(document.createElement('br'));
      div.appendChild(copyBtn);
    }
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }

  function addSystemDom(text){
    const div = document.createElement('div');
    div.className = 'msg system';
    div.textContent = text;
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }

  function addSystemMsg(text){
    const s = getCurrentSession();
    if (s) {
      s.messages.push({ id: uid(), role:'system', text, ts: Date.now() });
      saveSessions();
    }
    addSystemDom(text);
  }

  function renderMessages(){
    msgContainer.innerHTML = '';
    const s = getCurrentSession();
    if (!s || s.messages.length === 0) {
      addSystemDom('🔑 Nhập API Key và bắt đầu chat');
      addMessageDom({ role:'bot', text:'Chào bạn! Gemini Chat sẵn sàng.\nCó thể gửi ảnh, video, PDF hoặc bất kỳ tệp nào kèm tin nhắn.' });
      return;
    }
    s.messages.forEach(m => {
      if (m.role === 'system') addSystemDom(m.text);
      else addMessageDom(m);
    });
  }

  function showTyping(){
    const div = document.createElement('div');
    div.className = 'typing';
    div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    msgContainer.appendChild(div);
    msgContainer.scrollTop = msgContainer.scrollHeight;
  }
  function hideTyping(){
    const el = $('typingIndicator');
    if (el) el.remove();
  }

  /* ---------------- File handling ---------------- */
  function fileToBase64(file){
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsDataURL(file);
    });
  }

  async function buildFileMeta(file){
    const base64 = await fileToBase64(file);
    const isVideo = file.type.startsWith('video/');
    const tooBig = base64.length > EPHEMERAL_SIZE_LIMIT;
    return {
      name: file.name,
      type: file.type || 'application/octet-stream',
      size: file.size,
      base64,
      ephemeral: isVideo || tooBig
    };
  }

  function renderAttachPreview(){
    attachPreview.innerHTML = '';
    pendingFiles.forEach((f, idx) => {
      const chip = document.createElement('div');
      chip.className = 'attach-chip';
      const label = document.createElement('span');
      label.textContent = `${f.type && f.type.startsWith('image/') ? '🖼️' : f.type && f.type.startsWith('video/') ? '🎬' : '📄'} ${f.name}`;
      const rm = document.createElement('button');
      rm.textContent = '✕';
      rm.addEventListener('click', () => { pendingFiles.splice(idx,1); renderAttachPreview(); });
      chip.appendChild(label); chip.appendChild(rm);
      attachPreview.appendChild(chip);
    });
    updateSendState();
  }

  fileInput.addEventListener('change', (e) => {
    pendingFiles.push(...Array.from(e.target.files));
    renderAttachPreview();
    e.target.value = '';
  });

  /* ---------------- Gemini API ---------------- */
  function buildContents(session){
    const msgs = session.messages.filter(m => m.role !== 'system');
    return msgs.map((m, i) => {
      const isLatestUser = i === msgs.length - 1 && m.role === 'user';
      let parts = [];
      let text = m.text || '';
      if (m.files && m.files.length) {
        if (isLatestUser) {
          m.files.forEach(f => {
            if (f.base64) parts.push({ inline_data: { mime_type: f.type, data: f.base64.split(',')[1] } });
          });
        } else {
          text += ' ' + m.files.map(f => `[tệp đính kèm: ${f.name}]`).join(' ');
        }
      }
      parts.unshift({ text: text || '(tệp đính kèm)' });
      return { role: m.role === 'bot' ? 'model' : 'user', parts };
    });
  }

  async function callGemini(session){
    if (!API_KEY) { addSystemMsg('❌ Chưa có API Key.'); return; }
    const model = session.model || currentModel;
    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${API_KEY}`;
    const usedTemp = parseFloat(tempInput.value) || .7;
    const usedMaxTokens = parseInt(maxTokensInput.value) || 800;
    const usedTopP = parseFloat(topPInput.value) || .95;
    const usedTopK = parseInt(topKInput.value) || 40;
    const usedSysInstr = sysInstrInput.value || 'Bạn là trợ lý AI.';

    const payload = {
      contents: buildContents(session),
      systemInstruction: { parts: [{ text: usedSysInstr }] },
      safetySettings: [
        { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
        { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
      ],
      generationConfig: { temperature: usedTemp, maxOutputTokens: usedMaxTokens, topP: usedTopP, topK: usedTopK }
    };

    try {
      statusMsg.textContent = '⏳ Đang xử lý...';
      showTyping();
      const response = await fetch(url, { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify(payload) });
      hideTyping();
      if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        let errMsg = errData.error?.message || 'Lỗi không xác định';
        if (response.status === 403 || response.status === 401) errMsg = 'Sai key hoặc key không hợp lệ.';
        if (response.status === 429) errMsg = 'Vượt giới hạn tốc độ (rate limit). Vui lòng thử lại sau.';
        addSystemMsg(`❌ Lỗi: ${errMsg}`);
        statusMsg.textContent = '❌ Lỗi';
        return;
      }
      const data = await response.json();
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '(Không có nội dung)';
      session.messages.push({ id: uid(), role:'bot', text, ts: Date.now() });
      addMessageDom({ role:'bot', text });
      saveSessions();
      statusMsg.textContent = '✅ Nhận phản hồi';
    } catch (e) {
      hideTyping();
      addSystemMsg(`⚠️ Lỗi: ${e.message}`);
      statusMsg.textContent = '⚠️ Lỗi kết nối';
    }
  }

  /* ---------------- Send flow ---------------- */
  function updateSendState(){
    const hasKey = API_KEY?.trim()?.length > 0;
    const hasContent = userInput.value.trim().length > 0 || pendingFiles.length > 0;
    sendBtn.disabled = !hasKey || !hasContent;
  }

  async function handleSend(){
    const text = userInput.value.trim();
    if (!text && pendingFiles.length === 0) return;
    if (!API_KEY) { addSystemMsg('🔑 Vui lòng nhập API Key.'); return; }

    const session = getCurrentSession() || createSession();
    const filesMeta = [];
    for (const f of pendingFiles) filesMeta.push(await buildFileMeta(f));

    const userMsg = { id: uid(), role:'user', text, files: filesMeta, ts: Date.now() };
    session.messages.push(userMsg);
    if (!session.titleSet) {
      session.title = text ? text.slice(0, 40) : (filesMeta[0] ? filesMeta[0].name : 'Cuộc trò chuyện mới');
      session.titleSet = true;
    }
    pendingFiles = [];
    renderAttachPreview();
    addMessageDom(userMsg);
    renderSidebar();
    updateHeader();
    saveSessions();

    userInput.value = '';
    userInput.disabled = true; sendBtn.disabled = true;
    statusMsg.textContent = '⏳ Đang xử lý...';

    await callGemini(session);

    userInput.disabled = false;
    userInput.focus();
    updateSendState();
    if (API_KEY) statusMsg.textContent = '✅ Sẵn sàng';
  }

  /* ---------------- Settings ---------------- */
  function updateChatEnable(){
    const hasKey = API_KEY?.trim()?.length > 0;
    userInput.disabled = !hasKey;
    userInput.placeholder = hasKey ? 'Nhập tin nhắn...' : '🔒 Cần API Key';
    statusMsg.textContent = hasKey ? '✅ Sẵn sàng' : '⛔ Vui lòng nhập API Key';
    updateSendState();
  }

  function saveAllSettings(){
    const key = apiKeyInput.value.trim();
    API_KEY = key; localStorage.setItem('gemini_key', key);
    currentModel = modelSelect.value; localStorage.setItem('gemini_model', currentModel);
    localStorage.setItem('gemini_temp', parseFloat(tempInput.value) || .7);
    localStorage.setItem('gemini_maxTokens', parseInt(maxTokensInput.value) || 800);
    localStorage.setItem('gemini_topP', parseFloat(topPInput.value) || .95);
    localStorage.setItem('gemini_topK', parseInt(topKInput.value) || 40);
    localStorage.setItem('gemini_sysInstr', sysInstrInput.value || 'Bạn là trợ lý AI.');
    const s = getCurrentSession();
    if (s) s.model = currentModel;
    saveSessions();
    updateHeader();
    updateChatEnable();
    addSystemMsg('✅ Đã lưu cài đặt');
    statusMsg.textContent = API_KEY ? '✅ Cài đặt đã lưu' : '⛔ Chưa có key';
  }

  /* ---------------- Events ---------------- */
  sendBtn.addEventListener('click', handleSend);
  userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
  userInput.addEventListener('input', updateSendState);

  setKeyBtn.addEventListener('click', () => {
    const key = apiKeyInput.value.trim();
    if (!key) { addSystemMsg('⚠️ Key không được để trống.'); return; }
    API_KEY = key; localStorage.setItem('gemini_key', key);
    updateChatEnable(); addSystemMsg('🔑 API Key đã lưu.'); userInput.focus();
  });
  apiKeyInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') setKeyBtn.click(); });

  toggleBtn.addEventListener('click', () => settingsPanel.classList.toggle('open'));
  closeSettingsBtn.addEventListener('click', () => settingsPanel.classList.remove('open'));
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      settingsPanel.classList.remove('open');
      closeSidebarMobile();
    }
  });
  saveBtn.addEventListener('click', saveAllSettings);

  newChatBtn.addEventListener('click', createSession);
  openSidebarBtn.addEventListener('click', openSidebarMobile);
  closeSidebarBtn.addEventListener('click', closeSidebarMobile);
  sidebarOverlay.addEventListener('click', closeSidebarMobile);

  /* ---------------- Mobile keyboard / viewport fix ---------------- */
  // Tránh header/sidebar/input bị trôi mất khi bàn phím ảo mở trên mobile:
  // dùng visualViewport để tính đúng chiều cao khả dụng thay vì chỉ 100vh.
  function setAppHeight(){
    const h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setAppHeight);
    window.visualViewport.addEventListener('scroll', setAppHeight);
  }
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 200));

  userInput.addEventListener('focus', () => {
    setTimeout(() => {
      setAppHeight();
      msgContainer.scrollTop = msgContainer.scrollHeight;
    }, 300);
  });

  /* ---------------- Init ---------------- */
  sessions = loadSessions();
  if (sessions.length === 0) {
    sessions.push({ id: uid(), title:'Cuộc trò chuyện mới', titleSet:false, model: currentModel, createdAt: Date.now(), messages: [] });
  }
  const savedCurrent = localStorage.getItem('gemini_current_session');
  currentSessionId = sessions.find(s => s.id === savedCurrent) ? savedCurrent : sessions[0].id;

  renderSidebar();
  renderMessages();
  updateHeader();
  updateChatEnable();

  if (API_KEY) userInput.focus();
  else apiKeyInput.focus();
})();
</script>
</body>
